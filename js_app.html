                            return;
                        }
                        // キャッシュ更新
                        this._settings = data;
                        this._settingsMap = null;
                        Utils.showToast('SM設定を保存しました', 'success');
                        this.closeSettingsModal();
                    } catch (error) {
                        console.error('[SM設定] 保存エラー:', error);
                        Utils.showToast('SM設定の保存に失敗しました', 'error');
                    }
                },

                // --- Excel出力 ---
                _buildSettingsMap(settings) {
                    const map = new Map();
                    (settings || []).forEach(s => {
                        if (!map.has(s.courseName)) {
                            map.set(s.courseName, []);
                        }
                        // クラス一覧をカンマ区切りで配列化
                        const classes = s.classes.split(/[,，]/).map(c => c.trim()).filter(c => c);
                        map.get(s.courseName).push({ groupNumber: s.groupNumber, classes: classes });
                    });
                    return map;
                },

                async exportData() {
                    const statusDiv = document.getElementById('sm-export-status');
                    const button = document.getElementById('sm-export-button');

                    try {
                        button.disabled = true;
                        statusDiv.innerHTML = '<span style="color: #007bff;">データを取得中...</span>';

                        // 全生徒データ取得
                        const result = await DataManager.callGASFunction('getAllStudentsData', true);
                        const allStudents = NewClassImporter.applyOverlay(result?.students || result || []);

                        // フィルタ
                        const targetStatuses = new Set(['本登録']);
                        const finalStudents = allStudents.filter(s =>
                            targetStatuses.has(String(s['ステータス'] || '').trim())
                        );

                        if (finalStudents.length === 0) {
                            const msg = '本登録済みの生徒がいません。';
                            statusDiv.innerHTML = `<span style="color: #dc3545;">${msg}</span>`;
                            return;
                        }

                        statusDiv.innerHTML = '<span style="color: #007bff;">Excelファイルを生成中...</span>';

                        // ソート
                        finalStudents.sort((a, b) => {
                            const gradeA = parseInt(a['学年'] || 0);
                            const gradeB = parseInt(b['学年'] || 0);
                            if (gradeA !== gradeB) return gradeA - gradeB;
                            const classA = String(a['組'] || '');
                            const classB = String(b['組'] || '');
                            if (classA !== classB) return classA.localeCompare(classB);
                            return parseInt(a['番号'] || 0) - parseInt(b['番号'] || 0);
                        });

                        // SM設定取得（キャッシュあれば使用）
                        let settings = this._settings;
                        if (!settings) {
                            const smResult = await DataManager.callGASFunction('getSMSettings');
                            settings = (smResult && smResult.success) ? smResult.data : [];
                            this._settings = settings;
                        }

                        const courseNames = AppState.allCourses.map(c => c['科目名']);
                        const settingsMap = this._buildSettingsMap(settings);

                        // ヘッダー・行データ構築
                        const { headers, rows } = this.buildExportData(finalStudents, courseNames, settingsMap);

                        // SheetJSでExcel生成
                        const wb = XLSX.utils.book_new();
                        const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
                        const sheetName = 'SM取り込みデータ（本登録）';
                        XLSX.utils.book_append_sheet(wb, ws, sheetName);

                        const today = new Date();
                        const dateStr = today.getFullYear() + '-' +
                            String(today.getMonth() + 1).padStart(2, '0') + '-' +
                            String(today.getDate()).padStart(2, '0');
                        const fileName = 'SM取り込みデータ_本登録';
                        XLSX.writeFile(wb, `${fileName}_${dateStr}.xlsx`);

                        statusDiv.innerHTML = `<span style="color: #198754;">${finalStudents.length}名分のデータをダウンロードしました。</span>`;
                        Utils.showToast(`${finalStudents.length}名分のSMデータをダウンロードしました`, 'success');

                    } catch (error) {
                        console.error('[SM出力] エラー:', error);
                        statusDiv.innerHTML = '<span style="color: #dc3545;">エラーが発生しました。</span>';
                        Utils.showToast('SMデータの生成に失敗しました', 'error');
                    } finally {
                        button.disabled = false;
                    }
                },

                buildExportData(finalStudents, courseNames, settingsMap) {
                    // ヘッダー構築
                    const headers = ['学籍番号', '学年', '組', '番号', '名前'];
                    courseNames.forEach(name => {
                        if (settingsMap.has(name)) {
                            // グループ数分だけ科目名を追加
                            settingsMap.get(name).forEach(() => {
                                headers.push(name);
                            });
                            headers.push(name); // 残りクラス用の追加列
                        } else {
                            headers.push(name);
                        }
                    });

                    // 行データ構築
                    const rows = finalStudents.map(student => {
                        const row = [
                            student['学籍番号'] || '',
                            student['学年'] || '',
                            student['組'] || '',
                            student['番号'] || '',
                            student['名前'] || ''
                        ];
                        const studentClass = String(student['学年'] || '') + '-' + String(student['組'] || '');

                        courseNames.forEach(name => {
                            const hasCircle = /^○/.test(String(student[name] || '').trim());
                            if (settingsMap.has(name)) {
                                const groups = settingsMap.get(name);
                                // 定義済みグループのいずれかに属するかチェック
                                let matchedAnyGroup = false;
                                groups.forEach(group => {
                                    const matched = group.classes.includes(studentClass);
                                    if (matched) matchedAnyGroup = true;
                                    row.push(hasCircle && matched ? '○' : '');
                                });
                                // 残りクラス列: どのグループにも属さない生徒
                                row.push(hasCircle && !matchedAnyGroup ? '○' : '');
                            } else {
                                row.push(hasCircle ? '○' : '');
                            }
                        });
                        return row;
                    });

                    return { headers, rows };
                }
            };
            window.SMExporter = SMExporter;

            // 教科書発注データ出力
            const TextbookExporter = {
                // 取り込み済み個人情報（学籍番号→{フリガナ, 郵便番号, 住所, 電話番号}）
                personalData: {},
                personalLoaded: false,
                _textbookSettings: null,

                // --- 設定モーダル ---
                async openSettingsModal() {
                    Utils.showModal('textbook-settings-modal');
                    const content = document.getElementById('textbook-settings-content');
                    content.innerHTML = '<p style="text-align: center; color: #004294;">読み込み中...</p>';
                    try {
                        const result = await DataManager.callGASFunction('getTextbookData');
                        if (!result || !result.success) {
                            content.innerHTML = '<p style="color: #dc3545;">設定の読み込みに失敗しました。</p>';
                            return;
                        }
                        this._textbookSettings = result.data || [];
                        this._renderCodeSettingsTable(content, this._textbookSettings, 'textbook');
                    } catch (error) {
                        console.error('[教科書設定] 読み込みエラー:', error);
                        content.innerHTML = '<p style="color: #dc3545;">設定の読み込みに失敗しました。</p>';
                    }
                },

                closeSettingsModal() {
                    Utils.hideModal('textbook-settings-modal');
                },

                // 共通描画関数（ReportExporterからも呼び出す）
                _renderCodeSettingsTable(container, settings, prefix) {
                    if (!AppState.allCourses || AppState.allCourses.length === 0) {
                        container.innerHTML = '<p style="color: #dc3545;">科目データが読み込まれていません。</p>';
                        return;
                    }

                    // 設定をMapに変換（科目名→コード文字列）
                    const settingsMap = new Map();
                    settings.forEach(s => {
                        // codes配列をカンマ区切り文字列に結合
                        const codeStr = Array.isArray(s.codes) ? s.codes.join(', ') : (s.codes || '');
                        settingsMap.set(s.courseName, codeStr);
                    });

                    const codeLabel = prefix === 'textbook' ? '商品コード' : '科目コード';

                    // フィルタ入力 + テーブル
                    let html = '<div style="margin-bottom: 10px;">';
                    html += `<input type="text" id="${prefix}-settings-filter" placeholder="科目名で絞り込み..." oninput="TextbookExporter.filterSettingsCourses('${prefix}', this.value)" style="width: 100%; padding: 8px; border: 1px solid #dee2e6; border-radius: 5px; font-size: 14px; box-sizing: border-box;">`;
                    html += '</div>';
                    html += '<table style="width: 100%; border-collapse: collapse; font-size: 0.9em;">';
                    html += `<thead><tr style="background: #f8f9fa; position: sticky; top: 0; z-index: 1;"><th style="padding: 8px; border: 1px solid #dee2e6; width: 30%;">科目名</th><th style="padding: 8px; border: 1px solid #dee2e6;">${codeLabel}</th></tr></thead>`;
                    html += '<tbody>';

                    AppState.allCourses.forEach((course, idx) => {
                        const name = course['科目名'];
                        const codeValue = settingsMap.get(name) || '';
                        html += `<tr class="${prefix}-course-row" data-course-name="${Utils.escapeHtml(name)}">`;
                        html += `<td style="padding: 8px; border: 1px solid #dee2e6; vertical-align: middle; font-weight: bold;">${Utils.escapeHtml(name)}</td>`;
                        html += `<td style="padding: 8px; border: 1px solid #dee2e6;">`;
                        const placeholderText = prefix === 'textbook' ? 'カンマ区切りで複数入力可' : '科目コードを入力';
                        html += `<input type="text" class="${prefix}-code-input" data-course-name="${Utils.escapeHtml(name)}" value="${Utils.escapeHtml(codeValue)}" placeholder="${placeholderText}" style="width: 100%; padding: 4px 6px; border: 1px solid #dee2e6; border-radius: 4px; font-size: 0.9em; box-sizing: border-box;">`;
                        html += '</td></tr>';
                    });

                    html += '</tbody></table>';
                    container.innerHTML = html;
                },

                // 共通フィルタ関数
                filterSettingsCourses(prefix, keyword) {
                    const rows = document.querySelectorAll(`.${prefix}-course-row`);
                    const kw = keyword.trim().toLowerCase();
                    rows.forEach(row => {
                        const name = (row.getAttribute('data-course-name') || '').toLowerCase();
                        row.style.display = (!kw || name.includes(kw)) ? '' : 'none';
                    });
                },

                async saveSettings() {
                    try {
                        // モーダル内の全入力値を収集
                        const data = [];
                        const inputs = document.querySelectorAll('.textbook-code-input');
                        inputs.forEach(input => {
                            const courseName = input.getAttribute('data-course-name');
                            const codes = input.value.trim();
                            if (codes) {
                                data.push({ courseName: courseName, codes: codes });
                            }
                        });

                        const result = await DataManager.callGASFunction('saveTextbookData', data);
                        if (!result || !result.success) {
                            Utils.showToast(result?.error || '教科書設定の保存に失敗しました', 'error');
                            return;
                        }
                        this._textbookSettings = data;
                        Utils.showToast('教科書設定を保存しました', 'success');
                        this.closeSettingsModal();
                    } catch (error) {
                        console.error('[教科書設定] 保存エラー:', error);
                        Utils.showToast('教科書設定の保存に失敗しました', 'error');
                    }
                },

                // 個人情報Excelファイル読み込み
                handlePersonalFileSelect(event) {
                    const file = event.target.files[0];
                    if (!file) return;

                    const statusDiv = document.getElementById('textbook-personal-status');
                    statusDiv.innerHTML = '<span style="color: #007bff;">読み込み中...</span>';

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const workbook = XLSX.read(data, { type: 'array' });
                            const sheet = workbook.Sheets[workbook.SheetNames[0]];
                            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });

                            const strip = (s) => s ? String(s).replace(/[\uFEFF\u200B\u200C\u200D\uFFFE]/g, '').trim() : '';

                            // ヘッダー行を検索（「学籍番号」を含む行）
                            let headerIdx = -1;
                            for (let i = 0; i < Math.min(rows.length, 10); i++) {
                                if (rows[i] && rows[i].some(cell => strip(cell) === '学籍番号')) {
                                    headerIdx = i;
                                    break;
                                }
                            }
                            if (headerIdx === -1) {
                                statusDiv.innerHTML = '<span style="color: #dc3545;">「学籍番号」列が見つかりません。</span>';
                                return;
                            }

                            const headers = rows[headerIdx].map(h => strip(h));
                            const idCol = headers.indexOf('学籍番号');

                            // 各列のインデックスを取得（存在しなければ-1）
                            const furiganaCol = headers.indexOf('フリガナ');
                            const zipCol = headers.indexOf('郵便番号');
                            const addressCol = headers.indexOf('住所');
                            const phoneCol = headers.indexOf('電話番号');

                            this.personalData = {};
                            let count = 0;
                            for (let i = headerIdx + 1; i < rows.length; i++) {
                                const row = rows[i];
                                if (!row) continue;
                                const studentId = strip(row[idCol]);
                                if (!studentId) continue;

                                const info = {};
                                if (furiganaCol !== -1) info['フリガナ'] = strip(row[furiganaCol]);
                                if (zipCol !== -1) info['郵便番号'] = strip(row[zipCol]);
                                if (addressCol !== -1) info['住所'] = strip(row[addressCol]);
                                if (phoneCol !== -1) info['電話番号'] = strip(row[phoneCol]);
                                this.personalData[studentId] = info;
                                count++;
                            }

                            this.personalLoaded = true;
                            statusDiv.innerHTML = `<span style="color: #198754;">✓ ${count}名分の個人情報を読み込みました。</span>`;
                            // ボタンの色とテキストを読み込み済みに変更
                            const personalBtn = document.getElementById('textbook-personal-button');
                            if (personalBtn) {
                                personalBtn.style.backgroundColor = '#198754';
                                personalBtn.textContent = `${count}名 読込済（再選択可）`;
                            }
                            // STEP 2をアクティブ化
                            const step2 = document.getElementById('textbook-step2-container');
                            if (step2) step2.style.opacity = '1';
                            const exportBtn = document.getElementById('textbook-export-button');
                            if (exportBtn) exportBtn.disabled = false;
                        } catch (err) {
                            console.error('[教科書発注] 個人情報Excel読み込みエラー:', err);
                            statusDiv.innerHTML = '<span style="color: #dc3545;">ファイルの読み込みに失敗しました。</span>';
                        }
                    };
                    reader.readAsArrayBuffer(file);
                    // 同じファイルの再選択に対応
                    event.target.value = '';
                },

                // 教科書発注データExcel出力
                async exportData() {
                    const statusDiv = document.getElementById('textbook-export-status');
                    const button = document.getElementById('textbook-export-button');

                    // 個人情報未取り込みガード（フェイルセーフ）
                    if (!this.personalLoaded) {
                        statusDiv.innerHTML = '<span style="color: #dc3545;">先に個人情報Excelを取り込んでください。</span>';
                        return;
                    }

                    try {
                        button.disabled = true;
                        statusDiv.innerHTML = '<span style="color: #007bff;">データを取得中...</span>';

                        // 教科書データをGASから取得
                        const textbookResult = await DataManager.callGASFunction('getTextbookData');
                        if (!textbookResult?.success) {
                            statusDiv.innerHTML = `<span style="color: #dc3545;">${textbookResult?.error || '教科書データの取得に失敗しました。'}</span>`;
                            return;
                        }
                        const textbookData = textbookResult.data;
                        if (textbookData.length === 0) {
                            statusDiv.innerHTML = '<span style="color: #dc3545;">教科書シートにデータがありません。</span>';
                            return;
                        }

                        // 科目名→教科書コード配列のマップを構築
                        const textbookMap = {};
                        textbookData.forEach(item => {
                            textbookMap[item.courseName] = item.codes;
                        });

                        // 全生徒データ取得（教職員テストデータ含む）
                        const result = await DataManager.callGASFunction('getAllStudentsData', true);
                        const allStudents = NewClassImporter.applyOverlay(result?.students || result || []);

                        const targetStatuses = new Set(['本登録']);
                        const finalStudents = allStudents.filter(s =>
                            targetStatuses.has(String(s['ステータス'] || '').trim())
                        );

                        if (finalStudents.length === 0) {
                            statusDiv.innerHTML = '<span style="color: #dc3545;">本登録済みの生徒がいません。</span>';

            window.printBulkDocument = async function(type) {
                // 前回の印刷コンテンツが残っていれば除去（afterprint未発火時の対策）
                document.querySelectorAll('.print-content').forEach(el => el.remove());

                const classSelect = document.getElementById('class-select');
                const statusDiv = document.getElementById('bulk-print-status');

                if (!classSelect.value) {
                    Utils.showToast('クラスを選択してください');
                    return;
                }

                const className = classSelect.value;
                const statusText = type === 'draft' ? '記入用紙' : '確認用紙';
                statusDiv.innerHTML = `<span style="color: #007bff;">${statusText}を準備中...</span>`;

                try {
                    // 印刷用には常に全生徒データを取得（教職員テストデータも含む）
                    // cachedAllStudentsDataはincludeTeachers=falseで取得されている場合があり、
                    // 教職員メールの行が除外されるため、印刷には使用しない
                    statusDiv.innerHTML = `<span style="color: #007bff;">生徒データを読み込み中...</span>`;
                    const result = await DataManager.callGASFunction('getAllStudentsData', true);
                    const allStudents = result?.students || result || [];
                    // 新クラスオーバーレイ適用
                    let students = [...NewClassImporter.applyOverlay(allStudents)];

                    // クラス選択によるフィルタリング
                    if (className !== 'all') {
                        const sepIdx = className.indexOf('-');
                        const grade = parseInt(className.substring(0, sepIdx));
                        const classVal = className.substring(sepIdx + 1);
                        students = students.filter(student => {
                            const studentGrade = parseInt(student['学年'] || student.grade);
                            const studentClass = String(student['組'] || student.class || '').trim();
                            return studentGrade === grade && studentClass === classVal;
                        });
                    }

                    // 学年→組（数値優先）→番号でソート
                    students.sort((a, b) => Utils.compareByGradeClassNumber(
                        a['学年'] || a.grade, a['組'] || a.class, a['番号'] || a.number,
                        b['学年'] || b.grade, b['組'] || b.class, b['番号'] || b.number
                    ));

                    if (students.length === 0) {
                        statusDiv.innerHTML = `<span style="color: #dc3545;">❌ 生徒データが見つかりません。</span>`;
                        return;
                    }

                    // 一括印刷用コンテンツを生成
                    const printContainer = await createBulkPrintContent(students, type, statusDiv);
                    document.body.appendChild(printContainer);

                    // 各ページをA4サイズに収まるようスケール調整
                    const pages = printContainer.querySelectorAll('.print-page');
                    pages.forEach(page => {
                        window.EventHandlers.adjustPrintScale(page);
                    });

                    // 印刷後にコンテンツを削除
                    const cleanup = () => {
                        if (document.body.contains(printContainer)) {
                            document.body.removeChild(printContainer);
                        }
                        // リストの順番を維持するため再描画
                        TeacherScreen.renderStudentsList();
                        window.removeEventListener('afterprint', cleanup);
                        statusDiv.innerHTML = '';
                    };
                    window.addEventListener('afterprint', cleanup);
                    requestAnimationFrame(() => {
                        window.print();
                    });
                    // フォールバック: afterprintが発火しない環境用
                    setTimeout(cleanup, 5000);


                } catch (error) {
                    console.error('一括印刷エラー:', error);
                    statusDiv.innerHTML = '<span style="color: #dc3545;">❌ エラーが発生しました</span>';
                    TeacherScreen.renderStudentsList();
                }
            };

            // 一括印刷用コンテンツ生成
            async function createBulkPrintContent(students, type, statusDiv) {
                // 印刷用コンテナ
                const printContainer = document.createElement('div');
                printContainer.className = 'print-content batch-print';
                printContainer.style.position = 'absolute';
                printContainer.style.left = '-9999px';
                printContainer.style.top = '0';

                // 元のAppStateを保存
                const originalUserInfo = AppState.userInfo;
                const originalCurrentUser = AppState.currentUser;
                const originalAuthenticatedUser = AppState.authenticatedUser;
                const originalRegistrationData = AppState.registrationData;
                const originalCompletedCourses = AppState.completedCourses;
                const originalAutoRegisteredCourses = AppState.autoRegisteredCourses;
                const originalPureAutoRegisteredCourses = AppState.pureAutoRegisteredCourses;
                const originalRegisteredCourses = AppState.registeredCourses;
                const originalRegistrationStatus = AppState.registrationStatus;
                const originalInProgressCourses = AppState.inProgressCourses;
                const originalRetakenCourses = AppState.retakenCourses;
                const originalRetakenYearMap = AppState.retakenYearMap;
                const originalLockedCourses = AppState.lockedCourses;
                const originalCompletedCoursesYearMap = AppState.completedCoursesYearMap;
                const originalInProgressCoursesYearMap = AppState.inProgressCoursesYearMap;

                const showErrors = document.getElementById('error-display-checkbox')?.checked;

                for (let i = 0; i < students.length; i++) {
                    const student = { ...students[i] };
                    statusDiv.innerHTML = `<span style="color: #007bff;">印刷準備中... (${i + 1}/${students.length})</span>`;

                    // 生徒データの正規化
                    if (!student.name) {
                        student.name = student['名前'] || student['氏名'] || student['ユーザー名'] || `生徒${i + 1}`;
                    }
                    if (student.grade == null && student['学年'] != null) student.grade = student['学年'];
                    if (!student.class && student['組']) student.class = student['組'];
                    if (!student.number && student['番号']) student.number = student['番号'];
                    if (student['ステータス']) student.status = student['ステータス'];
                    if (!student.studentId && student['学籍番号']) student.studentId = student['学籍番号'];
                    // 来年度学年を設定（留年対応）
                    if (student['来年度学年']) {
                        const ng = parseInt(student['来年度学年']);
                        if (!isNaN(ng) && ng >= 1 && ng <= 3) student.nextGrade = ng;
                    }

                    // 生徒データを一時的に設定
                    AppState.userInfo = student;
                    AppState.currentUser = student;
                    AppState.authenticatedUser = student; // SelectabilityCheckerのフォールバック用
                    AppState.registrationStatus = { status: student['ステータス'] || '未提出' }; // 生徒のステータスを設定

                    // 共通関数でregistrationDataを構築しAppStateに反映
                    const registrationStatusResult = RegistrationManager.applyStudentRegistration(student);
                    AppState.registeredCourses = Object.keys(AppState.registrationData).filter(k => AppState.registrationData[k]);

                    // 記入用紙の場合は生徒の選択マーク表示を抑制（自動登録・履修済みは残す）
                    if (type === 'draft') {
                        const autoSet = new Set(AppState.autoRegisteredCourses);
                        const completedSet = new Set(AppState.completedCourses);
                        const inProgressSet = new Set(AppState.inProgressCourses || []);
                        Object.keys(AppState.registrationData).forEach(courseName => {
                            if (!autoSet.has(courseName) && !completedSet.has(courseName) && !inProgressSet.has(courseName)) {
                                delete AppState.registrationData[courseName];
                            }
                        });
                        AppState.registeredCourses = [];
                    }

                    // 高速ルックアップ用Setを更新（hasCompletedCourse/hasAutoRegisteredCourseが正しく動作するため）
                    updateCourseSets();

                    // エラー判定（チェックON & 確認用紙の場合のみ）
                    let errorReasons = [];
                    if (showErrors && type !== 'draft') {
                        // 1. ステータスチェック
                        const st = String(student['ステータス'] || '').trim();
                        const submittedStatuses = new Set(['仮登録', '確認済', '本登録許可', '本登録']);
                        if (!submittedStatuses.has(st)) {
                            // 移行期間中（履修中科目がある）は未提出エラーを表示しない
                            const hasEnrolledCourses = AppState.currentlyEnrolledCourses && AppState.currentlyEnrolledCourses.length > 0;
                            if (!hasEnrolledCourses) {
                                errorReasons.push('未提出');
                            }
                        }
                        // 2. 選択不可科目チェック
                        const invalidCourses = RegistrationManager.checkInvalidSelections();
                        if (invalidCourses.length > 0) {
                            errorReasons.push('選択できない科目がある');
                        }
                        // 3. 卒業要件チェック
                        const gradResult = GraduationRequirementChecker.checkRequirements();
                        if (gradResult.isTarget && !gradResult.isSatisfied) {
                            errorReasons.push('卒業要件未充足');
                        }
                    }

            // キャッシュクリア処理
            function clearCache() {
                try {
                    // LocalStorageの教員キャッシュをクリア
                    const keysToRemove = [];
                    for (let i = 0; i < localStorage.length; i++) {
                        const key = localStorage.key(i);
                        if (key && (key.startsWith('teacherView_') || key === 'teacherViewData')) {
                            keysToRemove.push(key);
                        }
                    }
                    keysToRemove.forEach(key => localStorage.removeItem(key));
                    
                    // GAS側のキャッシュもクリア（実装予定）
                } catch (error) {
                }

                // ブラウザキャッシュをクリア
                if ('serviceWorker' in navigator) {
                    caches.keys().then(function(cacheNames) {
                        cacheNames.forEach(function(cacheName) {
                            caches.delete(cacheName);
                        });
                    });
                }

                // localStorage の部分クリア（キャッシュ関連のみ）
                try {
                    Object.keys(localStorage).forEach(key => {
                        if (key.includes('cache') || key.includes('Cache') || key.includes('CACHE')) {
                            localStorage.removeItem(key);
                        }
                    });
                } catch(e) {
                }
            }

            // 本登録画面を表示

                    // コンテンツを生成（確認画面と同じフォーマット）

                            <p><strong>氏名:</strong> ${displayName}</p>
                        </div>

                        <div id="registration-form-container"></div>
                    `;

                    document.getElementById('final-registration-content').innerHTML = content;

                    // 履修科目を表示（学生画面と同じ表示）
                    if (registrationData.success && (registrationData.data || registrationData.row)) {
                        const formContainer = document.querySelector('#final-registration-screen #registration-form-container');


                        // registrationData を正しい形式に変換
                        const formData = registrationData.data || {
                            header: registrationData.header,
                            row: registrationData.row
                        };


                        // courseData から科目リストを取得（構造に応じて対応）
                        let allCourses = [];
                        if (Array.isArray(courseData.data)) {
                            allCourses = courseData.data;
                        } else if (courseData.data && typeof courseData.data === 'object') {
                            // year1, year2, year3 等のオブジェクト → {required: [], elective: []} → 配列に展開
                            Object.values(courseData.data).forEach(yearData => {
                                if (yearData.required && Array.isArray(yearData.required)) {
                                    allCourses.push(...yearData.required);
                                }
                                if (yearData.elective && Array.isArray(yearData.elective)) {
                                    allCourses.push(...yearData.elective);
                                }
                            });
                        }


                        // 3年間の合計を計算（仮登録確認画面と同じロジック）
                        const tempRegistrationData = {};
                        if (formData.header && formData.row) {
                            formData.header.forEach((headerName, index) => {
                                const value = formData.row[index];
                                if (value && headerName) {
                                    tempRegistrationData[headerName] = value;
                                }
                            });
                        }

                        const userInfo = {
                            grade: safeParseGrade(tempRegistrationData['学年'], 1),
                            name: tempRegistrationData['名前'] || '',
                            studentId: tempRegistrationData['学籍番号'] || ''
                        };

                        // 履修データから選択済み科目を抽出（履修中科目は除外）
                        const selectedCourses = [];
                        const finalRegEnrolledCourses = []; // 履修中と判定された科目
                        const localCourseMap = new Map(allCourses.map(c => [c['科目名'], c]));
                        const finalCurrentGrade = safeParseGrade(userInfo.grade, 1);
                        if (formData.header && formData.row && allCourses.length > 0) {
                            formData.header.forEach((headerName, index) => {
                                const value = formData.row[index];
                                // ○印がついている科目を抽出
                                if (value && typeof value === 'string' && value.includes('○')) {
                                    // ○N→履修中変換: Nがcurrentgradeと一致 & Nサフィックスなし → 履修中
                                    const yearMatch = value.match(/^[○〇⚪](\d)(N?)$/);
                                    if (yearMatch && parseInt(yearMatch[1]) === finalCurrentGrade && yearMatch[2] !== 'N') {
                                        finalRegEnrolledCourses.push(headerName);
                                    } else {
                                        // 科目名からコースデータを探す
                                        const course = localCourseMap.get(headerName);
                                        if (course) {
                                            selectedCourses.push(course);
                                        }
                                    }
                                }
                            });
                        }

                        // △科目を抽出
                        const tempEnrolledCourses = [];
                        const tempEnrolledYearMap = {};
                        Object.keys(tempRegistrationData).forEach(key => {
                            const val = tempRegistrationData[key];
                            if (val === '△') {
                                tempEnrolledCourses.push(key);
                            } else if (/^△[123]$/.test(val)) {
                                tempEnrolledCourses.push(key);
                                tempEnrolledYearMap[key] = parseInt(val[1]);
                            }
                        });

                        // ○N→履修中変換で検出された科目をtempEnrolledCoursesに追加
                        finalRegEnrolledCourses.forEach(courseName => {
                            if (!tempEnrolledCourses.includes(courseName)) {
                                tempEnrolledCourses.push(courseName);
                                tempEnrolledYearMap[courseName] = finalCurrentGrade;
                            }
                        });

                        const statsResult = Utils.calculateUnitsStats(
                            tempRegistrationData,
                            allCourses,
                            userInfo,
                            [],
                            {},
                            {},
                            RegistrationManager.getCourseCategory.bind(RegistrationManager),
                            [],
                            tempEnrolledCourses,
                            tempEnrolledYearMap
                        );
                        const gradeStats = statsResult.gradeStats;
                        const allYearsTotal = gradeStats.year1.total + gradeStats.year2.total + gradeStats.year3.total;

                        // セクション別にグループ化して表示
                        let html = '';
                        let totalUnits = 0;
                        if (selectedCourses.length > 0) {
                            const sectionGroups = {};
                            selectedCourses.forEach(course => {
                                const section = course['セクション'] || 'その他';
                                if (!sectionGroups[section]) {
                                    sectionGroups[section] = [];
                                }
                                sectionGroups[section].push(course);
                            });

                            const sections = Object.keys(sectionGroups);

                            // セクションごとに表示
                            sections.forEach(section => {
                                html += `<div class="course-group">`;
                                html += `<h2>${section}</h2>`;
                                html += '<table class="course-table">';
                                html += '<thead><tr><th>科目名</th><th>区分</th><th>単位数</th></tr></thead>';
                                html += '<tbody>';

                                let sectionTotal = 0;
                                sectionGroups[section].forEach(course => {
                                    const units = Utils.getUnits(course);
                                    sectionTotal += units;
                                    totalUnits += units;
                                    html += `<tr>`;
                                    const detail = course['詳細'];
                                    const detailHtml = detail ? `<div class="course-detail">${Utils.escapeHtml(detail)}</div>` : '';
                                    html += `<td><div class="course-name-wrapper">${course['科目名']}${detailHtml}</div></td>`;
                                    html += `<td>${Utils.getDisplayCategory(course['区分'])}</td>`;
                                    html += `<td style="text-align: center;">${units}</td>`;
                                    html += `</tr>`;
                                });

                                html += '</tbody></table>';
                                html += `<div style="text-align: right; margin-top: 5px; font-weight: bold; color: #004294;">${section}合計: ${sectionTotal}単位</div>`;
                                html += `</div>`;
                            });

                            // △科目の単位数を計算
                            let teacherEnrolledUnits = 0;
                            if (tempEnrolledCourses.length > 0) {
                                tempEnrolledCourses.forEach(courseName => {
                                    const course = localCourseMap.get(courseName);
                                    if (course) teacherEnrolledUnits += Utils.getUnits(course);
                                });
                            }

                            // 今年度履修科目の合計と3年間合計を表示
                            html += `<div style="text-align: right; margin-top: 15px; font-size: 1.0em; font-weight: bold; color: #004294; border-top: 2px solid #004294; padding-top: 10px; white-space: nowrap;">`;
                            if (teacherEnrolledUnits > 0) {
                                html += `履修中の単位数: ${teacherEnrolledUnits} 単位</div>`;
                                html += `<div style="text-align: right; margin-top: 5px; font-size: 1.0em; font-weight: bold; color: #004294; white-space: nowrap;">`;
                            }
                            if (totalUnits > 0) {
                                html += `来年度履修する単位数: ${totalUnits} 単位</div>`;
                                html += `<div style="text-align: right; margin-top: 5px; font-size: 1.0em; font-weight: bold; color: #004294; white-space: nowrap;">`;
                            }
                            html += `すべての単位数合計: ${allYearsTotal} 単位</div>`;
                        } else {
                            html = '<p>履修科目が登録されていません。</p>';
                        }

                        formContainer.innerHTML = html;
                    } else {
                        console.error('履修データが見つかりません:', registrationData);
                    }

                    // 読み込みオーバーレイを非表示
                    document.getElementById('loading-screen').style.display = 'none';

                    // 本登録ボタンにイベントを設定（モーダル表示）

                    var w = screen.width;
                    if (w > 0 && w <= 600) {

                        document.documentElement.classList.add('tablet');

                try {

                    if (saveBtn) saveBtn.disabled = true;
                    if (saveDraftBtn) saveDraftBtn.classList.add('is-disabled');

                    // GASから渡されたトークンを取得

                    document.querySelectorAll('[id$="-modal"]').forEach(modal => {
                        modal.style.display = 'none';
                    });
                    document.body.classList.remove('modal-open');
                    document.documentElement.classList.remove('modal-open');

                    TeacherScreen.stopStatusPolling();

                        // save-button（確認ボタン）は仮登録期間に関係なく有効化（中のbtn-confirmで制御）
                        if (saveBtn) saveBtn.disabled = false;
                        // モーダル内の仮登録ボタンは、仮登録設定のみで制御（最低単位数は関係ない）
                        if (confirmBtn) {
                            const hasCurrentlyEnrolled = AppState.currentlyEnrolledCourses && AppState.currentlyEnrolledCourses.length > 0;
                            confirmBtn.disabled = false; // loading時のdisabledをクリア
                            if (hasCurrentlyEnrolled || !provisionalEnabled) {
                                confirmBtn.classList.add('is-disabled');
                                confirmBtn.style.cssText = 'background-color: #e9ecef; color: #6c757d; cursor: not-allowed;';
                                confirmBtn.title = hasCurrentlyEnrolled ? '履修中の科目があるため仮登録できません' : '仮登録期間ではありません';
                            } else {
                                confirmBtn.classList.remove('is-disabled');
                                confirmBtn.style.cssText = '';
                                confirmBtn.title = '';
                            }
                        }
                        // 一時保存は仮登録とは独立して制御
                        const saveDraftEnabled = AppState.settings['一時保存'] !== '不可';
                        if (saveDraftBtn) {
                            if (!saveDraftEnabled || !AppState.isDirty) {
                                saveDraftBtn.classList.add('is-disabled');
                            } else {
                                saveDraftBtn.classList.remove('is-disabled');
                            }
                        }
                    }

                    // 仮登録期間外バナーの表示制御
                    const provisionalBanner = document.getElementById('provisional-registration-banner');
                    if (provisionalBanner) {
                        if (!provisionalEnabled) {
                            provisionalBanner.style.display = 'block';
                            document.body.style.paddingTop = '50px';
                        } else {
                            provisionalBanner.style.display = 'none';
                            document.body.style.paddingTop = '';
                        }
                    }

                    // 仮登録確認モーダル内のボタンも設定に応じて制御
                    const submitConfirmBtn = document.getElementById('submit-confirm-btn');
                    if (submitConfirmBtn) {
                        if (!provisionalEnabled) {
                            submitConfirmBtn.disabled = true;
                            submitConfirmBtn.style.cssText = 'background-color: #e9ecef; color: #6c757d; cursor: not-allowed; padding: 10px 20px; font-size: 1em; border: none; border-radius: 5px; min-width: 120px;';
                        } else {
                            submitConfirmBtn.disabled = false;
                            submitConfirmBtn.style.cssText = '';
                        }
                    }


                    // メンテナンスモードバナーの表示制御（管理者のみ）
                    const maintenanceBanner = document.getElementById('maintenance-mode-banner');
                    if (maintenanceBanner) {
                        const mMode = AppState.settings['メンテナンスモード'] || '無効';
                        if (mMode !== '無効' && AppState.userRole === 'admin') {
                            const mLabel = mMode === '教員以上' ? '有効（教職員は起動可）' : '有効（管理者のみ起動可）';
                            maintenanceBanner.textContent = 'メンテナンスモード: ' + mLabel;
                            maintenanceBanner.style.display = 'block';
                            document.body.style.paddingTop = '50px';
                        } else {
                            maintenanceBanner.style.display = 'none';
                        }
                    }

                    // 教員権限がある場合、バックグラウンドで生徒データを読み込み
                    if (['teacher', 'kyomu', 'admin'].includes(AppState.userRole)) {
                        TeacherScreen._loadStudentsPromise = TeacherScreen.loadStudentsData().catch(error => {
                            console.warn('バックグラウンド生徒データ読み込みエラー:', error);
                        });
                        // 管理画面のクラスリストもプリロード
                        populateClassList().catch(error => {
                            console.warn('クラスリストプリロードエラー:', error);
                        });
                    }
                } catch (error) {
                    console.error('アプリケーション初期化エラー:', error);
                    Utils.showToast('システムの初期化に失敗しました。ページを再読み込みしてください。');
                }
            }

            // DOM読み込み完了後に初期化実行
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initializeApp);
            } else {
                initializeApp();
            }

        })();
    </script>
