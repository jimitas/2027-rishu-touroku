                            Utils.showToast(`${studentName}の本登録許可を設定しました`, 'success');

                            // ローカルデータを即座更新
                            const studentIndex = this.studentsData.findIndex(s => s['学籍番号'] === studentId);
                            if (studentIndex !== -1) {
                                this.studentsData[studentIndex]['認証コード'] = authCode;
                                this.studentsData[studentIndex]['ステータス'] = '本登録許可';
                                this.currentViewingStudent = this.studentsData[studentIndex];
                            }

                            this.renderStudentsList();
                            this.showStudentDetail(studentId);
                        } else {
                            Utils.showToast(`本登録許可の設定に失敗しました: ${result.error}`);
                        }
                    } catch (error) {
                        console.error('本登録許可エラー:', error);
                        Utils.showToast('本登録許可の設定でエラーが発生しました');
                    } finally {
                        this.isProcessing = false;
                    }
                },

                async cancelFinalApproval() {
                    if (this.isProcessing) {
                        Utils.showToast('処理中です。しばらくお待ちください');
                        return;
                    }
                    const currentStudent = this.currentViewingStudent;
                    if (!currentStudent) {
                        Utils.showToast('生徒を選択してください');
                        return;
                    }

                    this.isProcessing = true;
                    try {
                        const studentId = currentStudent['学籍番号'];
                        const studentName = currentStudent['名前'] || currentStudent['氏名'] || studentId;

                        const result = await DataManager.callGASFunction('cancelFinalApproval', studentId);
                        if (result.success) {
                            Utils.showToast(`${studentName}の本登録許可を取り消しました`, 'success');

                            // ローカルデータを即座更新
                            const studentIndex = this.studentsData.findIndex(s => s['学籍番号'] === studentId);
                            if (studentIndex !== -1) {
                                this.studentsData[studentIndex]['認証コード'] = '';
                                this.studentsData[studentIndex]['ステータス'] = '仮登録';
                                this.currentViewingStudent = this.studentsData[studentIndex];
                            }

                            this.renderStudentsList();
                            this.showStudentDetail(studentId);
                        } else {
                            Utils.showToast(`本登録許可の取消に失敗しました: ${result.error}`);
                        }
                    } catch (error) {
                        console.error('本登録許可取消エラー:', error);
                        Utils.showToast('本登録許可の取消でエラーが発生しました');
                    } finally {
                        this.isProcessing = false;
                    }
                },

                // ===== 登録データ管理画面用メソッド =====

                // 科目の現在のマーク値を取得
                getCurrentRawMark(courseName) {
                    // ●マーク（completedCourses + YearMap）
                    if (AppState.completedCourses && AppState.completedCourses.includes(courseName)) {
                        const year = AppState.completedCoursesYearMap?.[courseName];
                        return year ? `●${year}` : '●';
                    }
                    // ○マーク（registrationData）
                    if (AppState.registrationData && AppState.registrationData[courseName]) {
                        return AppState.registrationData[courseName].replace(/〇/g, '○');
                    }
                    return '';
                },

                // マークセルをselectに変換
                convertToAdminManageSelects(detailArea) {
                    const MARK_OPTIONS = [
                        { value: '', label: '' },
                        { value: '●1', label: '●1' },
                        { value: '●2', label: '●2' },
                        { value: '●3', label: '●3' },
                        { value: '○1', label: '○1' },
                        { value: '○2', label: '○2' },
                        { value: '○3', label: '○3' },
                        { value: '○1N', label: '○1N' },
                        { value: '○2N', label: '○2N' },
                        { value: '○3N', label: '○3N' },
                    ];

                    const markCells = detailArea.querySelectorAll('[data-course-name]');
                    markCells.forEach(cell => {
                        const courseName = cell.dataset.courseName;
                        const currentMark = this.getCurrentRawMark(courseName);

                        // セルのクラスをリセット（completed等のスタイルを除去）
                        cell.className = 'admin-manage-select-cell';
                        cell.style.cssText = 'padding: 2px 4px; text-align: center;';
                        cell.removeAttribute('onclick');

                        // select要素を作成
                        const select = document.createElement('select');
                        select.dataset.courseName = courseName;
                        select.className = 'admin-manage-mark-select';

                        MARK_OPTIONS.forEach(opt => {
                            const option = document.createElement('option');
                            option.value = opt.value;
                            option.textContent = opt.label;
                            if (opt.value === currentMark) option.selected = true;
                            select.appendChild(option);
                        });

                        // select変更時にグラフをリアルタイム再計算
                        select.addEventListener('change', () => this.recalculateGraphFromSelects());

                        cell.innerHTML = '';
                        cell.appendChild(select);
                    });

                    // 元の値を保存（保存確認モーダル用）
                    this._originalMarks = {};
                    detailArea.querySelectorAll('.admin-manage-mark-select').forEach(s => {
                        if (s.id === 'admin-manage-status-select') return;
                        this._originalMarks[s.dataset.courseName] = s.value;
                    });
                    const statusSel = document.getElementById('admin-manage-status-select');
                    this._originalStatus = statusSel ? statusSel.value : '';

                    // 基本情報の元の値を保存
                    this._originalBasicFields = {
                        '学年': document.getElementById('admin-manage-grade')?.value ?? '',
                        '組': document.getElementById('admin-manage-class')?.value || '',
                        '番号': document.getElementById('admin-manage-number')?.value ?? '',
                        'メールアドレス': document.getElementById('admin-manage-email')?.value || '',
                        '来年度学年': document.getElementById('admin-manage-next-grade')?.value ?? ''
                    };

                    // 基本情報フィールドのダブルクリック編集モード設定
                    document.querySelectorAll('.admin-manage-basic-input').forEach(input => {
                        input.addEventListener('dblclick', () => {
                            input.removeAttribute('readonly');
                            input.classList.add('editing');
                            input.focus();
                        });
                        input.addEventListener('blur', () => {
                            input.setAttribute('readonly', '');
                            input.classList.remove('editing');
                        });
                    });
                },

                // 保存ボタンのイベント設定
                setupAdminManageSaveButton() {
                    const saveBtn = document.getElementById('admin-manage-save-btn');
                    if (saveBtn) {
                        saveBtn.addEventListener('click', () => this.showAdminManageSaveConfirmation());
                    }
                },

                // 保存確認モーダル表示
                showAdminManageSaveConfirmation() {
                    const changes = [];

                    // ステータスの変更チェック
                    const statusSel = document.getElementById('admin-manage-status-select');
                    if (statusSel && statusSel.value !== this._originalStatus) {
                        changes.push({ name: 'ステータス', before: this._originalStatus, after: statusSel.value });
                    }

                    // マークの変更チェック
                    const selects = document.querySelectorAll('#teacher-student-detail-area .admin-manage-mark-select');
                    selects.forEach(s => {
                        if (s.id === 'admin-manage-status-select') return;
                        const courseName = s.dataset.courseName;
                        const original = this._originalMarks[courseName] || '';
                        if (s.value !== original) {
                            changes.push({ name: courseName, before: original, after: s.value });
                        }
                    });

                    // 基本情報の変更チェック
                    const basicFieldIds = {
                        '学年': 'admin-manage-grade',
                        '組': 'admin-manage-class',
                        '番号': 'admin-manage-number',
                        'メールアドレス': 'admin-manage-email',
                        '来年度学年': 'admin-manage-next-grade'
                    };
                    if (this._originalBasicFields) {
                        Object.entries(basicFieldIds).forEach(([name, id]) => {
                            const el = document.getElementById(id);
                            if (!el) return;
                            const original = this._originalBasicFields[name] || '';
                            if (el.value !== original) {
                                changes.push({ name, before: original, after: el.value });
                            }
                        });
                    }

                    if (changes.length === 0) {
                        Utils.showToast('変更はありません', 'info');
                        return;
                    }

                    // モーダルをDOM動的生成
                    let modal = document.getElementById('admin-manage-save-confirmation-modal');
                    if (!modal) {
                        modal = document.createElement('div');
                        modal.id = 'admin-manage-save-confirmation-modal';
                        modal.className = 'submit-confirmation-modal';
                        document.body.appendChild(modal);
                    }

                    const displayMark = (v) => v || '（空白）';
                    const rowsHtml = changes.map(c => `
                        <tr>
                            <td style="padding: 6px 10px; border-bottom: 1px solid #eee;">${c.name}</td>
                            <td style="padding: 6px 10px; border-bottom: 1px solid #eee; text-align: center;">${displayMark(c.before)}</td>
                            <td style="padding: 6px 4px; border-bottom: 1px solid #eee; text-align: center; color: #999;">→</td>
                            <td style="padding: 6px 10px; border-bottom: 1px solid #eee; text-align: center; font-weight: bold;">${displayMark(c.after)}</td>
                        </tr>
                    `).join('');

                    modal.innerHTML = `
                        <div class="submit-confirmation-content" style="max-width: 500px; text-align: left;">
                            <h3>変更内容の確認</h3>
                            <p style="font-size: 0.9em; color: #666; margin-bottom: 15px;">${changes.length}件の変更があります</p>
                            <div style="max-height: 400px; overflow-y: auto;">
                                <table style="width: 100%; border-collapse: collapse; font-size: 0.9em;">
                                    <thead>
                                        <tr style="border-bottom: 2px solid var(--primary-color);">
                                            <th style="text-align: left; padding: 6px 10px;">項目</th>
                                            <th style="text-align: center; padding: 6px 10px;">変更前</th>
                                            <th style="padding: 6px 4px;"></th>
                                            <th style="text-align: center; padding: 6px 10px;">変更後</th>
                                        </tr>
                                    </thead>
                                    <tbody>${rowsHtml}</tbody>
                                </table>
                            </div>
                            <div class="submit-confirmation-buttons" style="margin-top: 20px;">
                                <button id="admin-manage-save-cancel-btn" class="save-button-in-summary" style="background-color: #6c757d;">キャンセル</button>
                                <button id="admin-manage-save-confirm-btn" class="save-button-in-summary" style="background-color: var(--primary-color);">保存</button>
                            </div>
                        </div>
                    `;

                    modal.style.display = 'flex';

                    document.getElementById('admin-manage-save-cancel-btn').onclick = () => {
                        modal.style.display = 'none';
                    };
                    document.getElementById('admin-manage-save-confirm-btn').onclick = () => {
                        modal.style.display = 'none';
                        this.saveAdminManageChanges();
                    };
                },

                // 登録データ管理: select変更時にグラフをリアルタイム再計算
                recalculateGraphFromSelects() {
                    const student = this.currentViewingStudent;
                    if (!student) return;

                    // 全selectからマークを収集
                    const selects = document.querySelectorAll('#teacher-student-detail-area .admin-manage-mark-select');
                    const markData = {};
                    selects.forEach(s => {
                        // ステータス用selectは除外
                        if (s.id === 'admin-manage-status-select') return;
                        if (s.value) markData[s.dataset.courseName] = s.value;
                    });

                    // processRegistrationStatus用のsubmissionData構築
                    const submissionData = {
                        header: Object.keys(markData),
                        row: Object.values(markData)
                    };
                    // AppState.currentUser.nextGrade を優先参照（admin-manage + 新クラスモード時に正しい値を持つ）
                    const userInfo = {
                        学年: student.grade || student['学年'],
                        来年度学年: AppState.currentUser?.nextGrade || student.nextGrade || student['来年度学年'] || null,
                        学籍番号: student['学籍番号']
                    };

                    // 派生状態を再計算してAppStateに反映
                    const result = DataProcessor.processRegistrationStatus(userInfo, submissionData, AppState.allCourses);
                    AppState.completedCourses = result.completedCourses;
                    AppState.completedCoursesYearMap = result.completedCoursesYearMap;
                    AppState.inProgressCoursesYearMap = result.inProgressCoursesYearMap;
                    AppState.registrationData = result.registrationData;
                    AppState.autoRegisteredCourses = result.autoRegisteredCourses || [];
                    AppState.pureAutoRegisteredCourses = result.pureAutoRegisteredCourses || [];
                    AppState.currentlyEnrolledCourses = result.currentlyEnrolledCourses || [];
                    AppState.currentlyEnrolledCoursesYearMap = result.currentlyEnrolledCoursesYearMap || {};

                    // gradeStats算出
                    const stats = Utils.calculateUnitsStats(
                        AppState.registrationData,
                        AppState.allCourses,
                        AppState.currentUser,
                        AppState.autoRegisteredCourses,
                        AppState.completedCoursesYearMap,
                        AppState.inProgressCoursesYearMap,
                        RegistrationManager.getCourseCategory.bind(RegistrationManager),
                        AppState.completedCourses,
                        AppState.currentlyEnrolledCourses,
                        AppState.currentlyEnrolledCoursesYearMap
                    );
                    const gradeStats = stats.gradeStats;

                    // 進捗バー更新
                    Utils.updateProgressBars(gradeStats, 'teacher');

                    // 単位数テキスト更新
                    const detailArea = document.getElementById('teacher-student-detail-area');
                    const totalUnitsValue = detailArea?.querySelector('#total-units-value');
                    const grandTotalUnitsValue = detailArea?.querySelector('#grand-total-units-value');
                    const nextGrade = Utils.getNextGrade();
                    const registrationYearUnits = gradeStats[`year${nextGrade}`]?.registrationUnits || 0;
                    const allYearsTotal = gradeStats.year1.total + gradeStats.year2.total + gradeStats.year3.total;
                    if (totalUnitsValue) totalUnitsValue.textContent = registrationYearUnits;
                    if (grandTotalUnitsValue) grandTotalUnitsValue.textContent = allYearsTotal;
                },

                // 登録データ管理: 保存実行
                async saveAdminManageChanges() {
                    if (this.isProcessing) return;
                    const student = this.currentViewingStudent;
                    if (!student) return;

                    this.isProcessing = true;
                    const studentId = student['学籍番号'];
                    const studentName = student['名前'] || student['氏名'];

                    // 保存ボタンを無効化（二重クリック防止）
                    const saveBtn = document.getElementById('admin-manage-save-btn');
                    if (saveBtn) {
                        saveBtn.disabled = true;
                        saveBtn.textContent = '保存中...';
                    }

                    try {
                        // 全selectからマークを収集（ステータスselectは除外）
                        const selects = document.querySelectorAll('#teacher-student-detail-area .admin-manage-mark-select');
                        const registrationData = {};
                        selects.forEach(select => {
                            if (select.id === 'admin-manage-status-select') return;
                            const courseName = select.dataset.courseName;
                            const value = select.value;
                            if (value) {
                                registrationData[courseName] = value;
                            }
                            // 空白の場合はキーを含めない（スプレッドシート上もクリアされる）
                        });

                        // ステータスselectの値を取得
                        const statusSelect = document.getElementById('admin-manage-status-select');
                        const newStatus = statusSelect ? statusSelect.value : null;

                        // 基本情報を収集
                        const basicFields = {};
                        const studentIdInput = document.getElementById('admin-manage-student-id');
                        if (studentIdInput) basicFields['学籍番号'] = studentIdInput.value;
                        const gradeInput = document.getElementById('admin-manage-grade');
                        const classInput = document.getElementById('admin-manage-class');
                        const numberInput = document.getElementById('admin-manage-number');
                        const emailInput = document.getElementById('admin-manage-email');
                        const nextGradeInput = document.getElementById('admin-manage-next-grade');
                        if (gradeInput) basicFields['学年'] = gradeInput.value;
                        if (classInput) basicFields['組'] = classInput.value;
                        if (numberInput) basicFields['番号'] = numberInput.value;
                        if (emailInput) basicFields['メールアドレス'] = emailInput.value;
                        if (nextGradeInput) basicFields['来年度学年'] = nextGradeInput.value;

                        let result;
                        let authCode = null;

                        if (newStatus === '本登録許可') {
                            // 本登録許可に変更 → 認証コード生成 + setFinalApproval呼び出し
                            authCode = Utils.generateAuthCode();
                            // まず科目マーク・基本情報を保存（ステータスはnullで現状維持）
                            const markResult = await DataManager.callGASFunction(
                                'adminUpdateRegistrationMarks', studentId, registrationData, null, basicFields
                            );
                            if (!markResult.success) { throw new Error(markResult.error); }
                            // setFinalApprovalで認証コード＋ステータスを設定
                            result = await DataManager.callGASFunction('setFinalApproval', studentId, authCode);
                        } else {
                            // 通常の保存（本登録許可以外に変更した場合、認証コードをクリア）
                            if (newStatus !== null && newStatus !== '本登録許可') {
                                basicFields['認証コード'] = '';
                            }
                            result = await DataManager.callGASFunction(
                                'adminUpdateRegistrationMarks', studentId, registrationData, newStatus, basicFields
                            );
                        }

                        if (result.success) {
                            Utils.showToast(`${studentName}の登録データを保存しました`, 'success');

                            // 学籍番号変更の検出と科目表示設定の連動更新
                            const newStudentId = basicFields['学籍番号'];
                            if (newStudentId && newStudentId !== studentId) {
                                try {
                                    const replaceResult = await DataManager.callGASFunction(
                                        'replaceStudentIdInCourseSettings',
                                        [{oldId: studentId, newId: newStudentId}]
                                    );
                                    if (replaceResult && replaceResult.success && replaceResult.updatedCount > 0) {
                                        Utils.updateStudentIdsInLocalCourses([{oldId: studentId, newId: newStudentId}]);
                                        Utils.showToast('科目表示設定の学籍番号を ' + replaceResult.updatedCount + ' 件更新しました', 'success');
                                    }
                                } catch (replaceErr) {
                                    console.error('[登録データ管理] 科目設定の学籍番号置換エラー:', replaceErr);
                                    Utils.showToast('科目表示設定の学籍番号更新に失敗しました', 'error');
                                }
                            }

                            // ローカルデータを更新
                            const studentIndex = this.studentsData.findIndex(s => s['学籍番号'] === studentId);
                            if (studentIndex !== -1) {
                                const s = this.studentsData[studentIndex];
                                // 科目マークをクリア→再設定
                                const metaKeys = new Set(['学籍番号', 'ステータス', '学年', '組', '番号', '名前', 'メールアドレス', '来年度学年', '認証コード', '教職員チェック', 'タイムスタンプ']);
                                Object.keys(s).forEach(key => { if (!metaKeys.has(key)) delete s[key]; });
                                Object.entries(registrationData).forEach(([k, v]) => { s[k] = v; });
                                // ステータスも反映
                                if (newStatus !== null) s['ステータス'] = newStatus;
                                // 基本情報も反映
                                Object.entries(basicFields).forEach(([k, v]) => { s[k] = v; });
                                // 認証コードの反映
                                if (newStatus === '本登録許可') {
                                    s['認証コード'] = authCode;
                                } else if (newStatus !== null) {
                                    s['認証コード'] = '';
                                }
                                this.currentViewingStudent = s;
                            }

                            // 左側の生徒一覧のステータスバッジを更新
                            this.renderStudentsList();

                            // 詳細表示を再描画（学籍番号が変わった場合は新しい学籍番号で）
                            const detailStudentId = (newStudentId && newStudentId !== studentId) ? newStudentId : studentId;
                            await this.showStudentDetail(detailStudentId);
                        } else {
                            Utils.showToast(`保存に失敗しました: ${result.error}`);
                        }
                    } catch (error) {
                        console.error('[登録データ管理] 保存エラー:', error);
                        Utils.showToast('保存処理でエラーが発生しました');
                    } finally {
                        this.isProcessing = false;
                        // 保存ボタンを復元（成功時はshowStudentDetailで再描画されるので主にエラー時用）
                        if (saveBtn) {
                            saveBtn.disabled = false;
                            saveBtn.textContent = '保存';
                        }
                    }
                }
            };

            // TeacherScreenをグローバルに公開
            window.TeacherScreen = TeacherScreen;

            // イベントハンドラー設定
            const EventHandlers = {
                initialize() {
                    if (this._initialized) return;
                    this._initialized = true;
                    // ウィンドウリサイズ対応（デバウンス150ms）
                    let resizeTimer;
                    window.addEventListener('resize', () => {
                        clearTimeout(resizeTimer);
                        resizeTimer = setTimeout(() => EventHandlers.handleResize(), 150);
                    });

                    // 科目フィルタートグル
                    const filterToggle = document.getElementById('course-filter-toggle');
                    if (filterToggle) {
                        filterToggle.addEventListener('change', () => {
                            AppState.courseFilterActive = filterToggle.checked;
                            localStorage.setItem('courseFilterActive', filterToggle.checked ? '1' : '0');
                            RegistrationManager.applyCourseFilter();
                        });
                        // localStorageから保存された状態を復元
                        const saved = localStorage.getItem('courseFilterActive');
                        if (saved === '1') {
                            filterToggle.checked = true;
                            AppState.courseFilterActive = true;
                        }
                    }

                    // 一時保存ボタン
                    const saveDraftButton = document.getElementById('save-draft-button');
                    if (saveDraftButton) {
                        saveDraftButton.addEventListener('click', async () => {
                            // is-disabled状態でクリックされた場合、理由をトースト表示
                            if (saveDraftButton.classList.contains('is-disabled')) {
                                if (AppState.settings && AppState.settings['一時保存'] === '不可') {
                                    Utils.showToast('現在、一時保存は許可されていません', 'warning');
                                } else if (!AppState.isDirty) {
                                    Utils.showToast('変更がないため保存できません', 'warning');
                                }
                                return;
                            }
                            // 編集ロック状態をチェック
                            if (RegistrationStatus.isEditingLocked()) {
                                const status = AppState.registrationStatus?.status;
                                let message = '';
                                if (status === '仮登録') {
                                    message = '仮登録中なので変更できません。';
                                } else if (status === '本登録' || status === '確認済') {
                                    message = '確認済のため変更できません。';
                                }
                                Utils.showToast(message);
                                return;
                            }

                            saveDraftButton.classList.add('is-disabled');
                            saveDraftButton.textContent = '保存中...';

                            const success = await DataManager.saveRegistrationData();

                            saveDraftButton.textContent = '一時保存';
                            if (success) {
                                AppState.isDirty = false;
                                AppState.initialRegistrationData = JSON.parse(JSON.stringify(AppState.registrationData));
                                saveDraftButton.classList.add('is-disabled');
                            } else {
                                saveDraftButton.classList.remove('is-disabled');
                            }
                        });
                    }

                    // 確認ボタン
                    const saveButton = document.getElementById('save-button');
                    if (saveButton) {
                        saveButton.addEventListener('click', () => {
                            // 選択必修チェック
                            if (!AppState.meetsElectiveRequired) {
                                Utils.showToast('選択必修を選択する必要があります', 'warning');
                                return;
                            }

                            // 最低単位数チェック
                            if (!AppState.meetsMinimumUnits) {
                                const nextGradeForMin = Utils.getNextGrade();
                                const minUnitsKey = `${nextGradeForMin}年最低単位数`;
                                const minUnits = parseInt(AppState.settings[minUnitsKey]) || 0;
                                Utils.showToast(`最低${minUnits}単位必要です`, 'warning');
                                return;
                            }

                            // 卒業要件チェック
                            const graduationResult = GraduationRequirementChecker.checkRequirements();
                            const canSubmit = !graduationResult.isTarget || graduationResult.isSatisfied;

                            if (!canSubmit) {
                                // 卒業要件を満たしていない場合は警告モーダルを表示
                                const subjectList = graduationResult.deficiencies.map(d => d.subject).join('、');
                                const modalContent = document.getElementById('graduation-requirement-modal-content');
                                if (modalContent) {
                                    modalContent.innerHTML = `<div style="color: #721c24;">不足している科目<br>${subjectList}</div>`;
                                }

                // 教職員専用画面・管理画面共通のモバイルscale処理
                applyMobileScale(elementId) {
                    const element = document.getElementById(elementId);
                    if (!element) return;

                    const screenWidth = window.innerWidth || screen.width;
                    if (screenWidth < 920) {
                        const scale = screenWidth / 920;
                        const bannerOffset = document.body.classList.contains('banner-shown') ? 60 : 0;
                        const logicalHeight = (window.innerHeight - bannerOffset) / scale;

                        // 共通: スケーリング
                        element.style.width = '920px';
                        element.style.transform = `scale(${scale})`;
                        element.style.transformOrigin = 'top left';
                        element.style.height = `${logicalHeight}px`;

                        // フォントサイズ補正: scaleが小さい時にテキストを読みやすくする
                        if (scale < 0.7) {
                            element.style.fontSize = '1.3em';
                        } else {
                            element.style.fontSize = '';
                        }

                        if (elementId === 'teacher-screen') {
                            // 教職員専用画面固有: 子要素の高さ修正
                            const container = element.querySelector('.teacher-container');
                            if (container) container.style.height = `${logicalHeight}px`;
                            const listContainer = document.getElementById('teacher-student-list-container');
                            if (listContainer) listContainer.style.maxHeight = `${logicalHeight - 145}px`;
                            const detailArea = document.getElementById('teacher-student-detail-area');
                            if (detailArea) detailArea.style.minHeight = `${logicalHeight - 200}px`;
                        }
                    } else {
                        // デスクトップ幅: モバイルスタイルをリセット
                        this.resetMobileScale(elementId);
                    }
                },

                // モバイルscaleのリセット（画面切り替え時に使用）
                resetMobileScale(elementId) {
                    const element = document.getElementById(elementId);
                    if (!element) return;
                    element.style.transform = '';
                    element.style.transformOrigin = '';
                    element.style.fontSize = '';
                    if (elementId === 'teacher-screen') {
                        // HTML定義のインラインスタイルに戻す
                        element.style.width = '100%';
                        element.style.height = '100vh';
                        const container = element.querySelector('.teacher-container');
                        if (container) container.style.height = '100vh';
                        const listContainer = document.getElementById('teacher-student-list-container');
                        if (listContainer) listContainer.style.maxHeight = 'calc(100vh - 145px)';
                        const detailArea = document.getElementById('teacher-student-detail-area');
                        if (detailArea) detailArea.style.minHeight = 'calc(100vh - 200px)';
                    } else {
                        element.style.width = '';
                        element.style.height = '';
                    }
                },

                // ウィンドウリサイズ時に表示中画面のスケールを再適用
                handleResize() {
                    const teacherScreen = document.getElementById('teacher-screen');

                    if (teacherScreen && teacherScreen.style.display !== 'none') {
                        this.applyMobileScale('teacher-screen');
                    }
                    // プログレスバーのラベルをリサイズ後の幅で再評価
                    if (typeof RegistrationManager !== 'undefined' && RegistrationManager.updateUnitsDisplay) {
                        RegistrationManager.updateUnitsDisplay();
                    }
                },

                        AppState.teacherUser = { ...AppState.currentUser };
                        AppState.teacherRegistrationStatus = AppState.registrationStatus ? { ...AppState.registrationStatus } : {};

                        // 生データをバックアップ（switchToTopPageでprocessRegistrationStatusを再実行して全派生状態を再計算するため）
                        AppState.teacherStudentSubmissionData = AppState.studentSubmissionData

                    AppState.teacherSavedRegistrationData = { ...AppState.registrationData };

                // URL共有モーダルを表示
                showShareUrlModal() {
                    const modal = document.getElementById('share-url-modal');
                    if (!modal) return;

                    // 教員用URL（認証トークンなしの素のアプリURL）
                    const teacherUrl = AppState.webAppUrl || window.location.href.split('?')[0];
                    // 生徒用URL（生徒用ドメイン設定時はドメイン置換）
                    const studentDomain = AppState.settings && AppState.settings['生徒用ドメイン'];
                    const studentUrl = studentDomain
                        ? teacherUrl.replace(/\/a\/[^\/]+\//, `/a/${studentDomain}/`)
                        : teacherUrl;

                    // タブ表示制御（生徒用ドメイン設定時のみ表示）
                    const toggleContainer = document.getElementById('share-url-toggle');
                    if (toggleContainer) {
                        toggleContainer.style.display = studentDomain ? 'flex' : 'none';
                        // タブのアクティブ状態をリセット（デフォルトは生徒用）
                        toggleContainer.querySelectorAll('button').forEach(b => {
                            if (b.getAttribute('data-share-mode') === 'student') {
                                b.style.backgroundColor = '#007bff';
                                b.style.color = 'white';
                            } else {
                                b.style.backgroundColor = '#f8f9fa';
                                b.style.color = '#333';
                            }
                        });
                    }

                    // デフォルトURL（生徒用ドメイン設定時は生徒用、未設定時は教員用）
                    const defaultUrl = studentDomain ? studentUrl : teacherUrl;

                    // URLテキストボックス更新
                    const urlText = document.getElementById('share-url-text');
                    if (urlText) urlText.value = defaultUrl;

                    // QRコード生成
                    const qrContainer = document.getElementById('share-qr-code');
                    if (qrContainer) {
                        qrContainer.innerHTML = '';
                        new QRCode(qrContainer, { text: defaultUrl, width: 200, height: 200 });
                    }

                    // URLをdata属性に保存（タブ切替イベントで参照）
                    if (toggleContainer) {
                        toggleContainer.dataset.teacherUrl = teacherUrl;
                        toggleContainer.dataset.studentUrl = studentUrl;
                    }

                    // タブ切替イベント（重複防止のため初回のみバインド）
                    if (toggleContainer && !toggleContainer._shareEventBound) {
                        toggleContainer.addEventListener('click', (e) => {
                            const btn = e.target.closest('[data-share-mode]');
                            if (!btn) return;
                            const mode = btn.getAttribute('data-share-mode');
                            const container = e.currentTarget;
                            const newUrl = mode === 'student' ? container.dataset.studentUrl : container.dataset.teacherUrl;

                            // ボタンスタイル切替
                            container.querySelectorAll('button').forEach(b => {
                                if (b.getAttribute('data-share-mode') === mode) {
                                    b.style.backgroundColor = '#007bff';
                                    b.style.color = 'white';
                                } else {
                                    b.style.backgroundColor = '#f8f9fa';
                                    b.style.color = '#333';
                                }
                            });

                            // QRコード再生成
                            const qr = document.getElementById('share-qr-code');
                            if (qr) {
                                qr.innerHTML = '';
                                new QRCode(qr, { text: newUrl, width: 200, height: 200 });
                            }

                            // URL更新
                            const urlInput = document.getElementById('share-url-text');
                            if (urlInput) urlInput.value = newUrl;
                        });
                        toggleContainer._shareEventBound = true;
                    }

                    // コピーボタンイベント
                    const copyBtn = document.getElementById('share-copy-btn');
                    if (copyBtn && !copyBtn._shareEventBound) {
                        copyBtn.addEventListener('click', () => {
                            const url = document.getElementById('share-url-text').value;
                            navigator.clipboard.writeText(url)
                                .then(() => {
                                    Utils.showToast('URLをコピーしました', 'success');
                                })
                                .catch((err) => {
                                    console.error('[URL共有] コピー失敗:', err);
                                    Utils.showToast('コピーに失敗しました');
                                });
                        });
                        copyBtn._shareEventBound = true;
                    }

                    // 閉じるボタンイベント
                    const closeBtn = document.getElementById('share-close-btn');
                    if (closeBtn && !closeBtn._shareEventBound) {
                        closeBtn.addEventListener('click', () => {
                            Utils.hideModal('share-url-modal');
                        });
                        closeBtn._shareEventBound = true;
                    }

                    // モーダル表示
                    Utils.showModal('share-url-modal');
                },

                switchToTopPage() {
                    // ステータス自動更新を停止
                    TeacherScreen.stopStatusPolling();

                    // 教員データに復元（教職員専用画面→トップ画面復帰時）
                    if (AppState.authenticatedUser && AppState.authenticatedUser.originalRegistrationData) {
                        // 深いコピーで確実に復元
                        AppState.currentUser = { ...AppState.authenticatedUser };
                        AppState.registrationData = { ...AppState.authenticatedUser.originalRegistrationData };
                    }

                    // 変数分離システム：ソースデータ復元 + processRegistrationStatusで全派生状態を再計算
                    if (AppState.teacherUser) {
                        // ソースデータの復元
                        AppState.currentUser = { ...AppState.teacherUser };
                        AppState.registrationStatus = AppState.teacherRegistrationStatus
                            ? { ...AppState.teacherRegistrationStatus } : {};

                        // 生データから全派生状態を再計算（初期化時と同じパイプライン）
                        const sourceData = AppState.teacherStudentSubmissionData || null;
                        if (sourceData && AppState.allCourses) {
                            const userInfo = {
                                学年: AppState.currentUser.grade,
                                来年度学年: AppState.currentUser.nextGrade || null,
                                学籍番号: AppState.currentUser.studentId || AppState.currentUser['学籍番号']
                            };
                            const regStatus = DataProcessor.processRegistrationStatus(
                                userInfo, sourceData, AppState.allCourses
                            );

                            // 派生状態を適用
                            AppState.registrationData = regStatus.registrationData;
                            AppState.completedCourses = regStatus.completedCourses;
                            AppState.inProgressCourses = regStatus.inProgressCourses;
                            AppState.retakenCourses = regStatus.retakenCourses;
                            AppState.retakenYearMap = regStatus.retakenYearMap;
                            AppState.autoRegisteredCourses = regStatus.autoRegisteredCourses || [];
                            AppState.pureAutoRegisteredCourses = regStatus.pureAutoRegisteredCourses || [];
                            AppState.lockedCourses = regStatus.lockedCourses;
                            AppState.completedCoursesYearMap = regStatus.completedCoursesYearMap || {};
                            AppState.inProgressCoursesYearMap = regStatus.inProgressCoursesYearMap || {};
                            AppState.currentlyEnrolledCourses = regStatus.currentlyEnrolledCourses || [];

                printDocument() {
                    try {
                        // 前回の印刷コンテンツが残っていれば除去（afterprint未発火時の対策）
                        document.querySelectorAll('.print-content').forEach(el => el.remove());

                        // エラー判定
                        let errorReasons = [];
                        // ステータスチェック（教務画面からの印刷時のみ）
                        if (TeacherScreen.currentMode === 'admin') {
                            const st = String(AppState.currentUser?.['ステータス'] || '').trim();
                            const submittedStatuses = new Set(['仮登録', '確認済', '本登録許可', '本登録']);
                            if (!submittedStatuses.has(st)) {
                                // 移行期間中（履修中科目がある）は未提出エラーを表示しない
                                const hasEnrolledCourses = AppState.currentlyEnrolledCourses && AppState.currentlyEnrolledCourses.length > 0;
                                if (!hasEnrolledCourses) {
                                    errorReasons.push('未提出');
                                }
                            }
                        }
                        const invalidCourses = RegistrationManager.checkInvalidSelections();
                        if (invalidCourses.length > 0) {
                            errorReasons.push('選択できない科目がある');
                        }
                        const gradResult = GraduationRequirementChecker.checkRequirements();
                        if (gradResult.isTarget && !gradResult.isSatisfied) {
                            errorReasons.push('卒業要件未充足');
                        }

                        // 印刷用コンテンツを作成
                        this.createPrintContentElement('status', { showStamp: TeacherScreen.currentMode === 'admin', hideStatus: true, errorReasons }).then(printElement => {
                            document.body.appendChild(printElement);

                            // A4サイズに収まるようスケール調整
                            this.adjustPrintScale(printElement);

                            // 印刷時のviewport依存レイアウトシフト防止: サイズをピクセル値に固定
                            const confirmContent = document.querySelector('#confirmation-modal .confirmation-content');
                            if (confirmContent) {
                                confirmContent.style.maxHeight = confirmContent.offsetHeight + 'px';
                                confirmContent.style.width = confirmContent.offsetWidth + 'px';
                            }

                            // 印刷後にコンテンツを削除・スタイルを復元
                            let cleaned = false;
                            const cleanup = () => {
                                if (cleaned) return;
                                cleaned = true;
                                if (confirmContent) {
                                    confirmContent.style.maxHeight = '';
                                    confirmContent.style.width = '';
                                }
                                if (document.body.contains(printElement)) {
                                    document.body.removeChild(printElement);
                                }
                                window.removeEventListener('afterprint', cleanup);
                            };
                            window.addEventListener('afterprint', cleanup);
                            requestAnimationFrame(() => {
                                window.print();
                            });
                            // フォールバック: afterprintが発火しない環境用
                            setTimeout(cleanup, 5000);
                        });

                    } catch (error) {
                        console.error('印刷エラー:', error);
                        Utils.showToast('印刷でエラーが発生しました');
                    }
                },

                // 印刷コンテンツをA4に収まるようスケール調整
                adjustPrintScale(element) {
                    const A4_HEIGHT = 1100;
                    const PRINT_AREA_WIDTH = 794;

                    element.style.width = PRINT_AREA_WIDTH + 'px';
                    let contentHeight = element.scrollHeight;

                    if (contentHeight <= A4_HEIGHT) return;

                    // スケール率を計算し、幅を逆補正
                    let scale = A4_HEIGHT / contentHeight;
                    let compensatedWidth = Math.ceil(PRINT_AREA_WIDTH / scale);
                    element.style.width = compensatedWidth + 'px';

                    // 幅変更後にコンテンツがリフローする可能性があるため再測定
                    contentHeight = element.scrollHeight;
                    if (contentHeight > A4_HEIGHT) {
                        scale = A4_HEIGHT / contentHeight;
                        compensatedWidth = Math.ceil(PRINT_AREA_WIDTH / scale);
                        element.style.width = compensatedWidth + 'px';
                    } else {
                        // 幅拡大でA4高さに収まった場合はスケーリング不要
                        element.style.width = PRINT_AREA_WIDTH + 'px';
                        return;
                    }

                    // zoomでレイアウトごと縮小（transformと違いブラウザの改ページ判定にも反映される）
                    element.style.zoom = scale;
                },

                            }

                        // 生徒のステータス取得
                        let studentStatus = '未提出'; // デフォルト値
                        // 一括PDF生成時は currentUser/userInfo を優先（各生徒のステータスを表示）
                        if (AppState.currentUser && AppState.currentUser.status) {
                            studentStatus = AppState.currentUser.status;
                        } else if (AppState.currentUser && AppState.currentUser['ステータス']) {
                            studentStatus = AppState.currentUser['ステータス'];
                        } else if (AppState.userInfo && AppState.userInfo.status) {
                            studentStatus = AppState.userInfo.status;
                        } else if (AppState.userInfo && AppState.userInfo['ステータス']) {
                            studentStatus = AppState.userInfo['ステータス'];
                        } else if (AppState.registrationStatus && AppState.registrationStatus.status) {
                            studentStatus = AppState.registrationStatus.status;
                        }

                        // PDF生成時にAppStateの同期を確実にする

                        const coursesBySection = {};

                        const desiredOrder = ['1年次科目', '2年次科目', '3年次科目', 'プロフェッショナル科目'];

                            Object.keys(coursesBySection).forEach(section => {

                        }
                        event.target.value = '';
                    };
                    reader.readAsArrayBuffer(file);

                    document.getElementById('new-student-import-summary').innerHTML = html;

                    confirmBtn.disabled = newCount === 0;

            // Excel テストデータ取込
            const ExcelImporter = {
                pendingImportData: null,

                // Excelファイル選択ハンドラ
                handleFileSelect(event) {
                    const file = event.target.files[0];
                    if (!file) return;

                    const statusDiv = document.getElementById('excel-import-status');
                    statusDiv.innerHTML = '<span style="color: #007bff;">ファイルを読み込み中...</span>';

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const workbook = XLSX.read(data, { type: 'array' });
                            const sheet = workbook.Sheets[workbook.SheetNames[0]];
                            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });

                            // 不可視文字除去ヘルパー（BOM U+FEFF、ゼロ幅文字等）
                            const stripInvisible = (s) => s ? String(s).replace(/[\uFEFF\u200B\u200C\u200D\uFFFE]/g, '').trim() : '';

                            // ヘッダー行を動的検出
                            let headerRowIndex = -1;
                            for (let i = 0; i < rows.length; i++) {
                                if (rows[i] && rows[i].some(cell => stripInvisible(cell) === '学籍番号')) {

                            if (headerRowIndex === -1) {

                                event.target.value = '';

                            // BOM・ゼロ幅文字を除去してからtrim
                            const headers = rows[headerRowIndex].map(h => stripInvisible(h));
                            const dataRows = rows.slice(headerRowIndex + 1);

                            const result = ExcelImporter.processExcelData(dataRows, headers);
                            if (!result) {
                                statusDiv.innerHTML = '<span style="color: #dc3545;">データの処理に失敗しました。</span>';
                                event.target.value = '';

                            ExcelImporter.showConfirmationModal(result.importData, result.unmatchedSubjects, result.totalRecords);
                            statusDiv.innerHTML = `<span style="color: #28a745;">ファイル読み込み完了: ${file.name}</span>`;
                        } catch (err) {

                            statusDiv.innerHTML = '<span style="color: #dc3545;">ファイルの読み込みに失敗しました。</span>';
                        }
                        event.target.value = '';
                    };
                    reader.readAsArrayBuffer(file);
                },

                // Excelデータを加工
                processExcelData(dataRows, headers) {
                    const studentIdIdx = headers.indexOf('学籍番号');
                    const subjectIdx = headers.indexOf('指導要録科目名');
                    const testClearIdx = headers.indexOf('テストクリア');
                    const gradeIdx = headers.indexOf('学年');
                    // テストクリア列が数式で空値になる場合のフォールバック用
                    const taninGouhiIdx = headers.indexOf('単位認定試験合否');
                    const saishiGouhiIdx = headers.indexOf('再試験合否');
                    const tuininGouhiIdx = headers.indexOf('追認試験合否');

                    const hasTestClearSource = testClearIdx !== -1 || taninGouhiIdx !== -1 || saishiGouhiIdx !== -1 || tuininGouhiIdx !== -1;
                    if (studentIdIdx === -1 || subjectIdx === -1 || !hasTestClearSource || gradeIdx === -1) {
                        const missing = [];
                        if (studentIdIdx === -1) missing.push('学籍番号');
                        if (subjectIdx === -1) missing.push('指導要録科目名');
                        if (!hasTestClearSource) missing.push('テストクリア（または合否列）');
                        if (gradeIdx === -1) missing.push('学年');
                        console.error('[テストデータ取込] 必要列が不足:', missing.join(', '));
                        const statusDiv = document.getElementById('excel-import-status');
                        statusDiv.innerHTML = `<span style="color: #dc3545;">必要な列が見つかりません: ${missing.join(', ')}</span>`;
                        return null;
                    }

                    // 登録データシートの科目名リストを取得（AppStateから）
                    const sheetSubjects = new Set();
                    if (AppState.allCourses) {
                        AppState.allCourses.forEach(course => {
                            if (course['科目名']) sheetSubjects.add(course['科目名']);
                        });
                    }

                    const importData = {}; // { 学籍番号: { 科目名: 学年, ... }, ... }
                    const unmatchedSubjects = new Set();
                    let totalRecords = 0;

                    dataRows.forEach(row => {
                        if (!row || row.length === 0) return;

                        const studentId = row[studentIdIdx] ? String(row[studentIdIdx]).trim() : '';
                        const subject = row[subjectIdx] ? String(row[subjectIdx]).trim() : '';
                        let testClear = testClearIdx !== -1 && row[testClearIdx] ? String(row[testClearIdx]).trim() : '';
                        const grade = row[gradeIdx] ? parseInt(String(row[gradeIdx]).trim()) : 0;

                        if (!studentId || !subject || !grade) return;

                        // テストクリア列が空の場合、合否列からフォールバック計算（Excel数式の再現）
                        if (!testClear) {
                            const taninGouhi = taninGouhiIdx !== -1 && row[taninGouhiIdx] ? String(row[taninGouhiIdx]).trim() : '';
                            const saishiGouhi = saishiGouhiIdx !== -1 && row[saishiGouhiIdx] ? String(row[saishiGouhiIdx]).trim() : '';
                            const tuininGouhi = tuininGouhiIdx !== -1 && row[tuininGouhiIdx] ? String(row[tuininGouhiIdx]).trim() : '';
                            testClear = (taninGouhi === '01' || saishiGouhi === '01' || tuininGouhi === '01') ? '01' : '03';
                        }
                        // 合格のみ処理
                        if (testClear !== '01') return;

                        totalRecords++;

                        // 科目名マッチング
                        if (!sheetSubjects.has(subject)) {
                            unmatchedSubjects.add(subject);
                            return;
                        }

                        if (!importData[studentId]) {
                            importData[studentId] = {};
                        }

                        // 同一生徒・同一科目で複数レコードがある場合、より大きい学年を優先
                        const existingGrade = importData[studentId][subject] || 0;
                        if (grade > existingGrade) {
                            importData[studentId][subject] = grade;
                        }
                    });

                    const studentCount = Object.keys(importData).length;
                    const subjectCount = new Set(
                        Object.values(importData).flatMap(subjects => Object.keys(subjects))
                    ).size;

                    return {
                        importData,
                        unmatchedSubjects: Array.from(unmatchedSubjects),
                        totalRecords
                    };
                },

                // 確認モーダル表示
                showConfirmationModal(importData, unmatchedSubjects, totalRecords) {
                    ExcelImporter.pendingImportData = importData;
                    ExcelImporter.pendingUnmatchedSubjects = unmatchedSubjects;

                        <div style="background: #f0fdf4; padding: 12px; border-radius: 8px; margin-bottom: 10px;">
                            <div style="font-weight: bold; margin-bottom: 8px;">取込データサマリー</div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 0.95em;">
                                <div>対象生徒数: <strong>${studentCount}名</strong></div>
                                <div>対象科目数: <strong>${subjectSet.size}科目</strong></div>
                                <div>合格レコード数: <strong>${totalRecords}件</strong></div>
                            </div>
                        </div>
                    `;

                    // マッチしなかった科目
                    const unmatchedDiv = document.getElementById('excel-import-unmatched');
                    if (unmatchedSubjects.length > 0) {
                        unmatchedDiv.innerHTML = `
                            <div style="background: #fef3c7; padding: 12px; border-radius: 8px; border: 1px solid #f59e0b;">
                                <div style="font-weight: bold; color: #b45309; margin-bottom: 6px;">
                                    ⚠ マッチしなかった科目（${unmatchedSubjects.length}件）
                                </div>
                                <div style="font-size: 0.85em; max-height: 120px; overflow-y: auto;">
                                    ${unmatchedSubjects.map(s => `<div style="padding: 2px 0;">・${s}</div>`).join('')}
                                </div>
                                <div style="font-size: 0.8em; color: #92400e; margin-top: 6px;">
                                    これらの科目は取り込まれません。
                                </div>
                            </div>
                        `;
                    } else {
                        unmatchedDiv.innerHTML = '';
                    }

                    if (studentCount === 0) {
                        document.getElementById('excel-import-confirm-btn').disabled = true;
                        summaryDiv.innerHTML += '<div style="color: #dc3545; margin-top: 8px;">取込対象のデータがありません。</div>';
                    } else {
                        document.getElementById('excel-import-confirm-btn').disabled = false;
                    }

                    Utils.showModal('excel-import-modal');
                },

                // キャンセル
                cancelImport() {
                    ExcelImporter.pendingImportData = null;
                    ExcelImporter.pendingUnmatchedSubjects = null;
                    Utils.hideModal('excel-import-modal');
                },

                // 取込実行
                async executeImport() {
                    const importData = ExcelImporter.pendingImportData;
                    if (!importData) return;

                    Utils.hideModal('excel-import-modal');

                    const statusDiv = document.getElementById('excel-import-status');
                    statusDiv.innerHTML = '<span style="color: #007bff;">取込処理中...</span>';

                    try {
                        // importData: { 学籍番号: { 科目名: 学年, ... }, ... }
                        const result = await DataManager.callGASFunction('importTestResults', importData);

                        if (result && result.success) {
                            let msg = `取込完了: ${result.updatedStudents}名, ${result.updatedCells}件更新, ${result.skippedCells}件スキップ`;
                            statusDiv.innerHTML = `<div style="color: #28a745;">${msg}</div>`;
                            Utils.showToast(msg, 'success');

                            if (result.notFoundStudents && result.notFoundStudents.length > 0) {
                                statusDiv.innerHTML += `<div style="color: #b45309; margin-top: 6px; font-size: 0.85em;">
                                    未登録の学籍番号: ${result.notFoundStudents.join(', ')}
                                </div>`;
                            }

                            // キャッシュをクリアして最新データを再読み込み
                            cachedAllStudentsData = null;
                            cachedTeacherEmails = null;
                            await DataManager.callGASFunction('clearDataCache');
                            await TeacherScreen.loadStudentsData();
                        } else {
                            const errorMsg = result?.error || '不明なエラー';
                            statusDiv.innerHTML = `<span style="color: #dc3545;">取込失敗: ${errorMsg}</span>`;
                            Utils.showToast('取込に失敗しました');
                        }
                    } catch (error) {
                        console.error('[テストデータ取込] 実行エラー:', error);
                        statusDiv.innerHTML = '<span style="color: #dc3545;">取込中にエラーが発生しました。</span>';
                        Utils.showToast('取込中にエラーが発生しました');
                    }

                    ExcelImporter.pendingImportData = null;
                    ExcelImporter.pendingUnmatchedSubjects = null;
                }
            };

            // 学籍移動 生徒削除
            const StudentDeleter = {
                pendingTransferStudents: null,

                // Excelファイル選択ハンドラ
                handleFileSelect(event) {
                    const file = event.target.files[0];
                    if (!file) return;

                    const statusDiv = document.getElementById('student-delete-status');
                    statusDiv.innerHTML = '<span style="color: #007bff;">ファイルを読み込み中...</span>';

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const workbook = XLSX.read(data, { type: 'array' });
                            const sheet = workbook.Sheets[workbook.SheetNames[0]];
                            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });

                            // 不可視文字除去ヘルパー（BOM U+FEFF、ゼロ幅文字等）
                            const stripInvisible = (s) => s ? String(s).replace(/[\uFEFF\u200B\u200C\u200D\uFFFE]/g, '').trim() : '';

                            // ヘッダー行を動的検出
                            let headerRowIndex = -1;
                            for (let i = 0; i < rows.length; i++) {
                                if (rows[i] && rows[i].some(cell => stripInvisible(cell) === '学籍番号')) {
                                    headerRowIndex = i;
                                    break;
                                }
                            }

                            if (headerRowIndex === -1) {
                                statusDiv.innerHTML = '<span style="color: #dc3545;">「学籍番号」列が見つかりません。ファイル形式を確認してください。</span>';
                                event.target.value = '';
                                return;
                            }

                            const headers = rows[headerRowIndex].map(h => stripInvisible(h));
                            const dataRows = rows.slice(headerRowIndex + 1);

                            const transferStudents = StudentDeleter.processExcelData(dataRows, headers);
                            if (transferStudents === null) {
                                // processExcelDataがstatusDiv にエラー表示済み
                                event.target.value = '';
                                return;
                            }

                            StudentDeleter.showConfirmationModal(transferStudents);
                            statusDiv.innerHTML = `<span style="color: #28a745;">ファイル読み込み完了: ${file.name}</span>`;
                        } catch (err) {
                            console.error('[学籍移動削除] Excel読み込みエラー:', err);
                            statusDiv.innerHTML = '<span style="color: #dc3545;">ファイルの読み込みに失敗しました。</span>';
                        }
                        event.target.value = '';
                    };
                    reader.readAsArrayBuffer(file);
                },

                // Excelデータから学籍移動生徒を抽出
                processExcelData(dataRows, headers) {
                    const studentIdIdx = headers.indexOf('学籍番号');
                    const transferIdx = headers.indexOf('学籍移動');

                    if (studentIdIdx === -1 || transferIdx === -1) {
                        const missing = [];
                        if (studentIdIdx === -1) missing.push('学籍番号');
                        if (transferIdx === -1) missing.push('学籍移動');
                        const statusDiv = document.getElementById('student-delete-status');
                        statusDiv.innerHTML = `<span style="color: #dc3545;">必要な列が見つかりません: ${missing.join(', ')}</span>`;
                        return null;
                    }

                    const TRANSFER_VALUES = ['転科', '転学', '退学', '卒業'];
                    const transferStudents = {}; // { 学籍番号: "転科"/"転学"/"退学"/"卒業" }

                    dataRows.forEach(row => {
                        if (!row || row.length === 0) return;
                        const studentId = row[studentIdIdx] ? String(row[studentIdIdx]).trim() : '';
                        if (!studentId) return;

                        const transferVal = row[transferIdx] ? String(row[transferIdx]).trim() : '';
                        if (transferVal && TRANSFER_VALUES.includes(transferVal)) {
                            transferStudents[studentId] = transferVal;
                        }
                    });

                    return transferStudents;
                },

                // 確認モーダル表示
                showConfirmationModal(transferStudents) {
                    const allStudents = cachedAllStudentsData?.students || cachedAllStudentsData || [];
                    const registeredIds = new Set(allStudents.map(s => String(s.studentId || s['学籍番号'] || '').trim()));

                    // 登録データに存在する生徒のみ削除対象にする
                    const matchedTransfer = {};
                    const unmatchedIds = [];
                    Object.keys(transferStudents).forEach(id => {
                        if (registeredIds.has(id)) {
                            matchedTransfer[id] = transferStudents[id];
                        } else {
                            unmatchedIds.push(id);
                        }
                    });

                    StudentDeleter.pendingTransferStudents = matchedTransfer;

                    const matchedIds = Object.keys(matchedTransfer);
                    const summaryDiv = document.getElementById('student-delete-summary');

                    let html = '';
                    if (matchedIds.length > 0) {
                        html += `
                            <div style="background: #fef2f2; padding: 12px; border-radius: 8px; border: 1px solid #ef4444; margin-bottom: 10px;">
                                <div style="font-weight: bold; color: #dc2626; margin-bottom: 6px;">
                                    削除対象の生徒（${matchedIds.length}名）
                                </div>
                                <div style="font-size: 0.85em; max-height: 200px; overflow-y: auto;">
                                    ${matchedIds.map(id => `<div style="padding: 2px 0;">・${id}（${matchedTransfer[id]}）</div>`).join('')}
                                </div>
                            </div>
                        `;
                        document.getElementById('student-delete-confirm-btn').disabled = false;
                    } else {
                        html += `
                            <div style="background: #f0fdf4; padding: 12px; border-radius: 8px; border: 1px solid #86efac; margin-bottom: 10px;">
                                <div style="color: #166534;">登録データに存在する学籍移動対象の生徒はいません。</div>
                            </div>
                        `;
                        document.getElementById('student-delete-confirm-btn').disabled = true;
                    }

                    if (unmatchedIds.length > 0) {
                        html += `
                            <div style="background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #dee2e6;">
                                <div style="font-size: 0.85em; color: #6c757d;">
                                    登録データに存在しない学籍番号（${unmatchedIds.length}件）: ${unmatchedIds.join(', ')}
                                </div>
                            </div>
                        `;
                    }

                    summaryDiv.innerHTML = html;
                    Utils.showModal('student-delete-modal');
                },

                // キャンセル
                cancelDelete() {
                    StudentDeleter.pendingTransferStudents = null;
                    Utils.hideModal('student-delete-modal');
                },

                // 削除実行
                async executeDelete() {
                    const transferStudents = StudentDeleter.pendingTransferStudents;
                    if (!transferStudents) return;

                    const deleteStudentIds = Object.keys(transferStudents);
                    if (deleteStudentIds.length === 0) return;

                    Utils.hideModal('student-delete-modal');

                    const statusDiv = document.getElementById('student-delete-status');
                    statusDiv.innerHTML = '<span style="color: #007bff;">削除処理中...</span>';

                    try {
                        const result = await DataManager.callGASFunction('deleteStudentRows', deleteStudentIds);

                        if (result && result.success) {
                            const msg = `削除完了: ${result.deletedStudents}名の登録データを削除しました`;
                            statusDiv.innerHTML = `<div style="color: #28a745;">${msg}</div>`;
                            Utils.showToast(msg, 'success');

                            // キャッシュをクリアして最新データを再読み込み
                            cachedAllStudentsData = null;
                            cachedTeacherEmails = null;
                            await DataManager.callGASFunction('clearDataCache');
                            await TeacherScreen.loadStudentsData();
                        } else {
                            const errorMsg = result?.error || '不明なエラー';
                            statusDiv.innerHTML = `<span style="color: #dc3545;">削除失敗: ${errorMsg}</span>`;
                            Utils.showToast('削除に失敗しました');
                        }
                    } catch (error) {
                        console.error('[学籍移動削除] 実行エラー:', error);
                        statusDiv.innerHTML = '<span style="color: #dc3545;">削除中にエラーが発生しました。</span>';
                        Utils.showToast('削除中にエラーが発生しました');
                    }

                    StudentDeleter.pendingTransferStudents = null;
                }
            };

            // 生徒別科目表示設定
            const StudentIdsManager = {
                currentTab: '抽選学籍番号',
                currentCourse: '',
                currentStudentIds: [],
                originalStudentIds: [],
                rosterData: null,
                isDirty: false,

                // モーダルを開く
                async openModal() {
                    this.currentTab = '抽選学籍番号';
                    this.currentCourse = '';
                    this.currentStudentIds = [];
                    this.originalStudentIds = [];
                    this.isDirty = false;
                    this.rosterData = null;  // 毎回最新データで再構築

                    // タブUIをリセット
                    this._updateTabUI();

                    // 科目リストを構築
                    this._buildCourseSelect();

                    // 対象者リストをクリア
                    document.getElementById('student-ids-list').innerHTML =
                        '<div style="padding: 20px; text-align: center; color: #9ca3af; font-size: 0.9em;">科目を選択してください</div>';
                    document.getElementById('student-ids-count').textContent = '（0件）';
                    document.getElementById('student-ids-add-section').style.display = 'none';
                    document.getElementById('student-ids-course-select').value = '';

                    // 逆引き検索欄をクリア
                    document.getElementById('student-ids-reverse-input').value = '';
                    // 逆引きモードで隠れている要素を復帰
                    document.getElementById('student-ids-course-select').parentElement.style.display = '';
                    document.getElementById('student-ids-count').parentElement.style.display = '';
                    document.getElementById('student-ids-button-row').style.display = 'flex';

                    Utils.showModal('student-ids-modal');

                    // 生徒名簿を構築（cachedAllStudentsData優先、なければRPCフォールバック）
                    if (!this.rosterData) {
                        if (cachedAllStudentsData && cachedAllStudentsData.students) {
                            // TeacherScreen.loadStudentsData() で取得済みの全生徒データから名簿を構築
                            this.rosterData = cachedAllStudentsData.students.map(s => ({
                                studentId: String(s['学籍番号'] || ''),
                                name: s['名前'] || s['氏名'] || '',
                                grade: s['学年'] || '',
                                class: s['組'] || '',
                                number: s['番号'] || ''
                            }));
                        } else {
                            // フォールバック: キャッシュがない場合のみRPCで取得
                            try {
                                const result = await DataManager.callGASFunction('getStudentRosterForAdmin');
                                if (result && result.success) {
                                    this.rosterData = result.students;
                                    // 科目が既に選択されていたらリストを再描画
                                    if (this.currentCourse) {
                                        this._renderList();
                                        this._updateSearchResults();
                                    }
                                } else {
                                    console.error('[学籍番号管理] 生徒名簿取得失敗:', result);
                                    Utils.showToast('生徒名簿の取得に失敗しました', 'error');
                                }
                            } catch (e) {
                                console.error('[学籍番号管理] 生徒名簿取得エラー:', e);
                                Utils.showToast('生徒名簿の取得に失敗しました', 'error');
                            }
                        }
                    }
                },

                // 科目ドロップダウンを構築
                _buildCourseSelect() {
                    const select = document.getElementById('student-ids-course-select');
                    select.innerHTML = '<option value="">-- 科目を選択 --</option>';
                    if (!AppState.allCourses || AppState.allCourses.length === 0) return;

                    var tab = this.currentTab;
                    // セクション別にグループ化
                    const sections = {};
                    const courseMap = {};
                    AppState.allCourses.forEach(course => {
                        const section = course['セクション'] || 'その他';
                        if (!sections[section]) sections[section] = [];
                        sections[section].push(course['科目名']);
                        courseMap[course['科目名']] = course;
                    });

                    Object.keys(sections).forEach(section => {
                        const optgroup = document.createElement('optgroup');
                        optgroup.label = section;
                        sections[section].forEach(name => {
                            const opt = document.createElement('option');
                            opt.value = name;
                            // 現在のタブの学籍番号件数を表示
                            var count = 0;
                            var c = courseMap[name];
                            if (c && c[tab]) {
                                var ids = String(c[tab]).split(',').map(function(id) { return id.trim(); }).filter(function(id) { return id !== ''; });
                                count = ids.length;
                            }
                            opt.textContent = count > 0 ? name + ' (' + count + ')' : name;
                            optgroup.appendChild(opt);
                        });
                        select.appendChild(optgroup);
                    });
                },

                // タブ切り替え
                switchTab(tabName) {
                    // 未保存チェック
                    if (this.isDirty) {
                        if (!confirm('変更が保存されていません。タブを切り替えると変更が失われます。よろしいですか？')) {
                            return;
                        }
                    }
                    this.currentTab = tabName;
                    this.isDirty = false;
                    this._updateTabUI();
                    // タブに応じて件数表示を更新
                    var selectedCourse = document.getElementById('student-ids-course-select').value;
                    this._buildCourseSelect();
                    if (selectedCourse) document.getElementById('student-ids-course-select').value = selectedCourse;
                    // 逆引き検索をクリアして通常モードに戻す
                    const reverseInput = document.getElementById('student-ids-reverse-input');
                    if (reverseInput.value.trim()) {
                        reverseInput.value = '';
                        this._exitReverseMode();
                    }
                    // 科目が選択されていれば再読み込み
                    if (this.currentCourse) {
                        this._loadCurrentData();
                    }
                },

                // タブUIを更新
                _updateTabUI() {
