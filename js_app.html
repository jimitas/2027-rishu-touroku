                            '<th style="padding: 6px 8px; text-align: left; border: 1px solid #dee2e6; color: #004294; font-weight: bold;">科目名</th>' +
                            '<th style="padding: 6px 8px; text-align: center; border: 1px solid #dee2e6; color: #004294; font-weight: bold; width: 50px;">学年</th>' +
                            '<th style="padding: 6px 8px; text-align: center; border: 1px solid #dee2e6; color: #004294; font-weight: bold; width: 80px;">区分</th>' +
                            '<th style="padding: 6px 8px; text-align: center; border: 1px solid #dee2e6; color: #004294; font-weight: bold; width: 80px;">単位数</th>' +
                            '<th style="padding: 6px 8px; text-align: center; border: 1px solid #dee2e6; color: #004294; font-weight: bold; width: 70px;">操作</th>' +
                            '</tr></thead><tbody>';
                        courses.forEach(function(c) {
                            const name = c['科目名'] || '';
                            html += '<tr>' +
                                '<td style="padding: 6px 8px; border: 1px solid #dee2e6;">' + CourseManager._escapeHtml(name) + '</td>' +
                                '<td style="padding: 6px 8px; text-align: center; border: 1px solid #dee2e6;">' + (c['学年'] || '') + '</td>' +
                                '<td style="padding: 6px 8px; text-align: center; border: 1px solid #dee2e6;">' + CourseManager._escapeHtml(c['区分'] || '') + '</td>' +
                                '<td style="padding: 6px 8px; text-align: center; border: 1px solid #dee2e6;">' + (c['単位数'] || '') + '</td>' +
                                '<td style="padding: 6px 8px; text-align: center; border: 1px solid #dee2e6;">' +

                                '</td></tr>';

                    });

                    listEl.innerHTML = html;
                },

                // 追加フォームを表示
                showAddForm() {
                    this._editingOriginalName = null;
                    document.getElementById('course-edit-title').textContent = '科目を追加';
                    // フォームクリア
                    document.getElementById('course-edit-name').value = '';
                    document.getElementById('course-edit-grade').value = '1';
                    document.getElementById('course-edit-category').value = '選択';
                    document.getElementById('course-edit-units').value = '1';
                    this._populateSectionSelect('');
                    document.querySelectorAll('.selectable-grade-cb').forEach(function(cb) { cb.checked = false; });
                    this._staircaseCourses = [];
                    this._renderStaircaseTags();
                    this._populateStaircaseSelect();
                    this._populateExclusiveSelect('');
                    document.getElementById('course-edit-subject').value = '';
                    document.getElementById('course-edit-detail').value = '';
                    document.getElementById('course-edit-closed').checked = false;
                    document.getElementById('course-edit-save-btn').disabled = false;
                    document.getElementById('course-edit-save-btn').textContent = '保存';
                    document.getElementById('course-edit-delete-btn').style.display = 'none';
                    Utils.showModal('course-edit-modal');
                },

                // 編集フォームを表示（プリフィル）
                showEditForm(courseName) {
                    this._editingOriginalName = courseName;
                    document.getElementById('course-edit-title').textContent = '科目を編集';
                    // 該当科目を探してプリフィル
                    const course = this._courseList.find(function(c) { return c['科目名'] === courseName; });
                    if (!course) {
                        Utils.showToast('科目が見つかりません', 'error');
                        return;
                    }
                    document.getElementById('course-edit-name').value = course['科目名'] || '';
                    document.getElementById('course-edit-grade').value = String(course['学年'] || '1');
                    document.getElementById('course-edit-category').value = course['区分'] || '選択';
                    document.getElementById('course-edit-units').value = String(course['単位数'] || '1');
                    this._populateSectionSelect(course['セクション'] || '');
                    // 選択可能学年チェックボックスを設定
                    var selectableGradesVal = String(course['選択可能学年'] || '');
                    var checkedGrades = selectableGradesVal.split(',').map(function(g) { return g.trim(); });
                    document.querySelectorAll('.selectable-grade-cb').forEach(function(cb) {
                        cb.checked = checkedGrades.includes(cb.value);
                    });
                    // 階段科目をタグとして設定
                    var staircaseVal = String(course['階段'] || '');
                    this._staircaseCourses = staircaseVal ? staircaseVal.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s !== ''; }) : [];
                    this._renderStaircaseTags();
                    this._populateStaircaseSelect();
                    this._populateExclusiveSelect(course['同時不可'] || '');
                    document.getElementById('course-edit-subject').value = course['教科'] || '';
                    document.getElementById('course-edit-detail').value = course['詳細'] || '';
                    document.getElementById('course-edit-closed').checked = !!course['開講なし'];
                    document.getElementById('course-edit-save-btn').disabled = false;
                    document.getElementById('course-edit-save-btn').textContent = '保存';
                    document.getElementById('course-edit-delete-btn').style.display = '';
                    Utils.showModal('course-edit-modal');
                },

                closeEditForm() {
                    Utils.hideModal('course-edit-modal');
                },

                // セクションドロップダウンに既存セクション一覧をセット
                _populateSectionSelect(currentValue) {
                    var select = document.getElementById('course-edit-section-select');
                    var input = document.getElementById('course-edit-section');
                    // 既存optionをクリア
                    while (select.options.length > 0) select.remove(0);
                    // 空の選択肢
                    // 既存セクションを重複なしで収集
                    var sections = [];
                    this._courseList.forEach(function(c) {
                        var sec = c['セクション'];
                        if (sec && String(sec).trim() !== '' && sections.indexOf(String(sec).trim()) === -1) {
                            sections.push(String(sec).trim());
                        }
                    });
                    sections.sort();
                    sections.forEach(function(sec) {
                        var opt = document.createElement('option');
                        opt.value = sec;
                        opt.textContent = sec;
                        select.appendChild(opt);
                    });
                    // 新規追加の選択肢
                    var newOpt = document.createElement('option');
                    newOpt.value = '__new__';
                    newOpt.textContent = '+ 新しいセクションを追加';
                    select.appendChild(newOpt);
                    // 現在の値をセット
                    if (currentValue && sections.indexOf(currentValue) !== -1) {
                        select.value = currentValue;
                        input.style.display = 'none';
                        input.value = '';
                    } else if (currentValue && currentValue.trim() !== '') {
                        // 一覧にない値→新規入力として表示
                        select.value = '__new__';
                        input.style.display = '';
                        input.value = currentValue;
                    } else {
                        select.value = '';
                        input.style.display = 'none';
                        input.value = '';
                    }
                    // 切り替えイベント
                    select.onchange = function() {
                        if (select.value === '__new__') {
                            input.style.display = '';
                            input.value = '';
                            input.focus();
                        } else {
                            input.style.display = 'none';
                            input.value = '';
                        }
                    };
                },

                // 同時不可グループドロップダウンに既存グループ一覧をセット
                _populateExclusiveSelect(currentValue) {
                    var select = document.getElementById('course-edit-exclusive-select');
                    var input = document.getElementById('course-edit-exclusive');
                    // 既存optionをクリア
                    while (select.options.length > 0) select.remove(0);
                    // 空の選択肢（なし）
                    var emptyOpt = document.createElement('option');
                    emptyOpt.value = '';
                    emptyOpt.textContent = 'なし';
                    select.appendChild(emptyOpt);
                    // 既存グループ名を重複なしで収集
                    var groups = [];
                    this._courseList.forEach(function(c) {
                        var g = c['同時不可'];
                        if (g && String(g).trim() !== '' && groups.indexOf(String(g).trim()) === -1) {
                            groups.push(String(g).trim());
                        }
                    });
                    groups.sort();
                    groups.forEach(function(g) {
                        var opt = document.createElement('option');
                        opt.value = g;
                        opt.textContent = g;
                        select.appendChild(opt);
                    });
                    // 新規追加の選択肢
                    var newOpt = document.createElement('option');
                    newOpt.value = '__new__';
                    newOpt.textContent = '+ 新しいグループを追加';
                    select.appendChild(newOpt);
                    // 現在の値をセット
                    if (currentValue && groups.indexOf(currentValue) !== -1) {
                        select.value = currentValue;
                        input.style.display = 'none';
                        input.value = '';
                    } else if (currentValue && currentValue.trim() !== '') {
                        select.value = '__new__';
                        input.style.display = '';
                        input.value = currentValue;
                    } else {
                        select.value = '';
                        input.style.display = 'none';
                        input.value = '';
                    }
                    // 切り替えイベント
                    select.onchange = function() {
                        if (select.value === '__new__') {
                            input.style.display = '';
                            input.value = '';
                            input.focus();
                        } else {
                            input.style.display = 'none';
                            input.value = '';
                        }
                    };
                },

                // 階段科目ドロップダウンに科目一覧をセット
                _populateStaircaseSelect() {
                    const select = document.getElementById('course-edit-staircase-select');
                    var self = this;
                    // 既存optionをクリア（先頭のプレースホルダーは残す）
                    while (select.options.length > 1) select.remove(1);
                    // 現在編集中の科目と既に追加済みの科目を除外して一覧を生成
                    var editingName = this._editingOriginalName;
                    var added = this._staircaseCourses;
                    this._courseList.forEach(function(c) {
                        var name = c['科目名'];
                        if (name === editingName) return;
                        if (added.indexOf(name) !== -1) return;
                        var opt = document.createElement('option');
                        opt.value = name;
                        opt.textContent = name;
                        select.appendChild(opt);
                    });
                    // 選択時にタグ追加
                    select.onchange = function() {
                        if (!select.value) return;
                        self._staircaseCourses.push(select.value);
                        self._renderStaircaseTags();
                        self._populateStaircaseSelect();
                        select.value = '';
                    };
                },

                // 階段科目タグを描画
                _renderStaircaseTags() {
                    var container = document.getElementById('staircase-tags');
                    var self = this;
                    container.innerHTML = '';
                    this._staircaseCourses.forEach(function(name, idx) {
                        var tag = document.createElement('span');
                        tag.style.cssText = 'display: inline-flex; align-items: center; gap: 4px; background: #e5e7eb; padding: 4px 10px; border-radius: 14px; font-size: 0.9em;';
                        tag.textContent = name;
                        var removeBtn = document.createElement('button');
                        removeBtn.type = 'button';
                        removeBtn.textContent = '×';
                        removeBtn.style.cssText = 'background: none; border: none; cursor: pointer; font-size: 1.1em; color: #6b7280; padding: 0 2px; line-height: 1;';
                        removeBtn.onclick = function() {
                            self._staircaseCourses.splice(idx, 1);
                            self._renderStaircaseTags();
                            self._populateStaircaseSelect();
                        };
                        tag.appendChild(removeBtn);
                        container.appendChild(tag);
                    });
                },

                // フォームからデータを収集
                _collectFormData() {
                    const data = {};
                    data['科目名'] = document.getElementById('course-edit-name').value.trim();
                    const gradeVal = document.getElementById('course-edit-grade').value;
                    data['学年'] = (gradeVal === 'プロ') ? 'プロ' : (parseInt(gradeVal) || 1);
                    data['区分'] = document.getElementById('course-edit-category').value;
                    data['単位数'] = parseInt(document.getElementById('course-edit-units').value) || 1;
                    var sectionSelect = document.getElementById('course-edit-section-select').value;
                    data['セクション'] = sectionSelect === '__new__' ? document.getElementById('course-edit-section').value.trim() : sectionSelect;
                    // チェックされた学年をカンマ区切りで収集
                    var selectedGrades = [];
                    document.querySelectorAll('.selectable-grade-cb:checked').forEach(function(cb) {
                        selectedGrades.push(cb.value);
                    });
                    data['選択可能学年'] = selectedGrades.join(',');
                    data['階段'] = this._staircaseCourses.join(',');
                    var exclusiveSelect = document.getElementById('course-edit-exclusive-select').value;
                    data['同時不可'] = exclusiveSelect === '__new__' ? document.getElementById('course-edit-exclusive').value.trim() : exclusiveSelect;
                    data['教科'] = document.getElementById('course-edit-subject').value.trim();
                    data['詳細'] = document.getElementById('course-edit-detail').value.trim();
                    data['開講なし'] = document.getElementById('course-edit-closed').checked ? true : '';
                    return data;
                },

                // 保存（追加 or 更新）
                async saveCourse(event) {
                    if (event) event.preventDefault();
                    const saveBtn = document.getElementById('course-edit-save-btn');
                    saveBtn.disabled = true;
                    saveBtn.textContent = '保存中...';

                    try {
                        const courseData = this._collectFormData();
                        if (!courseData['科目名']) {
                            Utils.showToast('科目名は必須です', 'error');
                            saveBtn.disabled = false;
                            saveBtn.textContent = '保存';
                            return;
                        }

                        let result;
                        if (this._editingOriginalName) {
                            // 更新
                            result = await DataManager.callGASFunction('updateCourse', this._editingOriginalName, courseData);
                        } else {
                            // 追加
                            result = await DataManager.callGASFunction('addCourse', courseData);
                        }

                        if (result && result.success) {
                            Utils.showToast(this._editingOriginalName ? '科目を更新しました' : '科目を追加しました', 'success');
                            this.closeEditForm();
                            // 一覧を再取得して描画
                            const listResult = await DataManager.callGASFunction('getCourseList');
                            if (listResult && listResult.success) {
                                this._courseList = listResult.courses || [];
                                this._headers = listResult.headers || [];
                                this.renderCourseList();
                            }
                            // AppState.allCoursesも更新
                            await this._refreshAppStateCourses();
                        } else {
                            Utils.showToast(result?.error || '保存に失敗しました', 'error');
                            saveBtn.disabled = false;
                            saveBtn.textContent = '保存';
                        }
                    } catch (e) {
                        console.error('[科目管理] 保存エラー:', e);
                        Utils.showToast('保存中にエラーが発生しました', 'error');
                        saveBtn.disabled = false;
                        saveBtn.textContent = '保存';
                    }
                },

                // 編集モーダルからの科目削除
                async deleteCourseFromEdit() {
                    if (!this._editingOriginalName) return;
                    await this.deleteCourse(this._editingOriginalName);
                    this.closeEditForm();
                },

                // 科目削除
                async deleteCourse(courseName) {
                    if (!confirm('「' + courseName + '」を削除しますか？\n\n履修データが存在する場合は削除できません。')) {
                        return;
                    }

                    try {
                        const result = await DataManager.callGASFunction('deleteCourse', courseName);
                        if (result && result.success) {
                            Utils.showToast('科目を削除しました', 'success');
                            // 一覧を再取得して描画
                            const listResult = await DataManager.callGASFunction('getCourseList');
                            if (listResult && listResult.success) {
                                this._courseList = listResult.courses || [];
                                this._headers = listResult.headers || [];
                                this.renderCourseList();
                            }
                            // AppState.allCoursesも更新
                            await this._refreshAppStateCourses();
                        } else {
                            Utils.showToast(result?.error || '削除に失敗しました', 'error');
                        }
                    } catch (e) {
                        console.error('[科目管理] 削除エラー:', e);
                        Utils.showToast('削除中にエラーが発生しました', 'error');
                    }
                },

                // AppState.allCoursesを最新のデータで更新
                async _refreshAppStateCourses() {
                    try {
                        const courseResult = await DataManager.callGASFunction('getCourseData');
                        if (courseResult && courseResult.courses) {
                            AppState.allCourses = courseResult.courses;
                        }
                    } catch (e) {
                        console.warn('[科目管理] AppState更新に失敗:', e);
                    }
                },

                // HTMLエスケープ
                _escapeHtml(str) {
                    const div = document.createElement('div');
                    div.textContent = str;
                    return div.innerHTML;
                },

                // 属性値エスケープ（onclick用）
                _escapeAttr(str) {
                    return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
                }
            };

            // CourseManagerをグローバルに公開
            window.CourseManager = CourseManager;

            // ============================================================
            // 教職員データ管理（StaffManager）
            // ============================================================
            const StaffManager = {
                _staffList: [],              // 取得済み教職員一覧
                _headers: [],                // ヘッダー配列
                _originalData: null,         // 開いた時のスナップショット（変更検知用）
                _isDirty: false,             // 未保存変更フラグ
                _currentUserEmail: '',       // 自己削除防止用
                _selAnchor: null,            // セル範囲選択の起点 {row, col}
                _selEnd: null,               // セル範囲選択の終点 {row, col}
                _isDragging: false,          // ドラッグ選択中フラグ
                _editingCell: null,          // 編集中セル {row, col}
                _scrollInterval: null,       // 自動スクロール用タイマー
                _isRowSelecting: false,      // 行番号ドラッグ中フラグ
                _isColumnSelect: false,      // 列選択中フラグ
                _docListenersAttached: false, // documentレベルリスナー登録済みフラグ
                _contextMenuRow: -1,         // 右クリック時の表示行インデックス
                _undoStack: [],              // Undoスナップショットスタック
                _clipboardRange: null,       // コピー/切り取り範囲 { minRow, maxRow, minCol, maxCol, isCut: boolean }

                // モーダルを開いて教職員一覧を表示
                async openModal() {
                    this._currentUserEmail = (AppState.currentUser && AppState.currentUser.email) ? AppState.currentUser.email.toLowerCase() : '';
                    const listEl = document.getElementById('staff-management-list');
                    listEl.innerHTML = '<div style="text-align: center; padding: 40px; color: #6c757d;">' +
                        '<div style="display: inline-block; width: 32px; height: 32px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite;"></div>' +
                        '<p style="margin-top: 10px; color: #666; font-size: 0.85em;">読み込み中...</p></div>';
                    this._isDirty = false;
                    this._updateDirtyIndicator();
                    Utils.showModal('staff-management-modal');

                    try {
                        const result = await DataManager.callGASFunction('getStaffList');
                        if (!result || !result.success) {
                            listEl.innerHTML = '<div style="text-align: center; padding: 40px; color: #dc3545;">' +
                                (result?.error || 'データの取得に失敗しました') + '</div>';
                            return;
                        }
                        this._staffList = result.staff || [];
                        this._headers = result.headers || [];
                        this._isDirty = false;
                        this._undoStack = [];
                        this._sortByClass();     // 初回読み込み時ソート
                        this.renderStaffList();  // _ensureEmptyRow()が呼ばれる
                        // 空行込みでスナップショット保存（_ensureEmptyRow後でないとdirty判定がずれる）
                        this._originalData = JSON.stringify(this._staffList);
                        this._updateDirtyIndicator();
                    } catch (e) {
                        console.error('[教職員管理] 取得エラー:', e);
                        listEl.innerHTML = '<div style="text-align: center; padding: 40px; color: #dc3545;">エラーが発生しました</div>';
                    }
                },

                closeModal() {
                    if (this._isDirty) {
                        if (!confirm('未保存の変更があります。閉じてもよろしいですか？')) {
                            return;
                        }
                    }
                    this._clearClipboardHighlight();
                    Utils.hideModal('staff-management-modal');
                },

                // 編集可能テーブルで教職員一覧を描画
                renderStaffList() {
                    const listEl = document.getElementById('staff-management-list');

                    // テーブル再構築前にフォーカス状態を保存
                    var oldTable = listEl.querySelector('table');
                    var hadFocus = oldTable && (oldTable === document.activeElement || oldTable.contains(document.activeElement));

                    // 氏名列のヘッダー名を判定
                    var nameKey = this._headers.indexOf('氏名') !== -1 ? '氏名' : '名前';

                    // 末尾に空行を確保
                    this._ensureEmptyRow();

                    var self = this;
                    var inputStyle = 'width: 100%; padding: 4px 6px; font-size: 0.9em; box-sizing: border-box;';
                    let html = '<table tabindex="0" style="width: 100%; border-collapse: collapse; font-size: 0.9em; outline: none;">';
                    html += '<thead><tr style="background: linear-gradient(135deg, #e3f2fd 0%, #f1f8ff 100%);">' +
                        '<th style="padding: 6px 4px; text-align: center; border: 1px solid #dee2e6; color: #999; width: 32px; font-weight: normal; font-size: 0.8em;"></th>' +
                        '<th style="padding: 6px 8px; text-align: left; border: 1px solid #dee2e6; color: #004294; font-weight: bold; cursor: pointer;">氏名</th>' +
                        '<th style="padding: 6px 8px; text-align: left; border: 1px solid #dee2e6; color: #004294; font-weight: bold; cursor: pointer;">メールアドレス</th>' +
                        '<th style="padding: 6px 8px; text-align: center; border: 1px solid #dee2e6; color: #004294; font-weight: bold; width: 90px; cursor: pointer;">権限</th>' +
                        '<th style="padding: 6px 8px; text-align: center; border: 1px solid #dee2e6; color: #004294; font-weight: bold; width: 100px; cursor: pointer;">担当クラス</th>' +
                        '</tr></thead><tbody>';
                    this._staffList.forEach(function(s, idx) {
                        var email = String(s['メールアドレス'] || '');
                        var name = String(s[nameKey] || '');
                        var role = String(s['権限'] || '').trim();
                        var classInfo = String(s['クラス'] || '');

                        // 権限inputのHTML（readonlyで表示、クリックで▼ボタン、ダブルクリックでテキスト編集）
                        var roleHtml = '<input type="text" readonly data-idx="' + idx + '" data-field="権限" ' +
                            'value="' + self._escapeAttr(role) + '" ' +
                            'oninput="StaffManager._markDirty()" ' +
                            'style="' + inputStyle + ' cursor: default; text-align: left;">';

                        html += '<tr>' +
                            '<td style="padding: 4px 2px; border: 1px solid #dee2e6; text-align: center; color: #999; font-size: 0.8em; cursor: pointer; user-select: none; background: #f8f9fa;">' + (idx + 1) + '</td>' +
                            '<td style="padding: 4px 6px; border: 1px solid #dee2e6;">' +
                                '<input type="text" data-idx="' + idx + '" data-field="' + self._escapeAttr(nameKey) + '" value="' + self._escapeAttr(name) + '" ' +
                                'oninput="StaffManager._markDirty()" style="' + inputStyle + '"></td>' +
                            '<td style="padding: 4px 6px; border: 1px solid #dee2e6;">' +
                                '<input type="email" data-idx="' + idx + '" data-field="メールアドレス" value="' + self._escapeAttr(email) + '" ' +
                                'oninput="StaffManager._markDirty()" style="' + inputStyle + '"></td>' +
                            '<td style="padding: 4px 6px; border: 1px solid #dee2e6;">' + roleHtml + '</td>' +
                            '<td style="padding: 4px 6px; border: 1px solid #dee2e6;">' +
                                '<input type="text" data-idx="' + idx + '" data-field="クラス" value="' + self._escapeAttr(classInfo) + '" ' +
                                'oninput="StaffManager._markDirty()" style="' + inputStyle + '"></td>' +
                            '</tr>';
                    });
                    html += '</tbody></table>';

                    listEl.innerHTML = html;

                    // テーブルにイベントリスナーを追加（セル選択・ダブルクリック編集・貼り付け・キーボード）
                    var table = listEl.querySelector('table');
                    if (table) {
                        // セル範囲選択（クリック / Shift+クリック / ドラッグ）
                        table.addEventListener('mousedown', function(e) {
                            // 編集中セル内のクリックはそのまま通す
                            if (StaffManager._editingCell) {
                                var editTd = e.target.closest('td');
                                if (editTd && editTd.classList.contains('staff-cell-editing')) return;
                            }
                            // 右クリックは選択変更しない（contextmenuイベントで処理）
                            if (e.button === 2) return;

                            // ヘッダークリック → 列全体選択
                            var th = e.target.closest('th');
                            if (th && th.closest('thead')) {
                                var colIdx = Array.prototype.indexOf.call(th.closest('tr').children, th);
                                if (colIdx === 0) return; // 左上セルは無視
                                StaffManager._stopEditing();
                                var tbody = table.querySelector('tbody');
                                var rowCount = tbody ? tbody.querySelectorAll('tr').length : 0;
                                if (rowCount === 0) return;
                                if (e.shiftKey && StaffManager._selAnchor) {
                                    StaffManager._selAnchor = { row: 0, col: StaffManager._selAnchor.col };
                                    StaffManager._selEnd = { row: rowCount - 1, col: colIdx };
                                } else {
                                    StaffManager._selAnchor = { row: 0, col: colIdx };
                                    StaffManager._selEnd = { row: rowCount - 1, col: colIdx };
                                }
                                StaffManager._isColumnSelect = true;
                                StaffManager._updateSelectionHighlight();
                                e.preventDefault();
                                table.focus();
                                return;
                            }

                            var td = e.target.closest('td');
                            if (!td) return;
                            var tr = td.closest('tr');
                            var tbody = tr ? tr.closest('tbody') : null;
                            if (!tbody) return;
                            var colIdx = Array.prototype.indexOf.call(tr.children, td);
                            if (colIdx >= 5) return;
                            var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
                            var rowIdx = rows.indexOf(tr);
                            if (rowIdx === -1) return;

                            // 編集中セルがあれば先に終了
                            StaffManager._stopEditing();
                            StaffManager._isColumnSelect = false;

                            if (colIdx === 0) {
                                // 行番号クリック → 行全体選択
                                if (e.shiftKey && StaffManager._selAnchor) {
                                    StaffManager._selAnchor = { row: StaffManager._selAnchor.row, col: 1 };
                                    StaffManager._selEnd = { row: rowIdx, col: 4 };
                                } else {
                                    StaffManager._selAnchor = { row: rowIdx, col: 1 };
                                    StaffManager._selEnd = { row: rowIdx, col: 4 };
                                    StaffManager._isDragging = true;
                                    StaffManager._isRowSelecting = true;
                                }
                                StaffManager._updateSelectionHighlight();
                                e.preventDefault();
                                table.focus();
                                return;
                            }

                            var pos = { row: rowIdx, col: colIdx };
                            if (e.shiftKey && StaffManager._selAnchor) {
                                StaffManager._selEnd = pos;
                            } else {
                                StaffManager._selAnchor = pos;
                                StaffManager._selEnd = pos;
                                StaffManager._isDragging = true;
                            }
                            e.preventDefault();
                            table.focus();
                            StaffManager._updateSelectionHighlight();
                        });

                        // 右クリックでコンテキストメニュー表示
                        table.addEventListener('contextmenu', function(e) {
                            // ヘッダー上の右クリック: 列選択済みならメニュー表示
                            var th = e.target.closest('th');
                            if (th && th.closest('thead') && StaffManager._isColumnSelect) {
                                e.preventDefault();
                                StaffManager._showContextMenu(e);
                                return;
                            }
                            var td = e.target.closest('td');
                            if (!td) return;
                            var tr = td.closest('tr');
                            var tbody = tr ? tr.closest('tbody') : null;
                            if (!tbody) return;
                            var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
                            var rowIdx = rows.indexOf(tr);
                            if (rowIdx === -1) return;
                            e.preventDefault();
                            // 右クリック行が選択範囲外なら、その行を選択
                            if (StaffManager._selAnchor && StaffManager._selEnd) {
                                var minRow = Math.min(StaffManager._selAnchor.row, StaffManager._selEnd.row);
                                var maxRow = Math.max(StaffManager._selAnchor.row, StaffManager._selEnd.row);
                                if (rowIdx < minRow || rowIdx > maxRow) {
                                    StaffManager._selAnchor = { row: rowIdx, col: 1 };
                                    StaffManager._selEnd = { row: rowIdx, col: 4 };
                                    StaffManager._updateSelectionHighlight();
                                }
                            } else {
                                StaffManager._selAnchor = { row: rowIdx, col: 1 };
                                StaffManager._selEnd = { row: rowIdx, col: 4 };
                                StaffManager._updateSelectionHighlight();
                            }
                            StaffManager._showContextMenu(e);
                        });

                        // ダブルクリックで編集モード開始
                        table.addEventListener('dblclick', function(e) {
                            var td = e.target.closest('td');
                            if (!td) return;
                            var tr = td.closest('tr');
                            var tbody = tr ? tr.closest('tbody') : null;
                            if (!tbody) return;
                            var colIdx = Array.prototype.indexOf.call(tr.children, td);
                            if (colIdx < 1 || colIdx >= 5) return;
                            var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
                            var rowIdx = rows.indexOf(tr);
                            if (rowIdx === -1) return;
                            StaffManager._startEditing(rowIdx, colIdx);
                        });

                        // ドラッグ中のセル範囲拡張
                        table.addEventListener('mousemove', function(e) {
                            if (!StaffManager._isDragging) return;
                            var td = e.target.closest('td');
                            if (!td) return;
                            var tr = td.closest('tr');
                            var tbody = tr ? tr.closest('tbody') : null;
                            if (!tbody) return;
                            var colIdx = Array.prototype.indexOf.call(tr.children, td);
                            if (colIdx >= 5) return;
                            var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
                            var rowIdx = rows.indexOf(tr);
                            if (rowIdx === -1) return;
                            // 行番号ドラッグ中は常に全列選択を維持
                            if (StaffManager._isRowSelecting) {
                                StaffManager._selEnd = { row: rowIdx, col: 4 };
                                StaffManager._updateSelectionHighlight();
                            } else {
                                if (colIdx < 1) colIdx = 1;
                                StaffManager._selEnd = { row: rowIdx, col: colIdx };
                                StaffManager._updateSelectionHighlight();
                            }

                            // ドラッグ中の自動スクロール
                            var container = document.getElementById('staff-management-list');
                            if (container) {
                                var rect = container.getBoundingClientRect();
                                var EDGE = 30;
                                var SPEED = 6;
                                var mouseY = e.clientY;
                                clearInterval(StaffManager._scrollInterval);
                                StaffManager._scrollInterval = null;
                                if (mouseY < rect.top + EDGE) {
                                    StaffManager._scrollInterval = setInterval(function() {
                                        container.scrollTop -= SPEED;
                                    }, 16);
                                } else if (mouseY > rect.bottom - EDGE) {
                                    StaffManager._scrollInterval = setInterval(function() {
                                        container.scrollTop += SPEED;
                                    }, 16);
                                }
                            }
                        });

                        // ドラッグ終了・テーブル外クリック（documentレベルは1回だけ登録）
                        if (!StaffManager._docListenersAttached) {
                            StaffManager._docListenersAttached = true;

                            document.addEventListener('mouseup', function() {
                                StaffManager._isDragging = false;
                                StaffManager._isRowSelecting = false;
                                clearInterval(StaffManager._scrollInterval);
                                StaffManager._scrollInterval = null;
                            });

                            document.addEventListener('mousedown', function(e) {
                                // コンテキストメニュー外クリックで閉じる
                                var ctxMenu = document.getElementById('staff-context-menu');
                                if (ctxMenu && ctxMenu.style.display !== 'none' && !ctxMenu.contains(e.target)) {
                                    StaffManager._hideContextMenu();
                                }
                                var currentTable = document.querySelector('#staff-management-list table');
                                if (currentTable && !currentTable.contains(e.target) && !(ctxMenu && ctxMenu.contains(e.target))) {
                                    StaffManager._stopEditing();
                                    if (StaffManager._selAnchor) {
                                        StaffManager._selAnchor = null;
                                        StaffManager._selEnd = null;
                                        StaffManager._updateSelectionHighlight();
                                    }
                                }
                            });
                        }

                        // スクロール時にコンテキストメニューを閉じる
                        listEl.addEventListener('scroll', function() {
                            StaffManager._hideContextMenu();
                        });

                        // 編集終了検知（focusout イベント委譲）
                        table.addEventListener('focusout', function(e) {
                            if (!StaffManager._editingCell) return;
                            var target = e.target;
                            if (target.tagName !== 'INPUT') return;
                            // 同じtd内の別要素へ移動する場合は終了しない
                            var td = target.closest('td');
                            setTimeout(function() {
                                var newFocus = document.activeElement;
                                if (td && td.contains(newFocus)) return;
                                // テーブル自体にフォーカスが戻った場合は_stopEditingが処理済み
                                if (newFocus === table) return;
                                StaffManager._editingCell = null;
                                if (td) td.classList.remove('staff-cell-editing');
                            }, 0);
                        });

                        // 複数セル一括貼り付け（Excelからのタブ区切りデータ対応）
                        table.addEventListener('paste', function(e) {
                            var clipText = (e.clipboardData || window.clipboardData).getData('text');
                            if (!clipText) return;

                            // 編集中のinputへの通常貼り付け
                            if (StaffManager._editingCell && e.target.tagName === 'INPUT') {
                                // タブ/改行を含まない場合はブラウザ標準
                                if (clipText.indexOf('\t') === -1 && clipText.indexOf('\n') === -1) return;
                                e.preventDefault();
                                StaffManager._pasteMultiCell(e.target, clipText);
                                return;
                            }

                            // 非編集時: 選択範囲があればアンカーセルのinputを起点に貼り付け
                            if (!StaffManager._editingCell && StaffManager._selAnchor) {
                                e.preventDefault();
                                var rows = table.querySelectorAll('tbody tr');
                                var anchorRow = rows[StaffManager._selAnchor.row];
                                if (!anchorRow) return;
                                var anchorTd = anchorRow.children[StaffManager._selAnchor.col];
                                var anchorInput = anchorTd ? anchorTd.querySelector('input') : null;
                                if (anchorInput) StaffManager._pasteMultiCell(anchorInput, clipText);
                            }
                        });

                        // キーボードナビゲーション＋コピー＋削除
                        table.addEventListener('keydown', function(e) {
                            var isEditing = StaffManager._editingCell !== null;
                            var hasSel = StaffManager._selAnchor && StaffManager._selEnd;

                            // IME変換中はキー操作を無視（変換確定Enterの誤処理を防止）
                            if (e.isComposing) return;

                            // Enter
                            if (e.key === 'Enter') {
                                if (isEditing) {
                                    // 編集中: 値を確定、編集終了、選択を1行下に移動
                                    e.preventDefault();
                                    var editRow = StaffManager._editingCell.row;
                                    var editCol = StaffManager._editingCell.col;
                                    StaffManager._stopEditing();
                                    var newRow = editRow + 1;
                                    var rows = table.querySelectorAll('tbody tr');
                                    if (newRow < rows.length) {
                                        StaffManager._selAnchor = { row: newRow, col: editCol };
                                        StaffManager._selEnd = { row: newRow, col: editCol };
                                        StaffManager._updateSelectionHighlight();
                                    }
                                } else if (hasSel) {
                                    // 非編集時+選択あり: 選択セルで編集開始
                                    e.preventDefault();
                                    StaffManager._startEditing(StaffManager._selAnchor.row, StaffManager._selAnchor.col);
                                }
                                return;
                            }

                            // F2: 編集開始
                            if (e.key === 'F2' && !isEditing && hasSel) {
                                e.preventDefault();
                                StaffManager._startEditing(StaffManager._selAnchor.row, StaffManager._selAnchor.col);
                                return;
                            }

                            // Escape
                            if (e.key === 'Escape') {
                                // コンテキストメニューが開いていれば閉じる
                                var ctxMenu = document.getElementById('staff-context-menu');
                                if (ctxMenu && ctxMenu.style.display !== 'none') {
                                    StaffManager._hideContextMenu();
                                    return;
                                }
                                if (isEditing) {
                                    // 編集中: 編集終了、選択は残す
                                    e.preventDefault();
                                    StaffManager._stopEditing();
                                } else if (StaffManager._clipboardRange) {
                                    // クリップボードハイライト解除
                                    StaffManager._clearClipboardHighlight();
                                }
                                return;
                            }

                            // Tab: 編集中なら次/前セルへ移動
                            if (e.key === 'Tab' && isEditing) {
                                e.preventDefault();
                                var tabRow = StaffManager._editingCell.row;
                                var tabCol = StaffManager._editingCell.col;
                                StaffManager._stopEditing();
                                var nextCol = e.shiftKey ? tabCol - 1 : tabCol + 1;
                                var nextRow = tabRow;
                                if (nextCol > 4) { nextCol = 1; nextRow++; }
                                if (nextCol < 1) { nextCol = 4; nextRow--; }
                                var tbodyRows = table.querySelectorAll('tbody tr');
                                if (nextRow >= 0 && nextRow < tbodyRows.length) {
                                    StaffManager._selAnchor = { row: nextRow, col: nextCol };
                                    StaffManager._selEnd = { row: nextRow, col: nextCol };
                                    StaffManager._updateSelectionHighlight();
                                    StaffManager._startEditing(nextRow, nextCol);
                                }
                                return;
                            }

                            // 矢印キー: 非編集時のセル移動
                            if (!isEditing && hasSel && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].indexOf(e.key) !== -1) {
                                e.preventDefault();
                                var anchor = StaffManager._selAnchor;
                                var newPos = { row: anchor.row, col: anchor.col };
                                if (e.key === 'ArrowUp') newPos.row = Math.max(0, anchor.row - 1);
                                if (e.key === 'ArrowDown') newPos.row = anchor.row + 1;
                                if (e.key === 'ArrowLeft') newPos.col = Math.max(1, anchor.col - 1);
                                if (e.key === 'ArrowRight') newPos.col = Math.min(4, anchor.col + 1);
                                var navRows = table.querySelectorAll('tbody tr');
                                if (newPos.row >= navRows.length) newPos.row = navRows.length - 1;
                                if (e.shiftKey) {
                                    StaffManager._selEnd = newPos;
                                } else {
                                    StaffManager._selAnchor = newPos;
                                    StaffManager._selEnd = newPos;
                                }
                                StaffManager._updateSelectionHighlight();
                                // 移動先セルへスクロール追従
                                if (navRows[newPos.row]) {
                                    navRows[newPos.row].scrollIntoView({ block: 'nearest' });
                                    // stickyヘッダーに隠れた場合の補正
                                    var stickyTh = table.querySelector('thead th');
                                    if (stickyTh) {
                                        var headerBottom = stickyTh.getBoundingClientRect().bottom;
                                        var rowTop = navRows[newPos.row].getBoundingClientRect().top;
                                        if (rowTop < headerBottom) {
                                            table.parentElement.scrollTop -= (headerBottom - rowTop);
                                        }
                                    }
                                }
                                return;
                            }

                            // Ctrl+Z / Cmd+Z: 元に戻す
                            if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !isEditing) {
                                e.preventDefault();
                                StaffManager._undo();
                                return;
                            }

                            // Ctrl+C / Cmd+C: 選択範囲コピー
                            if ((e.ctrlKey || e.metaKey) && e.key === 'c' && hasSel) {
                                // 編集中でテキスト選択があればブラウザ標準のコピーを優先
                                if (isEditing) {
                                    var active = document.activeElement;
                                    if (active && active.tagName === 'INPUT' && active.selectionStart !== active.selectionEnd) return;
                                }
                                e.preventDefault();
                                StaffManager._copySelection();
                                return;
                            }

                            // Ctrl+X / Cmd+X: 選択範囲切り取り
                            if ((e.ctrlKey || e.metaKey) && e.key === 'x' && hasSel) {
                                if (StaffManager._isColumnSelect) return; // 列選択中は切り取り不可
                                if (isEditing) {
                                    var active = document.activeElement;
                                    if (active && active.tagName === 'INPUT' && active.selectionStart !== active.selectionEnd) return;
                                }
                                e.preventDefault();
                                StaffManager._cutSelection();
                                return;
                            }

                            // Delete / Backspace: 選択範囲のセル値クリア（行削除はコンテキストメニューから）
                            if ((e.key === 'Delete' || e.key === 'Backspace') && hasSel && !isEditing) {
                                e.preventDefault();
                                StaffManager._clearSelection();
                                return;
                            }
                        });
                    }
                    // フォーカス復元（Ctrl+Z等のキーボード操作を継続可能にする）
                    if (hadFocus) {
                        var newTable = listEl.querySelector('table');
                        if (newTable) newTable.focus({ preventScroll: true });
                    }
                    // クリップボードハイライト復元（行の挿入・削除後）
                    this._updateClipboardHighlight();
                },

                // 末尾に空行が無ければ追加
                _ensureEmptyRow() {
                    var nameKey = this._headers.indexOf('氏名') !== -1 ? '氏名' : '名前';
                    var last = this._staffList[this._staffList.length - 1];
                    var isEmpty = last &&
                        !String(last[nameKey] || '').trim() &&
                        !String(last['メールアドレス'] || '').trim() &&
                        !String(last['権限'] || '').trim() &&
                        !String(last['クラス'] || '').trim();
                    if (!isEmpty || this._staffList.length === 0) {
                        var newItem = {};
                        newItem[nameKey] = '';
                        newItem['メールアドレス'] = '';
                        newItem['権限'] = '';
                        newItem['クラス'] = '';
                        this._staffList.push(newItem);
                    }
                },

                // 行を追加
                addRow() {
                    this._saveUndoSnapshot();
                    this._syncFromDOM();
                    this._ensureEmptyRow();
                    this._markDirty();
                    this.renderStaffList();
                    // 末尾にスクロール
                    var listEl = document.getElementById('staff-management-list');
                    listEl.scrollTop = listEl.scrollHeight;
                },

                // 行を削除
                removeRow(index) {
                    // DOMから現在の入力値を回収してから削除
                    this._syncFromDOM();
                    if (index >= 0 && index < this._staffList.length) {
                        this._staffList.splice(index, 1);
                        // _markDirty()は呼ばない（_syncFromDOMがsplice後のデータを破壊するため）
                        this.renderStaffList();
                        this._isDirty = JSON.stringify(this._staffList) !== this._originalData;
                        this._updateDirtyIndicator();
                    }
                },

                // 複数セル一括貼り付け処理
                _pasteMultiCell(startInput, text, insertMode) {
                    this._saveUndoSnapshot();
                    // 現在のDOM値を同期してから操作
                    this._syncFromDOM();

                    var nameKey = this._headers.indexOf('氏名') !== -1 ? '氏名' : '名前';
                    var fields = [nameKey, 'メールアドレス', '権限', 'クラス'];
                    var startField = startInput.getAttribute('data-field');
                    var startFieldIdx = fields.indexOf(startField);
                    if (startFieldIdx === -1) return;

                    // 起点セルのDOM行位置を特定
                    var startTr = startInput.closest('tr');
                    var tbody = startTr ? startTr.closest('tbody') : null;
                    if (!tbody) return;
                    var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
                    var startRowIdx = rows.indexOf(startTr);
                    if (startRowIdx === -1) return;

                    // クリップボードテキストを行×列に分割
                    var lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
                    // 末尾の空行を除去
                    while (lines.length > 0 && lines[lines.length - 1].trim() === '') {
                        lines.pop();
                    }

                    // 単一セルの値を選択範囲全体にフィル（Excel互換動作）
                    if (lines.length === 1 && lines[0].indexOf('\t') === -1 &&
                        this._selAnchor && this._selEnd &&
                        (this._selAnchor.row !== this._selEnd.row || this._selAnchor.col !== this._selEnd.col)) {
                        var singleValue = lines[0].trim();
                        var minRow = Math.min(this._selAnchor.row, this._selEnd.row);
                        var maxRow = Math.max(this._selAnchor.row, this._selEnd.row);
                        var minCol = Math.min(this._selAnchor.col, this._selEnd.col);
                        var maxCol = Math.max(this._selAnchor.col, this._selEnd.col);

                        for (var r = minRow; r <= maxRow; r++) {
                            var tr = rows[r];
                            if (!tr) continue;
                            for (var c = minCol; c <= maxCol; c++) {
                                var td = tr.children[c];
                                if (!td) continue;
                                var el = td.querySelector('input');
                                if (!el) continue;
                                el.value = singleValue;
                                var field = el.getAttribute('data-field');
                                var idx = parseInt(el.getAttribute('data-idx'));
                                if (!isNaN(idx) && this._staffList[idx] && field) {
                                    this._staffList[idx][field] = singleValue;
                                }
                            }
                        }
                        this._markDirty();
                        return;
                    }

                    var isCut = this._clipboardRange && this._clipboardRange.isCut;

                    // 行全体の切り取り → 行移動として処理
                    if (isCut && this._clipboardRange) {
                        var cutRange = this._clipboardRange;
                        var isFullRowCut = (cutRange.minCol <= 1 && cutRange.maxCol >= 4);

                        if (isFullRowCut) {
                            var insertDataIdx = parseInt(startInput.getAttribute('data-idx'));
                            if (isNaN(insertDataIdx)) return;

                            // 切り取り行のデータインデックスを収集
                            var cutTable = document.querySelector('#staff-management-list table');
                            var cutRows = cutTable ? cutTable.querySelectorAll('tbody tr') : [];
                            var cutDataIndices = [];
                            var cutItems = [];
                            for (var r = cutRange.minRow; r <= cutRange.maxRow; r++) {
                                if (!cutRows[r]) continue;
                                var el = cutRows[r].querySelector('[data-idx]');
                                if (!el) continue;
                                var idx = parseInt(el.getAttribute('data-idx'));
                                if (isNaN(idx)) continue;
                                cutDataIndices.push(idx);
                                cutItems.push(JSON.parse(JSON.stringify(this._staffList[idx])));
                            }
                            if (cutItems.length === 0) return;

                            // 元の行を削除（降順でspliceしてインデックスずれ防止）
                            var sortedIndices = cutDataIndices.slice().sort(function(a, b) { return b - a; });
                            for (var i = 0; i < sortedIndices.length; i++) {
                                this._staffList.splice(sortedIndices[i], 1);
                            }

                            // 挿入位置を調整（削除した行が挿入位置より前にあった分だけ減らす）
                            var adjustedIdx = insertDataIdx;
                            for (var i = 0; i < cutDataIndices.length; i++) {
                                if (cutDataIndices[i] < insertDataIdx) adjustedIdx--;
                            }
                            adjustedIdx = Math.max(0, Math.min(adjustedIdx, this._staffList.length));

                            // 切り取った行を挿入
                            var spliceArgs = [adjustedIdx, 0].concat(cutItems);
                            Array.prototype.splice.apply(this._staffList, spliceArgs);

                            // クリーンアップ & 再描画
                            this._clipboardRange = null;
                            this._updateClipboardHighlight();
                            this.renderStaffList();
                            this._isDirty = JSON.stringify(this._staffList) !== this._originalData;
                            this._updateDirtyIndicator();

                            // 移動先行を選択状態にする
                            this._selAnchor = { row: adjustedIdx, col: 1 };
                            this._selEnd = { row: adjustedIdx + cutItems.length - 1, col: 4 };
                            this._updateSelectionHighlight();
                            Utils.showToast(cutItems.length + '行を移動しました', 'success');
                            return;
                        }
                    }

                    // 挿入モードの場合は挿入方式で貼り付け（右クリック「コピーしたセルを挿入」用）
                    if (insertMode) {
                        var insertPos = parseInt(startInput.getAttribute('data-idx'));
                        if (isNaN(insertPos)) return;

                        // 新規行を作成してクリップボードデータを設定
                        var newItems = [];
                        for (var r = 0; r < lines.length; r++) {
                            var newItem = {};
                            newItem[nameKey] = '';
                            newItem['メールアドレス'] = '';
                            newItem['権限'] = '';
                            newItem['クラス'] = '';
                            var cols = lines[r].split('\t');
                            for (var c = 0; c < cols.length; c++) {
                                var fieldIdx = startFieldIdx + c;
                                if (fieldIdx >= fields.length) break;
                                newItem[fields[fieldIdx]] = cols[c].trim();
                            }
                            newItems.push(newItem);
                        }

                        // 挿入位置に新規行を挿入
                        var spliceArgs = [insertPos, 0].concat(newItems);
                        Array.prototype.splice.apply(this._staffList, spliceArgs);

                        this._clipboardRange = null;
                        this._updateClipboardHighlight();
                        this.renderStaffList();
                        this._isDirty = JSON.stringify(this._staffList) !== this._originalData;
                        this._updateDirtyIndicator();
                        Utils.showToast(lines.length + '行のデータを挿入しました', 'success');
                        return;
                    }

                    // 通常コピーの場合は上書き方式で貼り付け
                    var neededRows = (startRowIdx + lines.length) - rows.length;
                    for (var i = 0; i < neededRows; i++) {
                        var newItem = {};
                        newItem[nameKey] = '';
                        newItem['メールアドレス'] = '';
                        newItem['権限'] = '';
                        newItem['クラス'] = '';
                        this._staffList.push(newItem);
                    }

                    if (neededRows > 0) {
                        this.renderStaffList();
                        tbody = document.querySelector('#staff-management-list table tbody');
                        rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
                    }

                    for (var r = 0; r < lines.length; r++) {
                        var cols = lines[r].split('\t');
                        var tr = rows[startRowIdx + r];
                        if (!tr) break;

                        for (var c = 0; c < cols.length; c++) {
                            var fieldIdx = startFieldIdx + c;
                            if (fieldIdx >= fields.length) break;
                            var field = fields[fieldIdx];
                            var value = cols[c].trim();

                            var el = tr.querySelector('[data-field="' + field + '"]');
                            if (el) {
                                el.value = value;
                                var idx = parseInt(el.getAttribute('data-idx'));
                                if (!isNaN(idx) && this._staffList[idx]) {
                                    this._staffList[idx][field] = value;
                                }
                            }
                        }
                    }

                    // 切り取りの場合は元セルのみクリア（行削除ではなくセル単位）
                    if (isCut && this._clipboardRange) {
                        var cutRange = this._clipboardRange;
                        var cutTable = document.querySelector('#staff-management-list table');
                        if (cutTable) {
                            var cutRows = cutTable.querySelectorAll('tbody tr');
                            for (var cr = cutRange.minRow; cr <= cutRange.maxRow; cr++) {
                                if (!cutRows[cr]) continue;
                                var cutCells = cutRows[cr].children;
                                for (var cc = cutRange.minCol; cc <= cutRange.maxCol; cc++) {
                                    if (cc < 1 || cc >= 5 || !cutCells[cc]) continue;
                                    // 貼り付け先と重複するセルはスキップ（自分自身のデータ消失防止）
                                    var pasteRowStart = startRowIdx;
                                    var pasteRowEnd = startRowIdx + lines.length - 1;
                                    var pasteColStart = startFieldIdx + 1; // DOM列（col 0は行番号）
                                    var pasteColEnd = pasteColStart + (lines[0] ? lines[0].split('\t').length : 1) - 1;
                                    if (cr >= pasteRowStart && cr <= pasteRowEnd && cc >= pasteColStart && cc <= pasteColEnd) continue;
                                    var cutEl = cutCells[cc].querySelector('input');
                                    if (cutEl) {
                                        cutEl.value = '';
                                        var cutIdx = parseInt(cutEl.getAttribute('data-idx'));
                                        var cutField = cutEl.getAttribute('data-field');
                                        if (!isNaN(cutIdx) && this._staffList[cutIdx] && cutField) {
                                            this._staffList[cutIdx][cutField] = '';
                                        }
                                    }
                                }
                            }
                        }
                        this._clipboardRange = null;
                        this._updateClipboardHighlight();
                    }

                    this._markDirty();
                },

                // DOMの入力フィールドから現在の値を _staffList に同期
                _syncFromDOM() {
                    var nameKey = this._headers.indexOf('氏名') !== -1 ? '氏名' : '名前';
                    var inputs = document.querySelectorAll('#staff-management-list [data-idx]');
                    inputs.forEach(function(el) {
                        var idx = parseInt(el.getAttribute('data-idx'));
                        var field = el.getAttribute('data-field');
                        if (!isNaN(idx) && field && StaffManager._staffList[idx]) {
                            StaffManager._staffList[idx][field] = el.value;
                        }
                    });
                },

                // テーブルDOM全行から現在値を読み取り配列で返却
                _collectAllData() {
                    this._syncFromDOM();
                    var nameKey = this._headers.indexOf('氏名') !== -1 ? '氏名' : '名前';
                    // メールアドレスが空の行をスキップ
                    return this._staffList.filter(function(s) {
                        return String(s['メールアドレス'] || '').trim() !== '';
                    });
                },

                // 担当クラス順にソート（初回読み込み時・保存成功後のみ呼ぶ）
                _sortByClass() {
                    var nameKey = this._headers.indexOf('氏名') !== -1 ? '氏名' : '名前';
                    this._staffList.sort(function(a, b) {
                        // 空行は常に末尾
                        var aEmpty = !String(a[nameKey] || '').trim() && !String(a['メールアドレス'] || '').trim();
                        var bEmpty = !String(b[nameKey] || '').trim() && !String(b['メールアドレス'] || '').trim();
                        if (aEmpty !== bEmpty) return aEmpty ? 1 : -1;
                        // クラス列で昇順ソート（空クラスは後ろ）
                        var aClass = String(a['クラス'] || '').trim();
                        var bClass = String(b['クラス'] || '').trim();
                        if (!aClass && bClass) return 1;
                        if (aClass && !bClass) return -1;
                        return aClass.localeCompare(bClass, 'ja');
                    });
                },

                // 変更フラグを立てる
                _markDirty() {
                    this._syncFromDOM();
                    // 最終行に入力があれば自動で新しい空行を追加
                    var nameKey = this._headers.indexOf('氏名') !== -1 ? '氏名' : '名前';
                    var last = this._staffList[this._staffList.length - 1];
                    if (last && (String(last[nameKey] || '').trim() ||
                                 String(last['メールアドレス'] || '').trim() ||
                                 String(last['権限'] || '').trim() ||
                                 String(last['クラス'] || '').trim())) {
                        // フォーカス中のセルの位置とカーソル位置を記憶
                        var activeEl = document.activeElement;
                        var focusIdx = activeEl ? activeEl.getAttribute('data-idx') : null;
                        var focusField = activeEl ? activeEl.getAttribute('data-field') : null;
                        var cursorPos = activeEl && activeEl.setSelectionRange ? activeEl.selectionStart : null;
                        this._ensureEmptyRow();
                        this.renderStaffList();
                        // フォーカスとカーソル位置を復元
                        if (focusIdx !== null && focusField !== null) {
                            var target = document.querySelector(
                                '#staff-management-list [data-idx="' + focusIdx + '"][data-field="' + focusField + '"]');
                            if (target) {
                                target.focus({ preventScroll: true });
                                if (cursorPos !== null && target.setSelectionRange) {
                                    target.setSelectionRange(cursorPos, cursorPos);
                                }
                            }
                        }
                    }
                    this._isDirty = JSON.stringify(this._staffList) !== this._originalData;
                    this._updateDirtyIndicator();
                },

                // 未保存表示を更新
                _updateDirtyIndicator() {
                    var btn = document.getElementById('staff-save-all-btn');
                    if (btn) {
                        btn.disabled = !this._isDirty;
                        btn.style.opacity = this._isDirty ? '1' : '0.5';
                        btn.style.cursor = this._isDirty ? 'pointer' : 'default';
                    }
                },

                // 一括保存
                async saveAll() {
                    var data = this._collectAllData();
                    if (data.length === 0) {
                        Utils.showToast('保存するデータがありません', 'error');
                        return;
                    }

                    // メールアドレス重複チェック
                    var emails = {};
                    for (var i = 0; i < data.length; i++) {
                        var email = String(data[i]['メールアドレス'] || '').trim().toLowerCase();
                        if (emails[email]) {
                            Utils.showToast('メールアドレスが重複しています: ' + email, 'error');
                            return;
                        }
                        emails[email] = true;
                    }

                    // 自分のメールが含まれているか確認
                    if (this._currentUserEmail && !emails[this._currentUserEmail]) {
                        Utils.showToast('自分自身のメールアドレスが含まれていません。自分を削除することはできません。', 'error');
                        return;
                    }

                    if (!confirm('教職員データを' + data.length + '件で上書き保存します。よろしいですか？')) {
                        return;
                    }

                    var saveBtn = document.getElementById('staff-save-all-btn');
                    saveBtn.disabled = true;
                    saveBtn.textContent = '保存中...';

                    try {
                        var result = await DataManager.callGASFunction('replaceAllStaff', data);
                        if (result && result.success) {
                            Utils.showToast('教職員データを保存しました（' + result.count + '件）', 'success');
                            this._isDirty = false;
                            this._undoStack = [];
                            this._sortByClass();     // 保存後ソート
                            this.renderStaffList();  // 空行確保
                            this._originalData = JSON.stringify(this._staffList);
                            this._updateDirtyIndicator();
                        } else {
                            Utils.showToast(result?.error || '保存に失敗しました', 'error');
                        }
                    } catch (e) {
                        console.error('[教職員管理] 一括保存エラー:', e);
                        Utils.showToast('保存中にエラーが発生しました', 'error');
                    } finally {
                        saveBtn.textContent = '保存';
                        // disabled状態は_updateDirtyIndicator()に委ねる（手動で解除しない）
                    }
                },

                // HTMLエスケープ
                _escapeHtml(str) {
                    const div = document.createElement('div');
                    div.textContent = str;
                    return div.innerHTML;
                },

                // 属性値エスケープ（onclick用）
                _escapeAttr(str) {
                    return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                },

                // 編集モード開始
                _startEditing(row, col) {
                    this._saveUndoSnapshot();
                    this._stopEditing();
                    this._clearClipboardHighlight();
                    // ドロップダウンボタン/リストを非表示
                    this._hideRoleDropdownButton();
                    var table = document.querySelector('#staff-management-list table');
                    if (!table) return;
                    var tr = table.querySelectorAll('tbody tr')[row];
                    if (!tr) return;
                    var td = tr.children[col];
                    if (!td || col < 1 || col >= 5) return;
                    // 権限列の場合: 編集モードに入らず、ドロップダウンを表示して即return
                    if (col === 3) {
                        var el = td.querySelector('input');
                        if (el) StaffManager._showRoleDropdownList(td, el);
                        return;
                    }
                    td.classList.add('staff-cell-editing');
                    // 選択時と同じ青枠を維持
                    td.style.boxShadow = 'inset 0 2px 0 0 #1a73e8, inset 0 -2px 0 0 #1a73e8, inset 2px 0 0 0 #1a73e8, inset -2px 0 0 0 #1a73e8';
                    td.style.backgroundColor = '';
                    var el = td.querySelector('input');
                    if (el) {
                        el.focus();
                        el.select();
                    }
                    this._editingCell = { row: row, col: col };
                },

                // 編集モード終了
                _stopEditing() {
                    if (!this._editingCell) return;
                    var editCol = this._editingCell.col;
                    var table = document.querySelector('#staff-management-list table');
                    if (!table) return;
                    var tr = table.querySelectorAll('tbody tr')[this._editingCell.row];
                    if (tr) {
                        var td = tr.children[editCol];
                        if (td) {
                            td.classList.remove('staff-cell-editing');
                            var el = td.querySelector('input');
                            if (el) {
                                // 権限列のバリデーション
                                if (editCol === 3) {
                                    var validRoles = ['', '教務', '管理者'];
                                    var inputVal = el.value.trim();
                                    var idx = parseInt(el.getAttribute('data-idx'));
                                    if (validRoles.indexOf(inputVal) === -1) {
                                        // 不正値 → 元の値に戻す
                                        el.value = (!isNaN(idx) && this._staffList[idx]) ? (this._staffList[idx]['権限'] || '') : '';
                                    } else {
                                        // 正規値 → データモデル更新
                                        el.value = inputVal;
                                        if (!isNaN(idx) && this._staffList[idx]) {
                                            this._staffList[idx]['権限'] = inputVal;
                                        }
                                    }
                                    el.setAttribute('readonly', '');
                                    el.style.cursor = 'default';
                                }
                                el.blur();
                            }
                        }
                    }
                    this._editingCell = null;
                    table.focus();
                },

                // 権限列セルに▼ボタンを表示
                _showRoleDropdownButton(td) {
                    // 既存ボタンがあれば何もしない
                    if (document.getElementById('staff-role-dropdown-btn')) return;
                    td.style.position = 'relative';
                    var btn = document.createElement('span');
                    btn.id = 'staff-role-dropdown-btn';
                    btn.textContent = '▼';
                    btn.style.cssText = 'position: absolute; right: 2px; top: 50%; transform: translateY(-50%); ' +
                        'cursor: pointer; font-size: 0.85em; color: #666; padding: 3px 6px; ' +
                        'border-radius: 3px; line-height: 1; z-index: 5;';
                    btn.addEventListener('mouseenter', function() { btn.style.color = '#1a73e8'; });
                    btn.addEventListener('mouseleave', function() { btn.style.color = '#666'; });
                    btn.addEventListener('mousedown', function(e) {
                        e.stopPropagation();
                        e.preventDefault();
                        var input = td.querySelector('input');
                        StaffManager._showRoleDropdownList(td, input);
                    });
                    td.appendChild(btn);
                },

                // 権限列の▼ボタンを削除
                _hideRoleDropdownButton() {
                    var btn = document.getElementById('staff-role-dropdown-btn');
                    if (btn) btn.remove();
                    this._hideRoleDropdownList();
                },

                // 権限列のドロップダウンリストを表示
                _showRoleDropdownList(td, input) {
