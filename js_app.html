                        var field = el.getAttribute('data-field');
                        if (!isNaN(idx) && field && StudentManager._studentList[idx]) {
                            StudentManager._studentList[idx][field] = el.value;
                        }
                    });
                },

                // テーブルDOM全行から現在値を読み取り配列で返却
                _collectAllData() {
                    this._syncFromDOM();
                    // 学籍番号が空の行をスキップ
                    return this._studentList.filter(function(s) {
                        return String(s['学籍番号'] || '').trim() !== '';
                    });
                },

                // 学年→組→番号の昇順ソート
                _sortByGradeClassNumber() {
                    var fields = this._fields;
                    this._studentList.sort(function(a, b) {
                        // 空行は常に末尾
                        var aEmpty = fields.every(function(f) { return !String(a[f] || '').trim(); });
                        var bEmpty = fields.every(function(f) { return !String(b[f] || '').trim(); });
                        if (aEmpty !== bEmpty) return aEmpty ? 1 : -1;
                        return Utils.compareByGradeClassNumber(a['学年'], a['組'], a['番号'], b['学年'], b['組'], b['番号']);
                    });
                },

                // 変更フラグを立てる
                _markDirty() {
                    this._syncFromDOM();
                    var fields = this._fields;
                    var last = this._studentList[this._studentList.length - 1];
                    if (last && fields.some(function(f) { return String(last[f] || '').trim(); })) {
                        var activeEl = document.activeElement;
                        var focusIdx = activeEl ? activeEl.getAttribute('data-idx') : null;
                        var focusField = activeEl ? activeEl.getAttribute('data-field') : null;
                        var cursorPos = activeEl && activeEl.setSelectionRange ? activeEl.selectionStart : null;
                        this._ensureEmptyRow();
                        this.renderStudentList();
                        if (focusIdx !== null && focusField !== null) {
                            var target = document.querySelector(
                                '#student-management-list [data-idx="' + focusIdx + '"][data-field="' + focusField + '"]');
                            if (target) {
                                target.focus({ preventScroll: true });
                                if (cursorPos !== null && target.setSelectionRange) {
                                    target.setSelectionRange(cursorPos, cursorPos);
                                }
                            }
                        }
                    }
                    this._isDirty = JSON.stringify(this._studentList) !== this._originalData;
                    this._updateDirtyIndicator();
                },

                // 未保存表示を更新
                _updateDirtyIndicator() {
                    var btn = document.getElementById('student-save-all-btn');
                    if (btn) {
                        btn.disabled = !this._isDirty;
                        btn.style.opacity = this._isDirty ? '1' : '0.5';
                        btn.style.cursor = this._isDirty ? 'pointer' : 'default';
                    }
                },

                // Excel取込: ファイル読み込み＋解析
                handleImportFile(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const workbook = XLSX.read(data, { type: 'array' });
                            const sheet = workbook.Sheets[workbook.SheetNames[0]];
                            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });

                            // BOM/ゼロ幅文字除去
                            const stripInvisible = (s) => s ? String(s).replace(/[\uFEFF\u200B\u200C\u200D\uFFFE]/g, '').trim() : '';

                            // ヘッダー行を検出（'学籍番号'列を探す）
                            let headerRowIndex = -1;
                            let colMap = {};
                            const targetCols = ['学籍番号', '学年', '組', '番号', '名前', 'メールアドレス', '来年度学年'];
                            // '氏名'→'名前'の別名マッピング
                            const aliases = { '氏名': '名前', '番': '番号' };
                            for (let i = 0; i < Math.min(rows.length, 10); i++) {
                                if (!rows[i]) continue;
                                const cells = rows[i].map(c => stripInvisible(c));
                                if (cells.includes('学籍番号')) {
                                    headerRowIndex = i;
                                    cells.forEach((cell, ci) => {
                                        const mapped = aliases[cell] || cell;
                                        if (targetCols.includes(mapped)) {
                                            colMap[mapped] = ci;
                                        }
                                    });
                                    break;
                                }
                            }
                            if (headerRowIndex === -1 || colMap['学籍番号'] === undefined) {
                                alert('ヘッダー行に「学籍番号」列が見つかりませんでした。');
                                document.getElementById('student-import-file').value = '';
                                return;
                            }

                            // レコード配列を構築
                            const records = [];
                            for (let i = headerRowIndex + 1; i < rows.length; i++) {
                                const row = rows[i];
                                if (!row) continue;
                                const studentId = stripInvisible(row[colMap['学籍番号']] || '');
                                if (!studentId) continue;
                                const rec = {};
                                targetCols.forEach(col => {
                                    if (colMap[col] !== undefined) {
                                        rec[col] = stripInvisible(row[colMap[col]] || '');
                                    }
                                });
                                records.push(rec);
                            }
                            if (records.length === 0) {
                                alert('取込可能なデータが見つかりませんでした。');
                                document.getElementById('student-import-file').value = '';
                                return;
                            }
                            this._showImportConfirm(records);
                        } catch (err) {
                            console.error('[生徒管理] Excel解析エラー:', err);
                            alert('Excelファイルの読み込みに失敗しました: ' + err.message);
                            document.getElementById('student-import-file').value = '';
                        }
                    };
                    reader.readAsArrayBuffer(file);
                },

                // Excel取込: 差分確認オーバーレイ表示
                _showImportConfirm(records) {
                    // 既存オーバーレイがあれば削除
                    var existing = document.getElementById('student-import-overlay');
                    if (existing) existing.remove();

                    // 現在のテーブル内容を同期
                    this._syncFromDOM();
                    var fields = this._fields;
                    var esc = this._escapeHtml.bind(this);

                    // 既存データの学籍番号マップを構築
                    var existingMap = {};
                    this._studentList.forEach(function(s) {
                        var sid = String(s['学籍番号'] || '').trim();
                        if (sid) existingMap[sid] = s;
                    });

                    // Excelレコードを分類: 上書き / 新規追加
                    var overwriteItems = [];
                    var addItems = [];
                    records.forEach(function(rec) {
                        var sid = String(rec['学籍番号'] || '').trim();
                        if (!sid) return;
                        if (existingMap[sid]) {
                            // 上書き対象: 変更のあるフィールドを検出
                            var orig = existingMap[sid];
                            var changes = [];
                            fields.forEach(function(f) {
                                if (f === '学籍番号') return;
                                if (rec[f] === undefined || rec[f] === '') return;
                                var oldVal = String(orig[f] || '').trim();
                                var newVal = String(rec[f] || '').trim();
                                if (oldVal !== newVal) {
                                    changes.push({ field: f, oldVal: oldVal || '(空)', newVal: newVal || '(空)' });
                                }
                            });
                            if (changes.length > 0) {
                                overwriteItems.push({
                                    id: sid,
                                    name: String(rec['名前'] || orig['名前'] || '').trim(),
                                    grade: String(rec['学年'] || orig['学年'] || '').trim(),
                                    class_: String(rec['組'] || orig['組'] || '').trim(),
                                    number: String(rec['番号'] || orig['番号'] || '').trim(),
                                    changes: changes
                                });
                            }
                        } else {
                            // 新規追加
                            addItems.push({
                                id: sid,
                                name: String(rec['名前'] || '').trim(),
                                grade: String(rec['学年'] || '').trim(),
                                class_: String(rec['組'] || '').trim(),
                                number: String(rec['番号'] || '').trim()
                            });
                        }
                    });

                    var hasChanges = overwriteItems.length > 0 || addItems.length > 0;

                    var overlay = document.createElement('div');
                    overlay.id = 'student-import-overlay';
                    overlay.style.cssText = 'position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 10000;';

                    var dialog = document.createElement('div');
                    dialog.style.cssText = 'background: #fff; border-radius: 8px; padding: 24px; width: 540px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);';

                    // ヘッダー
                    var html = '<h3 style="margin: 0 0 12px; color: #004294;">Excel取込確認</h3>';

                    if (!hasChanges) {
                        html += '<p style="margin: 0 0 20px; color: #666;">取込対象がありません</p>';
                        html += '<div style="display: flex; gap: 8px; justify-content: center;">' +
                            '<button id="student-import-close" style="background: #6c757d; color: #fff; border: none; border-radius: 5px; padding: 8px 18px; cursor: pointer; font-size: 13px;">閉じる</button>' +
                            '</div>';
                    } else {
                        // サマリー
                        var summaryParts = [];
                        if (overwriteItems.length > 0) summaryParts.push('<span style="color: #004294;">上書き ' + overwriteItems.length + '件</span>');
                        if (addItems.length > 0) summaryParts.push('<span style="color: #004294;">新規追加 ' + addItems.length + '件</span>');
                        html += '<p style="margin: 0 0 12px; color: #333; font-size: 14px;">' + summaryParts.join(' / ') + '</p>';

                        // 差分詳細
                        html += '<div style="max-height: 300px; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 4px; padding: 12px; margin-bottom: 16px; font-size: 13px; line-height: 1.6;">';

                        var shownCount = 0;
                        var sections = [
                            { items: overwriteItems, label: '上書き', color: '#004294' },
                            { items: addItems, label: '新規追加', color: '#004294' }
                        ];
                        sections.forEach(function(sec) {
                            if (sec.items.length === 0) return;
                            var mt = shownCount > 0 ? ' margin-top: 10px;' : '';
                            shownCount++;
                            html += '<div style="border-left: 3px solid ' + sec.color + '; padding-left: 10px;' + mt + '">';
                            html += '<div style="font-weight: bold; color: ' + sec.color + '; margin-bottom: 4px;">' + sec.label + '（' + sec.items.length + '件）</div>';
                            sec.items.forEach(function(item) {
                                var label = (item.grade ? esc(item.grade) + '年' : '') + (item.class_ ? esc(item.class_) + '組' : '') + (item.number ? esc(item.number) + '番' : '');
                                html += '<div>' + (label ? label + '\u3000' : '') + esc(item.name) + '</div>';
                                if (sec.label === '上書き' && item.changes) {
                                    var details = item.changes.map(function(c) { return esc(c.field) + ': ' + esc(c.oldVal) + ' → ' + esc(c.newVal); }).join(', ');
                                    html += '<div style="padding-left: 1em; color: #666;">' + details + '</div>';
                                }
                            });
                            html += '</div>';
                        });

                        html += '</div>';

                        // ボタン
                        html += '<div style="display: flex; gap: 8px; justify-content: center;">' +
                            '<button id="student-import-execute" style="background: #004294; color: #fff; border: none; border-radius: 5px; padding: 8px 18px; cursor: pointer; font-size: 13px;">取込</button>' +
                            '<button id="student-import-close" style="background: #6c757d; color: #fff; border: none; border-radius: 5px; padding: 8px 18px; cursor: pointer; font-size: 13px;">キャンセル</button>' +
                            '</div>';
                    }

                    dialog.innerHTML = html;
                    overlay.appendChild(dialog);
                    var modalContent = document.querySelector('#student-management-modal .modal-content');
                    modalContent.style.position = 'relative';
                    modalContent.appendChild(overlay);

                    // イベントハンドラ
                    var self = this;
                    var closeBtn = document.getElementById('student-import-close');
                    if (closeBtn) {
                        closeBtn.onclick = function() {
                            overlay.remove();
                            document.getElementById('student-import-file').value = '';
                        };
                    }
                    var execBtn = document.getElementById('student-import-execute');
                    if (execBtn) {
                        execBtn.onclick = function() {
                            overlay.remove();
                            self._applyImportData(records);
                        };
                    }
                },

                // Excel取込: データ適用（学籍番号マッチ→上書き、なければ追加）
                _applyImportData(records) {
                    this._saveUndoSnapshot();
                    this._syncFromDOM();
                    var fields = this._fields;

                    // _syncFromDOM() 後、追加前に末尾空行を除去（空行の後に新規データが入るのを防止）
                    while (this._studentList.length > 0) {
                        var last = this._studentList[this._studentList.length - 1];
                        var isEmpty = fields.every(function(f) { return !String(last[f] || '').trim(); });
                        if (isEmpty) {
                            this._studentList.pop();
                        } else {
                            break;
                        }
                    }

                    var overwriteCount = 0;
                    var addCount = 0;

                    records.forEach(function(rec) {
                        var matchIdx = -1;
                        for (var i = 0; i < StudentManager._studentList.length; i++) {
                            if (String(StudentManager._studentList[i]['学籍番号'] || '').trim() === String(rec['学籍番号'] || '').trim()) {
                                matchIdx = i;
                                break;
                            }
                        }
                        if (matchIdx >= 0) {
                            // マッチ: Excelにある列だけ更新
                            var changed = false;
                            fields.forEach(function(f) {
                                if (f === '学籍番号') return;
                                if (rec[f] !== undefined && rec[f] !== '') {
                                    if (String(StudentManager._studentList[matchIdx][f] || '').trim() !== String(rec[f] || '').trim()) {
                                        changed = true;
                                    }
                                    StudentManager._studentList[matchIdx][f] = rec[f];
                                }
                            });
                            if (changed) overwriteCount++;
                        } else {
                            // 新規追加
                            var item = {};
                            fields.forEach(function(f) { item[f] = rec[f] || ''; });
                            StudentManager._studentList.push(item);
                            addCount++;
                        }
                    });

                    // 末尾空行を確保して再描画
                    this._ensureEmptyRow();
                    this._isDirty = JSON.stringify(this._studentList) !== this._originalData;
                    this._updateDirtyIndicator();
                    this.renderStudentList();
                    // file inputリセット（同じファイル再選択可能に）
                    document.getElementById('student-import-file').value = '';

                    var msgParts = [];
                    if (overwriteCount > 0) msgParts.push(overwriteCount + '件上書き');
                    if (addCount > 0) msgParts.push(addCount + '件追加');
                    Utils.showToast(msgParts.length > 0 ? msgParts.join('、') + 'しました' : '変更はありませんでした', 'success');
                },

                // 変更差分のサマリーを構築
                _buildDiffSummary(newData) {
                    var original = JSON.parse(this._originalData || '[]');
                    var fields = this._fields;

                    // 学籍番号をキーにしたマップを作成
                    var origMap = {};
                    original.forEach(function(s) {
                        var sid = String(s['学籍番号'] || '').trim();
                        if (sid) origMap[sid] = s;
                    });
                    var newMap = {};
                    newData.forEach(function(s) {
                        var sid = String(s['学籍番号'] || '').trim();
                        if (sid) newMap[sid] = s;
                    });

                    var added = [];
                    var removed = [];
                    var modified = [];
                    var unchangedCount = 0;

                    // 新データを走査: 追加 or 変更
                    newData.forEach(function(s) {
                        var sid = String(s['学籍番号'] || '').trim();
                        if (!sid) return;
                        var name = String(s['名前'] || '').trim();
                        if (!origMap[sid]) {
                            added.push({ id: sid, name: name, grade: String(s['学年'] || '').trim(), class_: String(s['組'] || '').trim(), number: String(s['番号'] || '').trim() });
                        } else {
                            var orig = origMap[sid];
                            var changes = [];
                            fields.forEach(function(f) {
                                if (f === '学籍番号') return;
                                var oldVal = String(orig[f] || '').trim();
                                var newVal = String(s[f] || '').trim();
                                if (oldVal !== newVal) {
                                    changes.push({ field: f, oldVal: oldVal || '(空)', newVal: newVal || '(空)' });
                                }
                            });
                            if (changes.length > 0) {
                                modified.push({ id: sid, name: name, grade: String(s['学年'] || '').trim(), class_: String(s['組'] || '').trim(), number: String(s['番号'] || '').trim(), changes: changes });
                            } else {
                                unchangedCount++;
                            }
                        }
                    });

                    // 元データにあって新データにないもの: 削除
                    Object.keys(origMap).forEach(function(sid) {
                        if (!newMap[sid]) {
                            var s = origMap[sid];
                            removed.push({ id: sid, name: String(s['名前'] || '').trim(), grade: String(s['学年'] || '').trim(), class_: String(s['組'] || '').trim(), number: String(s['番号'] || '').trim() });
                        }
                    });

                    return { added: added, removed: removed, modified: modified, unchangedCount: unchangedCount };
                },

                // 保存確認オーバーレイ表示
                _showSaveConfirm(data, diff) {
                    // 既存オーバーレイがあれば削除
                    var existing = document.getElementById('student-save-overlay');
                    if (existing) existing.remove();

                    var hasChanges = diff.added.length > 0 || diff.removed.length > 0 || diff.modified.length > 0;

                    var overlay = document.createElement('div');
                    overlay.id = 'student-save-overlay';
                    overlay.style.cssText = 'position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 10000;';

                    var dialog = document.createElement('div');
                    dialog.style.cssText = 'background: #fff; border-radius: 8px; padding: 24px; width: 540px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);';

                    // ヘッダー
                    var html = '<h3 style="margin: 0 0 12px; color: #004294;">保存内容の確認</h3>';

                    if (!hasChanges) {
                        html += '<p style="margin: 0 0 20px; color: #666;">変更はありません</p>';
                        html += '<div style="display: flex; gap: 8px; justify-content: center;">' +
                            '<button id="student-save-confirm-cancel" style="background: #6c757d; color: #fff; border: none; border-radius: 5px; padding: 8px 18px; cursor: pointer; font-size: 13px;">閉じる</button>' +
                            '</div>';
                    } else {
                        // サマリー
                        var summaryParts = [];
                        if (diff.added.length > 0) summaryParts.push('<span style="color: #004294;">追加 ' + diff.added.length + '件</span>');
                        if (diff.modified.length > 0) summaryParts.push('<span style="color: #004294;">変更 ' + diff.modified.length + '件</span>');
                        if (diff.removed.length > 0) summaryParts.push('<span style="color: #004294;">削除 ' + diff.removed.length + '件</span>');
                        html += '<p style="margin: 0 0 12px; color: #333; font-size: 14px;">' + summaryParts.join(' / ') + '</p>';

                        // 差分詳細（種別セクション表示）
                        html += '<div style="max-height: 300px; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 4px; padding: 12px; margin-bottom: 16px; font-size: 13px; line-height: 1.6;">';

                        var esc = this._escapeHtml.bind(this);
                        var sections = [
                            { items: diff.added, label: '追加', color: '#004294' },
                            { items: diff.modified, label: '変更', color: '#004294' },
                            { items: diff.removed, label: '削除', color: '#004294' }
                        ];
                        var shownCount = 0;
                        sections.forEach(function(sec) {
                            if (sec.items.length === 0) return;
                            var mt = shownCount > 0 ? ' margin-top: 10px;' : '';
                            shownCount++;
                            html += '<div style="border-left: 3px solid ' + sec.color + '; padding-left: 10px;' + mt + '">';
                            html += '<div style="font-weight: bold; color: ' + sec.color + '; margin-bottom: 4px;">' + sec.label + '（' + sec.items.length + '件）</div>';
                            sec.items.forEach(function(item) {
                                var label = (item.grade ? esc(item.grade) + '年' : '') + (item.class_ ? esc(item.class_) + '組' : '') + (item.number ? esc(item.number) + '番' : '');
                                html += '<div>' + (label ? label + '\u3000' : '') + esc(item.name) + '</div>';
                                if (sec.label === '変更' && item.changes) {
                                    var fields = item.changes.map(function(c) { return esc(c.field) + ': ' + esc(c.newVal); }).join(', ');
                                    html += '<div style="padding-left: 1em; color: #666;">' + fields + '</div>';
                                }
                            });
                            html += '</div>';
                        });

                        html += '</div>';

                        // ボタン
                        html += '<div style="display: flex; gap: 8px; justify-content: center;">' +
                            '<button id="student-save-confirm-ok" style="background: #004294; color: #fff; border: none; border-radius: 5px; padding: 8px 18px; cursor: pointer; font-size: 13px;">保存する</button>' +
                            '<button id="student-save-confirm-cancel" style="background: #6c757d; color: #fff; border: none; border-radius: 5px; padding: 8px 18px; cursor: pointer; font-size: 13px;">キャンセル</button>' +
                            '</div>';
                    }

                    dialog.innerHTML = html;
                    overlay.appendChild(dialog);
                    var modalContent = document.querySelector('#student-management-modal .modal-content');
                    modalContent.style.position = 'relative';
                    modalContent.appendChild(overlay);

                    // イベントハンドラ
                    var self = this;
                    var cancelBtn = document.getElementById('student-save-confirm-cancel');
                    if (cancelBtn) {
                        cancelBtn.onclick = function() { overlay.remove(); };
                    }
                    var okBtn = document.getElementById('student-save-confirm-ok');
                    if (okBtn) {
                        okBtn.onclick = function() {
                            overlay.remove();
                            self._executeSave(data);
                        };
                    }
                },

                // 一括保存: データ収集・バリデーション → 確認モーダル表示
                saveAll() {
                    var data = this._collectAllData();
                    if (data.length === 0) {
                        Utils.showToast('保存するデータがありません', 'error');
                        return;
                    }

                    // 学籍番号重複チェック
                    var ids = {};
                    for (var i = 0; i < data.length; i++) {
                        var sid = String(data[i]['学籍番号'] || '').trim();
                        if (ids[sid]) {
                            Utils.showToast('学籍番号が重複しています: ' + sid, 'error');
                            return;
                        }
                        ids[sid] = true;
                    }

                    // 差分を算出して確認モーダルを表示
                    var diff = this._buildDiffSummary(data);
                    this._showSaveConfirm(data, diff);
                },

                // 一括保存: 実際のGAS呼び出し・保存処理
                async _executeSave(data) {
                    var saveBtn = document.getElementById('student-save-all-btn');
                    saveBtn.disabled = true;
                    saveBtn.textContent = '保存中...';

                    try {
                        // 保存前のデータをパースして学籍番号変更を検出するため保持
                        var originalList = JSON.parse(this._originalData || '[]');
                        var result = await DataManager.callGASFunction('replaceAllStudents', data);
                        if (result && result.success) {
                            Utils.showToast('生徒データを保存しました（' + result.count + '件）', 'success');

                            // 学籍番号変更の検出（メールアドレスで突合）
                            var replacements = [];
                            var oldByEmail = {};
                            originalList.forEach(function(s) {
                                if (s['メールアドレス'] && s['学籍番号']) oldByEmail[s['メールアドレス']] = s['学籍番号'];
                            });
                            data.forEach(function(s) {
                                if (s['メールアドレス'] && s['学籍番号']) {
                                    var oldId = oldByEmail[s['メールアドレス']];
                                    if (oldId && oldId !== s['学籍番号']) {
                                        replacements.push({oldId: oldId, newId: s['学籍番号']});
                                    }
                                }
                            });

                            // 科目表示設定の学籍番号を連動更新
                            if (replacements.length > 0) {
                                try {
                                    var replaceResult = await DataManager.callGASFunction('replaceStudentIdInCourseSettings', replacements);
                                    if (replaceResult && replaceResult.success && replaceResult.updatedCount > 0) {
                                        Utils.updateStudentIdsInLocalCourses(replacements);
                                        Utils.showToast('科目表示設定の学籍番号を ' + replaceResult.updatedCount + ' 件更新しました', 'success');
                                    }
                                } catch (replaceErr) {
                                    console.error('[生徒管理] 科目設定の学籍番号置換エラー:', replaceErr);
                                    Utils.showToast('科目表示設定の学籍番号更新に失敗しました', 'error');
                                }
                            }

                            this._isDirty = false;
                            this._undoStack = [];
                            this._sortByGradeClassNumber();
                            this.renderStudentList();
                            this._originalData = JSON.stringify(this._studentList);
                            this._updateDirtyIndicator();
                        } else {
                            Utils.showToast(result?.error || '保存に失敗しました', 'error');
                        }
                    } catch (e) {
                        console.error('[生徒管理] 一括保存エラー:', e);
                        Utils.showToast('保存中にエラーが発生しました', 'error');
                    } finally {
                        saveBtn.textContent = '保存';
                    }
                },

                // HTMLエスケープ
                _escapeHtml(str) {
                    const div = document.createElement('div');
                    div.textContent = str;
                    return div.innerHTML;
                },

                // 属性値エスケープ
                _escapeAttr(str) {
                    return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                },

                // 編集モード開始
                _startEditing(row, col) {
                    this._saveUndoSnapshot();
                    this._stopEditing();
                    this._clearClipboardHighlight();
                    var table = document.querySelector('#student-management-list table');
                    if (!table) return;
                    var tr = table.querySelectorAll('tbody tr')[row];
                    if (!tr) return;
                    var td = tr.children[col];
                    if (!td || col < 1 || col > this._getMaxCol()) return;
                    td.classList.add('student-cell-editing');
                    td.style.boxShadow = 'inset 0 2px 0 0 #1a73e8, inset 0 -2px 0 0 #1a73e8, inset 2px 0 0 0 #1a73e8, inset -2px 0 0 0 #1a73e8';
                    td.style.backgroundColor = '';
                    var el = td.querySelector('input, select');
                    if (el) {
                        el.focus();
                        if (el.tagName === 'INPUT') el.select();
                    }
                    this._editingCell = { row: row, col: col };
                },

                // 編集モード終了
                _stopEditing() {
                    if (!this._editingCell) return;
                    var table = document.querySelector('#student-management-list table');
                    if (!table) return;
                    var tr = table.querySelectorAll('tbody tr')[this._editingCell.row];
                    if (tr) {
                        var td = tr.children[this._editingCell.col];
                        if (td) {
                            td.classList.remove('student-cell-editing');
                            var el = td.querySelector('input, select');
                            if (el) el.blur();
                        }
                    }
                    this._editingCell = null;
                    table.focus();
                },

                // 選択範囲のハイライトを更新
                _updateSelectionHighlight() {
                    var table = document.querySelector('#student-management-list table');
                    if (!table) return;
                    // theadのthスタイルもリセット
                    var thList = table.querySelectorAll('thead th');
                    for (var i = 0; i < thList.length; i++) {
                        thList[i].style.background = '';
                        thList[i].style.color = '#004294';
                    }
                    var allTds = table.querySelectorAll('tbody td');
                    for (var i = 0; i < allTds.length; i++) {
                        allTds[i].classList.remove('student-cell-selected');
                        allTds[i].style.boxShadow = '';
                        allTds[i].style.backgroundColor = '';
                        allTds[i].style.color = '';
                    }
                    var trList = table.querySelectorAll('tbody tr');
                    for (var i = 0; i < trList.length; i++) {
                        if (trList[i].children[0]) {
                            trList[i].children[0].style.background = '#f8f9fa';
                            trList[i].children[0].style.color = '#999';
                        }
                    }
                    if (!this._selAnchor || !this._selEnd) return;
                    var minRow = Math.min(this._selAnchor.row, this._selEnd.row);
                    var maxRow = Math.max(this._selAnchor.row, this._selEnd.row);
                    var minCol = Math.min(this._selAnchor.col, this._selEnd.col);
                    var maxCol = Math.max(this._selAnchor.col, this._selEnd.col);
                    var isRange = (minRow !== maxRow || minCol !== maxCol);
                    var isFullRowSelect = (minCol === 1 && maxCol === this._getMaxCol());
                    var rows = table.querySelectorAll('tbody tr');
                    for (var r = minRow; r <= maxRow; r++) {
                        if (!rows[r]) continue;
                        var cells = rows[r].children;
                        if (isFullRowSelect && cells[0]) {
                            cells[0].style.backgroundColor = '#4285f4';
                            cells[0].style.color = '#fff';
                        }
                        for (var c = minCol; c <= maxCol; c++) {
                            if (c < 1 || c > this._getMaxCol() || !cells[c]) continue;
                            cells[c].classList.add('student-cell-selected');
                            var shadows = [];
                            if (r === minRow) shadows.push('inset 0 2px 0 0 #1a73e8');
                            else shadows.push('inset 0 0.5px 0 0 #90bfff');
                            if (r === maxRow) shadows.push('inset 0 -2px 0 0 #1a73e8');
                            else shadows.push('inset 0 -0.5px 0 0 #90bfff');
                            if (c === minCol) shadows.push('inset 2px 0 0 0 #1a73e8');
                            else shadows.push('inset 0.5px 0 0 0 #90bfff');
                            if (c === maxCol) shadows.push('inset -2px 0 0 0 #1a73e8');
                            else shadows.push('inset -0.5px 0 0 0 #90bfff');
                            cells[c].style.boxShadow = shadows.join(', ');
                            if (isRange) cells[c].style.backgroundColor = '#d4e6ff';
                        }
                    }
                    // 列選択中のヘッダーをハイライト
                    if (this._isColumnSelect) {
                        for (var c = minCol; c <= maxCol; c++) {
                            if (thList[c]) {
                                thList[c].style.background = '#4285f4';
                                thList[c].style.color = '#fff';
                            }
                        }
                    }
                },

                // 選択範囲をクリップボードにコピー
                _copySelection() {
                    if (!this._selAnchor || !this._selEnd) return;
                    var table = document.querySelector('#student-management-list table');
                    if (!table) return;
                    var minRow = Math.min(this._selAnchor.row, this._selEnd.row);
                    var maxRow = Math.max(this._selAnchor.row, this._selEnd.row);
                    var minCol = Math.min(this._selAnchor.col, this._selEnd.col);
                    var maxCol = Math.max(this._selAnchor.col, this._selEnd.col);
                    var rows = table.querySelectorAll('tbody tr');
                    var lines = [];
                    for (var r = minRow; r <= maxRow; r++) {
                        if (!rows[r]) continue;
                        var cells = rows[r].children;
                        var vals = [];
                        for (var c = minCol; c <= maxCol; c++) {
                            if (c < 1 || c > this._getMaxCol() || !cells[c]) { vals.push(''); continue; }
                            var el = cells[c].querySelector('input, select');
                            if (el) {
                                vals.push(el.value);
                            } else if (cells[c].hasAttribute('data-field')) {
                                // 科目テキストセル — _studentListから読み取り
                                var idx = parseInt(cells[c].getAttribute('data-idx'));
                                var field = cells[c].getAttribute('data-field');
                                vals.push((!isNaN(idx) && field && this._studentList[idx])
                                    ? String(this._studentList[idx][field] || '') : '');
                            } else {
                                vals.push('');
                            }
                        }
                        lines.push(vals.join('\t'));
                    }
                    var text = lines.join('\n');
                    navigator.clipboard.writeText(text);
                    this._clipboardRange = { minRow: minRow, maxRow: maxRow, minCol: minCol, maxCol: maxCol, isCut: false };
                    this._updateClipboardHighlight();
                    this._selAnchor = null;
                    this._selEnd = null;
                    this._updateSelectionHighlight();
                },

                // 選択範囲を切り取り
                _cutSelection() {
                    if (!this._selAnchor || !this._selEnd) return;
                    var table = document.querySelector('#student-management-list table');
                    if (!table) return;
                    var minRow = Math.min(this._selAnchor.row, this._selEnd.row);
                    var maxRow = Math.max(this._selAnchor.row, this._selEnd.row);
                    var minCol = Math.min(this._selAnchor.col, this._selEnd.col);
                    var maxCol = Math.max(this._selAnchor.col, this._selEnd.col);
                    var rows = table.querySelectorAll('tbody tr');
                    var lines = [];
                    for (var r = minRow; r <= maxRow; r++) {
                        if (!rows[r]) continue;
                        var cells = rows[r].children;
                        var vals = [];
                        for (var c = minCol; c <= maxCol; c++) {
                            if (c < 1 || c > this._getMaxCol() || !cells[c]) { vals.push(''); continue; }
                            var el = cells[c].querySelector('input, select');
                            if (el) {
                                vals.push(el.value);
                            } else if (cells[c].hasAttribute('data-field')) {
                                var idx = parseInt(cells[c].getAttribute('data-idx'));
                                var field = cells[c].getAttribute('data-field');
                                vals.push((!isNaN(idx) && field && this._studentList[idx])
                                    ? String(this._studentList[idx][field] || '') : '');
                            } else {
                                vals.push('');
                            }
                        }
                        lines.push(vals.join('\t'));
                    }
                    var text = lines.join('\n');
                    navigator.clipboard.writeText(text);
                    this._clipboardRange = { minRow: minRow, maxRow: maxRow, minCol: minCol, maxCol: maxCol, isCut: true };
                    this._updateClipboardHighlight();
                    this._selAnchor = null;
                    this._selEnd = null;
                    this._updateSelectionHighlight();
                },

                // クリップボード範囲のマーチングアンツ表示を更新
                _updateClipboardHighlight() {
                    var existing = document.querySelectorAll('#student-management-list .student-cell-clipboard');
                    for (var i = 0; i < existing.length; i++) {
                        existing[i].classList.remove('student-cell-clipboard');
                        existing[i].style.backgroundImage = '';
                        existing[i].style.backgroundSize = '';
                        existing[i].style.backgroundRepeat = '';
                        existing[i].style.backgroundColor = '';
                        existing[i].style.color = '';
                    }
                    var allRowsForReset = document.querySelectorAll('#student-management-list table tbody tr');
                    for (var i = 0; i < allRowsForReset.length; i++) {
                        if (allRowsForReset[i].children[0]) {
                            allRowsForReset[i].children[0].style.background = '#f8f9fa';
                            allRowsForReset[i].children[0].style.color = '#999';
                        }
                    }
                    if (!this._clipboardRange) return;
                    var range = this._clipboardRange;
                    var table = document.querySelector('#student-management-list table');
                    if (!table) return;
                    var rows = table.querySelectorAll('tbody tr');
                    var color = '#1a73e8';
                    var transparent = 'transparent';
                    for (var r = range.minRow; r <= range.maxRow; r++) {
                        if (!rows[r]) continue;
                        var cells = rows[r].children;
                        if (range.isCut && cells[0]) {
                            cells[0].style.backgroundColor = '#4285f4';
                            cells[0].style.color = '#fff';
                            cells[0].classList.add('student-cell-clipboard');
                        }
                        for (var c = range.minCol; c <= range.maxCol; c++) {
                            if (!cells[c]) continue;
                            var isTop = (r === range.minRow);
                            var isBottom = (r === range.maxRow);
                            var isLeft = (c === range.minCol);
                            var isRight = (c === range.maxCol);
                            var topGrad = 'repeating-linear-gradient(90deg, ' + (isTop ? color : transparent) + ' 0, ' + (isTop ? color : transparent) + ' 5px, ' + transparent + ' 5px, ' + transparent + ' 10px)';
                            var bottomGrad = 'repeating-linear-gradient(90deg, ' + (isBottom ? color : transparent) + ' 0, ' + (isBottom ? color : transparent) + ' 5px, ' + transparent + ' 5px, ' + transparent + ' 10px)';
                            var leftGrad = 'repeating-linear-gradient(0deg, ' + (isLeft ? color : transparent) + ' 0, ' + (isLeft ? color : transparent) + ' 5px, ' + transparent + ' 5px, ' + transparent + ' 10px)';
                            var rightGrad = 'repeating-linear-gradient(0deg, ' + (isRight ? color : transparent) + ' 0, ' + (isRight ? color : transparent) + ' 5px, ' + transparent + ' 5px, ' + transparent + ' 10px)';
                            cells[c].style.backgroundImage = topGrad + ', ' + bottomGrad + ', ' + leftGrad + ', ' + rightGrad;
                            cells[c].style.backgroundSize = '10px 2px, 10px 2px, 2px 10px, 2px 10px';
                            cells[c].style.backgroundRepeat = 'repeat-x, repeat-x, repeat-y, repeat-y';
                            cells[c].classList.add('student-cell-clipboard');
                        }
                    }
                },

                // クリップボード範囲ハイライトをクリア
                _clearClipboardHighlight() {
                    this._clipboardRange = null;
                    this._updateClipboardHighlight();
                    navigator.clipboard.writeText('').catch(function() {});
                },

                // 選択範囲を削除/クリア
                _deleteSelection() {
                    if (!this._selAnchor || !this._selEnd) return;
                    this._saveUndoSnapshot();
                    var minRow = Math.min(this._selAnchor.row, this._selEnd.row);
                    var maxRow = Math.max(this._selAnchor.row, this._selEnd.row);
                    var minCol = Math.min(this._selAnchor.col, this._selEnd.col);
                    var maxCol = Math.max(this._selAnchor.col, this._selEnd.col);
                    var isFullRow = (minCol <= 1 && maxCol >= this._getMaxCol());
                    this._syncFromDOM();

                    if (isFullRow) {
                        var table = document.querySelector('#student-management-list table');
                        var rows = table ? table.querySelectorAll('tbody tr') : [];
                        var indicesToRemove = [];
                        for (var r = minRow; r <= maxRow; r++) {
                            if (!rows[r]) continue;
                            var el = rows[r].querySelector('[data-idx]');
                            if (!el) continue;
                            var idx = parseInt(el.getAttribute('data-idx'));
                            indicesToRemove.push(idx);
                        }
                        indicesToRemove.sort(function(a, b) { return b - a; });
                        for (var i = 0; i < indicesToRemove.length; i++) {
                            this._studentList.splice(indicesToRemove[i], 1);
                        }
                        this._selAnchor = null;
                        this._selEnd = null;
                        this.renderStudentList();
                        this._isDirty = JSON.stringify(this._studentList) !== this._originalData;
                        this._updateDirtyIndicator();
                    } else {
                        var table = document.querySelector('#student-management-list table');
                        var rows = table ? table.querySelectorAll('tbody tr') : [];
                        for (var r = minRow; r <= maxRow; r++) {
                            if (!rows[r]) continue;
                            var cells = rows[r].children;
                            for (var c = minCol; c <= maxCol; c++) {
                                if (c < 1 || c > this._getMaxCol() || !cells[c]) continue;
                                var el = cells[c].querySelector('input, select');
                                if (el) {
                                    el.value = '';
                                    var idx = parseInt(el.getAttribute('data-idx'));
                                    var field = el.getAttribute('data-field');
                                    if (!isNaN(idx) && field && this._studentList[idx]) {
                                        this._studentList[idx][field] = '';
                                    }
                                }
                            }
                        }
                        this._markDirty();
                    }
                },

                // 右クリックコンテキストメニューを表示
                _showContextMenu(e) {
                    var menu = document.getElementById('student-context-menu');
                    if (!menu) return;
                    var td = e.target.closest('td');
                    var tr = td ? td.closest('tr') : null;
                    var tbody = tr ? tr.closest('tbody') : null;
                    if (tbody && tr) {
                        var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
                        this._contextMenuRow = rows.indexOf(tr);
                    }
                    var undoItem = menu.querySelector('[data-action="undo"]');
                    if (undoItem) {
                        if (this._undoStack.length === 0) {
                            undoItem.style.color = '#ccc';
                            undoItem.style.pointerEvents = 'none';
                        } else {
                            undoItem.style.color = '';
                            undoItem.style.pointerEvents = '';
                        }
                    }
                    // 「コピーしたセルを挿入」のグレーアウト制御
                    var pasteInsertItem = menu.querySelector('[data-action="paste-insert"]');
                    if (pasteInsertItem) {
                        if (this._clipboardRange) {
                            pasteInsertItem.style.color = '';
                            pasteInsertItem.style.pointerEvents = '';
                        } else {
                            pasteInsertItem.style.color = '#ccc';
                            pasteInsertItem.style.pointerEvents = 'none';
                        }
                    }
                    // 列選択中は構造変更操作をグレーアウト
                    var colSelectActions = ['cut', 'paste-insert', 'insert-above', 'insert-below', 'delete-row'];
                    colSelectActions.forEach(function(action) {
                        var item = menu.querySelector('[data-action="' + action + '"]');
                        if (item) {
                            if (StudentManager._isColumnSelect) {
                                item.style.color = '#ccc';
                                item.style.pointerEvents = 'none';
                            } else {
                                // paste-insertは別途制御されるためスキップ
                                if (action !== 'paste-insert') {
                                    item.style.color = '';
                                    item.style.pointerEvents = '';
                                }
                            }
                        }
                    });
                    menu.style.display = 'block';
                    var menuW = menu.offsetWidth;
                    var menuH = menu.offsetHeight;
                    var x = e.clientX;
                    var y = e.clientY;
                    if (x + menuW > window.innerWidth) x = window.innerWidth - menuW - 4;
                    if (y + menuH > window.innerHeight) y = window.innerHeight - menuH - 4;
                    menu.style.left = x + 'px';
                    menu.style.top = y + 'px';

                    if (!menu._listenersAttached) {
                        menu._listenersAttached = true;
                        menu.addEventListener('mousedown', function(ev) {
                            var item = ev.target.closest('.student-ctx-item');
                            if (!item) return;
                            ev.preventDefault();
                            ev.stopPropagation();
                            var action = item.getAttribute('data-action');
                            var row = StudentManager._contextMenuRow;
                            StudentManager._hideContextMenu();
                            if (action === 'undo') {
                                StudentManager._undo();
                            } else if (action === 'clear') {
                                StudentManager._clearSelection();
                            } else if (action === 'insert-above') {
                                StudentManager._insertRow(row, 'above');
                            } else if (action === 'insert-below') {
                                StudentManager._insertRow(row, 'below');
                            } else if (action === 'copy') {
                                StudentManager._copySelection();
                            } else if (action === 'cut') {
                                StudentManager._cutSelection();
                            } else if (action === 'paste') {
                                navigator.clipboard.readText().then(function(text) {
                                    if (!text) return;
                                    var table = document.querySelector('#student-management-list table');
                                    if (!table || !StudentManager._selAnchor) return;
                                    var rows = table.querySelectorAll('tbody tr');
                                    var anchorRow = rows[StudentManager._selAnchor.row];
                                    if (!anchorRow) return;
                                    var anchorTd = anchorRow.children[StudentManager._selAnchor.col];
                                    var anchorInput = anchorTd ? (anchorTd.querySelector('input, select') ||
                                        (anchorTd.hasAttribute('data-field') ? anchorTd : null)) : null;
                                    if (anchorInput) StudentManager._pasteMultiCell(anchorInput, text);
                                }).catch(function() {
                                    Utils.showToast('クリップボードへのアクセスが拒否されました', 'error');
                                });
                            } else if (action === 'paste-insert') {
                                navigator.clipboard.readText().then(function(text) {
                                    if (!text) return;
                                    var table = document.querySelector('#student-management-list table');
                                    if (!table || !StudentManager._selAnchor) return;
                                    var rows = table.querySelectorAll('tbody tr');
                                    var anchorRow = rows[StudentManager._selAnchor.row];
                                    if (!anchorRow) return;
                                    var anchorTd = anchorRow.children[StudentManager._selAnchor.col];
                                    var anchorInput = anchorTd ? (anchorTd.querySelector('input, select') ||
                                        (anchorTd.hasAttribute('data-field') ? anchorTd : null)) : null;
                                    if (anchorInput) StudentManager._pasteMultiCell(anchorInput, text, true);
                                }).catch(function() {
                                    Utils.showToast('クリップボードへのアクセスが拒否されました', 'error');
                                });
                            } else if (action === 'delete-row') {
                                if (StudentManager._selAnchor) {
                                    var minR = Math.min(StudentManager._selAnchor.row, StudentManager._selEnd.row);
                                    var maxR = Math.max(StudentManager._selAnchor.row, StudentManager._selEnd.row);
                                    StudentManager._selAnchor = { row: minR, col: 1 };
                                    StudentManager._selEnd = { row: maxR, col: StudentManager._getMaxCol() };
                                }
                                StudentManager._deleteSelection();
                            }
                        });
                    }
                },

                // コンテキストメニューを非表示
                _hideContextMenu() {
                    var menu = document.getElementById('student-context-menu');
                    if (menu) menu.style.display = 'none';
                },

                // 行を挿入
                _insertRow(displayIdx, position) {
                    this._saveUndoSnapshot();
                    this._syncFromDOM();
                    var table = document.querySelector('#student-management-list table');
                    if (!table) return;
                    var rows = table.querySelectorAll('tbody tr');
                    var targetRow = rows[displayIdx];
                    if (!targetRow) return;
                    var el = targetRow.querySelector('[data-idx]');
                    if (!el) return;
                    var dataIdx = parseInt(el.getAttribute('data-idx'));
                    if (isNaN(dataIdx)) return;
                    var insertAt = position === 'below' ? dataIdx + 1 : dataIdx;
                    var fields = this._fields;
                    var newItem = {};
                    fields.forEach(function(f) { newItem[f] = ''; });
                    this._studentList.splice(insertAt, 0, newItem);
                    this.renderStudentList();
                    this._isDirty = JSON.stringify(this._studentList) !== this._originalData;
                    this._updateDirtyIndicator();
                },

                // Undoスナップショットを保存
                _saveUndoSnapshot() {
                    this._syncFromDOM();
                    this._undoStack.push(JSON.stringify(this._studentList));
                    if (this._undoStack.length > 50) this._undoStack.shift();
                },

                // 元に戻す
                _undo() {
                    if (this._undoStack.length === 0) return;
                    this._stopEditing();
                    var snapshot = this._undoStack.pop();
                    this._studentList = JSON.parse(snapshot);
                    this._isDirty = JSON.stringify(this._studentList) !== this._originalData;
                    this._updateDirtyIndicator();
                    this._selAnchor = null;
                    this._selEnd = null;
                    this.renderStudentList();
                },

                // 選択セルの内容をクリア（行は削除しない）
                _clearSelection() {
                    if (!this._selAnchor || !this._selEnd) return;
                    this._saveUndoSnapshot();
                    this._syncFromDOM();
                    var minRow = Math.min(this._selAnchor.row, this._selEnd.row);
                    var maxRow = Math.max(this._selAnchor.row, this._selEnd.row);
                    var minCol = Math.min(this._selAnchor.col, this._selEnd.col);
                    var maxCol = Math.max(this._selAnchor.col, this._selEnd.col);
                    var table = document.querySelector('#student-management-list table');
                    var rows = table ? table.querySelectorAll('tbody tr') : [];
                    for (var r = minRow; r <= maxRow; r++) {
                        if (!rows[r]) continue;
                        var cells = rows[r].children;
                        for (var c = minCol; c <= maxCol; c++) {
                            if (c < 1 || c > this._getMaxCol() || !cells[c]) continue;
                            var el = cells[c].querySelector('input, select');
                            if (el) {
                                el.value = '';
                                var idx = parseInt(el.getAttribute('data-idx'));
                                var field = el.getAttribute('data-field');
                                if (!isNaN(idx) && field && this._studentList[idx]) {
                                    this._studentList[idx][field] = '';
                                }
                            } else if (cells[c].hasAttribute('data-field')) {
                                // 科目テキストセル
                                var idx = parseInt(cells[c].getAttribute('data-idx'));
                                var field = cells[c].getAttribute('data-field');
                                if (!isNaN(idx) && field && this._studentList[idx]) {
                                    this._studentList[idx][field] = '';
                                }
                                cells[c].textContent = '\u3000';
                            }
                        }
                    }
                    this._markDirty();
                }
            };

            // StudentManagerをグローバルに公開
            window.StudentManager = StudentManager;

            // クラスリスト動的生成関数
            window.populateClassList = async function() {
                try {
                    // 新クラスモード有効時はローカルデータから生成
                    if (TeacherScreen.useNewClass && TeacherScreen.newClassMap) {
                        NewClassImporter.populateClassListFromNewClass();
                        return;
                    }

                    // 軽量なクラス一覧のみ取得（全生徒データは不要）
                    const result = await DataManager.callGASFunction('getClassList');

                    if (!result) {
                        console.error('[エラー] getClassList が null を返しました');
                        Utils.showToast('データの取得に失敗しました。', 'error');
                        return;
                    }

                    const classItems = result?.classList || [];

                    // ソート（学年順、組順）
                    const classList = classItems.sort((a, b) => {
                        const sepA = a.indexOf('-');
                        const sepB = b.indexOf('-');
                        const gradeA = Number(a.substring(0, sepA));
                        const gradeB = Number(b.substring(0, sepB));
                        if (gradeA !== gradeB) return gradeA - gradeB;
                        const classValA = a.substring(sepA + 1);
                        const classValB = b.substring(sepB + 1);
                        return classValA.localeCompare(classValB, 'ja');
                    });

                    // ドロップダウン生成
                    const classSelect = document.getElementById('class-select');
                    if (!classSelect) {
                        console.error('[エラー] class-select要素が見つかりません');
                        return;
                    }

                    classSelect.innerHTML = '<option value="">クラスを選択</option>';

                    classList.forEach(className => {
                        const [grade, classNum] = className.split('-');
                        const option = document.createElement('option');
                        option.value = className;
                        option.textContent = (parseInt(grade) === 0 ? '新1年' : `${grade}年`) + `${classNum}組`;
                        classSelect.appendChild(option);
                    });

                    const allOption = document.createElement('option');
                    allOption.value = 'all';
                    allOption.textContent = '全クラス';
                    classSelect.appendChild(allOption);


                } catch (error) {
                    console.error('クラスリスト生成エラー:', error);
                    console.error('エラー詳細:', error.stack);

                    // エラー時も最低限「全クラス」オプションを表示
                    const classSelect = document.getElementById('class-select');
                    if (classSelect) {
                        classSelect.innerHTML = '<option value="">クラスを選択</option>';
                        const allOption = document.createElement('option');
                        allOption.value = 'all';
                        allOption.textContent = '全クラス';
                        classSelect.appendChild(allOption);
                    }

                    Utils.showToast('クラスリストの生成に失敗しました');
                }
            };

            // 本登録済み生徒データのExcel出力
            window.exportRegistrationData = async function() {
                const statusDiv = document.getElementById('export-status');
                const button = document.getElementById('export-registration-button');

                try {
                    button.disabled = true;
                    statusDiv.innerHTML = '<span style="color: #007bff;">データを取得中...</span>';

                    // 教職員テストデータも含む全生徒データを取得
                    // cachedAllStudentsDataはincludeTeachers=falseの場合があるため使用しない
                    const result = await DataManager.callGASFunction('getAllStudentsData', true);
                    // 新クラスモード有効時はオーバーレイ適用
                    const allStudents = NewClassImporter.applyOverlay(result?.students || result || []);

                    const targetStatuses = new Set(['本登録']);
                    const finalStudents = allStudents.filter(s =>
                        targetStatuses.has(String(s['ステータス'] || '').trim())
                    );

                    if (finalStudents.length === 0) {
                        const msg = '本登録済みの生徒がいません。';
                        statusDiv.innerHTML = `<span style="color: #dc3545;">${msg}</span>`;
                        return;
                    }

                    statusDiv.innerHTML = '<span style="color: #007bff;">Excelファイルを生成中...</span>';

                    // 出力形式の判定
                    const exportFormat = document.getElementById('export-format-select')?.value || 'table';

                    // 科目名一覧をAppState.allCoursesの順序で取得
                    const courseNames = AppState.allCourses.map(c => c['科目名']);

                    // 学年→組→番号でソート
                    finalStudents.sort((a, b) => {
                        const gradeA = parseInt(a['学年'] || 0);
                        const gradeB = parseInt(b['学年'] || 0);
                        if (gradeA !== gradeB) return gradeA - gradeB;
                        const classA = String(a['組'] || '');
                        const classB = String(b['組'] || '');
                        if (classA !== classB) return classA.localeCompare(classB);
                        const numA = parseInt(a['番号'] || 0);
                        const numB = parseInt(b['番号'] || 0);
                        return numA - numB;
                    });

                    let headers, rows, sheetName, fileName;

                    if (exportFormat === 'vertical') {
                        // 縦展開: 1行1科目
                        headers = ['学籍番号', '学年', '組', '番号', '名前', '科目'];
                        rows = [];
                        finalStudents.forEach(student => {
                            courseNames.forEach(name => {
                                const val = String(student[name] || '').trim();
                                if (/^[○〇⚪]/.test(val)) {
                                    rows.push([
                                        student['学籍番号'] || '',
                                        student['学年'] || '',
                                        student['組'] || '',
                                        student['番号'] || '',
                                        student['名前'] || '',
                                        name
                                    ]);
                                }
                            });
                        });
                        sheetName = '本登録データ（縦展開）';
                        fileName = '本登録データ_縦展開';
                    } else {
                        // 表形式: 生徒×科目の一覧表
                        headers = ['学籍番号', '学年', '組', '番号', '名前', ...courseNames];
                        rows = finalStudents.map(student => {
                            const row = [
                                student['学籍番号'] || '',
                                student['学年'] || '',
                                student['組'] || '',
                                student['番号'] || '',
                                student['名前'] || ''
                            ];
                            courseNames.forEach(name => {
                                const val = String(student[name] || '').trim();
                                if (/^○/.test(val)) {
                                    row.push('○');
                                } else {
                                    row.push('');
                                }
                            });
                            return row;
                        });
                        sheetName = '本登録データ';
                        fileName = '本登録データ';
                    }

                    // SheetJSでExcelファイル生成
                    const wb = XLSX.utils.book_new();
                    const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
                    // 縦展開時は列幅を設定
                    if (exportFormat === 'vertical') {
                        ws['!cols'] = [
                            { wch: 12 }, // 学籍番号
                            { wch: 6 },  // 学年
                            { wch: 6 },  // 組
                            { wch: 6 },  // 番号
                            { wch: 16 }, // 名前
                            { wch: 30 }  // 科目
                        ];
                    }
                    XLSX.utils.book_append_sheet(wb, ws, sheetName);

                    // ファイル名に日付を含める
                    const today = new Date();
                    const dateStr = today.getFullYear() + '-' +
                        String(today.getMonth() + 1).padStart(2, '0') + '-' +
                        String(today.getDate()).padStart(2, '0');
                    XLSX.writeFile(wb, `${fileName}_${dateStr}.xlsx`);

                    statusDiv.innerHTML = `<span style="color: #198754;">${finalStudents.length}名分のデータをダウンロードしました。</span>`;
                    Utils.showToast(`${finalStudents.length}名分のExcelファイルをダウンロードしました`, 'success');

                } catch (error) {
                    console.error('[本登録データ出力] エラー:', error);
                    statusDiv.innerHTML = '<span style="color: #dc3545;">エラーが発生しました。</span>';
                    Utils.showToast('Excelファイルの生成に失敗しました', 'error');
                } finally {
                    button.disabled = false;
                }
            };

            // SM取り込み形式出力
            const SMExporter = {
                _settings: null,     // キャッシュ済み設定
                _settingsMap: null,  // 科目名→グループ配列のMap

                // --- 設定モーダル ---
                async openSettingsModal() {
                    Utils.showModal('sm-settings-modal');
                    const content = document.getElementById('sm-settings-content');
                    content.innerHTML = '<p style="text-align: center; color: #004294;">読み込み中...</p>';
                    try {
                        const result = await DataManager.callGASFunction('getSMSettings');
                        if (!result || !result.success) {
                            content.innerHTML = '<p style="color: #dc3545;">設定の読み込みに失敗しました。</p>';
                            return;
                        }
                        this._settings = result.data || [];
                        this.renderSettingsTable(this._settings);
                    } catch (error) {
                        console.error('[SM設定] 読み込みエラー:', error);
                        content.innerHTML = '<p style="color: #dc3545;">設定の読み込みに失敗しました。</p>';
                    }
                },

                closeSettingsModal() {
                    Utils.hideModal('sm-settings-modal');
                },

                renderSettingsTable(settings) {
                    const content = document.getElementById('sm-settings-content');
                    if (!AppState.allCourses || AppState.allCourses.length === 0) {
                        content.innerHTML = '<p style="color: #dc3545;">科目データが読み込まれていません。</p>';
                        return;
                    }

                    // 設定をMapに変換（科目名→グループ配列）
                    const settingsMap = new Map();
                    settings.forEach(s => {
                        if (!settingsMap.has(s.courseName)) {
                            settingsMap.set(s.courseName, []);
                        }
                        settingsMap.get(s.courseName).push({ groupNumber: s.groupNumber, classes: s.classes });
                    });

                    // フィルタ入力 + テーブル
                    let html = '<div style="margin-bottom: 10px;">';
                    html += '<input type="text" id="sm-settings-filter" placeholder="科目名で絞り込み..." oninput="SMExporter.filterCourses(this.value)" style="width: 100%; padding: 8px; border: 1px solid #dee2e6; border-radius: 5px; font-size: 14px; box-sizing: border-box;">';
                    html += '</div>';
                    html += '<table style="width: 100%; border-collapse: collapse; font-size: 0.9em;">';
                    html += '<thead><tr style="background: #f8f9fa; position: sticky; top: 0; z-index: 1;"><th style="padding: 8px; border: 1px solid #dee2e6; width: 30%;">科目名</th><th style="padding: 8px; border: 1px solid #dee2e6;">グループ設定</th></tr></thead>';
                    html += '<tbody>';

                    AppState.allCourses.forEach((course, idx) => {
                        const name = course['科目名'];
                        const groups = settingsMap.get(name) || [];
                        html += `<tr class="sm-course-row" data-course-name="${Utils.escapeHtml(name)}" data-course-idx="${idx}">`;
                        html += `<td style="padding: 8px; border: 1px solid #dee2e6; vertical-align: top; font-weight: bold;">${Utils.escapeHtml(name)}</td>`;
                        html += `<td style="padding: 8px; border: 1px solid #dee2e6;" id="sm-groups-cell-${idx}">`;
                        html += this._renderGroupsCell(idx, name, groups);
                        html += '</td></tr>';
                    });

                    html += '</tbody></table>';
                    content.innerHTML = html;
                },

                _renderGroupsCell(idx, courseName, groups) {
                    let html = '';
                    if (groups.length === 0) {
                        // グループ未設定時はボタンのみ表示
                    } else {
                        groups.forEach((g, gIdx) => {
                            html += `<div style="display: flex; align-items: center; gap: 6px; margin-bottom: 4px;">`;
                            html += `<span style="font-size: 0.85em; color: #555; white-space: nowrap;">グループ${gIdx + 1}:</span>`;
                            html += `<input type="text" class="sm-group-input" data-course-idx="${idx}" data-group-idx="${gIdx}" value="${Utils.escapeHtml(g.classes)}" placeholder="例: 1-1,1-2" style="flex: 1; padding: 4px 6px; border: 1px solid #dee2e6; border-radius: 4px; font-size: 0.9em;">`;
                            html += `<button onclick="SMExporter.removeGroup(${idx}, ${gIdx})" style="background: none; border: none; color: #dc3545; cursor: pointer; font-size: 1.1em; padding: 2px 4px;" title="削除">×</button>`;
                            html += '</div>';
                        });
                    }
                    return `<div style="text-align: right; margin-bottom: 2px;"><button onclick="SMExporter.addGroup(${idx})" style="background: none; border: 1px dashed #004294; color: #004294; font-size: 0.8em; padding: 2px 8px; border-radius: 4px; cursor: pointer;">+ グループ追加</button></div>` + html;
                },

                addGroup(courseIdx) {
                    const cell = document.getElementById(`sm-groups-cell-${courseIdx}`);
                    if (!cell) return;
                    // 現在のグループ入力値を収集
                    const inputs = cell.querySelectorAll('.sm-group-input');
                    const groups = Array.from(inputs).map((input, i) => ({
                        groupNumber: i + 1,
                        classes: input.value
                    }));
                    // 新しいグループを追加
                    groups.push({ groupNumber: groups.length + 1, classes: '' });
                    const courseName = AppState.allCourses[courseIdx]['科目名'];
                    cell.innerHTML = this._renderGroupsCell(courseIdx, courseName, groups);
                },

                removeGroup(courseIdx, groupIdx) {
                    const cell = document.getElementById(`sm-groups-cell-${courseIdx}`);
                    if (!cell) return;
                    const inputs = cell.querySelectorAll('.sm-group-input');
                    const groups = Array.from(inputs)
                        .filter((_, i) => i !== groupIdx)
                        .map((input, i) => ({ groupNumber: i + 1, classes: input.value }));
                    const courseName = AppState.allCourses[courseIdx]['科目名'];
                    cell.innerHTML = this._renderGroupsCell(courseIdx, courseName, groups);
                },

                filterCourses(keyword) {
                    const rows = document.querySelectorAll('.sm-course-row');
                    const kw = keyword.trim().toLowerCase();
                    rows.forEach(row => {
                        const name = (row.getAttribute('data-course-name') || '').toLowerCase();
                        row.style.display = (!kw || name.includes(kw)) ? '' : 'none';
                    });
                },

                async saveSettings() {
                    try {
                        // モーダル内の全グループ入力値を収集
                        const data = [];
                        const rows = document.querySelectorAll('.sm-course-row');
                        rows.forEach(row => {
                            const courseName = row.getAttribute('data-course-name');
                            const inputs = row.querySelectorAll('.sm-group-input');
                            inputs.forEach((input, gIdx) => {
                                const classes = input.value.trim();
                                if (classes) {
                                    data.push({ courseName: courseName, groupNumber: gIdx + 1, classes: classes });
                                }
                            });
                        });

                        const result = await DataManager.callGASFunction('saveSMSettings', data);
                        if (!result || !result.success) {
                            Utils.showToast(result?.error || 'SM設定の保存に失敗しました', 'error');
