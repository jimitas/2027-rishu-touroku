    <script>
        // アプリケーション初期化
        (function() {
            
            // アプリケーション状態管理
            const AppState = {
                isAuthenticated: false,
                currentUser: null,
                userRole: 'student', // student, teacher, admin
                courseData: {},
                registrationData: {},
                allCourses: [],
                completedCourses: [],
                inProgressCourses: [],
                retakenCourses: [],
                retakenYearMap: {},
                completedCoursesYearMap: {}, // 履修済み科目の学年指定マッピング
                inProgressCoursesYearMap: {}, // 履修中科目の学年指定マッピング
                currentlyEnrolledCourses: [],           // △マーク科目（現在履修中）
                currentlyEnrolledCoursesYearMap: {},    // △科目の学年指定マッピング
                registeredCourses: [],
                isDirty: false, // 未保存の変更があるかどうか
                initialRegistrationData: null, // 初期状態のスナップショット（dirty判定用）
                authenticatedUser: null, // 認証ユーザーのバックアップ（画面切り替え時の復元用）
                webAppUrl: null, // WebアプリURL（起動時に取得）
                // 教員・生徒データ分離用変数
                teacherUser: null,           // 教員の固定データ（不変）
                selectedStudent: null,       // 現在選択中の生徒データ
                currentMode: 'top',          // 'teacher' | 'student' | 'top'
                // 教員データ完全保存用変数
                teacherStudentSubmissionData: null,  // 教員の生データ（processRegistrationStatusで全派生状態を再計算するため）
                teacherSavedRegistrationData: null,  // 教員自身の未保存UI選択（画面遷移時にバックアップ）
                teacherSavedRegisteredCourses: null,  // 教員自身の未保存registeredCourses（画面遷移時にバックアップ）
                settings: {}, // 設定データ（学校名など）
                courseFilterActive: false, // 科目フィルタートグル状態
                meetsElectiveRequired: true // 選択必修チェック結果（updateUnitsDisplayで更新）
            };

            // 登録状態管理
            const RegistrationStatus = {
                /**
                 * 編集がロックされているかチェック
                 */
                isEditingLocked() {
                    const status = AppState.registrationStatus?.status;
                    const isLocked = status === '仮登録' || status === '本登録' || status === '本登録許可';
                    return isLocked;
                },

                /**
                 * 登録状態バナーを更新
                 */
                updateStatusBanner() {
                    const banner = document.getElementById('registration-status-banner');
                    const message = document.getElementById('registration-status-message');
                    const body = document.body;

                    // 教員/教務モードではバナーを表示しない
                    if (AppState.currentMode === 'teacher' || AppState.currentMode === 'admin') {
                        banner.classList.remove('show');
                        body.classList.remove('banner-shown');
                        this.enableButtons();
                        return;
                    }

                    if (this.isEditingLocked()) {
                        const status = AppState.registrationStatus?.status;
                        let bannerText = '';
                        
                        if (status === '仮登録') {
                            bannerText = '仮登録中なので変更できません。';
                        } else if (status === '本登録') {
                            bannerText = '本登録済のため変更できません。';
                        } else if (status === '本登録許可') {
                            bannerText = '本登録許可済みのため変更できません。';
                        }
                        
                        message.textContent = bannerText;
                        banner.classList.add('show');
                        body.classList.add('banner-shown');

                        // ボタンを無効化
                        this.disableButtons();
                    } else {
                        banner.classList.remove('show');
                        body.classList.remove('banner-shown');

                        // ボタンを有効化
                        this.enableButtons();
                    }
                },

                /**
                 * ボタンを無効化
                 */
                disableButtons() {
                    const confirmBtn = document.getElementById('btn-confirm');
                    const saveDraftBtn = document.getElementById('save-draft-button');
                    if (confirmBtn) confirmBtn.disabled = true;
                    if (saveDraftBtn) saveDraftBtn.classList.add('is-disabled');
                },

                /**
                 * ボタンを有効化
                 */
                enableButtons() {
                    const confirmBtn = document.getElementById('btn-confirm');
                    const saveDraftBtn = document.getElementById('save-draft-button');
                    const provisionalEnabled = AppState.settings && AppState.settings['仮登録'] === '可';
                    const hasCurrentlyEnrolled = AppState.currentlyEnrolledCourses && AppState.currentlyEnrolledCourses.length > 0;
                    if (confirmBtn) {
                        confirmBtn.disabled = false; // loading時のdisabledを常にクリア
                        if (hasCurrentlyEnrolled || !provisionalEnabled) {
                            confirmBtn.classList.add('is-disabled');
                            confirmBtn.style.cssText = 'background-color: #e9ecef; color: #6c757d; cursor: not-allowed;';
                            confirmBtn.title = hasCurrentlyEnrolled ? '履修中の科目があるため仮登録できません' : '仮登録期間ではありません';
                        } else {
                            confirmBtn.classList.remove('is-disabled');
                            confirmBtn.style.cssText = '';
                            confirmBtn.title = '';
                        }
                    }
                    // 一時保存ボタンは一時保存設定で独立判定（デフォルト'可'）
                    const saveDraftEnabled = AppState.settings && AppState.settings['一時保存'] !== '不可';
                    if (saveDraftBtn) {
                        if (!saveDraftEnabled || !AppState.isDirty) {
                            saveDraftBtn.classList.add('is-disabled');
                        } else {
                            saveDraftBtn.classList.remove('is-disabled');
                        }
                    }
                }
            };

            // UI制御関数
            const UIManager = {
                /**
                 * 権限に応じたボタンの表示制御
                 */
                updateRoleBasedButtons() {
                    const teacherBtn = document.getElementById('teacher-mode-btn');
                    const adminBtn = document.getElementById('admin-mode-btn');

                    // 教職員専用画面ボタン・共有ボタン: teacher, kyomu, admin
                    if (['teacher', 'kyomu', 'admin'].includes(AppState.userRole)) {
                        if (teacherBtn) {
                            teacherBtn.style.display = 'inline-block';
                        } else {
                            console.error(`[UI制御] 教職員専用画面ボタンが見つかりません`);
                        }
                        const shareBtn = document.getElementById('share-url-btn');
                        if (shareBtn) {
                            shareBtn.style.display = 'inline-block';
                        }
                    }

                    // 管理画面ボタン: kyomu, admin
                    if (['kyomu', 'admin'].includes(AppState.userRole)) {
                        if (adminBtn) {
                            adminBtn.style.display = 'inline-block';
                        }
                    }

                }
            };

            // ユーティリティ関数
            const Utils = {
                // 来年度学年を取得（留年対応：nextGradeプロパティ優先）
                getNextGrade(studentInfo) {
                    const info = studentInfo || AppState.currentUser || AppState.authenticatedUser;
                    if (info && info.nextGrade != null && info.nextGrade !== '') {
                        const parsed = parseInt(info.nextGrade);
                        if (!isNaN(parsed) && parsed >= 1 && parsed <= 3) return parsed;
                    }
                    const currentGrade = safeParseGrade(info?.grade, 1);
                    return Math.min(currentGrade + 1, 3);
                },

                /**
                 * 担当クラス文字列をパースする
                 * "1-1,1-2,3-1" → [{grade:1, class:'1'}, {grade:1, class:'2'}, {grade:3, class:'1'}]
                 * "1" → [{grade:1, class:null}]  （1年全組）
                 * "2,3" → [{grade:2, class:null}, {grade:3, class:null}]  （2,3年全組）
                 * 空欄/null → []
                 */
                parseAssignedClasses(str) {
                    if (!str || String(str).trim() === '') return [];
                    return String(str).split(',').map(s => s.trim()).filter(s => s !== '').map(entry => {
                        if (entry.includes('-')) {
                            const [g, c] = entry.split('-');
                            return { grade: parseInt(g), class: c.trim() };
                        }
                        // 学年のみ（数値）→ 全組
                        const gradeNum = parseInt(entry);
                        if (!isNaN(gradeNum)) {
                            return { grade: gradeNum, class: null };
                        }
                        return null;
                    }).filter(e => e !== null);
                },

                // 学年→組（数値優先）→番号の汎用比較関数
                // 非数値組（例: 1K）は数値組の後に配置
                compareByGradeClassNumber(gradeA, classA, numA, gradeB, classB, numB) {
                    var cA = String(classA || '').trim();
                    var cB = String(classB || '').trim();
                    // 非数値組は末尾
                    var aIsNum = !cA || /^\d+$/.test(cA);
                    var bIsNum = !cB || /^\d+$/.test(cB);
                    if (aIsNum !== bIsNum) return aIsNum ? -1 : 1;
                    // 学年
                    var gA = parseInt(gradeA) || 999;
                    var gB = parseInt(gradeB) || 999;
                    if (gA !== gB) return gA - gB;
                    // 組
                    if (!cA && cB) return 1;
                    if (cA && !cB) return -1;
                    if (aIsNum && bIsNum) {
                        var classDiff = parseInt(cA) - parseInt(cB);
                        if (classDiff !== 0) return classDiff;
                    } else {
                        var classCmp = cA.localeCompare(cB, 'ja');
                        if (classCmp !== 0) return classCmp;
                    }
                    // 番号
                    return (parseInt(numA) || 999) - (parseInt(numB) || 999);
                },

                // HTMLエスケープ（XSS対策）
                escapeHtml(text) {
                    if (text === null || text === undefined) return '';
                    const div = document.createElement('div');
                    div.textContent = String(text);
                    return div.innerHTML;
                },

                // 科目が現在のユーザーに表示可能かチェック（対象/非表示学籍番号フィルタ）
                // 表示学籍番号: 指定された生徒のみに表示（ホワイトリスト）
                // 非表示学籍番号: 指定された生徒には表示しない（ブラックリスト）
                // どちらもカンマ区切りで複数指定可能
                isCourseVisibleToUser: function(course, studentOverride = null) {
                    // 現在のユーザーの学籍番号を取得（複数のプロパティ名に対応）
                    const user = studentOverride || AppState.currentUser || AppState.authenticatedUser;
                    const currentStudentId = user?.studentId ||
                                             user?.['学籍番号'] ||
                                             user?.['studentId'] ||
                                             user?.id || '';
                    if (!currentStudentId) {
                        return true; // 学籍番号が取得できない場合は表示
                    }
                    const currentIdStr = String(currentStudentId).trim();

                    // 1. 非表示学籍番号チェック（ブラックリスト）
                    const excludedStudentIds = course['非表示学籍番号'];
                    if (excludedStudentIds && String(excludedStudentIds).trim() !== '') {
                        const excludedIds = String(excludedStudentIds).split(',').map(id => id.trim());
                        if (excludedIds.includes(currentIdStr)) {
                            return false; // この生徒には表示しない
                        }
                    }

                    // 2. 表示学籍番号チェック（ホワイトリスト）
                    const targetStudentIds = course['表示学籍番号'];
                    if (targetStudentIds && String(targetStudentIds).trim() !== '') {
                        const targetIds = String(targetStudentIds).split(',').map(id => id.trim());
                        return targetIds.includes(currentIdStr); // リストにあれば表示
                    }

                    // どちらも空なら全員に表示
                    return true;
                },

                // 抽選学籍番号チェック：この生徒が抽選対象かどうかを判定
                // 抽選学籍番号列が空の場合は制限なし（全員選択可能）
                // 抽選学籍番号列に値がある場合、リスト内の生徒のみ選択可能
                isCourseInLottery: function(course, studentOverride = null) {
                    const lotteryStudentIds = course['抽選学籍番号'];
                    if (!lotteryStudentIds || String(lotteryStudentIds).trim() === '') {
                        return true; // 抽選制限なし
                    }
                    const user = studentOverride || AppState.currentUser || AppState.authenticatedUser;
                    const currentStudentId = user?.studentId ||
                                             user?.['学籍番号'] ||
                                             user?.['studentId'] ||
                                             user?.id || '';
                    if (!currentStudentId) {
                        return true; // 学籍番号取得不可の場合は制限なし
                    }
                    const currentIdStr = String(currentStudentId).trim();
                    const lotteryIds = String(lotteryStudentIds).split(',').map(id => id.trim());
                    return lotteryIds.includes(currentIdStr);
                },

                // 深いコピー用ヘルパー（マップの値が配列の場合も正しくコピー）
                deepCopyMap: function(map) {
                    const result = {};
                    for (const key in map) {
                        if (map.hasOwnProperty(key)) {
                            result[key] = Array.isArray(map[key]) ? [...map[key]] : map[key];
                        }
                    }
                    return result;
                },

                showToast: function(message, type = 'error') {
                    const toastContainer = document.getElementById('toast-container');
                    const toast = document.createElement('div');
                    toast.className = 'toast';
                    toast.textContent = message;
                    if (type === 'success') {
                        toast.style.backgroundColor = '#28a745';
                    } else if (type === 'warning') {
                        toast.style.backgroundColor = '#ff8c42';
                    }
                    toastContainer.appendChild(toast);

                    setTimeout(() => {
                        if (toast.parentNode) {
                            toast.parentNode.removeChild(toast);
                        }
                    }, 4000);
                },

                showModal: function(modalId) {
                    const modal = document.getElementById(modalId);
                    if (modal) {
                        modal.style.display = 'flex';
                        // モーダル表示時に背景のスクロールを無効化
                        document.body.classList.add('modal-open');
                        document.documentElement.classList.add('modal-open');
                        // モーダル内のスクロール位置を一番上にリセット
                        const content = modal.querySelector('.confirmation-content, .modal-content');
                        if (content) {
                            content.scrollTop = 0;
                        }
                    }
                },

                hideModal: function(modalId) {
                    const modal = document.getElementById(modalId);
                    if (modal) {
                        modal.style.display = 'none';
                        
                        // 他にアクティブなモーダルがあるかチェック
                        const activeModals = document.querySelectorAll('[id$="-modal"]:not([style*="display: none"])');
                        const hasActiveModal = Array.from(activeModals).some(m =>
                            m.style.display === 'flex' || (m.style.display === '' && getComputedStyle(m).display === 'flex')
                        );
                        
                        // アクティブなモーダルがない場合のみスクロールを有効化
                        if (!hasActiveModal) {
                            document.body.classList.remove('modal-open');
                            document.documentElement.classList.remove('modal-open');
                        }
                    }
                },

                // 単位数を取得
                getUnits: function(course) {
                    const units = course['単位数'] || course.credits;
                    return parseInt(units) || 0;
                },

                /**
                 * 【統一関数】単位統計を計算する共通関数
                 * 生徒画面と教職員専用画面で同じロジックを使用するため統一
                 * @param {Object} registrationData - 登録データ（科目名 → 記号のマップ）
                 * @param {Array} allCourses - 全科目データ
                 * @param {Object} studentInfo - 学生情報（grade等）
                 * @param {Array} autoRegisteredCourses - 自動登録科目リスト（生徒画面のみ）
                 * @param {Object} completedCoursesYearMap - 履修済み科目の学年マップ
                 * @param {Object} inProgressCoursesYearMap - 履修中科目の学年マップ
                 * @param {Function} getCategoryFunction - カテゴリ取得関数
                 * @param {Array} completedCourses - 履修済み科目リスト（生徒画面のみ）
                 * @returns {Object} 学年別統計データ
                 */
                calculateUnitsStats: function(registrationData, allCourses, studentInfo, autoRegisteredCourses = null, completedCoursesYearMap = null, inProgressCoursesYearMap = null, getCategoryFunction = null, completedCourses = null, currentlyEnrolledCourses = null, currentlyEnrolledCoursesYearMap = null) {

                    // 科目名→科目オブジェクトのMapを構築（O(1)ルックアップ）
                    const courseMap = new Map(allCourses.map(c => [c['科目名'], c]));

                    const gradeStats = {
                        year1: { completed: 0, currentlyEnrolled: 0, required: 0, retakenRequired: 0, requiredDesignated: 0, elective: 0, total: 0, registrationUnits: 0 },
                        year2: { completed: 0, currentlyEnrolled: 0, required: 0, retakenRequired: 0, requiredDesignated: 0, elective: 0, total: 0, registrationUnits: 0 },
                        year3: { completed: 0, currentlyEnrolled: 0, required: 0, retakenRequired: 0, requiredDesignated: 0, elective: 0, total: 0, registrationUnits: 0 }
                    };

                    let totalUnits = 0;
                    const autoRegisteredSet = autoRegisteredCourses ? new Set(autoRegisteredCourses) : null;

                    // 各学年に選択科目が存在するかを科目マスターから事前計算
                    const gradeHasElectives = { year1: false, year2: false, year3: false };
                    allCourses.forEach(course => {
                        const cat = getCategoryFunction ? getCategoryFunction(course) : this._getDefaultCategory(course);
                        if (cat === 'elective') {
                            const courseGrade = course['学年'];
                            if (typeof courseGrade === 'number' && courseGrade >= 1 && courseGrade <= 3) {
                                gradeHasElectives[`year${courseGrade}`] = true;
                            }
                        }
                    });

                    // currentlyEnrolledCoursesのSet構築（○N→履修中変換された科目の二重カウント防止用）
                    const currentlyEnrolledSet = new Set(currentlyEnrolledCourses || []);

                    // 自動登録科目の処理（生徒画面のみ）
                    if (autoRegisteredCourses && Array.isArray(autoRegisteredCourses)) {
                        allCourses.forEach(course => {
                            if (autoRegisteredSet.has(course['科目名'])) {
                                // 履修中に変換された科目はスキップ（後段で別途カウント）
                                if (currentlyEnrolledSet.has(course['科目名'])) return;
                                const units = this.getUnits(course);
                                const category = getCategoryFunction ? getCategoryFunction(course) : this._getDefaultCategory(course);

                                // 履修登録学年にカウント
                                const nextGrade = Utils.getNextGrade(studentInfo);
                                const targetGrade = `year${nextGrade}`;

                                totalUnits += units;
                                if (gradeStats[targetGrade]) {
                                    gradeStats[targetGrade][category] += units;
                                    gradeStats[targetGrade].total += units;
                                    gradeStats[targetGrade].registrationUnits += units;
                                }
                            }
                        });
                    }

                    // 手動選択科目の処理
                    Object.keys(registrationData).forEach(courseName => {
                        const course = courseMap.get(courseName);
                        if (course && !(autoRegisteredSet && autoRegisteredSet.has(course['科目名']))) {
                            // 履修中に変換された科目はスキップ（後段で別途カウント）
                            if (currentlyEnrolledSet.has(courseName)) return;
                            const units = this.getUnits(course);
                            const category = getCategoryFunction ? getCategoryFunction(course) : this._getDefaultCategory(course);
                            const registrationValue = registrationData[courseName];

                            // 【デバッグ】再履修判定の詳細ログ
                            if (category === 'retakenRequired') {
                            }

                            let targetGrade;


                            // 1. 学年指定マップを優先使用（生徒画面）
                            const inProgressYear = inProgressCoursesYearMap && inProgressCoursesYearMap[courseName];
                            const completedYear = completedCoursesYearMap && completedCoursesYearMap[courseName];

                            if (inProgressYear) {
                                // 安全策: 新3年生+3年次科目の矛盾修正
                                const currentGrade = parseInt(studentInfo.grade);
                                const courseGrade = course['学年'];
                                if (currentGrade === 3 && courseGrade === 3 && inProgressYear !== 3) {
                                    targetGrade = 'year3';
                                } else {
                                    targetGrade = `year${inProgressYear}`;
                                }
                            } else if (completedYear) {
                                targetGrade = `year${completedYear}`;
                            } else {
                                // 2. 記号から学年を抽出（○1, ○2, ○3, ●1, ●2, ●3等）
                                const gradeMatch = String(registrationValue).match(/[○●](\d)/);
                                if (gradeMatch) {
                                    const specifiedGrade = parseInt(gradeMatch[1]);
                                    targetGrade = `year${specifiedGrade}`;
                                } else {
                                    // 3. プロ科目の処理
                                    const courseGrade = course['学年'];
                                    if (courseGrade === 'プロ') {
                                        // フォールバック: 2年次として扱う
                                        targetGrade = 'year2';
                                    } else {
                                        // 4. 科目の設定学年を使用（再履修科目は現在学年に修正）
                                        const currentGrade = parseInt(studentInfo.grade);

                                        // 再履修科目は学生の現在学年にカウント（学年0の場合は1年次にカウント）
                                        if (category === 'retakenRequired') {
                                            targetGrade = `year${Math.max(currentGrade, 1)}`;
                                        } else if (typeof courseGrade === 'number' && courseGrade >= 1 && courseGrade <= 3) {
                                            targetGrade = `year${courseGrade}`;
                                        } else {
                                            // 最終フォールバック: 学生の現在学年
                                            targetGrade = `year${currentGrade}`;
                                        }
                                    }
                                }
                            }

                            totalUnits += units;

                            if (gradeStats[targetGrade]) {
                                gradeStats[targetGrade][category] += units;
                                gradeStats[targetGrade].total += units;
                                gradeStats[targetGrade].registrationUnits += units;
                            }

                            // データ整合性チェック
                            const currentGrade = parseInt(studentInfo.grade);
                            const finalGradeNum = parseInt(targetGrade.replace('year', ''));
                            if (currentGrade === 3 && course['学年'] === 3 && finalGradeNum !== 3) {
                                console.warn(`[統一関数-不整合] 新3年生が3年次科目「${courseName}」を選択したが${finalGradeNum}年次にカウントされています`);
                            }
                        }
                    });

                    // 履修済み科目の処理（生徒画面のみ、totalUnitsには含めずグラフのみ）
                    if (completedCourses && Array.isArray(completedCourses)) {
                        completedCourses.forEach(courseName => {
                            const course = courseMap.get(courseName);
                            if (course) {
                                // 既に登録された科目（自動登録、手動登録）の重複チェック
                                const isAlreadyRegistered = (autoRegisteredSet && autoRegisteredSet.has(courseName)) ||
                                                          registrationData[courseName];

                                if (!isAlreadyRegistered) {
                                    const units = this.getUnits(course);

                                    // 学年指定があれば優先、なければ科目の設定学年を使用
                                    const specifiedYear = completedCoursesYearMap && completedCoursesYearMap[courseName];
                                    const grade = specifiedYear ? `year${specifiedYear}` : `year${course['学年'] || 1}`;
                                    const category = getCategoryFunction ? getCategoryFunction(course) : this._getDefaultCategory(course);


                                    // グラフにのみ反映（totalUnitsには含めない）
                                    // 選択科目と混在する学年 → グレーの「履修済」セグメントに集約
                                    // 選択科目がない学年 → 元の区分色で表示
                                    if (gradeStats[grade]) {
                                        // 登録対象学年のみグレー化（過去学年は区分色で表示）
                                        const registrationGrade = `year${Utils.getNextGrade(studentInfo)}`;
                                        if (gradeHasElectives[grade] && grade === registrationGrade) {
                                            gradeStats[grade].completed += units;
                                        } else {
                                            gradeStats[grade][category] += units;
                                        }
                                        gradeStats[grade].total += units;
                                    }
                                }
                            }
                        });
                    }

                    // △科目（現在履修中）の処理（グラフに反映、totalUnitsには含めない）
                    if (currentlyEnrolledCourses && Array.isArray(currentlyEnrolledCourses)) {
                        currentlyEnrolledCourses.forEach(courseName => {
                            const course = courseMap.get(courseName);
                            if (course) {
                                const units = this.getUnits(course);

                                // 学年決定: YearMap → 科目設定学年の順
                                const specifiedYear = currentlyEnrolledCoursesYearMap && currentlyEnrolledCoursesYearMap[courseName];
                                const grade = specifiedYear ? `year${specifiedYear}` : `year${course['学年'] || 1}`;

                                if (gradeStats[grade]) {
                                    gradeStats[grade].currentlyEnrolled += units;
                                    gradeStats[grade].total += units;
                                    // totalUnitsには加算しない（来年度履修単位数に含めない）
                                    // registrationUnitsにも加算しない
                                }
                            }
                        });
                    }

                    // 【デバッグ】再履修科目の集計結果をチェック
                    let totalRetakenUnits = 0;
                    Object.keys(gradeStats).forEach(yearKey => {
                        if (gradeStats[yearKey].retakenRequired > 0) {
                            totalRetakenUnits += gradeStats[yearKey].retakenRequired;
                        }
                    });


                    // 必修科目数計算デバッグ（終了時）

                    return { gradeStats, totalUnits };
                },

                /**
                 * 統一プログレスバー更新関数
                 * 生徒画面と教職員専用画面で共通使用
                 */
                _initialProgressBarUpdate: true,

                updateProgressBars: function(gradeStats, elementPrefix = '') {
                    ['year1', 'year2', 'year3'].forEach((gradeKey, index) => {
                        const grade = index + 1;
                        const stats = gradeStats[gradeKey];

                        // 進捗バー要素を取得（prefix対応）
                        const progressBarId = elementPrefix ? `${elementPrefix}-progress-bar-${gradeKey}` : `progress-bar-${gradeKey}`;
                        const unitsValueId = elementPrefix ? `${elementPrefix}-${gradeKey}-units-value` : `${gradeKey}-units-value`;

                        const progressBar = document.getElementById(progressBarId);
                        const unitsValue = document.getElementById(unitsValueId);

                        if (!progressBar || !stats) return;

                        // 各セグメントを取得
                        const segments = progressBar.querySelectorAll('.progress-bar-segment');
                        const completedSegment = segments[0]; // completed（履修済）
                        const enrolledSegment = segments[1]; // currently-enrolled（履修中）
                        const retakenSegment = segments[2]; // retaken-required
                        const requiredSegment = segments[3]; // required
                        const designatedSegment = segments[4]; // required-designated
                        const electiveSegment = segments[5]; // elective

                        // 30単位以下は30基準（空白あり）、超過時は合計基準（比率表示）
                        const totalUnits = stats.total;
                        const maxUnits = Math.max(totalUnits, 30);

                        // 各セグメントの幅を計算（パーセンテージ）
                        const completedPercent = (stats.completed / maxUnits) * 100;
                        const enrolledPercent = ((stats.currentlyEnrolled || 0) / maxUnits) * 100;
                        const retakenPercent = (stats.retakenRequired / maxUnits) * 100;
                        const requiredPercent = (stats.required / maxUnits) * 100;
                        const designatedPercent = (stats.requiredDesignated / maxUnits) * 100;
                        const electivePercent = (stats.elective / maxUnits) * 100;

                        // セグメントの幅を設定
                        if (Utils._initialProgressBarUpdate) {
                            // 初回: ブラウザにwidth:0%を描画させてからtransitionを発火
                            progressBar.offsetWidth;
                        }
                        completedSegment.style.width = `${completedPercent}%`;
                        enrolledSegment.style.width = `${enrolledPercent}%`;
                        retakenSegment.style.width = `${retakenPercent}%`;
                        requiredSegment.style.width = `${requiredPercent}%`;
                        designatedSegment.style.width = `${designatedPercent}%`;
                        electiveSegment.style.width = `${electivePercent}%`;

                        // セグメント内にテキストを表示（幅に応じてフルラベル→省略形→非表示）
                        function setSegmentLabel(segment, fullLabel, shortLabel, percent) {
                            if (percent <= 5) {
                                segment.textContent = '';
                                return;
                            }
                            // 親プログレスバーの実幅からセグメントの目標ピクセル幅を算出
                            // （トランジション中でも親の幅は安定している）
                            const barWidth = segment.parentElement.offsetWidth;
                            const segmentWidth = (percent / 100) * barWidth;
                            // Canvas APIでテキスト幅を計測（DOM layout/トランジションに依存しない）
                            if (!setSegmentLabel._ctx) {
                                setSegmentLabel._ctx = document.createElement('canvas').getContext('2d');
                            }
                            const style = window.getComputedStyle(segment);
                            setSegmentLabel._ctx.font = `${style.fontSize} ${style.fontFamily}`;
                            const fullTextWidth = setSegmentLabel._ctx.measureText(fullLabel).width;
                            if (fullTextWidth + 6 <= segmentWidth) {
                                segment.textContent = fullLabel;
                            } else {
                                segment.textContent = shortLabel;
                            }
                        }
                        setSegmentLabel(completedSegment, '履修済(' + stats.completed + ')', '済(' + stats.completed + ')', completedPercent);
                        setSegmentLabel(enrolledSegment, '履修中(' + (stats.currentlyEnrolled || 0) + ')', '中(' + (stats.currentlyEnrolled || 0) + ')', enrolledPercent);
                        setSegmentLabel(retakenSegment, '再履修(' + stats.retakenRequired + ')', '再(' + stats.retakenRequired + ')', retakenPercent);
                        setSegmentLabel(requiredSegment, '必修(' + stats.required + ')', '必(' + stats.required + ')', requiredPercent);
                        setSegmentLabel(designatedSegment, '履修指定(' + stats.requiredDesignated + ')', '履(' + stats.requiredDesignated + ')', designatedPercent);
                        setSegmentLabel(electiveSegment, '選択(' + stats.elective + ')', '選(' + stats.elective + ')', electivePercent);

                        // 単位数表示を更新
                        if (unitsValue) {
                            unitsValue.textContent = `${totalUnits}単位`;
                        }
                    });
                    Utils._initialProgressBarUpdate = false;
                },


                /**
                 * デフォルトのカテゴリ取得関数（getCategoryFunctionが提供されない場合）
                 */
                _getDefaultCategory: function(course) {
                    const category = course['区分'] || '';
                    if (category === '必修') return 'required';
                    if (category.includes('履修指定')) return 'requiredDesignated';
                    return 'elective';
                },

                // 区分の表示名を返す（「選択必修-履修指定」「選択必修-選択」→「選択必修」）
                getDisplayCategory: function(category) {
                    if (category && category.startsWith('選択必修')) return '選択必修';
                    return category;
                },

                // 選択必修チェック: 新3年生以上で選択必修科目がどれか1つ履修済or選択済か判定
                checkElectiveRequired: function() {
                    const nextGrade = Utils.getNextGrade();
                    if (nextGrade < 3) return { isTarget: false, isSatisfied: true };

                    if (!AppState.allCourses) return { isTarget: true, isSatisfied: true };

                    const electiveRequiredCourses = AppState.allCourses.filter(c => {
                        const cat = c['区分'] || '';
                        return cat.startsWith('選択必修');
                    });

                    if (electiveRequiredCourses.length === 0) return { isTarget: true, isSatisfied: true };

                    const isSatisfied = electiveRequiredCourses.some(course => {
                        const courseName = course['科目名'];
                        return hasCompletedCourse(courseName) ||
                               (AppState.registrationData?.[courseName] &&
                                String(AppState.registrationData[courseName]).includes('○')) ||
                               hasAutoRegisteredCourse(courseName) ||
                               hasCurrentlyEnrolledCourse(courseName);
                    });

                    return {
                        isTarget: true,
                        isSatisfied: isSatisfied,
                        courses: electiveRequiredCourses
                    };
                },

                // 6桁英数字の認証コードを生成
                generateAuthCode: function() {
                    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                    let code = '';
                    for (let i = 0; i < 6; i++) {
                        code += chars.charAt(Math.floor(Math.random() * chars.length));
                    }
                    return code;
                },

                // 科目データ内の学籍番号を置換（ローカルキャッシュ即時更新用）
                updateStudentIdsInLocalCourses(replacements) {
                    if (!AppState.allCourses || !replacements || replacements.length === 0) return;
                    const columns = ['抽選学籍番号', '非表示学籍番号', '表示学籍番号'];
                    replacements.forEach(({oldId, newId}) => {
                        const oldStr = String(oldId).trim();
                        const newStr = String(newId).trim();
                        if (!oldStr || !newStr || oldStr === newStr) return;
                        AppState.allCourses.forEach(course => {
                            columns.forEach(col => {
                                const val = course[col];
                                if (!val) return;
                                const ids = String(val).split(',').map(s => s.trim());
                                const idx = ids.indexOf(oldStr);
                                if (idx !== -1) {
                                    ids[idx] = newStr;
                                    course[col] = ids.join(',');
                                }
                            });
                        });
                    });
                }
            };

            // データ処理ユーティリティ
            const DataProcessor = {
                /**
                 * ヘッダーと行データからユーザー情報を抽出
                 * @param {Object} rosterData - 生徒情報シートデータ {header: [], row: []}
                 * @param {Object} progressData - 履修情報シートデータ {header: [], row: []}
                 * @returns {Object} ユーザー情報
                 */
                parseUserInfo(rosterData, progressData) {
                    const userInfo = {};
                    
                    // 生徒情報シートから基本情報を取得
                    if (rosterData && rosterData.header && rosterData.row) {
                        rosterData.header.forEach((columnName, index) => {
                            userInfo[columnName] = rosterData.row[index];
                        });
                    }
                    
                    // 履修情報シートからも情報を補完（優先度は履修情報シートが高い）
                    if (progressData && progressData.header && progressData.row) {
                        progressData.header.forEach((columnName, index) => {
                            const value = progressData.row[index];
                            // 基本情報項目のみ上書き（科目情報は除外）
                            if (['学籍番号', '学年', '組', '番号', '名前'].includes(columnName)) {
                                userInfo[columnName] = value;
                            }
                        });
                    }
                    
                    return userInfo;
                },

                /**
                 * ヘッダーと行データから履修済み科目を抽出
                 * @param {Object} progressData - 履修情報シートデータ {header: [], row: []}
                 * @param {Object} submissionData - 登録データシートデータ {header: [], row: []}
                 * @returns {Array} 履修済み科目名の配列
                 */
                parseCompletedCourses(progressData, submissionData) {
                    const completedCourses = [];
                    
                    // 履修情報シートから●および●1,●2,●3の科目を抽出
                    if (progressData && progressData.header && progressData.row) {
                        progressData.header.forEach((columnName, index) => {
                            const value = progressData.row[index];
                            const excludeColumns = ['学籍番号', '学年', '組', '番号', '名前'];
                            if ((value === '●' || /^●[123]$/.test(value)) && columnName && !excludeColumns.includes(columnName)) {
                                completedCourses.push(columnName);
                            }
                        });
                    }
                    
                    // 登録データシートからは履修済み科目を抽出しない
                    // ○と○1,○2,○3は「選択中」であり「履修済み」ではない
                    // 階段科目の前提条件チェックを正しく機能させるため、履修済み判定は履修情報シートの●のみとする
                    
                    return completedCourses;
                },

                /**
                 * ヘッダーと行データから履修中科目を抽出
                 * @param {Object} progressData - 履修情報シートデータ {header: [], row: []}
                 * @returns {Array} 履修中科目名の配列
                 */
                parseInProgressCourses(progressData) {
                    const inProgressCourses = [];
                    
                    if (progressData && progressData.header && progressData.row) {
                        progressData.header.forEach((columnName, index) => {
                            const value = progressData.row[index];
                            const excludeColumns = ['学籍番号', '学年', '組', '番号', '名前'];
                            if ((value === '○' || value === '〇' || /^[○〇][123]$/.test(value)) && columnName && !excludeColumns.includes(columnName)) {
                                inProgressCourses.push(columnName);
                            }
                        });
                    }
                    
                    return inProgressCourses;
                },

                /**
                 * ヘッダーと行データから再履修科目を抽出
                 * @param {Object} progressData - 履修情報シートデータ {header: [], row: []}
                 * @returns {Object} 再履修科目情報 {courses: [], yearMap: {}}
                 */
                parseRetakenCourses(progressData) {
                    const retakenCourses = [];
                    const retakenYearMap = {};
                    
                    if (progressData && progressData.header && progressData.row) {
                        progressData.header.forEach((columnName, index) => {
                            const value = progressData.row[index];
                            const excludeColumns = ['学籍番号', '学年', '組', '番号', '名前'];
                            if (['2', '3'].includes(value) && columnName && !excludeColumns.includes(columnName)) {
                                retakenCourses.push(columnName);
                                retakenYearMap[columnName] = parseInt(value);
                            }
                        });
                    }
                    
                    return {
                        courses: retakenCourses,
                        yearMap: retakenYearMap
                    };
                },

                /**
                 * ヘッダーと行配列から科目オブジェクト配列を構築
                 * @param {Object} courseData - 科目マスタデータ {header: [], rows: [[]]}
                 * @returns {Array} 科目オブジェクトの配列
                 */
                buildCourseObjects(courseData) {
                    if (!courseData || !courseData.header || !courseData.rows) {
                        return [];
                    }

                    return courseData.rows.map(row => {
                        const course = {};
                        courseData.header.forEach((columnName, index) => {
                            // undefinedの場合は空文字列に変換（後続処理の安定性向上）
                            course[columnName] = row[index] ?? '';
                        });
                        return course;
                    });
                },

                /**
                 * 統合的な履修状況処理（再履修システム対応）
                 * @param {Object} userInfo - ユーザー情報
                 * @param {Object} studentSubmissionData - 登録データシートデータ（履修情報統合済み）
                 * @param {Array} allCourses - 全科目データ
                 * @returns {Object} 処理済み履修状況
                 */
                processRegistrationStatus(userInfo, studentSubmissionData, allCourses) {

                    const currentGrade = Math.min(safeParseGrade(userInfo.学年, 1), 3); // 4年生は3年生として処理
                    // 来年度学年（留年対応）
                    const nextGrade = Utils.getNextGrade({ grade: currentGrade, nextGrade: userInfo['来年度学年'] });

                    // 表示学籍番号フィルタ用：userInfoから学籍番号を取得してstudentOverrideを構築
                    // ※ AppState.currentUser が未設定の場合（生徒初期化時）でもフィルタが機能するようにする
                    const studentOverride = userInfo?.['学籍番号'] ? { studentId: userInfo['学籍番号'] } : null;

                    // 初期データ構造
                    const result = {
                        completedCourses: [],
                        inProgressCourses: [],
                        currentlyEnrolledCourses: [],
                        currentlyEnrolledCoursesYearMap: {},
                        retakenCourses: [],
                        retakenYearMap: {},
                        registrationData: {},
                        autoRegisteredCourses: [],
                        pureAutoRegisteredCourses: [], // スプレッドシートに○がない純粋な自動登録のみ（確認用紙判定用）
                        lockedCourses: [], // 変更不可科目
                        completedCoursesYearMap: {},
                        inProgressCoursesYearMap: {}
                    };
                    
                    // 表示学籍番号フィルタ用：表示可能な科目のSetを構築
                    const allCourseNames = new Set();
                    const visibleCourseNames = new Set();
                    allCourses.forEach(course => {
                        const name = course['科目名'];
                        if (name) {
                            allCourseNames.add(name);
                            if (Utils.isCourseVisibleToUser(course, studentOverride)) {
                                visibleCourseNames.add(name);
                            }
                        }
                    });

                    // 【再履修デバッグ】再履修科目の解析
                    if (studentSubmissionData) {
                        // 数学Ⅰの値を特別にチェック
                        if (studentSubmissionData.header && studentSubmissionData.row) {
                            const mathIndex = studentSubmissionData.header.indexOf('数学Ⅰ');
                            if (mathIndex !== -1) {
                                const mathValue = studentSubmissionData.row[mathIndex];
                            } else {
                            }
                        }
                        
                        try {
                            const retakenInfo = this.parseRetakenCourses(studentSubmissionData);
                            // 表示学籍番号フィルタ：非表示科目を再履修から除外
                            result.retakenCourses = retakenInfo.courses.filter(name => visibleCourseNames.has(name));
                            result.retakenYearMap = {};
                            for (const [name, year] of Object.entries(retakenInfo.yearMap)) {
                                if (visibleCourseNames.has(name)) {
                                    result.retakenYearMap[name] = year;
                                }
                            }
                        } catch (error) {
                            console.error('【再履修デバッグ】parseRetakenCoursesでエラー:', error);
                            // エラーが発生した場合は空の値で初期化
                            result.retakenCourses = [];
                            result.retakenYearMap = {};
                        }
                    }
                    
                    // 1. 登録データ優先処理
                    if (studentSubmissionData && studentSubmissionData.header && studentSubmissionData.row) {
                        // 提出状態を抽出
                        const statusIndex = studentSubmissionData.header.indexOf('ステータス');
                        if (statusIndex !== -1) {
                            const submissionStatus = studentSubmissionData.row[statusIndex];
                            result.registrationStatus = { status: submissionStatus };
                        }
                        studentSubmissionData.header.forEach((columnName, index) => {
                            const value = studentSubmissionData.row[index];
                            const excludeColumns = ['学籍番号', 'タイムスタンプ', 'ステータス', '更新日時', '提出日時', '教職員チェック', 'メールアドレス', '学年', '組', '番号', '名前'];
                            
                            if (columnName && !excludeColumns.includes(columnName)) {
                                // 表示学籍番号フィルタ：科目データに存在するが非表示の科目をスキップ
                                if (allCourseNames.has(columnName) && !visibleCourseNames.has(columnName)) {
                                    return;
                                }
                                if (value === '●') {
                                    result.completedCourses.push(columnName);
                                } else if (/^●[123]$/.test(value)) {
                                    // 新記法：●1, ●2, ●3 (履修済み+学年指定)
                                    const year = parseInt(value[1]);
                                    result.completedCourses.push(columnName);
                                    if (!result.completedCoursesYearMap) {
                                        result.completedCoursesYearMap = {};
                                    }
                                    result.completedCoursesYearMap[columnName] = year;
                                } else if (['○', '〇', '⚪'].includes(value)) {
                                    result.inProgressCourses.push(columnName);
                                    result.registrationData[columnName] = value; // 文字列値で保存
                                } else if (/^[○〇⚪][123]N?$/.test(value)) {
                                    // 新記法：○1, ○2, ○3, ○2N等 (履修中+学年指定、Nは留年生用)
                                    const normalizedMark = value[0] === '〇' || value[0] === '⚪' ? '○' : value[0];
                                    const year = parseInt(value[1]);
                                    const hasNSuffix = value.endsWith('N');
                                    result.inProgressCourses.push(columnName);
                                    // Nサフィックスも含めて保持（留年生の来年度選択識別用）
                                    result.registrationData[columnName] = normalizedMark + year + (hasNSuffix ? 'N' : '');
                                    if (!result.inProgressCoursesYearMap) {
                                        result.inProgressCoursesYearMap = {};
                                    }
                                    result.inProgressCoursesYearMap[columnName] = year;
                                    // Nサフィックス科目を追跡
                                    if (hasNSuffix) {
                                        if (!result.nSuffixCourses) result.nSuffixCourses = new Set();
                                        result.nSuffixCourses.add(columnName);
                                    }
                                }
                            }
                        });
                    }
                    
                    // 2. 統合データ処理完了（studentSubmissionDataに全データ統合済み）

                    // 留年判定（自動入力処理で使用）
                    const isRetained = userInfo['来年度学年'] != null &&
                                       userInfo['来年度学年'] !== '' &&
                                       currentGrade === nextGrade;

                    // 留年生: スプレッドシートから読み込んだ○Nマーク（Nサフィックスなし）に
                    // 事後的にNサフィックスを補完する。
                    // 留年生の登録データ内の○マークはすべて「来年度の選択」を意味するため、
                    // 留年強制変換で「今年度履修中」に移動されるべきではない。
                    if (isRetained) {
                        result.inProgressCourses.forEach(courseName => {
                            if (!result.nSuffixCourses?.has(courseName)) {
                                const yearMapValue = result.inProgressCoursesYearMap?.[courseName];
                                if (yearMapValue === currentGrade) {
                                    // registrationDataのマークにもNを補完
                                    const currentMark = result.registrationData[courseName];
                                    if (currentMark && /^○\d$/.test(currentMark)) {
                                        result.registrationData[courseName] = currentMark + 'N';
                                    }
                                    if (!result.nSuffixCourses) result.nSuffixCourses = new Set();
                                    result.nSuffixCourses.add(courseName);
                                }
                            }
                        });
                    }

                    // 通常進級: 来年度学年が空欄の場合、全○NサフィックスのNを除去
                    // 留年時に付与されたNを解除し、○→履修中変換で正しく処理されるようにする
                    if (userInfo['来年度学年'] == null || userInfo['来年度学年'] === '') {
                        result.nSuffixCourses?.forEach(courseName => {
                            const currentMark = result.registrationData[courseName];
                            if (currentMark && /^○\dN$/.test(currentMark)) {
                                result.registrationData[courseName] = currentMark.replace('N', '');
                            }
                        });
                        if (result.nSuffixCourses) result.nSuffixCourses.clear();
                    }

                    // 1年生白紙データの自動○1入力
                    // 新1年生が初回ログインした際、登録データが完全に空の場合、
                    // 1年の必修＋履修指定科目に○1マークを自動入力する。
                    // ○1は○→履修中変換により「履修中」扱いになり、仮登録はできない（意図通り）。
                    if (currentGrade === 1 &&
                        result.completedCourses.length === 0 &&
                        result.inProgressCourses.length === 0 &&
                        !result.registrationStatus?.status) {
                        allCourses.forEach(course => {
                            if (!Utils.isCourseVisibleToUser(course, studentOverride)) return;
                            if (!Utils.isCourseInLottery(course, studentOverride)) return;
                            const courseName = course['科目名'];
                            const courseGrade = parseInt(course['学年']);
                            const courseCategory = course['区分'];
                            if (!courseName || course['開講なし']) return;
                            if (courseGrade !== 1) return;
                            if (courseCategory !== '必修' && courseCategory !== '履修指定' && courseCategory !== '選択必修-履修指定') return;

                            result.registrationData[courseName] = '○1';
                            result.inProgressCourses.push(courseName);
                            result.inProgressCoursesYearMap[courseName] = 1;
                            result.autoRegisteredCourses.push(courseName);
                            result.pureAutoRegisteredCourses.push(courseName);
                        });
                    }

                    // 3. 自動入力処理（Set構築でO(1)ルックアップ）
                    const completedSet = new Set(result.completedCourses);
                    const inProgressSet = new Set(result.inProgressCourses);
                    const currentlyEnrolledSet = new Set(result.currentlyEnrolledCourses);
                    allCourses.forEach(course => {
                        // 表示学籍番号フィルタ：この生徒に表示されない科目は自動登録しない
                        if (!Utils.isCourseVisibleToUser(course, studentOverride)) {
                            return;
                        }
                        // 抽選学籍番号フィルタ：抽選対象外の生徒は自動登録しない
                        if (!Utils.isCourseInLottery(course, studentOverride)) {

                        const courseName = course['科目名'];
                        const courseGrade = parseInt(course['学年']);
                        const courseCategory = course['区分'];

                        if (!courseName) return;

                        // 既に処理済みの科目はスキップ
                        const alreadyProcessed = completedSet.has(courseName) ||
                                                inProgressSet.has(courseName) ||

                            // 取得済み科目（●マーク）はautoRegisteredCoursesに追加不要

                            if (completedSet.has(courseName)) return;

                                const selectableGrades = course['選択可能学年'];
                                let gradeAllowed = true;
                                if (selectableGrades) {
                                    const allowedGrades = String(selectableGrades).split(',').map(g => parseInt(g.trim())).filter(g => !isNaN(g));
                                    if (allowedGrades.length > 0 && !allowedGrades.includes(nextGrade)) {
                                        gradeAllowed = false;
                                    }
                                }
                                if (gradeAllowed && (courseGrade === currentGrade || courseGrade === nextGrade || courseGrade < currentGrade)) {
                                    if (!result.autoRegisteredCourses.includes(courseName)) {
                                        result.autoRegisteredCourses.push(courseName);
                                    }
                                    // 再履修の場合はロックも追加
                                    if (courseGrade <= currentGrade && !result.lockedCourses.includes(courseName)) {
                                        result.lockedCourses.push(courseName);
                                    }
                                }
                            }
                            if ((courseCategory === '履修指定' || courseCategory === '選択必修-履修指定') && !course['開講なし']) {
                                if (courseGrade === nextGrade && !isRetained) {
                                    if (!result.autoRegisteredCourses.includes(courseName)) {
                                        result.autoRegisteredCourses.push(courseName);
                                    }
                                }
                            }
                            return;
                        }

                        // A. 必修科目の自動入力
                        if (courseCategory === '必修' && !course['開講なし']) {

                            // 選択可能学年チェック: nextGradeが許可されていない場合は自動登録しない

                            // 3. 下位学年の必修科目（再履修）
                            if (courseGrade === currentGrade ||
                                courseGrade === nextGrade ||
                                courseGrade < currentGrade) {
                                
                                result.inProgressCourses.push(courseName);

                                    if (!result.inProgressCoursesYearMap) {
                                        result.inProgressCoursesYearMap = {};
                                    }
                                    result.inProgressCoursesYearMap[courseName] = nextGrade;
                                }

                                // 留年生の場合、nSuffixCoursesに追加して留年強制変換で除外
                                if (isRetained) {
                                    if (!result.nSuffixCourses) result.nSuffixCourses = new Set();
                                    result.nSuffixCourses.add(courseName);
                                }

                                result.autoRegisteredCourses.push(courseName);
                                result.pureAutoRegisteredCourses.push(courseName);

                                // 再履修の場合は変更不可（現在学年以下の必修は全て再履修扱い）
                                if (courseGrade <= currentGrade) {
                                    result.lockedCourses.push(courseName);
                                } else {
                                }
                            } else {
                            }
                        }
                        
                        // B. 履修指定科目の自動入力（次学年のみ）（選択必修-履修指定も同様）
                        if ((courseCategory === '履修指定' || courseCategory === '選択必修-履修指定') && !course['開講なし']) {

                            result.inProgressCourses.push(courseName);

                            const nSuffixDesig = isRetained ? 'N' : '';
                            if (courseGrade !== currentGrade) {

                            if (isRetained) {

                                result.nSuffixCourses.add(courseName);
                            }

                            result.autoRegisteredCourses.push(courseName);
                            result.pureAutoRegisteredCourses.push(courseName);

                    });

                    // 留年生の○N（Nサフィックスなし）→ 履修中に強制変換

                        result.inProgressCourses.forEach(courseName => {

                    toMove.forEach(courseName => {

                        delete result.inProgressCoursesYearMap[courseName];
                        // currentlyEnrolledCoursesに追加
                        result.currentlyEnrolledCourses.push(courseName);
                        result.currentlyEnrolledCoursesYearMap[courseName] = currentGrade;
                        // 変更不可（ロック）にする
                        if (!result.lockedCourses.includes(courseName)) {
                            result.lockedCourses.push(courseName);
                        }
                        // ※ registrationDataはそのまま残す（保存時に○Nマークを維持するため）
                    });

                    return result;
                }
            };

            // 認証管理
            const AuthManager = {

                                        .withSuccessHandler(function(result) {
                                            if (result && result.success) {
                                                location.reload();

                                                document.getElementById('btn-clear-suspension').disabled = false;
                                                document.getElementById('btn-clear-suspension').textContent = '管理者権限で解除する';

                                        .clearOwnSuspension();

                        if (response.error) {

                        // 教員のみの場合（生徒データなし）
                        if (response.isTeacher && !response.studentRosterData && !response.studentSubmissionData) {

                            AppState.teacherAssignedClasses = Utils.parseAssignedClasses(response.teacherData?.クラス);
                            
                            // 権限に応じたボタン表示

                        } else {

                            // DataProcessorを使用してデータを解析
                            const userInfo = DataProcessor.parseUserInfo(

                            // 来年度学年を設定（留年対応）

                            };
                            // 認証ユーザー情報をバックアップ
                            AppState.authenticatedUser = {

                    } else if (nextGrade === 3) {
                        targetGrades = [1, 2]; // 新3年生は1,2年次の必修をチェック
                    }
                    
                    let autoRegisteredCount = 0;

                                const isAlreadyRegistered = AppState.registrationData[courseName];
                                
                                
                                // 履修済み、履修中、既に登録済み、開講なしでない場合のみ自動登録
                                if (!isCompleted && !isAlreadyInProgress && !isAlreadyRegistered && !course['開講なし']) {

                                    const mark = SelectabilityChecker.generateYearSpecifiedMark(course);

                                    if (typeof mark !== 'string') {

                                } else {
                                }

                    // 履修指定科目の自動登録（新学年の履修指定科目）

                        const courseGrade = parseInt(course['学年']);

                        const courseCategory = course['区分'];

                        if (courseGrade === nextGrade && courseName && (courseCategory === '履修指定' || courseCategory === '選択必修-履修指定')) {
                            const isCompleted = hasCompletedCourse(courseName);
                            const isAlreadyInProgress = hasInProgressCourse(courseName);
                            const isAlreadyRegistered = AppState.registrationData[courseName];
                            
                            if (!isCompleted && !isAlreadyInProgress && !isAlreadyRegistered && !course['開講なし']) {
                                // 学年指定記法を適用
                                const mark = SelectabilityChecker.generateYearSpecifiedMark(course);

                                // 型安全性チェック
                                if (typeof mark !== 'string') {
                                    console.error(`[履修指定自動登録エラー] 不正なマーク値: ${mark} (型: ${typeof mark}) - 科目: ${courseName}`);
                                    console.error(`[履修指定自動登録エラー] フォールバック処理: ○1 を使用`);
                                    AppState.registrationData[courseName] = '○1';
                                } else {
                                    AppState.registrationData[courseName] = mark;

                                AppState.autoRegisteredCourses = AppState.autoRegisteredCourses || [];
                                AppState.autoRegisteredCourses.push(courseName);
                                autoRegisteredCount++;
                            }
                        }
                    });

                }
            };

            // 留年生の○マークにNサフィックスを補完する（保存/提出時の防御的ガード）
            function ensureRetainedStudentNSuffix(registrationData) {
                if (!AppState.isRetainedStudent) return registrationData;
                const nextGrade = Utils.getNextGrade();
                Object.keys(registrationData).forEach(key => {
                    const value = registrationData[key];
                    if (typeof value === 'string' && /^○[123]$/.test(value)) {
                        const markGrade = parseInt(value[1]);
                        if (markGrade === nextGrade) {
                            registrationData[key] = value + 'N';
                        }
                    }
                });
                return registrationData;
            }

            // データ管理
            const DataManager = {

                async callGASFunction(functionName, ...args) {
                    try {
                        const response = await new Promise((resolve, reject) => {
                            const timeout = setTimeout(() => {
                                reject(new Error(`GAS_TIMEOUT:${functionName}`));
                            }, 30000);
                            google.script.run
                                .withSuccessHandler((result) => {
                                    clearTimeout(timeout);
                                    resolve(result);
                                })
                                .withFailureHandler((error) => {
                                    clearTimeout(timeout);
                                    console.error(`[callGASFunction] ${functionName} Failure:`, error);
                                    reject(error);
                                })
                                [functionName](...args);
                        });
                        // responseのnullチェック
                        if (!response) {
                            console.error(`GAS関数 ${functionName} からの応答がnullです`);
                            return {
                                success: false,
                                error: 'サーバーからの応答がありません。ページを再読み込みしてください。'
                            };
                        }

                        return response;
                    } catch (error) {
                        console.error(`GAS関数呼び出しエラー (${functionName}):`, error);
                        // タイムアウトまたはセッション切れの可能性がある場合、リロード案内を表示
                        const message = error.message || error.toString();
                        if (message.includes('GAS_TIMEOUT') || message.includes('Script function not found') || message.includes('Authorization')) {
                            this.showSessionExpiredModal();
                            // エラーをthrowせず、呼び出し元のcatchで二重表示を避ける
                            return { success: false, error: 'セッションの有効期限が切れた可能性があります。' };
                        }
                        // その他のエラーはより詳細なエラー情報を含めてthrow
                        const enhancedError = new Error(`GAS関数 ${functionName} でエラー: ${message}`);
                        enhancedError.originalError = error;
                        enhancedError.functionName = functionName;
                        enhancedError.args = args;
                        throw enhancedError;
                    }
                },

                async submitRegistrationData() {

                        // 留年生の○マークにNサフィックスを補完（防御的ガード）
                        ensureRetainedStudentNSuffix(combinedRegistrationData);

                        // タイムスタンプを文字列として追加
                        const registrationDataWithTimestamp = {
                            ...combinedRegistrationData,
                            提出日時: new Date().toISOString(),  // ISO文字列形式で確実に文字列化
                            更新日時: new Date().toISOString()
                        };

                        const response = await new Promise((resolve, reject) => {
