            };

            // 型安全ヘルパー関数
            function safeParseGrade(value, defaultValue = 1) {
                if (value === null || value === undefined) return defaultValue;
                const parsed = parseInt(value);
                return isNaN(parsed) || parsed < 0 || parsed > 3 ? defaultValue : parsed;
            }

            // debounceユーティリティ関数（高速化：連続した呼び出しを最後の1回にまとめる）
            function debounce(fn, delay = 300) {
                let timeout;
                return function(...args) {
                    clearTimeout(timeout);
                    timeout = setTimeout(() => fn.apply(this, args), delay);
                };
            }

            // 高速ルックアップ用Set更新関数（配列→Setでincludes O(n)→has O(1)）
            function updateCourseSets() {
                AppState.completedCoursesSet = new Set(AppState.completedCourses || []);
                AppState.inProgressCoursesSet = new Set(AppState.inProgressCourses || []);
                AppState.autoRegisteredCoursesSet = new Set(AppState.autoRegisteredCourses || []);
                AppState.pureAutoRegisteredCoursesSet = new Set(AppState.pureAutoRegisteredCourses || []);
                AppState.currentlyEnrolledCoursesSet = new Set(AppState.currentlyEnrolledCourses || []);
            }

            // 高速ルックアップ用ヘルパー関数（Setがあれば使用、なければ配列フォールバック）
            function hasCompletedCourse(courseName) {
                if (AppState.completedCoursesSet) return AppState.completedCoursesSet.has(courseName);
                return AppState.completedCourses && AppState.completedCourses.includes(courseName);
            }
            function hasInProgressCourse(courseName) {
                if (AppState.inProgressCoursesSet) return AppState.inProgressCoursesSet.has(courseName);
                return AppState.inProgressCourses && AppState.inProgressCourses.includes(courseName);
            }
            function hasAutoRegisteredCourse(courseName) {
                if (AppState.autoRegisteredCoursesSet) return AppState.autoRegisteredCoursesSet.has(courseName);
                return AppState.autoRegisteredCourses && AppState.autoRegisteredCourses.includes(courseName);
            }
            function hasPureAutoRegisteredCourse(courseName) {
                if (AppState.pureAutoRegisteredCoursesSet) return AppState.pureAutoRegisteredCoursesSet.has(courseName);
                return AppState.pureAutoRegisteredCourses && AppState.pureAutoRegisteredCourses.includes(courseName);
            }
            function hasCurrentlyEnrolledCourse(courseName) {
                if (AppState.currentlyEnrolledCoursesSet) return AppState.currentlyEnrolledCoursesSet.has(courseName);
                return AppState.currentlyEnrolledCourses && AppState.currentlyEnrolledCourses.includes(courseName);
            }

            // 科目名からコースを高速検索するためのMap更新関数
            function updateCourseByNameMap() {
                if (AppState.allCourses && Array.isArray(AppState.allCourses)) {
                    AppState.courseByName = new Map(
                        AppState.allCourses.map(c => [c['科目名'], c])
                    );
                } else {
                    AppState.courseByName = new Map();
                }
            }

            // 科目名から科目オブジェクトを高速検索（Map使用、フォールバックあり）
            function getCourseByName(courseName) {
                if (AppState.courseByName) return AppState.courseByName.get(courseName);
                return AppState.allCourses && AppState.allCourses.find(c => c['科目名'] === courseName);
            }

            // 科目選択制限チェック
            const SelectabilityChecker = {
                checkSelectability(course, options = {}) {
                    try {
                        const userGrade = AppState.currentUser?.grade || AppState.authenticatedUser?.grade;
                        const studentGrade = safeParseGrade(userGrade, 1);
                        const allRegisteredCourses = this.getAllRegisteredCourses();
                        const nextGrade = Utils.getNextGrade();

                        // 開講なしチェック（最優先）
                        if (course['開講なし']) {
                            return { isSelectable: false, reason: '開講がありません' };
                        }

                        // 抽選学籍番号チェック（開講なしの次に判定）
                        if (!Utils.isCourseInLottery(course)) {
                            return { isSelectable: false, reason: '抽選対象外のため選択できません。' };
                        }

                        // 区分と再履修状況を組み合わせて判定
                        const detailedCategory = RegistrationManager.getCourseCategory(course);

                        // 全ての科目区分に学年制限を適用
                        const selectableGrades = course['選択可能学年'];
                        if (selectableGrades) {
                            // 選択可能学年列が設定されている場合
                            const allowedGrades = String(selectableGrades).split(',').map(g => parseInt(g.trim())).filter(g => !isNaN(g));
                            if (allowedGrades.length > 0 && !allowedGrades.includes(nextGrade)) {
                                const categoryName = detailedCategory === 'elective' ? '選択科目' :
                                                    detailedCategory === 'requiredDesignated' ? '履修指定科目' : '必修科目';
                                return { isSelectable: false, reason: `新${nextGrade}年生はこの${categoryName}を選択できません。\n選択可能学年: ${allowedGrades.join(',')}年` };
                            }
                        } else {
                            // 選択可能学年列がない場合の従来ロジック
                            const courseGrade = safeParseGrade(course['学年'], 0);
                            switch(detailedCategory) {
                                case 'required':           // 通常の必修
                                case 'retakenRequired':    // 再履修必修
                                    // 必修科目は科目の設定学年以下の学生のみ選択可能
                                    if (courseGrade > nextGrade) {
                                        return { isSelectable: false, reason: `新${nextGrade}年生は${courseGrade}年生の必修科目を選択できません。` };
                                    }
                                    break;

                                case 'requiredDesignated': // 履修指定科目
                                    // 履修指定科目も学年制限を適用
                                    if (courseGrade > nextGrade) {
                                        return { isSelectable: false, reason: `新${nextGrade}年生は${courseGrade}年生の履修指定科目を選択できません。` };
                                    }
                                    break;

                                case 'elective':           // 選択科目
                                    if (studentGrade !== 3 && courseGrade > nextGrade) {
                                        return { isSelectable: false, reason: `新${nextGrade}年生は${courseGrade}年生の選択科目を選択できません。` };
                                    }
                                    break;
                            }
                        }


                        // ルール3: 階段科目のチェック（履修済み科目のみを前提条件として扱う）
                        const prereqs = course['階段'] ? String(course['階段']).split(',').map(p => p.trim()) : [];
                        if (prereqs.length > 0 && prereqs.some(p => p !== '') && !prereqs.every(p => hasCompletedCourse(p) || hasCurrentlyEnrolledCourse(p))) {
                            return { isSelectable: false, reason: `${prereqs.join('・')}の履修が必要です。` };
                        }

                        // ルール4: 同時不可科目のチェック（統合版）
                        if (!options.skipSimultaneous) {
                            const simultaneousResult = this.checkSimultaneousConflict(course, allRegisteredCourses);
                            if (!simultaneousResult.isSelectable) {
                                return simultaneousResult;
                            }
                        }

                        return { isSelectable: true, reason: "" };
                    } catch (error) {
                        console.error('[SelectabilityChecker] checkSelectability エラー:', error, course);
                        return { isSelectable: false, reason: "判定エラーが発生しました。" }; // エラー時は安全側にフォールバック
                    }
                },

                // 同時不可制約チェック統合関数
                checkSimultaneousConflict(course, allRegisteredCourses) {
                    const simultaneousKey = course['同時不可'];
                    if (simultaneousKey && typeof simultaneousKey === 'string' && simultaneousKey.trim() !== '') {
                        const cleanedKey = simultaneousKey.trim();

                        const conflictCourse = allRegisteredCourses.find(rc => {
                            const rcKey = rc['同時不可'];
                            return rcKey && typeof rcKey === 'string' &&
                                   rcKey.trim() === cleanedKey &&
                                   rc['科目名'] !== course['科目名'];
                        });

                        if (conflictCourse) {
                            return { isSelectable: false, reason: `「${conflictCourse['科目名']}」が選択されているため、この科目は選択できません。` };
                        }
                    }
                    return { isSelectable: true, reason: "" };
                },

                getAllRegisteredCourses() {
                    try {
                        if (!AppState.allCourses || !Array.isArray(AppState.allCourses)) {
                            console.warn('[SelectabilityChecker] allCoursesが未初期化');
                            return [];
                        }
                        return AppState.allCourses.filter(course => {
                            const courseName = course['科目名'];
                            // 履修済み科目は同時不可制約の原因にならない
                            if (hasCompletedCourse(courseName)) {
                                return false;
                            }
                            // △科目（履修中）も登録済みとして扱う
                            if (hasCurrentlyEnrolledCourse(courseName)) {
                                return true;
                            }
                            // registrationDataまたは自動登録をチェック
                            return AppState.registrationData?.[courseName] ||
                                   this.isAutoRegistered(course);
                        });
                    } catch (error) {
                        console.error('[SelectabilityChecker] getAllRegisteredCourses エラー:', error);
                        return [];
                    }
                },

                isAutoRegistered(course) {
                    try {
                        const userGrade = AppState.currentUser?.grade || AppState.authenticatedUser?.grade;
                        const studentGrade = safeParseGrade(userGrade, 1);
                        const nextGrade = Utils.getNextGrade();
                        const courseCategory = String(course['区分'] || '');
                        const courseGrade = safeParseGrade(course['学年'], 0);

                        // 仕様書に基づく自動登録ルール
                        // 1. 現在学年の必修科目（通常履修）
                        if (courseCategory === '必修' && courseGrade === studentGrade) {
                            return true;
                        }

                        // 2. 下位学年の必修科目（再履修）
                        if (courseCategory === '必修' && courseGrade < studentGrade) {
                            return true;
                        }

                        // 3. 次学年の履修指定科目（履修指定）
                        if (courseCategory.includes('履修指定') && courseGrade === nextGrade) {
                            return true;
                        }

                        return false;
                    } catch (error) {
                        console.error('[SelectabilityChecker] isAutoRegistered エラー:', error, course);
                        return false;
                    }
                },

                /**
                 * 学年指定記法を生成
                 * @param {object} course - 科目データ
                 * @returns {string} 適切な記法（○、○2、○3等）
                 */
                generateYearSpecifiedMark(course) {
                    // null安全性チェック（safeParseGradeでフォールバック）
                    const userGrade = AppState.currentUser?.grade || AppState.authenticatedUser?.grade;
                    if (!userGrade) {
                        console.warn(`[学年指定記法] 学年情報が未設定のため、デフォルト値1を使用`);
                        return '○1';  // 安全な初期値（学年番号付き）
                    }

                    const currentGrade = safeParseGrade(userGrade, 1);
                    const nextGrade = Utils.getNextGrade(); // 履修予定学年（留年対応）
                    const courseGrade = course['学年'];
                    const selectableGrades = course['選択可能学年'];
                    // 留年生はNサフィックスを付与
                    const nSuffix = AppState.isRetainedStudent ? 'N' : '';

                    // 科目設定学年が数字で、履修予定学年と一致する場合
                    if (typeof courseGrade === 'number' && courseGrade === nextGrade) {
                        return `○${nextGrade}${nSuffix}`;
                    }

                    // 【デバッグ強化】新3年生の3年次科目選択の詳細ログ
                    if (currentGrade === 3 && courseGrade === 3) {
                    }
                    
                    // プロ科目または学年が異なる場合は学年指定記法が必要
                    if (selectableGrades) {
                        const allowedGrades = String(selectableGrades).split(',').map(g => parseInt(g.trim())).filter(g => !isNaN(g));

                        if (allowedGrades.length > 0) {
                            // 学年決定アルゴリズム（履修予定学年ベース）
                            let targetGrade;

                            // 【デバッグ強化】新3年生の3年科目選択時の詳細ログ
                            if (currentGrade === 3 && courseGrade === 3) {
                            }

                            if (allowedGrades.includes(nextGrade)) {
                                // 履修予定学年が選択可能なら履修予定学年優先
                                targetGrade = nextGrade;
                            } else if (allowedGrades.includes(currentGrade)) {
                                // 現在学年が選択可能ならそれを使用
                                targetGrade = currentGrade;
                            } else {
                                // 最初の選択可能学年を使用
                                targetGrade = allowedGrades[0];
                            }

                            // 【データ整合性チェック】生成された学年指定マークの妥当性確認
                            if (currentGrade === 3 && courseGrade === 3 && targetGrade !== 3) {
                                console.warn(`[データ不整合検出] 新3年生+3年次科目で不適切な学年指定: ○${targetGrade} → ○3に修正推奨`);
                                console.warn(`[データ不整合検出] 科目「${course['科目名']}」の選択可能学年データを確認してください: ${selectableGrades}`);
                            }

                            return `○${targetGrade}${nSuffix}`;
                        }
                    }

                    // フォールバック: 通常記法

                    // 【データ整合性チェック】フォールバック時の妥当性確認
                    if (selectableGrades && selectableGrades.length > 0) {
                        console.warn(`[データ不整合検出] 選択可能学年が設定されているのにフォールバックが実行されました`);
                        console.warn(`[データ不整合検出] 科目「${course['科目名']}」のデータを確認してください: 選択可能学年=${selectableGrades}`);
                    }

                    return `○${nextGrade || courseGrade || 1}${nSuffix}`;
                }
            };

            // 卒業要件チェック
            const GraduationRequirementChecker = {
                /**
                 * 卒業要件チェック対象かどうかを判定
                 * @returns {boolean} 新3年生以上ならtrue
                 */
                isTargetStudent() {
                    // 来年度学年（留年対応）で判定 — 新3年生以上が対象
                    const nextGrade = Utils.getNextGrade();
                    return nextGrade >= 3;
                },

                /**
                 * 設定から卒業要件を取得
                 * @returns {Object} 教科名をキー、必要単位数を値とするオブジェクト
                 */
                getRequirements() {
                    const requirements = {};
                    if (!AppState.settings) return requirements;

                    Object.keys(AppState.settings).forEach(key => {
                        if (key.startsWith('卒業要件_')) {
                            const subject = key.replace('卒業要件_', '');
                            const units = parseInt(AppState.settings[key]) || 0;
                            if (units > 0) {
                                requirements[subject] = units;
                            }
                        }
                    });
                    return requirements;
                },

                /**
                 * 教科別の履修単位数を計算
                 * @returns {Object} 教科名をキー、単位数を値とするオブジェクト
                 */
                calculateUnitsBySubject() {
                    const unitsBySubject = {};

                    if (!AppState.allCourses) return unitsBySubject;

                    AppState.allCourses.forEach(course => {
                        const courseName = course['科目名'];
                        const subject = course['教科']; // 科目マスタの「教科」列
                        const units = parseInt(course['単位数']) || 0;

                        if (!subject) return; // 教科が設定されていない科目はスキップ

                        // 履修済み（●）をチェック
                        const isCompleted = hasCompletedCourse(courseName);

                        // 履修中（○）または選択中をチェック
                        const registrationMark = AppState.registrationData?.[courseName];
                        const isInProgress = registrationMark && typeof registrationMark === 'string' && registrationMark.includes('○');

                        // 自動登録科目をチェック
                        const isAutoRegistered = hasAutoRegisteredCourse(courseName);

                        // △科目（現在履修中）をチェック
                        const isCurrentlyEnrolled = hasCurrentlyEnrolledCourse(courseName);

                        if (isCompleted || isInProgress || isAutoRegistered || isCurrentlyEnrolled) {
                            if (!unitsBySubject[subject]) {
                                unitsBySubject[subject] = 0;
                            }
                            unitsBySubject[subject] += units;
                        }
                    });

                    return unitsBySubject;
                },

                /**
                 * 卒業要件をチェック
                 * @returns {Object} { isTarget, isSatisfied, deficiencies: [{subject, required, current, shortage}] }
                 */
                checkRequirements() {
                    const result = {
                        isTarget: this.isTargetStudent(),
                        isSatisfied: true,
                        deficiencies: [],
                        totalRequired: 0,
                        totalCurrent: 0
                    };

                    // 対象学年でない場合はチェックスキップ
                    if (!result.isTarget) {
                        return result;
                    }

                    const requirements = this.getRequirements();
                    const unitsBySubject = this.calculateUnitsBySubject();

                    // 要件が設定されていない場合はスキップ
                    if (Object.keys(requirements).length === 0) {
                        return result;
                    }

                    // 各教科の要件をチェック
                    Object.keys(requirements).forEach(subject => {
                        if (subject === '合計') {
                            result.totalRequired = requirements[subject];
                            return;
                        }

                        const required = requirements[subject];
                        const current = unitsBySubject[subject] || 0;

                        if (current < required) {
                            result.isSatisfied = false;
                            result.deficiencies.push({
                                subject: subject,
                                required: required,
                                current: current,
                                shortage: required - current
                            });
                        }
                    });

                    // 合計単位数のチェック
                    result.totalCurrent = Object.values(unitsBySubject).reduce((sum, units) => sum + units, 0);
                    if (result.totalRequired > 0 && result.totalCurrent < result.totalRequired) {
                        result.isSatisfied = false;
                        if (!result.deficiencies.find(d => d.subject === '合計')) {
                            result.deficiencies.push({
                                subject: '合計',
                                required: result.totalRequired,
                                current: result.totalCurrent,
                                shortage: result.totalRequired - result.totalCurrent
                            });
                        }
                    }

                    return result;
                },

                /**
                 * 卒業要件チェック結果をUIに表示
                 */
                updateUI() {
                    const statusDivModal = document.getElementById('graduation-requirement-status');
                    const statusDivMain = document.getElementById('graduation-requirement-status-main');

                    const result = this.checkRequirements();

                    // 両方の要素を更新する関数
                    const updateElement = (element, isMain) => {
                        if (!element) return;

                        if (!result.isTarget) {
                            // 対象学年でない場合
                            element.innerHTML = `
                                <div style="color: #6c757d; font-size: 0.9em;">
                                    ✓ 卒業要件の確認は新3年生以上が対象です
                                </div>
                            `;
                            element.style.backgroundColor = '#f8f9fa';
                            element.style.border = '1px solid #dee2e6';
                        } else if (result.isSatisfied) {
                            // 要件を満たしている場合
                            element.innerHTML = `
                                <div style="color: #28a745; font-weight: bold;">
                                    ✓ 卒業要件を満たしています
                                </div>
                            `;
                            element.style.backgroundColor = '#d4edda';
                            element.style.border = '1px solid #c3e6cb';
                        } else {
                            // 要件を満たしていない場合
                            let deficiencyHtml = result.deficiencies.map(d =>
                                `<div>・${d.subject}: あと${d.shortage}単位不足（現在${d.current}/${d.required}単位）</div>`
                            ).join('');

                            element.innerHTML = `
                                <div style="color: #dc3545; font-weight: bold; margin-bottom: 8px;">
                                    ⚠ 卒業要件を満たしていません
                                </div>
                                <div style="color: #721c24; font-size: 0.9em;">
                                    ${deficiencyHtml}
                                </div>
                            `;
                            element.style.backgroundColor = '#f8d7da';
                            element.style.border = '1px solid #f5c6cb';
                        }
                    };

                    // モーダル用とサマリー用の両方を更新
                    updateElement(statusDivModal, false);
                    updateElement(statusDivMain, true);

                    return result.isTarget ? result.isSatisfied : true;
                }
            };

            // 履修登録管理
            const RegistrationManager = {
                bannerTimer: null, // バナータイマー管理用
                
                // AppState.registrationDataの選択科目をルールと照合し、選択不可科目を返す（状態変更なし）
                checkInvalidSelections() {
                    const dataKeys = AppState.registrationData ? Object.keys(AppState.registrationData) : [];
                    if (!AppState.registrationData || dataKeys.length === 0) {
                        return [];
                    }

                    const invalidCourses = [];
                    const nextGrade = Utils.getNextGrade();

                    for (const courseName of dataKeys) {
                        const regValue = AppState.registrationData[courseName];
                        if (!regValue || !String(regValue).includes('○')) continue;

                        // 来年度学年に対応する年付きマークのみチェック（例: 新2年なら○2のみ、○2Nも含む）
                        const markStr = String(regValue);
                        if (/^○[123]N?$/.test(markStr)) {
                            const markYear = parseInt(markStr[1]);
                            if (markYear !== nextGrade) continue;  // 来年度学年と異なる年マークはスキップ
                        }
                        if (hasCompletedCourse(courseName)) continue;
                        if (hasAutoRegisteredCourse(courseName)) continue;
                        if (AppState.lockedCourses && AppState.lockedCourses.includes(courseName)) continue;

                        const course = getCourseByName(courseName);
                        if (!course) {
                            invalidCourses.push({ courseName, reason: 'この科目は現在の科目データに存在しません。' });
                            continue;
                        }

                        // 対象/非表示学籍番号チェック（科目データ変更で対象外になった場合）
                        if (!Utils.isCourseVisibleToUser(course)) {
                            invalidCourses.push({ courseName, reason: 'この科目は現在の生徒には選択できません。' });
                            continue;
                        }

                        const result = SelectabilityChecker.checkSelectability(course, { skipSimultaneous: true });
                        if (!result.isSelectable) {
                            invalidCourses.push({ courseName, reason: result.reason });
                        }
                    }
                    return invalidCourses;
                },

                // 起動時の保存済み選択科目バリデーション（ルール変更対応）
                validateSavedSelections() {
                    if (RegistrationStatus.isEditingLocked()) { return []; }

                    const invalidCourses = this.checkInvalidSelections();
                    if (invalidCourses.length === 0) return [];

                    // AppStateから削除
                    for (const { courseName } of invalidCourses) {
                        delete AppState.registrationData[courseName];
                        const idx = AppState.registeredCourses?.indexOf(courseName);
                        if (idx > -1) AppState.registeredCourses.splice(idx, 1);
                        if (AppState.inProgressCoursesYearMap?.[courseName]) {
                            delete AppState.inProgressCoursesYearMap[courseName];
                        }
                        const ipIdx = AppState.inProgressCourses?.indexOf(courseName);
                        if (ipIdx > -1) AppState.inProgressCourses.splice(ipIdx, 1);
                    }

                    updateCourseSets();
                    return invalidCourses;
                },

                async initialize() {
                    try {
                        await this.loadExistingData();

                        // 保存済み選択科目のルール変更チェック
                        const removedCourses = this.validateSavedSelections();

                        // スナップショットをバリデーション後に保存（dirty判定用）
                        if (removedCourses.length > 0) {
                            // バリデーション前のデータをスナップショットに→現在と差分ありでdirty=true
                            const beforeData = JSON.parse(JSON.stringify(AppState.registrationData));
                            removedCourses.forEach(({ courseName }) => {
                                beforeData[courseName] = '○'; // 削除前の状態を復元（dirty判定用）
                            });
                            AppState.initialRegistrationData = beforeData;
                            AppState.isDirty = true;
                        } else {
                            AppState.initialRegistrationData = JSON.parse(JSON.stringify(AppState.registrationData));
                        }
                        this.renderRegistrationForm();
                        this.updateUnitsDisplay();
                        this.updateSimultaneousRestrictionUI();
                        
                        // 登録状態バナーを更新
                        RegistrationStatus.updateStatusBanner();

                        // 自動解除の通知（レンダリング完了後に表示）
                        if (removedCourses.length > 0) {
                            this.showValidationBanner(removedCourses);
                        }
                    } catch (error) {
                        console.error('履修登録初期化エラー:', error);
                    }
                },

                hasRegistrationChanged() {
                    const current = AppState.registrationData;
                    const initial = AppState.initialRegistrationData;
                    if (!initial) return true;
                    const currentKeys = Object.keys(current);
                    const initialKeys = Object.keys(initial);
                    if (currentKeys.length !== initialKeys.length) return true;
                    for (const key of currentKeys) {
                        if (current[key] !== initial[key]) return true;
                    }
                    return false;
                },

                async loadExistingData() {
                    try {

                        // 既存のstudentSubmissionDataを活用（API呼び出し不要）
                        if (AppState.studentSubmissionData && AppState.studentSubmissionData.header && AppState.studentSubmissionData.row) {

                            // 科目列からregistrationDataオブジェクトを構築
                            const registrationData = this.parseRowData(AppState.studentSubmissionData.header, AppState.studentSubmissionData.row);

                            // 既にAppState.registrationDataに設定済みの可能性があるが、念のため確認・更新
                            if (!AppState.registrationData || Object.keys(AppState.registrationData).length === 0) {
                                AppState.registrationData = registrationData;
                                // processRegistrationStatusが呼ばれていない場合のみYearMapを再構築
                                // （通常の起動パスではprocessRegistrationStatusで既にYearMapが正しく構築済み）
                                try {
                                    this.parseYearSpecificMarks(AppState.registrationData);
                                } catch (parseError) {
                                    console.error('[フロントエンド] 学年指定マーク解析エラー:', parseError);
                                }
                            }
                        } else {
                            AppState.registrationData = {};
                        }
                        
                        // 登録状態バナーを更新
                        RegistrationStatus.updateStatusBanner();
                    } catch (error) {
                        console.error('[フロントエンド] 履修データ読み込みエラー:', error);
                    }
                },
                
                parseRowData(headers, row) {

                    const registrationData = {};
                    const excludeColumns = [
                        'タイムスタンプ', 'ステータス', '教職員チェック', '教務チェック',
                        '学籍番号', '学年', '組', '番号', '名前', '来年度学年'];
                    
                    headers.forEach((columnName, index) => {
                        const value = row[index];
                        
                        // 管理列以外で値が存在する場合
                        if (!excludeColumns.includes(columnName) &&
                            value &&
                            columnName &&
                            columnName.trim() !== '') {
                            registrationData[columnName] = value;
                        }
                    });
                    
                    return registrationData;
                },
                
                parseYearSpecificMarks(savedData) {

                    // YearMapの初期化（常にクリアして前の生徒データが残らないようにする）
                    AppState.completedCoursesYearMap = {};
                    AppState.inProgressCoursesYearMap = {};
                    
                    Object.keys(savedData).forEach(courseName => {
                        const mark = savedData[courseName];
                        if (!mark || typeof mark !== 'string') return;
                        
                        // ●1, ●2, ●3 の履修済み学年指定マーク
                        if (/^●[123]$/.test(mark)) {
                            const year = parseInt(mark[1]);
                            AppState.completedCoursesYearMap[courseName] = year;
                        }
                        
                        // ○1, ○2, ○3, ○2N等 の履修中学年指定マーク
                        else if (/^○[123]N?$/.test(mark)) {
                            const year = parseInt(mark[1]);
                            AppState.inProgressCoursesYearMap[courseName] = year;
                        } else {
                        }
                    });
                    
                },

                // 教職員専用画面・一括出力共通: 生徒オブジェクトからregistrationDataを構築しAppStateに反映
                applyStudentRegistration(student) {
                    const headers = Object.keys(student);
                    const row = Object.values(student);
                    const registrationData = this.parseRowData(headers, row);

                    // 開講なし科目の登録データを除外（履修済み以外）
                    Object.keys(registrationData).forEach(courseName => {

                        const mark = registrationData[courseName];

                            delete registrationData[courseName];

                    // processRegistrationStatus用のsubmissionData構築
                    const studentSubmissionData = {
                        header: Object.keys(registrationData),
                        row: Object.values(registrationData)
                    };
                    const userInfo = {
                        学年: student.grade || student['学年'],

                    };

                    );

                    AppState.completedCourses = result.completedCourses;
                    AppState.inProgressCourses = result.inProgressCourses;
                    AppState.currentlyEnrolledCourses = result.currentlyEnrolledCourses || [];
                    AppState.currentlyEnrolledCoursesYearMap = result.currentlyEnrolledCoursesYearMap || {};
                    AppState.retakenCourses = result.retakenCourses;
                    AppState.retakenYearMap = result.retakenYearMap;
                    AppState.lockedCourses = result.lockedCourses;
                    AppState.completedCoursesYearMap = result.completedCoursesYearMap;
                    AppState.inProgressCoursesYearMap = result.inProgressCoursesYearMap;
                    AppState.autoRegisteredCourses = result.autoRegisteredCourses || [];
                    AppState.pureAutoRegisteredCourses = result.pureAutoRegisteredCourses || [];
                    AppState.registrationData = result.registrationData;

                    // 留年生フラグを更新（教職員専用画面での生徒切替対応）
                    const studentGrade = safeParseGrade(userInfo.学年, 1);

                applyCourseFilter(containerEl, isActive) {

                        isActive = AppState.courseFilterActive;

                    containerEl.querySelectorAll('.course-row').forEach(row => {

                renderRegistrationForm() {

                generateSectionData() {
                    // セクション優先順序を定義（安定化のため）
                    const sectionOrderPriority = ['1年次科目', '2年次科目', '3年次科目', 'プロフェッショナル科目', 'その他'];
                    const prioritySet = new Set(sectionOrderPriority);

                    // 【高速化】シングルパスでセクションデータを構築（O(n)）
                    const sectionData = {};
                    const foundSectionsSet = new Set();

                    (AppState.allCourses || []).forEach(course => {
                        // 表示学籍番号フィルタ：指定された生徒のみに表示
                        if (!Utils.isCourseVisibleToUser(course)) {
                            return; // この生徒には表示しない
                        }
                        let section = course['セクション'];
                        if (!section || section.trim() === '') {
                            section = 'その他';
                        }
                        if (!sectionData[section]) {
                            sectionData[section] = [];
                            foundSectionsSet.add(section);
                        }
                        sectionData[section].push(course);
                    });

                    // 優先順序に従ってセクションを並び替え
                    const sections = [];
                    sectionOrderPriority.forEach(orderSection => {
                        if (foundSectionsSet.has(orderSection)) {
                            sections.push(orderSection);
                        }
                    });
                    // 優先順序にないセクションも追加
                    foundSectionsSet.forEach(section => {
                        if (!prioritySet.has(section)) {
                            sections.push(section);
                        }
                    });

                    // セクションデータと順序配列の両方を返却
                    return { sectionData, sectionOrder: sections };
                },

                renderSectionGroup(sectionName, courses) {
                    
                    let html = `<div class="course-group">`;
                    html += `<h2>${sectionName}</h2>`;
                    
                    if (courses.length === 0) {
                        html += '<p>このセクションに科目がありません。</p>';
                        html += `</div>`;
                        return html;
                    }
                    
                    // 科目テーブルを構築
                    html += this.renderUnifiedCourseTable(courses);
                    html += `</div>`;
                    
                    return html;
                },

                renderGradeSection(grade, gradeData) {
                    let html = `<div class="course-group">`;
                    html += `<h2>${grade}年次科目</h2>`;
                    
                    // 必修科目と選択科目を統合して一つの表にする
                    const allCourses = [];
                    
                    // 必修科目を追加
                    if (gradeData.required && gradeData.required.length > 0) {
                        gradeData.required.forEach(course => {
                            allCourses.push({ ...course, category: 'required' });
                        });
                    }
                    
                    // 選択科目を追加
                    if (gradeData.elective && gradeData.elective.length > 0) {
                        gradeData.elective.forEach(course => {
                            allCourses.push({ ...course, category: 'elective' });
                        });
                    }
                    
                    // 統合された科目表を表示
                    if (allCourses.length > 0) {
                        html += this.renderUnifiedCourseTable(allCourses);
                    }
                    
                    html += `</div>`;
                    return html;
                },

                renderUnifiedCourseTable(courses, readOnly = false) {
                    // 選択必修チェック（ループ前に1回だけ実行）
                    const electiveReqCheck = Utils.checkElectiveRequired();
                    const showElectiveReqWarning = electiveReqCheck.isTarget && !electiveReqCheck.isSatisfied;

                    let html = '<table class="course-table">';
                    html += '<thead><tr><th>科目名</th><th>区分</th><th>単位数</th><th>登録</th></tr></thead>';
                    html += '<tbody>';

                    courses.forEach(course => {
                        const courseName = course['科目名'];
                        const isRequired = course['区分'] === '必修';

                        // 生徒画面と完全に同じ判定ロジックを使用（高速ルックアップ関数使用）
                        const isCompleted = hasCompletedCourse(courseName);
                        const isRegistered = AppState.registrationData && AppState.registrationData[courseName];
                        const isAutoRegistered = hasAutoRegisteredCourse(courseName);

                        // 統一されたカテゴリ判定を使用
                        const unifiedCategory = RegistrationManager.getCourseCategory(course);

                        // デバッグログ追加
                        if (unifiedCategory === 'retakenRequired') {
                        }

                        // CSS用にハイフン形式に変換
                        let category = '';
                        switch(unifiedCategory) {
                            case 'retakenRequired':
                                category = 'retaken-required';
                                break;
                            case 'required':
                                category = 'required';
                                break;
                            case 'requiredDesignated':
                                category = 'required-designated';
                                break;
                            case 'elective':
                            default:
                                category = 'elective';
                                break;
                        }

                        // 表示判定
                        let markClass = 'mark-cell';
                        let markText = '';

                        const isCurrentlyEnrolled = hasCurrentlyEnrolledCourse(courseName);

                        if (isCompleted) {
                            markClass += ' completed';
                            markText = '履修済';
                        } else if (isCurrentlyEnrolled) {
                            markClass += ' completed'; // 同じスタイル（変更不可）
                            markText = '履修中';
                        } else if ((isRegistered || isAutoRegistered) && !course['開講なし']) {
                            switch(category) {
                                case 'retaken-required':
                                    markClass += ' retaken-registered';
                                    break;
                                case 'required':
                                    markClass += ' required-registered';
                                    break;
                                case 'required-designated':
                                    markClass += ' required-designated-registered';
                                    break;
                                case 'elective':
                                default:
                                    markClass += ' elective-registered';
                                    break;
                            }
                            markText = '○';
                        } else {
                            // 選択可能性判定はupdateSimultaneousRestrictionUIで統一的に行う
                            markClass += ' selectable';
                            markText = '';
                        }

                        // readOnlyモードでは選択機能を無効化
                        const cellClass = readOnly ? markClass.replace(' selectable', ' read-only') : markClass;
                        // data-course-name属性は常に追加（同時不可制約UIで必要）
                        const clickable = `data-course-name="${course['科目名']}"`;

                        html += `<tr class="course-row ${isRequired ? 'is-required' : ''}">`;
                        // 詳細テキスト: 履修済み以外は常時表示
                        const detail = course['詳細'];
                        const showDetail = detail && !isCompleted && !isCurrentlyEnrolled;
                        const detailHtml = showDetail ? `<div class="course-detail">${Utils.escapeHtml(detail)}</div>` : '';
                        // 選択必修警告マーク: 未充足かつこの科目が未選択の場合
                        let warningHtml = '';
                        if (showElectiveReqWarning && course['区分']?.startsWith('選択必修') && !isCompleted && !isCurrentlyEnrolled) {
                            const isSelected = (isRegistered || isAutoRegistered);
                            if (!isSelected) {
                                warningHtml = ' <span class="elective-req-warning" style="color: #e67e22; cursor: pointer;" onclick="event.stopPropagation(); Utils.showToast(\'選択必修を選択する必要があります\');">⚠</span>';
                            }
                        }
                        html += `<td><div class="course-name-wrapper">${course['科目名']}${warningHtml}${detailHtml}</div></td>`;
                        html += `<td>${Utils.getDisplayCategory(course['区分'])}</td>`;
                        html += `<td>${Utils.getUnits(course)}</td>`;
                        html += `<td class="${cellClass}" ${clickable}>${markText}</td>`;
                        html += `</tr>`;
                    });

                    html += '</tbody></table>';
                    return html;
                },

                attachEventListeners() {
                    // イベントデリゲーション: 親コンテナに1つのリスナーを設置
                    const containers = [
                        document.getElementById('registration-form-container'),
                        document.getElementById('teacher-student-detail-area')
                    ].filter(Boolean);

                    containers.forEach(container => {
                        // 重複防止: 既にリスナー付きならスキップ
                        if (container._markCellDelegated) return;
                        container._markCellDelegated = true;

                        container.addEventListener('click', (e) => {
                            const cell = e.target.closest('.mark-cell');
                            if (!cell) return;

                            // 最優先: 教務承認画面でロックされている場合は編集不可
                            if (window.TeacherScreen &&
                                window.TeacherScreen.currentMode === 'admin' &&
                                window.TeacherScreen.currentViewingStudent &&
                                window.TeacherScreen.isEditLocked) {
                                this.showRestrictionBanner('編集がロックされています。');
                                return;
                            }

                            // 教職員専用画面でもロックされている場合は編集不可
                            if (window.TeacherScreen &&
                                window.TeacherScreen.currentMode === 'teacher' &&
                                window.TeacherScreen.currentViewingStudent &&
                                window.TeacherScreen.isEditLocked) {
                                this.showRestrictionBanner('編集がロックされています。');
                                return;
                            }

                            // 編集ロック中（仮登録/本登録許可/本登録）は全操作を拒否
                            if (RegistrationStatus.isEditingLocked()) {
                                const status = AppState.registrationStatus?.status;
                                const message = status === '仮登録' ?
                                    '仮登録中なので科目の変更はできません。' :
                                    '本登録中なので科目の変更はできません。';
                                this.showRestrictionBanner(message);
                                return;
                            }

                            const courseName = cell.getAttribute('data-course-name');

                            if (cell.classList.contains('selectable') ||
                                cell.classList.contains('elective-registered') ||
                                cell.classList.contains('required-registered') ||
                                cell.classList.contains('retaken-registered') ||
                                cell.classList.contains('required-designated-registered')) {
                                // 選択可能または選択済みの場合は選択/解除処理
                                this.toggleCourseSelection(cell);
                            } else {
                                // 選択不可の場合は制限理由を表示（30単位制限と統一処理）
                                const reason = this.getRestrictionReason(courseName, cell);
                                this.showRestrictionBanner(reason);
                            }
                        });
                    });
                },

                toggleCourseSelection(cell) {
                    // courseNameの早期取得
                    const courseName = cell.getAttribute('data-course-name');
                    if (!courseName) {
                        this.showRestrictionBanner('編集がロックされています。');
                        return;
                    }

                    // 最優先: 教務承認画面でロックされている場合は編集不可
                    if (window.TeacherScreen &&
                        window.TeacherScreen.currentMode === 'admin' &&
                        window.TeacherScreen.currentViewingStudent &&
                        window.TeacherScreen.isEditLocked) {
                        this.showRestrictionBanner('編集がロックされています。');
                        return;
                    }

                    // 通常の編集ロックチェック（仮登録・本登録中）
                    // 教務承認画面で生徒を閲覧中の場合は、トグルスイッチで編集可否を制御するためスキップ
                    const isAdminViewingStudent = window.TeacherScreen &&
                        window.TeacherScreen.currentMode === 'admin' &&
                        window.TeacherScreen.currentViewingStudent;

                    if (!isAdminViewingStudent && RegistrationStatus.isEditingLocked()) {
                        const status = AppState.registrationStatus?.status;
                        const message = status === '仮登録' ?
                            '仮登録中なので科目の変更はできません。' :
                            '本登録中なので科目の変更はできません。';
                        this.showRestrictionBanner(message);
                        return;
                    }

                    // 履修済み科目チェック（ロックの次、他のチェックより前）
                    if (hasCompletedCourse(courseName)) {
                        this.showRestrictionBanner('履修済みです。');
                        return;
                    }

                    // 履修中科目チェック（△マーク、変更不可）
                    if (hasCurrentlyEnrolledCourse(courseName)) {
                        this.showRestrictionBanner('履修中の科目です。');
                        return;
                    }

                    // 過去学年の○Nマーク科目は解除不可（今年度以前の履修科目）
                    const inProgressYear = AppState.inProgressCoursesYearMap?.[courseName];
                    if (inProgressYear !== undefined) {
                        const nextGrade = Utils.getNextGrade();
                        if (inProgressYear !== nextGrade) {
                            this.showRestrictionBanner('今年度履修している科目は解除できません。');
                            return;
                        }
                    }

                    // 学年別科目変更制限チェック
                    const course = getCourseByName(courseName);

                    if (!course) {
                        this.showRestrictionBanner('科目情報が見つかりません。');
                        return;
                    }

                    if (course) {
                        const userGrade = AppState.currentUser?.grade ?? AppState.authenticatedUser?.grade;
                        const currentGrade = parseInt(userGrade);
                        const courseGrade = parseInt(course['学年']);

                        // 数値でない学年（旧など）はチェックスキップ
                        if (!isNaN(courseGrade)) {
                            // 必修科目のチェック
                            if (course['区分'] === '必修') {
                                if ((currentGrade <= 1 && courseGrade <= 2) ||
                                    (currentGrade >= 2)) {
                                    this.showRestrictionBanner(`${courseGrade}年の必修科目は変更できません。`);
                                    return;
                                }
                            }

                            // 履修指定科目のチェック（留年対応: 留年生は同学年の履修指定を選択可能）
                            if (course['区分'].includes('履修指定')) {
                                const nextGrade = Utils.getNextGrade();
                                const isRepeatingYear = currentGrade === nextGrade;
                                if (courseGrade === nextGrade && !isRepeatingYear) {
                                    this.showRestrictionBanner(`${courseGrade}年の履修指定科目は変更できません。`);
                                    return;
                                }
                            }
                        }
                    }
                    
                    if (AppState.registrationData[courseName]) {
                        // 選択解除
                        delete AppState.registrationData[courseName];

                        // AppState.registeredCoursesからも削除
                        const index = AppState.registeredCourses.indexOf(courseName);
                        if (index > -1) {
                            AppState.registeredCourses.splice(index, 1);
                        }

                        // 【重要】inProgressCoursesYearMapからも削除
                        if (AppState.inProgressCoursesYearMap && AppState.inProgressCoursesYearMap[courseName]) {
                            delete AppState.inProgressCoursesYearMap[courseName];
                        }

                        // nSuffixCoursesからも削除
                        if (AppState.nSuffixCourses) {
                            AppState.nSuffixCourses.delete(courseName);
                        }

                        cell.textContent = '';
                        cell.classList.remove('manual-registered');
                    } else {
                        // 科目選択前のバリデーション
                        const course = getCourseByName(courseName);
                        if (course) {
                            const selectability = SelectabilityChecker.checkSelectability(course);
                            if (!selectability.isSelectable) {
                                // 開講なしの場合はトースト、それ以外はバナー
                                if (course['開講なし']) {
                                    Utils.showToast('開講がありません', 'warning');
                                } else {
                                    this.showRestrictionBanner(selectability.reason);
                                }
                                return;
                            }

                            // 30単位制限チェック
                            const unitsCheck = this.checkUnitsLimit(course);
                            if (!unitsCheck.canAdd) {
                                this.showRestrictionBanner(unitsCheck.reason);
                                return;
                            }
                        
                        }
                        
                        // 選択
                        
                        // 学年指定記法を生成（内部保存用）
                        const mark = SelectabilityChecker.generateYearSpecifiedMark(course);

                        // 型安全性チェック
                        if (typeof mark !== 'string') {
                            console.error(`[手動選択エラー] 不正なマーク値: ${mark} (型: ${typeof mark}) - 科目: ${courseName}`);
                            console.error(`[手動選択エラー] フォールバック処理: ○1 を使用`);
                            AppState.registrationData[courseName] = '○1';
                        } else {
                            AppState.registrationData[courseName] = mark;
                        }

                        // AppState.registeredCoursesにも追加
                        if (!AppState.registeredCourses.includes(courseName)) {
                            AppState.registeredCourses.push(courseName);
                        }

                        // 【重要】学年指定マークからinProgressCoursesYearMapを更新
                        if (/^○[123]N?$/.test(mark)) {
                            // ○1, ○2, ○3, ○2N等の場合は学年を抽出してマップに設定
                            const year = parseInt(mark[1]);
                            if (!AppState.inProgressCoursesYearMap) {
                                AppState.inProgressCoursesYearMap = {};
                            }
                            AppState.inProgressCoursesYearMap[courseName] = year;
                        } else {
                            // 通常の○マークの場合は学年指定なしとして処理
                            if (AppState.inProgressCoursesYearMap && AppState.inProgressCoursesYearMap[courseName]) {
                                delete AppState.inProgressCoursesYearMap[courseName];
                            }
                        }

                        // 留年生のNサフィックス科目をnSuffixCoursesに反映
                        if (/^○[123]N$/.test(mark)) {
                            if (!AppState.nSuffixCourses) AppState.nSuffixCourses = new Set();
                            AppState.nSuffixCourses.add(courseName);
                        }

                        // 表示は常に○で統一（視覚的な一貫性）
                        cell.textContent = '○';
                        cell.classList.add('manual-registered');
                    }

                    // 同時不可制約のUI更新
                    // クリックされたセルの親コンテナを特定して渡す
                    const container = cell.closest('#teacher-student-detail-area') ||
                                      cell.closest('#registration-form-container') ||
                                      document;
                    // 変更フラグを設定し、一時保存ボタンの有効/無効を切り替え
                    AppState.isDirty = this.hasRegistrationChanged();
                    const saveDraftBtn = document.getElementById('save-draft-button');
                    if (saveDraftBtn && !RegistrationStatus.isEditingLocked() && AppState.settings['一時保存'] !== '不可') {
                        if (AppState.isDirty) {
                            saveDraftBtn.classList.remove('is-disabled');
                        } else {
                            saveDraftBtn.classList.add('is-disabled');
                        }
                    }

                    this.updateSimultaneousRestrictionUI(container);
                    this.applyCourseFilter();
                    this.updateUnitsDisplay();
                },

                updateSimultaneousRestrictionUI(container = document) {
                    // 全ての未登録科目の選択可能性を統一的に判定（高速ルックアップ使用）
                    container.querySelectorAll('.mark-cell').forEach(cell => {
                        const courseName = cell.getAttribute('data-course-name');
                        const course = getCourseByName(courseName);

                        if (course) {
                            const isRegistered = AppState.registrationData[courseName];
                            const isCompleted = hasCompletedCourse(courseName);
                            const isAutoRegistered = hasAutoRegisteredCourse(courseName);

                            // 登録済み・履修済み・自動登録済みの科目はスキップ（登録関連クラスを保持）
                            if (isRegistered || isCompleted || isAutoRegistered) {
                                return;
                            }

                            // 未登録科目のみ選択可能性を再判定
                            cell.classList.remove('unselectable');
                            cell.classList.remove('selectable');
                            cell.title = '';

                            const selectability = SelectabilityChecker.checkSelectability(course);
                            if (!selectability.isSelectable) {
                                cell.classList.add('unselectable');
                                cell.title = selectability.reason;
                            } else {
                                cell.classList.add('selectable');
                            }
                        }
                    });
                },

                checkUnitsLimit(course) {
                    if (!AppState.allCourses) return false;
                    const courseUnits = Utils.getUnits(course);

                    // AppStateから直接計算（DOM依存を排除）
                    const userForCalculation = (AppState.currentMode === 'student' && AppState.selectedStudent) ? AppState.selectedStudent : AppState.currentUser;
                    const statsResult = Utils.calculateUnitsStats(
                        AppState.registrationData,
                        AppState.allCourses,
                        userForCalculation,
                        AppState.autoRegisteredCourses,
                        AppState.completedCoursesYearMap,
                        AppState.inProgressCoursesYearMap,
                        this.getCourseCategory.bind(this),
                        AppState.completedCourses,
                        AppState.currentlyEnrolledCourses,
                        AppState.currentlyEnrolledCoursesYearMap
                    );
                    const nextGrade = Utils.getNextGrade();
                    // 来年度の登録単位数（新規登録科目のみ）で判定
                    const currentRegistrationUnits = statsResult.gradeStats[`year${nextGrade}`] ? statsResult.gradeStats[`year${nextGrade}`].registrationUnits : 0;

                    const newTotal = currentRegistrationUnits + courseUnits;

                    if (newTotal > 30) {
                        return {
                            canAdd: false,
                            reason: `年間30単位の制限を超えます`
                        };
                    }

                    return { canAdd: true, reason: "" };
                },
                
                showRestrictionBanner(message) {
                    const banner = document.getElementById('restriction-banner');
                    const messageDiv = document.getElementById('restriction-message');
                    
                    if (banner && messageDiv) {
                        // 既存のタイマーをクリア
                        if (this.bannerTimer) {
                            clearTimeout(this.bannerTimer);
                        }
                        
                        messageDiv.innerHTML = message.replace(/\n/g, '<br>');
                        banner.classList.add('show');
                        
                        // 新しい5秒タイマーを設定
                        this.bannerTimer = setTimeout(() => {
                            banner.classList.remove('show');
                            this.bannerTimer = null; // タイマー変数をクリア
                        }, 5000);
                    } else {
                        // フォールバック: アラート表示
                        alert(message);
                    }
                },

                showValidationBanner(removedCourses) {
                    const banner = document.getElementById('restriction-banner');
                    const messageDiv = document.getElementById('restriction-message');
                    if (!banner || !messageDiv) return;

                    // 既存のタイマーをクリア
                    if (this.bannerTimer) {
                        clearTimeout(this.bannerTimer);
                        this.bannerTimer = null;
                    }

                    // リスト形式で科目名を表示
                    let html = '選択を解除した科目があります。<br>';
                    html += removedCourses.map(({ courseName }) =>
                        `・${courseName}`
                    ).join('<br>');

                    messageDiv.innerHTML = html;
                    banner.classList.add('show');
                    this.bannerTimer = setTimeout(() => {
                        banner.classList.remove('show');
                    }, 8000);
                },

                getRestrictionReason(courseName, cellElement) {
                    // 最優先: courseNameが存在しない場合（教務承認画面でロック中）
                    if (!courseName) {
                        return '編集がロックされています。';
                    }

                    const course = getCourseByName(courseName);

                    // デバッグ情報出力

                    // 0. 履修中科目チェック（△マークまたは○N→履修中変換）
                    if (hasCurrentlyEnrolledCourse(courseName)) {
                        return '履修中なので選択を解除できません。';
                    }

                    // 1. 再履修科目の解除チェック
                    if (AppState.retakenYearMap && AppState.retakenYearMap[courseName]) {
                        return '再履修必修科目なので選択を解除できません。';
                    }
                    
                    // 2. 必修科目の解除チェック
                    if (course && course['区分'] === '必修' && AppState.registrationData[courseName]) {
                        return '必修科目なので選択を解除できません。';
                    }
                    
                    // 3. 履修指定科目の解除チェック
                    if (course && course['区分'].includes('履修指定') && AppState.registrationData[courseName]) {
                        return '履修指定科目なので選択を解除できません。';
                    }
                    
                    // 4. 履修済みチェック
                    if (hasCompletedCourse(courseName)) {
                        return 'この科目は既に履修済みです。';
                    }
                    
                    // 5. 同時不可制約チェック
                    if (cellElement.classList.contains('simultaneous-disabled')) {
                        return cellElement.title || '同時選択制約により選択できません。';
                    }
                    
                    // 6. 学年制限等のselectabilityチェック
                    if (course) {
                        const selectability = SelectabilityChecker.checkSelectability(course);
                        if (!selectability.isSelectable) {
                            return selectability.reason;
                        }
                        
                        // 7. 30単位制限チェック（既存処理と統一）
                        const unitsCheck = this.checkUnitsLimit(course);
                        if (!unitsCheck.canAdd) {
                            return unitsCheck.reason;
                        }
                    }
                    
                    // 具体的な理由が見つからない場合のフォールバック
                    return 'この科目は選択できません。';
                },

                updateUnitsDisplay() {
                    // allCoursesがnullの場合は計算不可（キャッシュクリア直後等）
                    if (!AppState.allCourses) return;

                    const summaryArea = document.querySelector('.summary-area');
                    if (summaryArea) {
                    }

                    // 統一関数を呼び出し（認証ユーザー情報を使用）
                    // 計算前のデータ整合性確認

                    // 必修科目数デバッグ
                    const userForCalculation = (AppState.currentMode === 'student' && AppState.selectedStudent) ? AppState.selectedStudent : AppState.currentUser;

                    const result = Utils.calculateUnitsStats(
                        AppState.registrationData,
                        AppState.allCourses,
                        userForCalculation,
                        AppState.autoRegisteredCourses,
                        AppState.completedCoursesYearMap,
                        AppState.inProgressCoursesYearMap,
                        this.getCourseCategory.bind(this),
                        AppState.completedCourses,
                        AppState.currentlyEnrolledCourses,
                        AppState.currentlyEnrolledCoursesYearMap
                    );


                    // 必修科目数デバッグ（計算後）

                    const gradeStats = result.gradeStats;

                    const totalUnits = result.totalUnits;

                    // 履修登録学年の単位数を計算
                    const nextGrade = Utils.getNextGrade();
                    const registrationYearUnits = gradeStats[`year${nextGrade}`] ? gradeStats[`year${nextGrade}`].registrationUnits : 0;

                    // 3年間の合計単位数を計算
                    const allYearsTotal = gradeStats.year1.total + gradeStats.year2.total + gradeStats.year3.total;

                    // 教務承認画面判定（DOM要素のスコープ決定に使用）
                    const isTeacherMode = AppState.currentMode === 'teacher' || AppState.currentMode === 'admin';

                    // 表示更新（教務承認画面ではdetailAreaコンテナ内の要素を更新）
                    // ※ total-units-value, grand-total-units-value は生徒画面と教務画面で
                    //   同一IDが存在するため、教務画面ではコンテナでスコープを限定する
                    const container = isTeacherMode
                        ? (document.getElementById('teacher-student-detail-area') || document)
                        : document;
                    const totalUnitsValue = container.querySelector('#total-units-value');
                    const grandTotalUnitsValue = container.querySelector('#grand-total-units-value');
                    if (totalUnitsValue) totalUnitsValue.textContent = registrationYearUnits; // 履修登録学年の単位数
                    if (grandTotalUnitsValue) grandTotalUnitsValue.textContent = allYearsTotal; // 3年間合計単位数

                    // 学年別進捗バー更新（統一関数使用）
                    const progressBarPrefix = isTeacherMode ? 'teacher' : '';
                    Utils.updateProgressBars(gradeStats, progressBarPrefix);

                    // 単位制限チェック

                    const totalUnitsDisplay = document.querySelector('.total-units-display');
                    if (!totalUnitsDisplay) {
                        console.error('[エラー] total-units-display要素が見つかりません');
                        return;
                    }


                    // 最低単位数チェック（3年間合計で判定）
                    const saveButton = document.getElementById('save-button');

                    if (saveButton && AppState.settings) {
                        const nextGradeForMin = Utils.getNextGrade();
                        const minUnitsKey = `${nextGradeForMin}年最低単位数`;
                        const minUnits = parseInt(AppState.settings[minUnitsKey]) || 0;

                        AppState.meetsMinimumUnits = allYearsTotal >= minUnits;

                        // save-buttonは仮登録期間に関係なく有効（モーダル内のbtn-confirmで制御）
                        saveButton.disabled = false;

                        if (allYearsTotal < minUnits) {
                            saveButton.style.cssText = 'background-color: #e9ecef; color: #6c757d; cursor: not-allowed;';
                            saveButton.title = `最低${minUnits}単位必要です（現在: ${allYearsTotal}単位）`;
                        } else {
                            saveButton.style.cssText = '';
                            saveButton.title = '';
                        }

                        // confirmation-modal内の仮登録ボタン（btn-confirm）を△科目チェック＋仮登録期間チェックで制御
                        const btnConfirm = document.getElementById('btn-confirm');
                        if (btnConfirm) {
                            btnConfirm.disabled = false; // loading時のdisabledをクリア
                            const hasCurrentlyEnrolled = AppState.currentlyEnrolledCourses && AppState.currentlyEnrolledCourses.length > 0;
                            const provisionalEnabledForConfirm = AppState.settings['仮登録'] === '可';
                            if (hasCurrentlyEnrolled || !provisionalEnabledForConfirm) {
                                btnConfirm.classList.add('is-disabled');
                                btnConfirm.style.cssText = 'background-color: #e9ecef; color: #6c757d; cursor: not-allowed;';
                                btnConfirm.title = hasCurrentlyEnrolled ? '履修中の科目があるため仮登録できません' : '仮登録期間ではありません';
                            } else {
                                btnConfirm.classList.remove('is-disabled');
                                btnConfirm.style.cssText = '';
                                btnConfirm.title = '';
                            }
                        }

                        // 教務画面の仮登録ボタン（admin-provisional-submit-btn）の動的更新
                        const adminProvisionalBtn = container.querySelector('#admin-provisional-submit-btn');
                        if (adminProvisionalBtn) {
                            const isProvisionalStatus = TeacherScreen.currentViewingStudent?.['ステータス'] === '仮登録';
                            const hasCurrentlyEnrolledForAdmin = AppState.currentlyEnrolledCourses && AppState.currentlyEnrolledCourses.length > 0;
                            const electiveReqResultForAdmin = Utils.checkElectiveRequired();
                            const failsElectiveReqForAdmin = electiveReqResultForAdmin.isTarget && !electiveReqResultForAdmin.isSatisfied;
                            const failsMinUnitsForAdmin = minUnits > 0 && allYearsTotal < minUnits;
                            const gradResultForAdmin = GraduationRequirementChecker.checkRequirements();
                            const failsGradForAdmin = gradResultForAdmin.isTarget && !gradResultForAdmin.isSatisfied;

                            const shouldDisableAdmin = isProvisionalStatus || hasCurrentlyEnrolledForAdmin || failsElectiveReqForAdmin || failsMinUnitsForAdmin || failsGradForAdmin;

                            adminProvisionalBtn.disabled = shouldDisableAdmin;
                            if (shouldDisableAdmin) {
                                adminProvisionalBtn.style.cssText = 'background-color: #e9ecef; color: #6c757d; cursor: not-allowed;';
                                const reasons = [];
                                if (isProvisionalStatus) reasons.push('仮登録済み');
                                if (hasCurrentlyEnrolledForAdmin) reasons.push('履修中の科目があります');
                                if (failsElectiveReqForAdmin) reasons.push('選択必修が未選択です');
                                if (failsMinUnitsForAdmin) reasons.push(`最低${minUnits}単位必要です（現在: ${allYearsTotal}単位）`);
                                if (failsGradForAdmin) {
                                    const subjectList = gradResultForAdmin.deficiencies.map(d => d.subject).join('、');
                                    reasons.push(`卒業要件未充足（不足: ${subjectList}）`);
                                }
                                adminProvisionalBtn.title = reasons.join('／');
                            } else {
                                adminProvisionalBtn.style.cssText = 'background-color: #004294;';
                                adminProvisionalBtn.title = '';
                            }
                        }
                    } else {
                        AppState.meetsMinimumUnits = true; // 設定がない場合はtrue
                    }

                    // 卒業要件チェック・選択必修チェックで確認ボタンの表示を更新
                    const confirmButton = document.getElementById('save-button');
                    if (confirmButton) {
                        const graduationResult = GraduationRequirementChecker.checkRequirements();
                        const meetsRequirement = !graduationResult.isTarget || graduationResult.isSatisfied;

                        // 選択必修チェック
                        const electiveReqResult = Utils.checkElectiveRequired();
                        const meetsElectiveReq = !electiveReqResult.isTarget || electiveReqResult.isSatisfied;
                        AppState.meetsElectiveRequired = meetsElectiveReq;

                        if (!meetsElectiveReq) {
                            confirmButton.style.cssText = 'background-color: #e9ecef; color: #6c757d; cursor: not-allowed;';
                            confirmButton.innerHTML = '確認 <span style="color: #e67e22;">⚠</span>';
                            confirmButton.title = '選択必修を選択する必要があります';
                        } else if (!meetsRequirement) {
                            if (!AppState.meetsMinimumUnits) {
                                // 最低単位数不足のグレーアウトを維持
                            } else {
                                confirmButton.style.cssText = '';
                            }
                            confirmButton.innerHTML = '確認 <span style="color: #e67e22;">⚠</span>';
                            confirmButton.title = '';
                        } else {
                            if (!AppState.meetsMinimumUnits) {
                                // 最低単位数不足のグレーアウトを維持
                            } else {
                                confirmButton.style.cssText = '';
                            }
                            confirmButton.innerHTML = '確認';
                            confirmButton.title = '';
                        }

                        // 選択必修チェック結果に応じて科目名横の⚠マークを表示/非表示
                        document.querySelectorAll('.elective-req-warning').forEach(el => {
                            el.style.display = meetsElectiveReq ? 'none' : '';
                        });
                    }
                },


                getCourseCategory(course) {
                    try {
                        const category = course['区分'] || '';
                        const courseName = course['科目名'] || '';
                        const courseGrade = safeParseGrade(course['学年'], 1);

                        // 年指定マークから再履修判定
                        const inProgressYear = AppState.inProgressCoursesYearMap?.[courseName];
                        const completedYear = AppState.completedCoursesYearMap?.[courseName];
                        const specifiedYear = inProgressYear || completedYear;

                        if (category === '必修') {
                            const isInRetakenMap = AppState.retakenYearMap?.[courseName];
                            // 年マーカー > 科目学年 → 再履修（例: ●2の1年科目、○2の1年科目）
                            const isRetaken = specifiedYear && specifiedYear > courseGrade;

                            // 留年対応: 留年生（currentGrade === nextGrade）の場合、
                            // 現在学年以下の必修科目で履修中のものは再履修
                            const currentGradeNum = safeParseGrade(AppState.currentUser?.grade ?? AppState.authenticatedUser?.grade, 1);
                            const nextGradeNum = Utils.getNextGrade();
                            const isRepeatingYear = currentGradeNum === nextGradeNum;
                            const isInProgress = !!inProgressYear || !!AppState.registrationData?.[courseName];
                            const isRetakenByRepeat = isRepeatingYear && courseGrade < currentGradeNum && isInProgress;

                            if (isInRetakenMap || isRetaken || isRetakenByRepeat) {
                                return 'retakenRequired';
                            }
                            return 'required';
                        } else if (category.includes('履修指定')) {
                            const nextGrade = Utils.getNextGrade();
                            const currentGradeNum = safeParseGrade(AppState.currentUser?.grade ?? AppState.authenticatedUser?.grade, 1);
                            const isRepeatingYear = currentGradeNum === nextGrade;
                            if (courseGrade < nextGrade || (isRepeatingYear && courseGrade === nextGrade)) {
                                // 過去学年の履修指定（または留年生の同学年履修指定）：取得済みなら履修指定のまま
                                if (hasCompletedCourse(courseName)) {
                                    return 'requiredDesignated';
                                }
                                return 'elective';
                            }
                            return 'requiredDesignated';
                        } else {
                            return 'elective';
                        }
                    } catch (error) {
                        console.error('[RegistrationManager] getCourseCategory エラー:', error, course);
                        return 'elective'; // 安全なフォールバック
                    }
                }
            };

            // 教職員専用画面管理
            const TeacherScreen = {
                studentsData: [],
                courseDataCache: null, // 科目データのキャッシュ
                courseFilterActive: false, // フィルタートグル状態を生徒切替時に維持
                currentMode: 'teacher', // 'teacher' or 'admin'
                lastLoadedMode: null, // 最後にデータを読み込んだ時のモード
                isLoading: false, // 読み込み状態
                isEditLocked: true, // 教務承認画面での編集ロック状態（デフォルト: ロック中）
                isProcessing: false, // 操作中フラグ（二重操作防止）
                refreshHandler: null, // 更新ボタンのイベントハンドラ（重複防止用）
                handlersInitialized: false, // イベントハンドラ登録済みフラグ（重複防止用）
                _statusPollingTimer: null, // ステータス自動更新タイマー
                newClassMap: null,        // Map<学籍番号, {学年, 組, 番号}> — 新クラス取り込みデータ
                useNewClass: false,       // 新クラスモードトグル状態
                _originalStudentsData: null, // トグルOFF復元用のバックアップ
