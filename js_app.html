                async initialize() {
                    // currentModeは呼び出し元で設定されるので、ここでは上書きしない
                    if (!this.currentMode) this.currentMode = 'teacher';  // デフォルト値のみ設定

                    // 前の生徒情報をクリア
                    this.currentViewingStudent = null;
                    AppState.selectedStudent = null;
                    const detailArea = document.getElementById('teacher-student-detail-area');
                    if (detailArea) {
                        // 詳細エリアの内容を初期状態に戻す
                        detailArea.innerHTML = `
                            <div id="teacher-no-student-selected" style="text-align: center; padding: 100px 0; color: var(--text-secondary-color); font-size: 1.1em;">
                                左側の生徒一覧から生徒を選択してください
                            </div>
                        `;
                    }

                    // 教職員専用画面・教務承認画面ではバナーを非表示
                    const banner = document.getElementById('registration-status-banner');
                    if (banner) {
                        banner.classList.remove('show');
                        document.body.classList.remove('banner-shown');
                    }

                    // provisional-registration-bannerも非表示にしてbody.paddingTopをリセット
                    const provisionalBanner = document.getElementById('provisional-registration-banner');
                    if (provisionalBanner) {
                        provisionalBanner.style.display = 'none';
                    }
                    document.body.style.paddingTop = '';

                    // データが未読み込み、またはモードが変わった場合のみ読み込む
                    // （教職員専用画面はフィルタあり、教務画面はフィルタなし）
                    const modeChanged = this.lastLoadedMode !== this.currentMode;
                    if (this.studentsData.length === 0 || modeChanged) {
                        await this.loadStudentsData();
                        this.lastLoadedMode = this.currentMode;
                    } else {
                        // バックグラウンドで最新データを取得（ローディング表示なし）
                        this.loadStudentsData(true);
                    }

                    this.setupEventHandlers();

                    // 読み込み完了後のみレンダリング
                    if (!this.isLoading) {
                        this.renderStudentsList();
                    }

                    // ステータスバッジの自動更新を開始
                    this.startStatusPolling();
                },

                
                async loadStudentsData(silent = false) {
                    try {
                        this.isLoading = true;
                        if (!silent) this.showLoadingMessage();

                        // 科目データが既にロード済みならRPCをスキップ
                        const courseDataPromise = (AppState.allCourses && AppState.allCourses.length > 0)
                            ? Promise.resolve({ success: true, data: AppState.courseData })
                            : DataManager.callGASFunction('getCourseData');

                        // 生徒データと科目データを並列取得
                        const [result, courseResult] = await Promise.all([
                            DataManager.callGASFunction('getAllStudentsData', this.currentMode === 'admin-manage' || this.currentMode === 'admin'),
                            courseDataPromise
                        ]);

                        // resultのnullチェック
                        if (!result) {
                            const errorMsg = 'データの取得に失敗しました。\n\n' +
                                '【対処方法】\n' +
                                '・スプレッドシートの「タイムスタンプ」列にデータがある場合、一時的にデータを削除してから再度お試しください\n' +
                                '・問題が解決しない場合は、ページをリロードしてください\n' +
                                '・それでも解決しない場合は、管理者にお問い合わせください';
                            throw new Error(errorMsg);
                        }

                        if (result.success) {
                            // 印刷用キャッシュに生データを保存（常に最新データで更新）
                            cachedAllStudentsData = result;

                            // 全生徒データを取得
                            let allStudents = result.students || [];

                            // 教職員データシートの担当クラスでフィルタリング（教職員専用画面のみ、教務/管理画面は全生徒表示）
                            if (this.currentMode !== 'admin' && this.currentMode !== 'admin-manage') {
                                const assigned = AppState.teacherAssignedClasses;
                                // 担当クラスが設定されている場合のみフィルタ（空→全生徒表示）
                                if (assigned && assigned.length > 0) {
                                    allStudents = allStudents.filter(student => {
                                        const studentGradeNum = parseInt(student['学年'] ?? student.grade ?? 0);
                                        const studentClassStr = String(student['組'] || student.class || '').trim();

                                        // 防御的処理: 学年が取得できない場合はフィルタをスキップ
                                        if (isNaN(studentGradeNum) || studentGradeNum < 0 || studentGradeNum > 3) {
                                            return true;
                                        }

                                        // 担当クラス配列のいずれかにマッチすれば表示
                                        return assigned.some(entry => {
                                            if (entry.grade !== studentGradeNum) return false;
                                            // class が null → その学年の全組
                                            if (entry.class === null) return true;
                                            return studentClassStr === entry.class;
                                        });
                                    });
                                } else {
                                    // 担当クラスが未設定の教員には生徒を表示しない
                                    allStudents = [];
                                }
                            }

                            // 教職員専用画面では利用停止生徒を非表示
                            if (this.currentMode === 'teacher') {
                                allStudents = allStudents.filter(s => {
                                    const status = String(s['ステータス'] || '').trim();
                                    return status !== '利用停止';
                                });
                            }

                            // 新クラスモード有効時はオーバーレイ適用
                            allStudents = NewClassImporter.applyOverlay(allStudents);

                            // 担当クラスの記述順をソートに反映（教職員専用画面のみ）
                            const assignedForSort = (this.currentMode !== 'admin' && this.currentMode !== 'admin-manage' && AppState.teacherAssignedClasses?.length > 0)
                                ? AppState.teacherAssignedClasses : null;

                            this.studentsData = allStudents.sort((a, b) => {
                                const gradeA = parseInt(a['学年'] ?? a.grade ?? 0);
                                const gradeB = parseInt(b['学年'] ?? b.grade ?? 0);
                                const classA = String(a['組'] || a.class || '');
                                const classB = String(b['組'] || b.class || '');

                                // 担当クラス記述順ソート
                                if (assignedForSort) {
                                    const idxA = assignedForSort.findIndex(e => e.grade === gradeA && (e.class === null || e.class === classA));
                                    const idxB = assignedForSort.findIndex(e => e.grade === gradeB && (e.class === null || e.class === classB));
                                    if (idxA !== idxB) return idxA - idxB;
                                }

                                // 同一クラス内は学年→組（数値優先）→番号
                                return Utils.compareByGradeClassNumber(gradeA, classA, a['番号'] || a.number, gradeB, classB, b['番号'] || b.number);
                            });

                        }

                        // courseResultのnullチェック（並列取得済み）
                        if (courseResult && courseResult.success) {
                            this.courseDataCache = courseResult.data;
                            // allCoursesが未構築の場合、APIレスポンスから構築
                            if (!AppState.allCourses || AppState.allCourses.length === 0) {
                                AppState.courseData = courseResult.data;
                                AppState.allCourses = [];
                                Object.values(courseResult.data).forEach(gradeData => {
                                    if (gradeData.required) AppState.allCourses.push(...gradeData.required);
                                    if (gradeData.elective) AppState.allCourses.push(...gradeData.elective);
                                });
                                updateCourseSets();
                                updateCourseByNameMap();
                            }
                        }

                        this.isLoading = false;
                        if (!silent) this.hideLoadingMessage();

                        // データ読み込み完了後にリストを表示
                        this.renderStudentsList();
                    } catch (error) {
                        console.error('生徒データ読み込みエラー:', error);

                        // エラーメッセージを表示（改行を<br>に変換）
                        const errorMessage = error.message || '生徒データの読み込みに失敗しました';
                        const formattedMessage = errorMessage.replace(/\n/g, '<br>');

                        // モーダルで詳細なエラーメッセージを表示
                        alert(errorMessage);

                        this.isLoading = false;
                        this.hideLoadingMessage();

                        // エラー時も空のリストを表示
                        this.renderStudentsList();
                    }
                },

                showLoadingMessage() {
                    const loadingMsg = document.getElementById('teacher-loading-message');
                    if (loadingMsg) {
                        loadingMsg.style.display = 'block';
                    }
                    // 読み込み中は前の一覧をクリア
                    const container = document.getElementById('teacher-student-list-items');
                    if (container) {
                        container.innerHTML = '';
                    }
                },

                hideLoadingMessage() {
                    const loadingMsg = document.getElementById('teacher-loading-message');
                    if (loadingMsg) {
                        loadingMsg.style.display = 'none';
                    }
                },
                
                setupEventHandlers() {
                    // 重複登録を防止（initialize()は画面切り替えのたびに呼ばれるため）
                    if (this.handlersInitialized) return;
                    this.handlersInitialized = true;

                    // 検索機能（debounce適用で高速化、日本語IME対応）
                    const searchInput = document.getElementById('teacher-student-search');
                    if (searchInput) {
                        const debouncedFilter = debounce((value) => {
                            this.filterStudents(value);
                        }, 150); // 遅延を短縮

                        // 通常の入力イベント
                        searchInput.addEventListener('input', (e) => {
                            if (!e.isComposing) { // IME変換中でなければ即時フィルタ
                                debouncedFilter(e.target.value);
                            }
                        });

                        // 日本語IME変換確定時
                        searchInput.addEventListener('compositionend', (e) => {
                            debouncedFilter(e.target.value);
                        });

                        // キー入力でもフィルタ（Enterキー不要に）
                        searchInput.addEventListener('keyup', (e) => {
                            if (!e.isComposing && e.key !== 'ArrowDown' && e.key !== 'ArrowUp') {
                                debouncedFilter(e.target.value);
                            }
                        });

                        // 上下キーで生徒リストをナビゲーション
                        const handleArrowNavigation = (e) => {
                            if (e.key !== 'ArrowDown' && e.key !== 'ArrowUp') return;
                            e.preventDefault();

                            const items = Array.from(
                                document.querySelectorAll('#teacher-student-list-items .teacher-student-item')
                            );
                            if (items.length === 0) return;

                            const currentActive = document.querySelector('.teacher-student-item.active');
                            let currentIndex = currentActive ? items.indexOf(currentActive) : -1;

                            if (e.key === 'ArrowDown') {
                                currentIndex = currentIndex < items.length - 1 ? currentIndex + 1 : currentIndex;
                            } else {
                                currentIndex = currentIndex > 0 ? currentIndex - 1 : 0;
                            }

                            const targetItem = items[currentIndex];
                            if (targetItem === currentActive) return;  // 端で移動なし → 何もしない
                            const studentId = targetItem.getAttribute('data-student-id');
                            TeacherScreen.selectStudent(studentId);
                            // scrollIntoView()は祖先コンテナまで連鎖スクロールするため、手動計算で対象コンテナのみスクロール
                            const scrollContainer = document.getElementById('teacher-student-list-container');
                            if (scrollContainer) {
                                const containerRect = scrollContainer.getBoundingClientRect();
                                const itemRect = targetItem.getBoundingClientRect();
                                if (itemRect.bottom > containerRect.bottom) {
                                    scrollContainer.scrollTop += (itemRect.bottom - containerRect.bottom);
                                } else if (itemRect.top < containerRect.top) {
                                    scrollContainer.scrollTop -= (containerRect.top - itemRect.top);
                                }
                            }
                        };

                        searchInput.addEventListener('keydown', handleArrowNavigation);

                        // リストコンテナでも上下キーが効くようにする
                        const listContainer = document.getElementById('teacher-student-list-container');
                        if (listContainer) {
                            listContainer.setAttribute('tabindex', '0');
                            listContainer.style.outline = 'none';
                            listContainer.addEventListener('keydown', handleArrowNavigation);
                        }

                        // フォールバック: フォーカスが失われた場合（body）でも矢印キーが機能するようにする
                        document.addEventListener('keydown', (e) => {
                            if (e.defaultPrevented) return; // 既にlistContainer/searchInputのハンドラで処理済み
                            if (e.key !== 'ArrowDown' && e.key !== 'ArrowUp') return;
                            // 教職員専用画面が表示中のみ
                            const ts = document.getElementById('teacher-screen');
                            if (!ts || ts.style.display === 'none') return;
                            // フォーカスがbodyにある場合のみ介入（他の要素は通常のスクロール等を尊重）
                            if (document.activeElement && document.activeElement !== document.body) return;
                            handleArrowNavigation(e);
                            // フォーカスをリストコンテナに復元（以降は直接ハンドラで処理）
                            const lc = document.getElementById('teacher-student-list-container');
                            if (lc) lc.focus({ preventScroll: true });
                        });
                    }

                    // 更新ボタン（重複登録を防止）
                    const refreshBtn = document.getElementById('teacher-refresh-btn');
                    if (refreshBtn) {
                        // 既存のイベントリスナーを削除
                        if (this.refreshHandler) {
                            refreshBtn.removeEventListener('click', this.refreshHandler);
                        }

                        // 新しいハンドラを作成して登録
                        this.refreshHandler = async () => {
                            refreshBtn.disabled = true;
                            await this.loadStudentsData();
                            this.renderStudentsList();
                            Utils.showToast('生徒データを更新しました', 'success');
                            refreshBtn.disabled = false;
                        };

                        refreshBtn.addEventListener('click', this.refreshHandler);
                    }

                    // 一括承認ボタンの初期化は setupActionButtons() で個別処理として実行
                },

                setupActionButtons() {
                    // 印刷ボタン
                    const printBtn = document.getElementById('teacher-print-btn');
                    if (printBtn) {
                        printBtn.addEventListener('click', () => {
                            EventHandlers.printDocument();
                        });
                    }
                    // 差戻しボタン（個別処理に変更）
                    const rejectBtn = document.getElementById('teacher-bulk-reject-btn');
                    if (rejectBtn) {
                        rejectBtn.removeEventListener('click', this.bulkRejectStudents);

                        rejectBtn.addEventListener('click', () => {
                            if (rejectBtn.disabled) return;
                            this.showRevertConfirmation();
                        });

                        // ボタンIDを個別用に更新
                        rejectBtn.id = 'teacher-single-reject-btn';
                    }
                },

                renderStudentsList(filterText = null) {
                    const container = document.getElementById('teacher-student-list-items');
                    if (!container) return;

                    // 再レンダリング前に選択中の生徒IDとフォーカス状態を保存
                    const activeItem = container.querySelector('.teacher-student-item.active');
                    const activeStudentId = activeItem ? activeItem.getAttribute('data-student-id') : null;
                    const listContainer = document.getElementById('teacher-student-list-container');
                    const hadFocus = listContainer && listContainer.contains(document.activeElement);

                    // 引数省略時は検索バーの現在値を使用
                    if (filterText === null) {
                        const searchInput = document.getElementById('teacher-student-search');
                        filterText = searchInput ? searchInput.value : '';
                    }

                    // 読み込み中の場合は何もしない
                    if (this.isLoading) {
                        return;
                    }

                    const studentListSource = this.studentsData;
                    const filteredStudents = studentListSource.filter(student => {
                        if (!filterText) return true;

                        const searchString = filterText.toLowerCase().trim();
                        const studentId = String(student['学籍番号'] || '');
                        const studentName = String(student['名前'] || '');
                        const grade = String(student['学年'] ?? '');
                        const className = String(student['組'] || '');
                        const number = String(student['番号'] || '');

                        // 名前・学籍番号での検索
                        if (studentId.toLowerCase().includes(searchString) ||
                            studentName.toLowerCase().includes(searchString)) {
                            return true;
                        }

                        // 「2年」「2年1組」「2年1」「2年K組」「2年K」形式の検索
                        const yearClassMatch = searchString.match(/^(\d+)年(?:(.+?)組?)?$/);
                        if (yearClassMatch) {
                            const searchGrade = yearClassMatch[1];
                            const searchClass = yearClassMatch[2] || null;
                            if (searchClass) {
                                return grade === searchGrade && className.toLowerCase() === searchClass;
                            }
                            return grade === searchGrade;
                        }

                        // 「1-2」「1-2-3」「1-K」「2-」形式のクラス検索を厳密に判定
                        const parts = searchString.split('-');
                        if (parts.length >= 2) {
                            const nonEmptyParts = parts.filter(p => p !== '');
                            if (nonEmptyParts.length >= 1 && /^\d+$/.test(nonEmptyParts[0])) {
                                const searchGrade = nonEmptyParts[0];
                                const searchClass = nonEmptyParts[1] || null;
                                const searchNumber = nonEmptyParts[2] || null;

                                if (!searchClass) {
                                    // 「2-」→ 学年のみフィルタ
                                    return grade === searchGrade;
                                }
                                if (grade === searchGrade && className.toLowerCase() === searchClass) {
                                    if (searchNumber) {
                                        return number === searchNumber;
                                    }
                                    return true;
                                }
                                return false;
                            }
                        }

                        // その他のフリーテキスト検索
                        return `${grade}-${className}-${number}`.toLowerCase().includes(searchString);
                    });
                    
                    let html = '';
                    filteredStudents.forEach(student => {
                        const studentId = student['学籍番号'];
                        const status = student['ステータス'] || '未提出';
                        const statusClass = this.getStatusClass(status);

                        // 生徒名を取得（複数のフィールド名パターンを試行）
                        const studentName = student.name || student['氏名'] || student['名前'] || '名前未設定';

                        // デバッグ: 最初の生徒のデータ構造を確認
                        if (filteredStudents.indexOf(student) === 0) {
                        }

                        // 学年組番号を生成（複数のフィールド名パターンを試行）
                        const grade = student.grade ?? student['学年'] ?? student['Grade'] ?? '';
                        const className = student.class || student['クラス'] || student['組'] || student['Class'];
                        const number = student.number || student['番号'] || student['出席番号'] || student['Number'];

                        let classInfo = '';
                        const parts = [];
                        if (grade !== undefined && grade !== null && grade !== '') {
                            parts.push(parseInt(grade) === 0 ? '新1年' : `${grade}年`);
                        }
                        if (className) parts.push(`${className}組`);
                        if (number) parts.push(`${number}番`);
                        classInfo = parts.join('');

                        // デバッグ: クラス情報の詳細確認
                        if (filteredStudents.indexOf(student) === 0) {
                        }

                        const escapedStudentId = Utils.escapeHtml(studentId);
                        const escapedStudentName = Utils.escapeHtml(studentName);
                        const escapedClassInfo = Utils.escapeHtml(classInfo);
                        html += `
                            <div class="teacher-student-item"
                                 data-student-id="${escapedStudentId}"
                                 onclick="TeacherScreen.selectStudent(&quot;${escapedStudentId}&quot;); document.getElementById('teacher-student-list-container')?.focus({preventScroll:true})">
                                <div class="student-info">
                                    <div class="student-name">${escapedStudentName}</div>
                                    <div class="student-class-info">${escapedClassInfo || '&nbsp;'}</div>
                                </div>
                                <div class="student-status ${statusClass}">${status}</div>
                            </div>
                        `;
                    });
                    
                    container.innerHTML = html;

                    // 選択状態を復元
                    if (activeStudentId) {
                        const item = container.querySelector(`[data-student-id="${activeStudentId}"]`);
                        if (item) item.classList.add('active');
                    }
                    // innerHTML書き換えでフォーカスが失われるため、元々フォーカスがあった場合は復元
                    if (hadFocus && listContainer) listContainer.focus({ preventScroll: true });

                    this.updateBulkActionButton();
                },
                
                getStatusClass(status) {
                    switch (status) {
                        case '仮登録': return 'status-submitted';
                        case '保存': return 'status-draft';
                        case '確認済': return 'status-approved';
                        case '本登録': return 'status-final-registered';
                        case '本登録許可': return 'status-final-ready';
                        case '利用停止': return 'status-leave';
                        default: return 'status-none';
                    }
                },

                // ステータス自動更新（60秒間隔）
                startStatusPolling() {
                    this.stopStatusPolling();
                    this._statusPollingTimer = setInterval(() => {
                        this._pollStatuses();
                    }, 15000);
                    console.log('[教職員専用画面] ステータス自動更新を開始');
                },

                stopStatusPolling() {
                    if (this._statusPollingTimer) {
                        clearInterval(this._statusPollingTimer);
                        this._statusPollingTimer = null;
                        console.log('[教職員専用画面] ステータス自動更新を停止');
                    }
                },

                _showDetailOverlay() {
                    const pane = document.getElementById('teacher-detail-right-pane');
                    if (!pane || document.getElementById('teacher-detail-updating-overlay')) return;
                    const overlay = document.createElement('div');
                    overlay.id = 'teacher-detail-updating-overlay';
                    overlay.innerHTML = '<div class="detail-updating-content"><div style="display: inline-block; width: 32px; height: 32px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite;"></div><p>読み込み中...</p></div>';
                    pane.appendChild(overlay);
                },

                _hideDetailOverlay() {
                    const overlay = document.getElementById('teacher-detail-updating-overlay');
                    if (overlay) overlay.remove();
                },

                _restoreFocusToList() {
                    const searchInput = document.getElementById('teacher-student-search');
                    if (document.activeElement !== searchInput) {
                        const listContainer = document.getElementById('teacher-student-list-container');
                        if (listContainer) listContainer.focus({ preventScroll: true });
                    }
                },

                async _pollStatuses() {
                    try {
                        const result = await new Promise((resolve, reject) => {
                            google.script.run
                                .withSuccessHandler(resolve)
                                .withFailureHandler(reject)
                                .getStudentStatuses();
                        });
                        if (!result || !result.success) return;

                        // ステータスが変化した生徒を検出
                        const changedIds = [];
                        const items = document.querySelectorAll('.teacher-student-item[data-student-id]');
                        items.forEach(item => {
                            const studentId = item.getAttribute('data-student-id');
                            if (studentId in result.statuses) {
                                const newStatus = result.statuses[studentId] || '未提出';
                                const badge = item.querySelector('.student-status');
                                if (badge && badge.textContent !== newStatus) {
                                    badge.textContent = newStatus;
                                    badge.className = 'student-status ' + TeacherScreen.getStatusClass(newStatus);
                                    // studentsData のステータスも即座に更新（getAllStudentsData完了前のクリック対策）
                                    const studentInData = this.studentsData.find(s => String(s['学籍番号']) === String(studentId));
                                    if (studentInData) {
                                        studentInData['ステータス'] = newStatus;
                                    }
                                    changedIds.push(studentId);
                                    badge.classList.add('updating');
                                }
                            }
                        });

                        // 変化があった場合、studentsData を最新に更新
                        if (changedIds.length > 0) {
                            this._showDetailOverlay();
                            console.log('[教職員専用画面] ステータス変化検出:', changedIds, '→ データ再取得');
                            try {
                                const freshData = await new Promise((resolve, reject) => {
                                    google.script.run
                                        .withSuccessHandler(resolve)
                                        .withFailureHandler(reject)
                                        .getAllStudentsData(TeacherScreen.currentMode === 'admin-manage');
                                });
                                if (freshData && freshData.success && freshData.students) {
                                    this.studentsData = freshData.students;
                                    // 表示中の生徒が変化対象なら自動再描画（科目データも最新に）
                                    if (this.currentViewingStudent) {
                                        const viewingId = String(this.currentViewingStudent['学籍番号']);
                                        if (changedIds.some(id => String(id) === viewingId)) {
                                                    this.showStudentDetail(viewingId);
                                        }
                                    }
                                }
                            } catch (fetchError) {
                                console.warn('[教職員専用画面] データ再取得エラー:', fetchError);
                            }
                            // データ取得完了後、オーバーレイ除去＋パルスアニメーション停止
                            this._hideDetailOverlay();
                            changedIds.forEach(id => {
                                const item = document.querySelector(`.teacher-student-item[data-student-id="${id}"]`);
                                if (item) {
                                    const badge = item.querySelector('.student-status');
                                    if (badge) badge.classList.remove('updating');
                                }
                            });
                        }
                    } catch (error) {
                        console.warn('[教職員専用画面] ステータス自動更新エラー:', error);
                        // エラー時はポーリングを停止せず、次回リトライ
                    }
                },

                selectStudent(studentId) {
                    // 生徒詳細を表示（完了後にフォーカスを復元）
                    this.showStudentDetail(studentId).then(() => {
                        this._restoreFocusToList();
                    });

                    // 選択状態を更新
                    document.querySelectorAll('.teacher-student-item').forEach(item => {
                        item.classList.remove('active');
                    });
                    document.querySelector(`[data-student-id="${studentId}"]`)?.classList.add('active');
                },
                
                updateBulkActionButton() {
                    const approveBtn = document.getElementById('teacher-single-approve-btn');
                    const rejectBtn = document.getElementById('teacher-single-reject-btn');


                    // 現在表示中の生徒をチェック
                    const currentStudent = this.currentViewingStudent;

                    const status = currentStudent ? currentStudent['ステータス'] : null;
                    const authCode = currentStudent ? currentStudent['認証コード'] : null;

                    // 差戻ボタン: 仮登録かつ認証コードが未設定の時のみ有効
                    if (rejectBtn) {
                        if (currentStudent && status === '仮登録') {
                            rejectBtn.disabled = false;
                            rejectBtn.textContent = '差戻し';
                        } else {
                            rejectBtn.disabled = true;
                            rejectBtn.textContent = '差戻し';
                        }
                    }
                },
                
                filterStudents(filterText) {
                    this.renderStudentsList(filterText);
                },
                
                async showStudentDetail(studentId) {
                    // 教務承認画面の場合、生徒切り替え時に編集ロックをリセット
                    if (this.currentMode === 'admin') {
                        this.isEditLocked = true;
                    }

                    const student = this.studentsData.find(s => s['学籍番号'] == studentId);
                    if (!student) return;

                    // AppStateのバックアップ（認証ユーザーの状態を保護）
                    const appStateBackup = {
                        registrationData: { ...AppState.registrationData },
                        currentUser: { ...AppState.currentUser },
                        registeredCourses: [...(AppState.registeredCourses || [])],
                        inProgressCoursesYearMap: Utils.deepCopyMap(AppState.inProgressCoursesYearMap || {}),
                        completedCoursesYearMap: Utils.deepCopyMap(AppState.completedCoursesYearMap || {}),
                        lockedCourses: [...(AppState.lockedCourses || [])],
                        retakenYearMap: Utils.deepCopyMap(AppState.retakenYearMap || {}),
                        completedCourses: [...(AppState.completedCourses || [])],
                        autoRegisteredCourses: [...(AppState.autoRegisteredCourses || [])],
                        pureAutoRegisteredCourses: [...(AppState.pureAutoRegisteredCourses || [])]
                    };

                    // 現在表示中の生徒を保存
                    this.currentViewingStudent = student;

                    // 新しい変数分離方式：生徒データを専用変数に設定
                    // 来年度学年を取得（留年対応）
                    let rawNextGrade = student['来年度学年'];
                    // admin-manageモードかつ新クラスモードON時は、applyOverlayで空にされた来年度学年を元データから復元
                    if (this.currentMode === 'admin-manage' && TeacherScreen.useNewClass && TeacherScreen._originalStudentsData) {
                        const orig = TeacherScreen._originalStudentsData.find(s => s['学籍番号'] == student['学籍番号']);
                        if (orig) rawNextGrade = orig['来年度学年'];
                    }
                    const parsedNextGrade = rawNextGrade ? parseInt(rawNextGrade) : null;
                    const studentNextGrade = (parsedNextGrade && parsedNextGrade >= 1 && parsedNextGrade <= 3) ? parsedNextGrade : null;

                    AppState.selectedStudent = {
                        ...student,
                        grade: student['学年'],
                        studentId: student['学籍番号'], // 表示学籍番号フィルタ用
                        nextGrade: studentNextGrade
                    };

                    // 計算用の変数も更新（既存システムとの互換性のため）
                    AppState.currentUser = AppState.selectedStudent;
                    // AppState.registrationDataもgenerateStudentDetailHTML内で設定される

                    // AppState.registeredCoursesも同期して更新
                    AppState.registeredCourses = Object.keys(AppState.registrationData).filter(courseName => {
                        const mark = AppState.registrationData[courseName];
                        return mark && (mark === '○' || mark.toString().includes('○'));
                    });

                        const detailArea = document.getElementById('teacher-student-detail-area');
                    const noStudentMessage = document.getElementById('teacher-no-student-selected');
                    
                    if (noStudentMessage) {
                        noStudentMessage.style.display = 'none';
                    }
                    
                    // 生徒詳細HTML生成は次で実装
                    const detailHtml = await this.generateStudentDetailHTML(student);
                    if (detailArea) {
                        // 右パネルのDOM変更によるflexレイアウト再計算で左パネルのスクロール位置がズレるのを防止
                        const studentListContainer = document.getElementById('teacher-student-list-container');
                        const savedScrollTop = studentListContainer?.scrollTop;

                        detailArea.innerHTML = `<div style="padding: 0;">${detailHtml}</div>`;

                        // 左パネルのスクロール位置を復元
                        if (studentListContainer != null && savedScrollTop != null) {
                            studentListContainer.scrollTop = savedScrollTop;
                        }

                        // HTML生成後にボタンのイベントリスナーを設定
                        this.setupActionButtons();
                        // ボタンの表示状態を更新
                        this.updateBulkActionButton();

                        // 教務承認画面: 科目セルのクリックイベントを設定
                        if (this.currentMode === 'admin') {
                            RegistrationManager.attachEventListeners();
                        }

                        // 登録データ管理画面: マークセルをselectに変換
                        if (this.currentMode === 'admin-manage') {
                            this.convertToAdminManageSelects(detailArea);
                            this.setupAdminManageSaveButton();
                        }
                        // 初期表示時に同時不可UIを更新
                        RegistrationManager.updateSimultaneousRestrictionUI(detailArea);

                        // 科目フィルターを同期的に適用（ちらつき防止）
                        const teacherFilterToggle = detailArea.querySelector('#teacher-course-filter-toggle');
                        if (teacherFilterToggle) {
                            if (TeacherScreen.courseFilterActive) {
                                RegistrationManager.applyCourseFilter(detailArea, true);
                            }
                            teacherFilterToggle.addEventListener('change', () => {
                                TeacherScreen.courseFilterActive = teacherFilterToggle.checked;
                                RegistrationManager.applyCourseFilter(detailArea, teacherFilterToggle.checked);
                            });
                        }

                        // 本登録許可ボタンとQRコードを追加（登録データ管理画面ではスキップ）
                        if (this.currentMode !== 'admin-manage') {
                            const status = student['ステータス'];
                            const authCode = student['認証コード'];


                            // 教職員専用画面と教務承認画面モードで確認済の時のみ本登録許可ボタンを表示
                            const buttonArea = document.getElementById('teacher-action-buttons');
                            if (buttonArea) {
                                // 既存のボタンを削除（生徒切替時に状態を更新するため）
                                const existingBtn = document.getElementById('teacher-final-approval-btn');
                                if (existingBtn) {
                                    existingBtn.remove();
                                }

                                const isTeacherOrAbove = AppState.userRole === 'teacher' || AppState.userRole === 'kyomu' || AppState.userRole === 'admin';
                                if (isTeacherOrAbove && (this.currentMode === 'teacher' || this.currentMode === 'admin')) {
                                    // 教員以上のロールでボタンを表示
                                    const finalApprovalEnabled = AppState.settings['本登録許可'] === '可';
                                    const isProvisionalStatus = status === '仮登録';

                                    const finalApprovalBtn = document.createElement('button');
                                    finalApprovalBtn.id = 'teacher-final-approval-btn';

                                    if (status === '本登録許可') {
                                        // 許可済の場合は取消ボタン
                                        finalApprovalBtn.textContent = '本登録許可取消';
                                        finalApprovalBtn.style.cssText = 'background-color: #004294; color: white; font-size: 0.8em; padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer; white-space: nowrap;';
                                        finalApprovalBtn.onclick = () => this.showCancelFinalApprovalConfirmation();
                                    } else {
                                        // 未許可の場合は許可ボタン
                                        finalApprovalBtn.textContent = '本登録許可';

                                        // 設定が「可」でない、ステータスが仮登録でない、または選択不可科目がある場合は無効化
                                        const hasInvalidCourses = this.currentInvalidCourses && this.currentInvalidCourses.length > 0;
                                        if (!finalApprovalEnabled || !isProvisionalStatus || hasInvalidCourses) {
                                            // disabledにするとclickイベントが発火しないため、スタイルのみ無効風にする
                                            finalApprovalBtn.style.cssText = 'background-color: #e9ecef; color: #6c757d; font-size: 0.8em; padding: 6px 12px; border: none; border-radius: 5px; cursor: not-allowed; white-space: nowrap;';
                                            finalApprovalBtn.onclick = () => {
                                                if (!finalApprovalEnabled) {
                                                    Utils.showToast('本登録許可機能は現在無効です。設定から「本登録許可」を「可」に変更してください。');

                                                    Utils.showToast('選択不可の科目が含まれています。科目表の警告を確認してください。', 'warning');
                                                } else if (!isProvisionalStatus) {
                                                    Utils.showToast('仮登録済みの生徒のみ本登録許可ができます。');
                                                }
                                            };
                                        } else {
                                            finalApprovalBtn.style.cssText = 'background-color: #28a745; color: white; font-size: 0.8em; padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer; white-space: nowrap;';

                                    }

                                    buttonArea.appendChild(finalApprovalBtn);
                                }

                            // 既存のQRコードエリアを常に削除（生徒切替時のクリーンアップ）

                            if (existingQR) {
                                existingQR.remove();
                            }

                            // 認証コードが存在する場合、またはステータスが本登録許可の場合にQRコードを表示
                            // （認証コードは一覧取得から除外されたため、必要時に個別取得する）
                            if (authCode || status === '本登録許可') {
                                const detailArea = document.getElementById('teacher-student-detail-area');
                                const currentStudentId = student['学籍番号'];

                                if (detailArea) {

                                    // QRコードを非同期で生成
                                    (async () => {
                                        try {
                                            // 認証コードがローカルにない場合はGASから個別取得
                                            let resolvedAuthCode = authCode;
                                            if (!resolvedAuthCode) {
                                                const authResult = await DataManager.callGASFunction('getAuthCode', currentStudentId);
                                                if (authResult.success && authResult.authCode) {
                                                    resolvedAuthCode = authResult.authCode;
                                                } else {
                                                    console.warn('[QRコード] 認証コードが取得できませんでした:', currentStudentId);
                                                    return;
                                                }
                                            }

                                            const teacherQrUrl = `${AppState.webAppUrl}?token=${resolvedAuthCode}`;
                                            const studentDomain = AppState.settings['生徒用ドメイン'];
                                            const studentQrUrl = studentDomain

                showAdminProvisionalSubmitConfirmation() {
                    if (!this.currentViewingStudent) {
                        Utils.showToast('生徒が選択されていません');
                        return;
                    }

                    // 選択必修チェック
                    const electiveReqResult = Utils.checkElectiveRequired();
                    if (electiveReqResult.isTarget && !electiveReqResult.isSatisfied) {
                        Utils.showToast('選択必修を選択する必要があります', 'warning');
                        return;
                    }

                    // 最低単位数チェック
                    const nextGradeForMin = Utils.getNextGrade();
                    const minUnitsKey = `${nextGradeForMin}年最低単位数`;
                    const minUnits = parseInt(AppState.settings?.[minUnitsKey]) || 0;
                    if (minUnits > 0) {
                        const stats = Utils.calculateUnitsStats(
                            AppState.registrationData, AppState.allCourses,
                            AppState.currentUser, AppState.autoRegisteredCourses,
                            AppState.completedCoursesYearMap, AppState.inProgressCoursesYearMap,
                            RegistrationManager.getCourseCategory.bind(RegistrationManager),
                            AppState.completedCourses, AppState.currentlyEnrolledCourses,
                            AppState.currentlyEnrolledCoursesYearMap
                        );
                        const gradeStats = stats.gradeStats;
                        const allYearsTotal = gradeStats.year1.total + gradeStats.year2.total + gradeStats.year3.total;
                        if (allYearsTotal < minUnits) {
                            Utils.showToast(`最低${minUnits}単位必要です（現在: ${allYearsTotal}単位）`, 'warning');
                            return;
                        }
                    }

                    // 卒業要件チェック
                    const graduationResult = GraduationRequirementChecker.checkRequirements();
                    if (graduationResult.isTarget && !graduationResult.isSatisfied) {
                        const subjectList = graduationResult.deficiencies.map(d => d.subject).join('、');
                        Utils.showToast(`卒業要件を満たしていません（不足: ${subjectList}）`, 'warning');
                        return;
                    }

                    const studentName = this.currentViewingStudent['氏名'] || this.currentViewingStudent['名前'];
                    document.getElementById('admin-provisional-submit-info').innerHTML =
                        `<p><strong>生徒:</strong> ${Utils.escapeHtml(studentName)}</p>`;

                    Utils.showModal('admin-provisional-submit-modal');
                },

                // 実際の仮登録処理
                async confirmAdminProvisionalSubmit() {
                    if (this.isProcessing) {
                        Utils.showToast('処理中です。しばらくお待ちください');
                        return;
                    }
                    Utils.hideModal('admin-provisional-submit-modal');
                    Utils.showModal('processing-modal');

                    if (!this.currentViewingStudent) {
                        Utils.hideModal('processing-modal');
                        Utils.showToast('生徒が選択されていません');
                        return;
                    }

                    this.isProcessing = true;
                    try {
                        const studentId = this.currentViewingStudent['学籍番号'];
                        const studentName = this.currentViewingStudent['氏名'] || this.currentViewingStudent['名前'];
                        // 生徒側のsubmitRegistrationData()と同じパターンで●/○マークを統合
                        const combinedRegistrationData = { ...AppState.registrationData };

                        // 自動選択科目を追加（○マーク）
                        if (AppState.autoRegisteredCourses) {
                            AppState.autoRegisteredCourses.forEach(courseName => {
                                if (!combinedRegistrationData[courseName]) {
                                    const yearFromMap = AppState.inProgressCoursesYearMap?.[courseName];
                                    const courseInfo = getCourseByName(courseName);
                                    const year = yearFromMap || courseInfo?.['学年'] || Utils.getNextGrade();
                                    const suffix = AppState.isRetainedStudent ? 'N' : '';
                                    combinedRegistrationData[courseName] = `○${year}${suffix}`;
                                }
                            });
                        }

                        // 履修済み科目を追加（●マーク）
                        if (AppState.completedCourses) {
                            AppState.completedCourses.forEach(courseName => {
                                if (!combinedRegistrationData[courseName]) {
                                    const specifiedYear = AppState.completedCoursesYearMap?.[courseName];
                                    const courseInfo = getCourseByName(courseName);
                                    const year = specifiedYear || courseInfo?.['学年'] || 1;
                                    combinedRegistrationData[courseName] = `●${year}`;
                                }
                            });
                        }

                        // 留年生の○マークにNサフィックスを補完（防御的ガード）
                        ensureRetainedStudentNSuffix(combinedRegistrationData);

                        const registrationData = combinedRegistrationData;

                        const result = await DataManager.callGASFunction('adminSubmitRegistration', studentId, registrationData);

                        if (result.success) {
                            Utils.hideModal('processing-modal');
                            Utils.showToast(`${studentName}の仮登録を完了しました`);

                            // ステータスと科目データを更新
                            const studentIndex = this.studentsData.findIndex(s => s['学籍番号'] === studentId);
                            if (studentIndex !== -1) {
                                const student = this.studentsData[studentIndex];
                                student['ステータス'] = '仮登録';

                                // メタデータキーは保持し、既存の科目マークをクリアしてから新しいデータを反映
                                const metaKeys = new Set(['学籍番号', 'ステータス', '学年', '組', '番号', '名前', 'メールアドレス']);
                                Object.keys(student).forEach(key => {
                                    if (!metaKeys.has(key)) {
                                        delete student[key];
                                    }
                                });
                                Object.entries(registrationData).forEach(([key, value]) => {
                                    student[key] = value;
                                });

                                this.currentViewingStudent = student;
                            }

                            // ロック状態をリセット
                            this.isEditLocked = true;

                            // 左側一覧を更新
                            this.renderStudentsList();
                            // 詳細表示を更新（processRegistrationStatusが再実行されAppStateが最新化される）
                            await this.showStudentDetail(studentId);

                            // 仮登録対象が自分自身の場合、教員バックアップのソースデータを更新
                            // （switchToTopPageでprocessRegistrationStatusを再実行して全派生状態を再計算する）
                            if (AppState.authenticatedUser?.studentId === studentId) {
                                AppState.teacherRegistrationStatus = { status: '仮登録' };
                                // registrationDataにはparseRowDataの結果（●/○全マーク）が入っている
                                // これをstudentSubmissionData形式に変換してバックアップ
                                AppState.teacherStudentSubmissionData = {
                                    header: Object.keys(AppState.registrationData),
                                    row: Object.values(AppState.registrationData)
                                };
                            }
                        } else {
                            Utils.hideModal('processing-modal');
                            Utils.showToast(`仮登録に失敗しました: ${result.error}`);
                        }
                    } catch (error) {
                        console.error('仮登録エラー:', error);
                        Utils.hideModal('processing-modal');
                        Utils.showToast('仮登録処理でエラーが発生しました');
                    } finally {
                        this.isProcessing = false;
                    }
                },
