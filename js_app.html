                    this._hideRoleDropdownList();
                    var currentVal = input ? input.value.trim() : '';
                    var options = [
                        { value: '', label: '（空欄）' },
                        { value: '教務', label: '教務' },
                        { value: '管理者', label: '管理者' }
                    ];
                    td.style.position = 'relative';
                    var list = document.createElement('div');
                    list.id = 'staff-role-dropdown-list';
                    list.style.cssText = 'position: absolute; top: 100%; left: -1px; right: -1px; ' +
                        'background: #fff; border: 1px solid #1a73e8; border-top: none; ' +
                        'box-shadow: 0 4px 8px rgba(0,0,0,0.15); z-index: 100; ' +
                        'border-radius: 0 0 4px 4px; overflow: hidden;';
                    options.forEach(function(opt) {
                        var item = document.createElement('div');
                        item.textContent = opt.label;
                        var isActive = (currentVal === opt.value);
                        item.style.cssText = 'padding: 6px 10px; cursor: pointer; font-size: 0.9em; ' +
                            'text-align: center; ' +
                            (isActive ? 'background: #e8f0fe; color: #1a73e8; font-weight: bold;' : 'color: #333;');
                        item.addEventListener('mouseenter', function() {
                            if (!isActive) item.style.background = '#f5f5f5';
                        });
                        item.addEventListener('mouseleave', function() {
                            item.style.background = isActive ? '#e8f0fe' : '';
                        });
                        item.addEventListener('mousedown', function(e) {
                            e.stopPropagation();
                            e.preventDefault();
                            if (input) {
                                input.value = opt.value;
                                var idx = parseInt(input.getAttribute('data-idx'));
                                if (!isNaN(idx) && StaffManager._staffList[idx]) {
                                    StaffManager._staffList[idx]['権限'] = opt.value;
                                }
                                StaffManager._markDirty();
                            }
                            StaffManager._hideRoleDropdownList();
                        });
                        list.appendChild(item);
                    });
                    td.appendChild(list);
                    // 外クリックで閉じるリスナーを登録
                    setTimeout(function() {
                        StaffManager._roleDropdownCloseHandler = function(e) {
                            var listEl = document.getElementById('staff-role-dropdown-list');
                            var btnEl = document.getElementById('staff-role-dropdown-btn');
                            if (listEl && !listEl.contains(e.target) && (!btnEl || !btnEl.contains(e.target))) {
                                StaffManager._hideRoleDropdownList();
                            }
                        };
                        document.addEventListener('mousedown', StaffManager._roleDropdownCloseHandler);
                    }, 0);
                },

                // 権限列のドロップダウンリストを削除
                _hideRoleDropdownList() {
                    var list = document.getElementById('staff-role-dropdown-list');
                    if (list) list.remove();
                    if (this._roleDropdownCloseHandler) {
                        document.removeEventListener('mousedown', this._roleDropdownCloseHandler);
                        this._roleDropdownCloseHandler = null;
                    }
                },

                // 選択範囲のハイライトを更新（Excelライクなbox-shadow枠）
                _updateSelectionHighlight() {
                    // ドロップダウンボタンをリセット
                    this._hideRoleDropdownButton();
                    var table = document.querySelector('#staff-management-list table');
                    if (!table) return;
                    // theadのthスタイルもリセット
                    var thList = table.querySelectorAll('thead th');
                    for (var i = 0; i < thList.length; i++) {
                        thList[i].style.background = '';
                        thList[i].style.color = '#004294';
                    }
                    var allTds = table.querySelectorAll('tbody td');
                    for (var i = 0; i < allTds.length; i++) {
                        allTds[i].classList.remove('staff-cell-selected');
                        allTds[i].style.boxShadow = '';
                        allTds[i].style.backgroundColor = '';
                        allTds[i].style.color = '';
                    }
                    // 行番号セル（各行の最初のtd）のスタイルを復元
                    var trList = table.querySelectorAll('tbody tr');
                    for (var i = 0; i < trList.length; i++) {
                        if (trList[i].children[0]) {
                            trList[i].children[0].style.background = '#f8f9fa';
                            trList[i].children[0].style.color = '#999';
                        }
                    }
                    if (!this._selAnchor || !this._selEnd) return;
                    var minRow = Math.min(this._selAnchor.row, this._selEnd.row);
                    var maxRow = Math.max(this._selAnchor.row, this._selEnd.row);
                    var minCol = Math.min(this._selAnchor.col, this._selEnd.col);
                    var maxCol = Math.max(this._selAnchor.col, this._selEnd.col);
                    var isRange = (minRow !== maxRow || minCol !== maxCol);
                    var isFullRowSelect = (minCol === 1 && maxCol === 4);
                    var rows = table.querySelectorAll('tbody tr');
                    for (var r = minRow; r <= maxRow; r++) {
                        if (!rows[r]) continue;
                        var cells = rows[r].children;
                        // 行全体選択時は行番号セル（col=0）もハイライト
                        if (isFullRowSelect && cells[0]) {
                            cells[0].style.backgroundColor = '#4285f4';
                            cells[0].style.color = '#fff';
                        }
                        for (var c = minCol; c <= maxCol; c++) {
                            if (c < 1 || c >= 5 || !cells[c]) continue;
                            cells[c].classList.add('staff-cell-selected');
                            // 外周辺に太い青枠、内部に薄い仕切り線を表示
                            var shadows = [];
                            if (r === minRow) shadows.push('inset 0 2px 0 0 #1a73e8');
                            else shadows.push('inset 0 0.5px 0 0 #90bfff');
                            if (r === maxRow) shadows.push('inset 0 -2px 0 0 #1a73e8');
                            else shadows.push('inset 0 -0.5px 0 0 #90bfff');
                            if (c === minCol) shadows.push('inset 2px 0 0 0 #1a73e8');
                            else shadows.push('inset 0.5px 0 0 0 #90bfff');
                            if (c === maxCol) shadows.push('inset -2px 0 0 0 #1a73e8');
                            else shadows.push('inset -0.5px 0 0 0 #90bfff');
                            cells[c].style.boxShadow = shadows.join(', ');
                            // 範囲選択時は内部セルに薄い背景
                            if (isRange) cells[c].style.backgroundColor = '#d4e6ff';
                        }
                    }
                    // 単一セル選択かつ権限列（col=3）かつ非編集中の場合のみ▼ボタン表示
                    if (minRow === maxRow && minCol === maxCol && minCol === 3 && !this._editingCell) {
                        var roleTd = rows[minRow] ? rows[minRow].children[3] : null;
                        if (roleTd) this._showRoleDropdownButton(roleTd);
                    }
                    // 列選択中のヘッダーをハイライト
                    if (this._isColumnSelect) {
                        for (var c = minCol; c <= maxCol; c++) {
                            if (thList[c]) {
                                thList[c].style.background = '#4285f4';
                                thList[c].style.color = '#fff';
                            }
                        }
                    }
                },

                // 選択範囲をクリップボードにコピー
                _copySelection() {
                    if (!this._selAnchor || !this._selEnd) return;
                    var table = document.querySelector('#staff-management-list table');
                    if (!table) return;
                    var minRow = Math.min(this._selAnchor.row, this._selEnd.row);
                    var maxRow = Math.max(this._selAnchor.row, this._selEnd.row);
                    var minCol = Math.min(this._selAnchor.col, this._selEnd.col);
                    var maxCol = Math.max(this._selAnchor.col, this._selEnd.col);
                    var rows = table.querySelectorAll('tbody tr');
                    var lines = [];
                    for (var r = minRow; r <= maxRow; r++) {
                        if (!rows[r]) continue;
                        var cells = rows[r].children;
                        var vals = [];
                        for (var c = minCol; c <= maxCol; c++) {
                            if (c < 1 || c >= 5 || !cells[c]) { vals.push(''); continue; }
                            var el = cells[c].querySelector('input');
                            vals.push(el ? el.value : '');
                        }
                        lines.push(vals.join('\t'));
                    }
                    var text = lines.join('\n');
                    navigator.clipboard.writeText(text);
                    this._clipboardRange = { minRow: minRow, maxRow: maxRow, minCol: minCol, maxCol: maxCol, isCut: false };
                    this._updateClipboardHighlight();
                    // コピー後に選択を解除（マーチングアンツを即座に表示するため）
                    this._selAnchor = null;
                    this._selEnd = null;
                    this._updateSelectionHighlight();
                },

                // 選択範囲を切り取り（行ごと全列をクリップボードにコピー＋切り取りマーク）
                _cutSelection() {
                    if (!this._selAnchor || !this._selEnd) return;
                    var table = document.querySelector('#staff-management-list table');
                    if (!table) return;
                    var minRow = Math.min(this._selAnchor.row, this._selEnd.row);
                    var maxRow = Math.max(this._selAnchor.row, this._selEnd.row);
                    var minCol = Math.min(this._selAnchor.col, this._selEnd.col);
                    var maxCol = Math.max(this._selAnchor.col, this._selEnd.col);
                    var rows = table.querySelectorAll('tbody tr');
                    var lines = [];
                    for (var r = minRow; r <= maxRow; r++) {
                        if (!rows[r]) continue;
                        var cells = rows[r].children;
                        var vals = [];
                        for (var c = minCol; c <= maxCol; c++) {
                            if (c < 1 || c >= 5 || !cells[c]) { vals.push(''); continue; }
                            var el = cells[c].querySelector('input');
                            vals.push(el ? el.value : '');
                        }
                        lines.push(vals.join('\t'));
                    }
                    var text = lines.join('\n');
                    navigator.clipboard.writeText(text);
                    this._clipboardRange = { minRow: minRow, maxRow: maxRow, minCol: minCol, maxCol: maxCol, isCut: true };
                    this._updateClipboardHighlight();
                    // 切り取り後に選択を解除（マーチングアンツを即座に表示するため）
                    this._selAnchor = null;
                    this._selEnd = null;
                    this._updateSelectionHighlight();
                },

                // クリップボード範囲のマーチングアンツ表示を更新
                _updateClipboardHighlight() {
                    // まず既存のハイライトをすべてクリア
                    var existing = document.querySelectorAll('#staff-management-list .staff-cell-clipboard');
                    for (var i = 0; i < existing.length; i++) {
                        existing[i].classList.remove('staff-cell-clipboard');
                        existing[i].style.backgroundImage = '';
                        existing[i].style.backgroundSize = '';
                        existing[i].style.backgroundRepeat = '';
                        existing[i].style.backgroundColor = '';
                        existing[i].style.color = '';
                    }
                    // 行番号列のスタイルをデフォルトに復元
                    var allRowsForReset = document.querySelectorAll('#staff-management-list table tbody tr');
                    for (var i = 0; i < allRowsForReset.length; i++) {
                        if (allRowsForReset[i].children[0]) {
                            allRowsForReset[i].children[0].style.background = '#f8f9fa';
                            allRowsForReset[i].children[0].style.color = '#999';
                        }
                    }
                    if (!this._clipboardRange) return;
                    var range = this._clipboardRange;
                    var table = document.querySelector('#staff-management-list table');
                    if (!table) return;
                    var rows = table.querySelectorAll('tbody tr');
                    var color = '#1a73e8';
                    var transparent = 'transparent';
                    for (var r = range.minRow; r <= range.maxRow; r++) {
                        if (!rows[r]) continue;
                        var cells = rows[r].children;
                        // 切り取り時は行番号列（col 0）もハイライト
                        if (range.isCut && cells[0]) {
                            cells[0].style.backgroundColor = '#4285f4';
                            cells[0].style.color = '#fff';
                            cells[0].classList.add('staff-cell-clipboard');
                        }
                        for (var c = range.minCol; c <= range.maxCol; c++) {
                            if (!cells[c]) continue;
                            var isTop = (r === range.minRow);
                            var isBottom = (r === range.maxRow);
                            var isLeft = (c === range.minCol);
                            var isRight = (c === range.maxCol);
                            // 各辺の破線gradient（外辺のみ着色、内辺は透明）
                            var topGrad = 'repeating-linear-gradient(90deg, ' + (isTop ? color : transparent) + ' 0, ' + (isTop ? color : transparent) + ' 5px, ' + transparent + ' 5px, ' + transparent + ' 10px)';
                            var bottomGrad = 'repeating-linear-gradient(90deg, ' + (isBottom ? color : transparent) + ' 0, ' + (isBottom ? color : transparent) + ' 5px, ' + transparent + ' 5px, ' + transparent + ' 10px)';
                            var leftGrad = 'repeating-linear-gradient(0deg, ' + (isLeft ? color : transparent) + ' 0, ' + (isLeft ? color : transparent) + ' 5px, ' + transparent + ' 5px, ' + transparent + ' 10px)';
                            var rightGrad = 'repeating-linear-gradient(0deg, ' + (isRight ? color : transparent) + ' 0, ' + (isRight ? color : transparent) + ' 5px, ' + transparent + ' 5px, ' + transparent + ' 10px)';
                            cells[c].style.backgroundImage = topGrad + ', ' + bottomGrad + ', ' + leftGrad + ', ' + rightGrad;
                            cells[c].style.backgroundSize = '10px 2px, 10px 2px, 2px 10px, 2px 10px';
                            cells[c].style.backgroundRepeat = 'repeat-x, repeat-x, repeat-y, repeat-y';
                            cells[c].classList.add('staff-cell-clipboard');
                        }
                    }
                },

                // クリップボード範囲ハイライトをクリア
                _clearClipboardHighlight() {
                    this._clipboardRange = null;
                    this._updateClipboardHighlight();
                    navigator.clipboard.writeText('').catch(function() {});
                },

                // 選択範囲を削除/クリア
                _deleteSelection() {
                    if (!this._selAnchor || !this._selEnd) return;
                    this._saveUndoSnapshot();
                    var minRow = Math.min(this._selAnchor.row, this._selEnd.row);
                    var maxRow = Math.max(this._selAnchor.row, this._selEnd.row);
                    var minCol = Math.min(this._selAnchor.col, this._selEnd.col);
                    var maxCol = Math.max(this._selAnchor.col, this._selEnd.col);
                    var isFullRow = (minCol <= 1 && maxCol >= 4);
                    this._syncFromDOM();

                    if (isFullRow) {
                        // 全列選択 → 行削除
                        var deleteCount = maxRow - minRow + 1;

                        var table = document.querySelector('#staff-management-list table');
                        var rows = table ? table.querySelectorAll('tbody tr') : [];
                        // 削除対象のdata-idxを収集（自分自身はスキップ）
                        var indicesToRemove = [];
                        for (var r = minRow; r <= maxRow; r++) {
                            if (!rows[r]) continue;
                            var el = rows[r].querySelector('[data-idx]');
                            if (!el) continue;
                            var idx = parseInt(el.getAttribute('data-idx'));
                            // 自分自身の行はスキップ
                            var emailEl = rows[r].querySelector('[data-field="メールアドレス"]');
                            if (emailEl && emailEl.value.trim().toLowerCase() === this._currentUserEmail) continue;
                            indicesToRemove.push(idx);
                        }
                        // インデックス降順で削除（配列のずれ防止）
                        indicesToRemove.sort(function(a, b) { return b - a; });
                        for (var i = 0; i < indicesToRemove.length; i++) {
                            this._staffList.splice(indicesToRemove[i], 1);
                        }
                        this._selAnchor = null;
                        this._selEnd = null;
                        // _markDirty()は呼ばない（_syncFromDOMがsplice後のデータを破壊するため）
                        this.renderStaffList();
                        this._isDirty = JSON.stringify(this._staffList) !== this._originalData;
                        this._updateDirtyIndicator();
                    } else {
                        // 部分選択 → セルの値をクリア
                        var table = document.querySelector('#staff-management-list table');
                        var rows = table ? table.querySelectorAll('tbody tr') : [];
                        for (var r = minRow; r <= maxRow; r++) {
                            if (!rows[r]) continue;
                            var cells = rows[r].children;
                            for (var c = minCol; c <= maxCol; c++) {
                                if (c < 1 || c >= 5 || !cells[c]) continue;
                                var el = cells[c].querySelector('input');
                                if (el) {
                                    el.value = '';
                                    var idx = parseInt(el.getAttribute('data-idx'));
                                    var field = el.getAttribute('data-field');
                                    if (!isNaN(idx) && field && this._staffList[idx]) {
                                        this._staffList[idx][field] = '';
                                    }
                                }
                            }
                        }
                        this._markDirty();
                    }
                },

                // 右クリックコンテキストメニューを表示
                _showContextMenu(e) {
                    var menu = document.getElementById('staff-context-menu');
                    if (!menu) return;
                    // 右クリック行の表示インデックスを保持
                    var td = e.target.closest('td');
                    var tr = td ? td.closest('tr') : null;
                    var tbody = tr ? tr.closest('tbody') : null;
                    if (tbody && tr) {
                        var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
                        this._contextMenuRow = rows.indexOf(tr);
                    }
                    // Undoスタック空ならグレーアウト
                    var undoItem = menu.querySelector('[data-action="undo"]');
                    if (undoItem) {
                        if (this._undoStack.length === 0) {
                            undoItem.style.color = '#ccc';
                            undoItem.style.pointerEvents = 'none';
                        } else {
                            undoItem.style.color = '';
                            undoItem.style.pointerEvents = '';
                        }
                    }
                    // 「コピーしたセルを挿入」のグレーアウト制御
                    var pasteInsertItem = menu.querySelector('[data-action="paste-insert"]');
                    if (pasteInsertItem) {
                        if (this._clipboardRange) {
                            pasteInsertItem.style.color = '';
                            pasteInsertItem.style.pointerEvents = '';
                        } else {
                            pasteInsertItem.style.color = '#ccc';
                            pasteInsertItem.style.pointerEvents = 'none';
                        }
                    }
                    // 列選択中は構造変更操作をグレーアウト
                    var colSelectActions = ['cut', 'paste-insert', 'insert-above', 'insert-below', 'delete-row'];
                    colSelectActions.forEach(function(action) {
                        var item = menu.querySelector('[data-action="' + action + '"]');
                        if (item) {
                            if (StaffManager._isColumnSelect) {
                                item.style.color = '#ccc';
                                item.style.pointerEvents = 'none';
                            } else {
                                // paste-insertは別途制御されるためスキップ
                                if (action !== 'paste-insert') {
                                    item.style.color = '';
                                    item.style.pointerEvents = '';
                                }
                            }
                        }
                    });
                    // メニューを表示して位置を設定
                    menu.style.display = 'block';
                    var menuW = menu.offsetWidth;
                    var menuH = menu.offsetHeight;
                    var x = e.clientX;
                    var y = e.clientY;
                    // 画面端はみ出し補正
                    if (x + menuW > window.innerWidth) x = window.innerWidth - menuW - 4;
                    if (y + menuH > window.innerHeight) y = window.innerHeight - menuH - 4;
                    menu.style.left = x + 'px';
                    menu.style.top = y + 'px';

                    // メニュー項目のクリックイベント（一度だけ登録）
                    if (!menu._listenersAttached) {
                        menu._listenersAttached = true;
                        menu.addEventListener('mousedown', function(ev) {
                            var item = ev.target.closest('.staff-ctx-item');
                            if (!item) return;
                            ev.preventDefault();
                            ev.stopPropagation();
                            var action = item.getAttribute('data-action');
                            var row = StaffManager._contextMenuRow;
                            StaffManager._hideContextMenu();
                            if (action === 'undo') {
                                StaffManager._undo();
                            } else if (action === 'clear') {
                                StaffManager._clearSelection();
                            } else if (action === 'insert-above') {
                                StaffManager._insertRow(row, 'above');
                            } else if (action === 'insert-below') {
                                StaffManager._insertRow(row, 'below');
                            } else if (action === 'copy') {
                                StaffManager._copySelection();
                            } else if (action === 'cut') {
                                StaffManager._cutSelection();
                            } else if (action === 'paste') {
                                navigator.clipboard.readText().then(function(text) {
                                    if (!text) return;
                                    // 選択範囲のアンカーセルを起点に貼り付け
                                    var table = document.querySelector('#staff-management-list table');
                                    if (!table || !StaffManager._selAnchor) return;
                                    var rows = table.querySelectorAll('tbody tr');
                                    var anchorRow = rows[StaffManager._selAnchor.row];
                                    if (!anchorRow) return;
                                    var anchorTd = anchorRow.children[StaffManager._selAnchor.col];
                                    var anchorInput = anchorTd ? anchorTd.querySelector('input') : null;
                                    if (anchorInput) StaffManager._pasteMultiCell(anchorInput, text);
                                }).catch(function() {
                                    Utils.showToast('クリップボードへのアクセスが拒否されました', 'error');
                                });
                            } else if (action === 'paste-insert') {
                                navigator.clipboard.readText().then(function(text) {
                                    if (!text) return;
                                    var table = document.querySelector('#staff-management-list table');
                                    if (!table || !StaffManager._selAnchor) return;
                                    var rows = table.querySelectorAll('tbody tr');
                                    var anchorRow = rows[StaffManager._selAnchor.row];
                                    if (!anchorRow) return;
                                    var anchorTd = anchorRow.children[StaffManager._selAnchor.col];
                                    var anchorInput = anchorTd ? anchorTd.querySelector('input') : null;
                                    if (anchorInput) StaffManager._pasteMultiCell(anchorInput, text, true);
                                }).catch(function() {
                                    Utils.showToast('クリップボードへのアクセスが拒否されました', 'error');
                                });
                            } else if (action === 'delete-row') {
                                // 行全体選択にしてから削除を呼ぶ
                                if (StaffManager._selAnchor) {
                                    var minR = Math.min(StaffManager._selAnchor.row, StaffManager._selEnd.row);
                                    var maxR = Math.max(StaffManager._selAnchor.row, StaffManager._selEnd.row);
                                    StaffManager._selAnchor = { row: minR, col: 1 };
                                    StaffManager._selEnd = { row: maxR, col: 4 };
                                }
                                StaffManager._deleteSelection();
                            }
                        });
                    }
                },

                // コンテキストメニューを非表示
                _hideContextMenu() {
                    var menu = document.getElementById('staff-context-menu');
                    if (menu) menu.style.display = 'none';
                },

                // 行を挿入（displayIdx: 表示行インデックス、position: 'above' or 'below'）
                _insertRow(displayIdx, position) {
                    this._saveUndoSnapshot();
                    this._syncFromDOM();
                    // 表示インデックスからデータインデックスに変換
                    var table = document.querySelector('#staff-management-list table');
                    if (!table) return;
                    var rows = table.querySelectorAll('tbody tr');
                    var targetRow = rows[displayIdx];
                    if (!targetRow) return;
                    var el = targetRow.querySelector('[data-idx]');
                    if (!el) return;
                    var dataIdx = parseInt(el.getAttribute('data-idx'));
                    if (isNaN(dataIdx)) return;
                    // 挿入位置を計算
                    var insertAt = position === 'below' ? dataIdx + 1 : dataIdx;
                    // 空行を作成
                    var nameKey = this._headers.indexOf('氏名') !== -1 ? '氏名' : '名前';
                    var newItem = {};
                    newItem[nameKey] = '';
                    newItem['メールアドレス'] = '';
                    newItem['権限'] = '';
                    newItem['クラス'] = '';
                    this._staffList.splice(insertAt, 0, newItem);
                    // _markDirty()は呼ばない（_syncFromDOMがsplice後のデータを破壊するため）
                    this.renderStaffList();
                    this._isDirty = JSON.stringify(this._staffList) !== this._originalData;
                    this._updateDirtyIndicator();
                },

                // Undoスナップショットを保存
                _saveUndoSnapshot() {
                    this._syncFromDOM();
                    this._undoStack.push(JSON.stringify(this._staffList));
                    // 最大50件
                    if (this._undoStack.length > 50) this._undoStack.shift();
                },

                // 元に戻す
                _undo() {
                    if (this._undoStack.length === 0) return;
                    this._stopEditing();
                    var snapshot = this._undoStack.pop();
                    this._staffList = JSON.parse(snapshot);
                    // 変更フラグを再判定
                    this._isDirty = JSON.stringify(this._staffList) !== this._originalData;
                    this._updateDirtyIndicator();
                    // 選択状態リセット
                    this._selAnchor = null;
                    this._selEnd = null;
                    this.renderStaffList();
                },

                // 選択セルの内容をクリア（行は削除しない）
                _clearSelection() {
                    if (!this._selAnchor || !this._selEnd) return;
                    this._saveUndoSnapshot();
                    this._syncFromDOM();
                    var minRow = Math.min(this._selAnchor.row, this._selEnd.row);
                    var maxRow = Math.max(this._selAnchor.row, this._selEnd.row);
                    var minCol = Math.min(this._selAnchor.col, this._selEnd.col);
                    var maxCol = Math.max(this._selAnchor.col, this._selEnd.col);
                    var table = document.querySelector('#staff-management-list table');
                    var rows = table ? table.querySelectorAll('tbody tr') : [];
                    for (var r = minRow; r <= maxRow; r++) {
                        if (!rows[r]) continue;
                        var cells = rows[r].children;
                        for (var c = minCol; c <= maxCol; c++) {
                            if (c < 1 || c >= 5 || !cells[c]) continue;
                            var el = cells[c].querySelector('input');
                            if (el) {
                                el.value = '';
                                var idx = parseInt(el.getAttribute('data-idx'));
                                var field = el.getAttribute('data-field');
                                if (!isNaN(idx) && field && this._staffList[idx]) {
                                    this._staffList[idx][field] = '';
                                }
                            }
                        }
                    }
                    this._markDirty();
                }
            };

            // StaffManagerをグローバルに公開
            window.StaffManager = StaffManager;

            // ===== 生徒データ管理（Excel風UI） =====
            const StudentManager = {
                _studentList: [],            // 取得済み生徒一覧
                _headers: [],                // ヘッダー配列
                _originalData: null,         // 開いた時のスナップショット（変更検知用）
                _isDirty: false,             // 未保存変更フラグ
                _selAnchor: null,            // セル範囲選択の起点 {row, col}
                _selEnd: null,               // セル範囲選択の終点 {row, col}
                _isDragging: false,          // ドラッグ選択中フラグ
                _editingCell: null,          // 編集中セル {row, col}
                _scrollInterval: null,       // 自動スクロール用タイマー
                _isRowSelecting: false,      // 行番号ドラッグ中フラグ
                _isColumnSelect: false,      // 列選択中フラグ
                _docListenersAttached: false, // documentレベルリスナー登録済みフラグ
                _contextMenuRow: -1,         // 右クリック時の表示行インデックス
                _undoStack: [],              // Undoスナップショットスタック
                _clipboardRange: null,       // コピー/切り取り範囲 { minRow, maxRow, minCol, maxCol, isCut: boolean }
                // フィールド定義（col 1〜7に対応、基本列のみ）
                _fields: ['学籍番号', '学年', '組', '番号', '名前', 'メールアドレス', '来年度学年'],

                // 現在表示中のフィールドリストを返す
                _getVisibleFields() {
                    return this._fields.slice();
                },

                // 現在の最大データ列インデックスを返す
                _getMaxCol() {
                    return this._getVisibleFields().length;
                },

                // モーダルを開いて生徒一覧を表示
                async openModal() {
                    const listEl = document.getElementById('student-management-list');
                    listEl.innerHTML = '<div style="text-align: center; padding: 40px; color: #6c757d;">' +
                        '<div style="display: inline-block; width: 32px; height: 32px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite;"></div>' +
                        '<p style="margin-top: 10px; color: #666; font-size: 0.85em;">読み込み中...</p></div>';
                    this._isDirty = false;
                    this._updateDirtyIndicator();
                    Utils.showModal('student-management-modal');

                    try {
                        const result = await DataManager.callGASFunction('getStudentList');
                        if (!result || !result.success) {
                            listEl.innerHTML = '<div style="text-align: center; padding: 40px; color: #dc3545;">' +
                                (result?.error || 'データの取得に失敗しました') + '</div>';
                            return;
                        }
                        this._studentList = result.students || [];
                        this._headers = result.headers || [];
                        this._isDirty = false;
                        this._undoStack = [];
                        this._sortByGradeClassNumber();
                        this.renderStudentList();
                        this._originalData = JSON.stringify(this._studentList);
                        this._updateDirtyIndicator();
                    } catch (e) {
                        console.error('[生徒管理] 取得エラー:', e);
                        listEl.innerHTML = '<div style="text-align: center; padding: 40px; color: #dc3545;">エラーが発生しました</div>';
                    }
                },

                closeModal() {
                    if (this._isDirty) {
                        if (!confirm('未保存の変更があります。閉じてもよろしいですか？')) {
                            return;
                        }
                    }
                    this._clearClipboardHighlight();
                    Utils.hideModal('student-management-modal');
                },

                // 編集可能テーブルで生徒一覧を描画
                renderStudentList() {
                    const listEl = document.getElementById('student-management-list');

                    // テーブル再構築前にフォーカス状態を保存
                    var oldTable = listEl.querySelector('table');
                    var hadFocus = oldTable && (oldTable === document.activeElement || oldTable.contains(document.activeElement));

                    // 末尾に空行を確保
                    this._ensureEmptyRow();

                    var self = this;
                    var inputStyle = 'width: 100%; padding: 4px 6px; font-size: 0.9em; box-sizing: border-box;';
                    let html = '<table tabindex="0" style="width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.9em; outline: none;">';
                    var thBase = 'padding: 6px 8px; border: 1px solid #dee2e6; color: #004294; font-weight: bold; cursor: pointer;';
                    html += '<thead><tr style="background: linear-gradient(135deg, #e3f2fd 0%, #f1f8ff 100%);">' +
                        '<th style="padding: 6px 4px; text-align: center; border: 1px solid #dee2e6; color: #999; width: 32px; font-weight: normal; font-size: 0.8em;"></th>' +
                        '<th style="' + thBase + ' text-align: left; width: 100px;">学籍番号</th>' +
                        '<th style="' + thBase + ' text-align: center; width: 50px;">学年</th>' +
                        '<th style="' + thBase + ' text-align: center; width: 50px;">組</th>' +
                        '<th style="' + thBase + ' text-align: center; width: 50px;">番号</th>' +
                        '<th style="' + thBase + ' text-align: left;">名前</th>' +
                        '<th style="' + thBase + ' text-align: left;">メールアドレス</th>' +
                        '<th style="' + thBase + ' text-align: center; width: 100px;">来年度学年</th>';
                    html += '</tr></thead><tbody>';
                    this._studentList.forEach(function(s, idx) {
                        var studentId = String(s['学籍番号'] || '');
                        var grade = String(s['学年'] ?? '').trim();
                        var classNum = String(s['組'] || '');
                        var number = String(s['番号'] || '');
                        var name = String(s['名前'] || '');
                        var email = String(s['メールアドレス'] || '');
                        var nextGrade = String(s['来年度学年'] || '').trim();

                        // 学年selectのHTML
                        var gradeHtml = '<select data-idx="' + idx + '" data-field="学年" ' +
                            'oninput="StudentManager._markDirty()" ' +
                            'style="' + inputStyle + '">' +
                            '<option value=""' + (grade !== '0' && grade !== '1' && grade !== '2' && grade !== '3' ? ' selected' : '') + '></option>' +
                            '<option value="0"' + (grade === '0' ? ' selected' : '') + '>0</option>' +
                            '<option value="1"' + (grade === '1' ? ' selected' : '') + '>1</option>' +
                            '<option value="2"' + (grade === '2' ? ' selected' : '') + '>2</option>' +
                            '<option value="3"' + (grade === '3' ? ' selected' : '') + '>3</option>' +
                            '</select>';

                        // 来年度学年inputのHTML
                        var nextGradeHtml = '<input type="text" data-idx="' + idx + '" data-field="来年度学年" value="' + self._escapeAttr(nextGrade) + '" ' +
                            'oninput="StudentManager._markDirty()" style="' + inputStyle + '">';

                        html += '<tr>' +
                            '<td style="padding: 4px 2px; border: 1px solid #dee2e6; text-align: center; color: #999; font-size: 0.8em; cursor: pointer; user-select: none; background: #f8f9fa;">' + (idx + 1) + '</td>' +
                            '<td style="padding: 4px 6px; border: 1px solid #dee2e6;">' +
                                '<input type="text" data-idx="' + idx + '" data-field="学籍番号" value="' + self._escapeAttr(studentId) + '" ' +
                                'oninput="StudentManager._markDirty()" style="' + inputStyle + '"></td>' +
                            '<td style="padding: 4px 6px; border: 1px solid #dee2e6;">' + gradeHtml + '</td>' +
                            '<td style="padding: 4px 6px; border: 1px solid #dee2e6;">' +
                                '<input type="text" data-idx="' + idx + '" data-field="組" value="' + self._escapeAttr(classNum) + '" ' +
                                'oninput="StudentManager._markDirty()" style="' + inputStyle + '"></td>' +
                            '<td style="padding: 4px 6px; border: 1px solid #dee2e6;">' +
                                '<input type="text" data-idx="' + idx + '" data-field="番号" value="' + self._escapeAttr(number) + '" ' +
                                'oninput="StudentManager._markDirty()" style="' + inputStyle + '"></td>' +
                            '<td style="padding: 4px 6px; border: 1px solid #dee2e6;">' +
                                '<input type="text" data-idx="' + idx + '" data-field="名前" value="' + self._escapeAttr(name) + '" ' +
                                'oninput="StudentManager._markDirty()" style="' + inputStyle + '"></td>' +
                            '<td style="padding: 4px 6px; border: 1px solid #dee2e6;">' +
                                '<input type="email" data-idx="' + idx + '" data-field="メールアドレス" value="' + self._escapeAttr(email) + '" ' +
                                'oninput="StudentManager._markDirty()" style="' + inputStyle + '"></td>' +
                            '<td style="padding: 4px 6px; border: 1px solid #dee2e6;">' + nextGradeHtml + '</td>';

                        html += '</tr>';
                    });
                    html += '</tbody></table>';

                    listEl.innerHTML = html;

                    // テーブルにイベントリスナーを追加
                    var table = listEl.querySelector('table');
                    if (table) {
                        // セル範囲選択（クリック / Shift+クリック / ドラッグ）
                        table.addEventListener('mousedown', function(e) {
                            if (StudentManager._editingCell) {
                                var editTd = e.target.closest('td');
                                if (editTd && editTd.classList.contains('student-cell-editing')) return;
                            }
                            if (e.button === 2) return;

                            // ヘッダークリック → 列全体選択
                            var th = e.target.closest('th');
                            if (th && th.closest('thead')) {
                                var colIdx = Array.prototype.indexOf.call(th.closest('tr').children, th);
                                if (colIdx === 0) return; // 左上セルは無視
                                StudentManager._stopEditing();
                                var tbody = table.querySelector('tbody');
                                var rowCount = tbody ? tbody.querySelectorAll('tr').length : 0;
                                if (rowCount === 0) return;
                                if (e.shiftKey && StudentManager._selAnchor) {
                                    StudentManager._selAnchor = { row: 0, col: StudentManager._selAnchor.col };
                                    StudentManager._selEnd = { row: rowCount - 1, col: colIdx };
                                } else {
                                    StudentManager._selAnchor = { row: 0, col: colIdx };
                                    StudentManager._selEnd = { row: rowCount - 1, col: colIdx };
                                }
                                StudentManager._isColumnSelect = true;
                                StudentManager._updateSelectionHighlight();
                                e.preventDefault();
                                table.focus();
                                return;
                            }

                            var td = e.target.closest('td');
                            if (!td) return;
                            var tr = td.closest('tr');
                            var tbody = tr ? tr.closest('tbody') : null;
                            if (!tbody) return;
                            var colIdx = Array.prototype.indexOf.call(tr.children, td);
                            if (colIdx > StudentManager._getMaxCol()) return;
                            var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
                            var rowIdx = rows.indexOf(tr);
                            if (rowIdx === -1) return;

                            StudentManager._stopEditing();
                            StudentManager._isColumnSelect = false;

                            if (colIdx === 0) {
                                if (e.shiftKey && StudentManager._selAnchor) {
                                    StudentManager._selAnchor = { row: StudentManager._selAnchor.row, col: 1 };
                                    StudentManager._selEnd = { row: rowIdx, col: StudentManager._getMaxCol() };
                                } else {
                                    StudentManager._selAnchor = { row: rowIdx, col: 1 };
                                    StudentManager._selEnd = { row: rowIdx, col: StudentManager._getMaxCol() };
                                    StudentManager._isDragging = true;
                                    StudentManager._isRowSelecting = true;
                                }
                                StudentManager._updateSelectionHighlight();
                                e.preventDefault();
                                table.focus();
                                return;
                            }

                            var pos = { row: rowIdx, col: colIdx };
                            if (e.shiftKey && StudentManager._selAnchor) {
                                StudentManager._selEnd = pos;
                            } else {
                                StudentManager._selAnchor = pos;
                                StudentManager._selEnd = pos;
                                StudentManager._isDragging = true;
                            }
                            e.preventDefault();
                            table.focus();
                            StudentManager._updateSelectionHighlight();

                            // 科目セルはシングルクリックで即編集開始
                            if (!e.shiftKey && td.hasAttribute('data-field') && td.hasAttribute('data-idx') && !td.querySelector('input, select')) {
                                StudentManager._startEditing(rowIdx, colIdx);
                            }
                        });

                        // 右クリックでコンテキストメニュー表示
                        table.addEventListener('contextmenu', function(e) {
                            // ヘッダー上の右クリック: 列選択済みならメニュー表示
                            var th = e.target.closest('th');
                            if (th && th.closest('thead') && StudentManager._isColumnSelect) {
                                e.preventDefault();
                                StudentManager._showContextMenu(e);
                                return;
                            }
                            var td = e.target.closest('td');
                            if (!td) return;
                            var tr = td.closest('tr');
                            var tbody = tr ? tr.closest('tbody') : null;
                            if (!tbody) return;
                            var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
                            var rowIdx = rows.indexOf(tr);
                            if (rowIdx === -1) return;
                            e.preventDefault();
                            if (StudentManager._selAnchor && StudentManager._selEnd) {
                                var minRow = Math.min(StudentManager._selAnchor.row, StudentManager._selEnd.row);
                                var maxRow = Math.max(StudentManager._selAnchor.row, StudentManager._selEnd.row);
                                if (rowIdx < minRow || rowIdx > maxRow) {
                                    StudentManager._selAnchor = { row: rowIdx, col: 1 };
                                    StudentManager._selEnd = { row: rowIdx, col: StudentManager._getMaxCol() };
                                    StudentManager._updateSelectionHighlight();
                                }
                            } else {
                                StudentManager._selAnchor = { row: rowIdx, col: 1 };
                                StudentManager._selEnd = { row: rowIdx, col: StudentManager._getMaxCol() };
                                StudentManager._updateSelectionHighlight();
                            }
                            StudentManager._showContextMenu(e);
                        });

                        // ダブルクリックで編集モード開始
                        table.addEventListener('dblclick', function(e) {
                            var td = e.target.closest('td');
                            if (!td) return;
                            var tr = td.closest('tr');
                            var tbody = tr ? tr.closest('tbody') : null;
                            if (!tbody) return;
                            var colIdx = Array.prototype.indexOf.call(tr.children, td);
                            if (colIdx < 1 || colIdx > StudentManager._getMaxCol()) return;
                            var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
                            var rowIdx = rows.indexOf(tr);
                            if (rowIdx === -1) return;
                            StudentManager._startEditing(rowIdx, colIdx);
                        });

                        // ドラッグ中のセル範囲拡張
                        table.addEventListener('mousemove', function(e) {
                            if (!StudentManager._isDragging) return;
                            var td = e.target.closest('td');
                            if (!td) return;
                            var tr = td.closest('tr');
                            var tbody = tr ? tr.closest('tbody') : null;
                            if (!tbody) return;
                            var colIdx = Array.prototype.indexOf.call(tr.children, td);
                            if (colIdx > StudentManager._getMaxCol()) return;
                            var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
                            var rowIdx = rows.indexOf(tr);
                            if (rowIdx === -1) return;
                            if (StudentManager._isRowSelecting) {
                                StudentManager._selEnd = { row: rowIdx, col: StudentManager._getMaxCol() };
                                StudentManager._updateSelectionHighlight();
                            } else {
                                if (colIdx < 1) colIdx = 1;
                                StudentManager._selEnd = { row: rowIdx, col: colIdx };
                                StudentManager._updateSelectionHighlight();
                            }

                            // ドラッグ中の自動スクロール
                            var container = document.getElementById('student-management-list');
                            if (container) {
                                var rect = container.getBoundingClientRect();
                                var EDGE = 30;
                                var SPEED = 6;
                                var mouseY = e.clientY;
                                clearInterval(StudentManager._scrollInterval);
                                StudentManager._scrollInterval = null;
                                if (mouseY < rect.top + EDGE) {
                                    StudentManager._scrollInterval = setInterval(function() {
                                        container.scrollTop -= SPEED;
                                    }, 16);
                                } else if (mouseY > rect.bottom - EDGE) {
                                    StudentManager._scrollInterval = setInterval(function() {
                                        container.scrollTop += SPEED;
                                    }, 16);
                                }
                            }
                        });

                        // ドラッグ終了・テーブル外クリック（documentレベルは1回だけ登録）
                        if (!StudentManager._docListenersAttached) {
                            StudentManager._docListenersAttached = true;

                            document.addEventListener('mouseup', function() {
                                StudentManager._isDragging = false;
                                StudentManager._isRowSelecting = false;
                                clearInterval(StudentManager._scrollInterval);
                                StudentManager._scrollInterval = null;
                            });

                            document.addEventListener('mousedown', function(e) {
                                var ctxMenu = document.getElementById('student-context-menu');
                                if (ctxMenu && ctxMenu.style.display !== 'none' && !ctxMenu.contains(e.target)) {
                                    StudentManager._hideContextMenu();
                                }
                                var currentTable = document.querySelector('#student-management-list table');
                                if (currentTable && !currentTable.contains(e.target) && !(ctxMenu && ctxMenu.contains(e.target))) {
                                    StudentManager._stopEditing();
                                    if (StudentManager._selAnchor) {
                                        StudentManager._selAnchor = null;
                                        StudentManager._selEnd = null;
                                        StudentManager._updateSelectionHighlight();
                                    }
                                }
                            });
                        }

                        // スクロール時にコンテキストメニューを閉じる
                        listEl.addEventListener('scroll', function() {
                            StudentManager._hideContextMenu();
                        });

                        // 編集終了検知（focusout イベント委譲）
                        table.addEventListener('focusout', function(e) {
                            if (!StudentManager._editingCell) return;
                            var target = e.target;
                            if (target.tagName !== 'INPUT' && target.tagName !== 'SELECT') return;
                            var td = target.closest('td');
                            setTimeout(function() {
                                var newFocus = document.activeElement;
                                if (td && td.contains(newFocus)) return;
                                if (newFocus === table) return;
                                StudentManager._editingCell = null;
                                if (td) td.classList.remove('student-cell-editing');
                            }, 0);
                        });

                        // 複数セル一括貼り付け
                        table.addEventListener('paste', function(e) {
                            var clipText = (e.clipboardData || window.clipboardData).getData('text');
                            if (!clipText) return;

                            if (StudentManager._editingCell && (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT')) {
                                if (clipText.indexOf('\t') === -1 && clipText.indexOf('\n') === -1) return;
                                e.preventDefault();
                                StudentManager._pasteMultiCell(e.target, clipText);
                                return;
                            }

                            if (!StudentManager._editingCell && StudentManager._selAnchor) {
                                e.preventDefault();
                                var rows = table.querySelectorAll('tbody tr');
                                var anchorRow = rows[StudentManager._selAnchor.row];
                                if (!anchorRow) return;
                                var anchorTd = anchorRow.children[StudentManager._selAnchor.col];
                                var anchorInput = anchorTd ? (anchorTd.querySelector('input, select') ||
                                    (anchorTd.hasAttribute('data-field') ? anchorTd : null)) : null;
                                if (anchorInput) StudentManager._pasteMultiCell(anchorInput, clipText);
                            }
                        });

                        // キーボードナビゲーション
                        table.addEventListener('keydown', function(e) {
                            var isEditing = StudentManager._editingCell !== null;
                            var hasSel = StudentManager._selAnchor && StudentManager._selEnd;

                            if (e.isComposing) return;

                            if (e.key === 'Enter') {
                                if (isEditing) {
                                    e.preventDefault();
                                    var editRow = StudentManager._editingCell.row;
                                    var editCol = StudentManager._editingCell.col;
                                    StudentManager._stopEditing();
                                    var newRow = editRow + 1;
                                    var rows = table.querySelectorAll('tbody tr');
                                    if (newRow < rows.length) {
                                        StudentManager._selAnchor = { row: newRow, col: editCol };
                                        StudentManager._selEnd = { row: newRow, col: editCol };
                                        StudentManager._updateSelectionHighlight();
                                    }
                                } else if (hasSel) {
                                    e.preventDefault();
                                    StudentManager._startEditing(StudentManager._selAnchor.row, StudentManager._selAnchor.col);
                                }
                                return;
                            }

                            if (e.key === 'F2' && !isEditing && hasSel) {
                                e.preventDefault();
                                StudentManager._startEditing(StudentManager._selAnchor.row, StudentManager._selAnchor.col);
                                return;
                            }

                            if (e.key === 'Escape') {
                                var ctxMenu = document.getElementById('student-context-menu');
                                if (ctxMenu && ctxMenu.style.display !== 'none') {
                                    StudentManager._hideContextMenu();
                                    return;
                                }
                                if (isEditing) {
                                    e.preventDefault();
                                    StudentManager._stopEditing();
                                } else if (StudentManager._clipboardRange) {
                                    StudentManager._clearClipboardHighlight();
                                }
                                return;
                            }

                            if (e.key === 'Tab' && isEditing) {
                                e.preventDefault();
                                var tabRow = StudentManager._editingCell.row;
                                var tabCol = StudentManager._editingCell.col;
                                StudentManager._stopEditing();
                                var nextCol = e.shiftKey ? tabCol - 1 : tabCol + 1;
                                var nextRow = tabRow;
                                if (nextCol > StudentManager._getMaxCol()) { nextCol = 1; nextRow++; }
                                if (nextCol < 1) { nextCol = StudentManager._getMaxCol(); nextRow--; }
                                var tbodyRows = table.querySelectorAll('tbody tr');
                                if (nextRow >= 0 && nextRow < tbodyRows.length) {
                                    StudentManager._selAnchor = { row: nextRow, col: nextCol };
                                    StudentManager._selEnd = { row: nextRow, col: nextCol };
                                    StudentManager._updateSelectionHighlight();
                                    StudentManager._startEditing(nextRow, nextCol);
                                }
                                return;
                            }

                            if (!isEditing && hasSel && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].indexOf(e.key) !== -1) {
                                e.preventDefault();
                                var anchor = StudentManager._selAnchor;
                                var newPos = { row: anchor.row, col: anchor.col };
                                if (e.key === 'ArrowUp') newPos.row = Math.max(0, anchor.row - 1);
                                if (e.key === 'ArrowDown') newPos.row = anchor.row + 1;
                                if (e.key === 'ArrowLeft') newPos.col = Math.max(1, anchor.col - 1);
                                if (e.key === 'ArrowRight') newPos.col = Math.min(StudentManager._getMaxCol(), anchor.col + 1);
                                var navRows = table.querySelectorAll('tbody tr');
                                if (newPos.row >= navRows.length) newPos.row = navRows.length - 1;
                                if (e.shiftKey) {
                                    StudentManager._selEnd = newPos;
                                } else {
                                    StudentManager._selAnchor = newPos;
                                    StudentManager._selEnd = newPos;
                                }
                                StudentManager._updateSelectionHighlight();
                                // 移動先セルへスクロール追従
                                if (navRows[newPos.row]) {
                                    navRows[newPos.row].scrollIntoView({ block: 'nearest' });
                                    // stickyヘッダーに隠れた場合の補正
                                    var stickyTh = table.querySelector('thead th');
                                    if (stickyTh) {
                                        var headerBottom = stickyTh.getBoundingClientRect().bottom;
                                        var rowTop = navRows[newPos.row].getBoundingClientRect().top;
                                        if (rowTop < headerBottom) {
                                            table.parentElement.scrollTop -= (headerBottom - rowTop);
                                        }
                                    }
                                }
                                return;
                            }

                            if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !isEditing) {
                                e.preventDefault();
                                StudentManager._undo();
                                return;
                            }

                            if ((e.ctrlKey || e.metaKey) && e.key === 'c' && hasSel) {
                                if (isEditing) {
                                    var active = document.activeElement;
                                    if (active && active.tagName === 'INPUT' && active.selectionStart !== active.selectionEnd) return;
                                }
                                e.preventDefault();
                                StudentManager._copySelection();
                                return;
                            }

                            if ((e.ctrlKey || e.metaKey) && e.key === 'x' && hasSel) {
                                if (StudentManager._isColumnSelect) return; // 列選択中は切り取り不可
                                if (isEditing) {
                                    var active = document.activeElement;
                                    if (active && active.tagName === 'INPUT' && active.selectionStart !== active.selectionEnd) return;
                                }
                                e.preventDefault();
                                StudentManager._cutSelection();
                                return;
                            }

                            if ((e.key === 'Delete' || e.key === 'Backspace') && hasSel && !isEditing) {
                                e.preventDefault();
                                StudentManager._clearSelection();
                                return;
                            }
                        });
                    }
                    // フォーカス復元
                    if (hadFocus) {
                        var newTable = listEl.querySelector('table');
                        if (newTable) newTable.focus({ preventScroll: true });
                    }
                    this._updateClipboardHighlight();
                },

                // 末尾に空行が無ければ追加
                _ensureEmptyRow() {
                    var fields = this._fields;
                    var last = this._studentList[this._studentList.length - 1];
                    var isEmpty = last && fields.every(function(f) {
                        return !String(last[f] || '').trim();
                    });
                    if (!isEmpty || this._studentList.length === 0) {
                        var newItem = {};
                        fields.forEach(function(f) { newItem[f] = ''; });
                        this._studentList.push(newItem);
                    }
                },

                // 行を追加
                addRow() {
                    this._saveUndoSnapshot();
                    this._syncFromDOM();
                    this._ensureEmptyRow();
                    this._markDirty();
                    this.renderStudentList();
                    var listEl = document.getElementById('student-management-list');
                    listEl.scrollTop = listEl.scrollHeight;
                },

                // 行を削除
                removeRow(index) {
                    this._syncFromDOM();
                    if (index >= 0 && index < this._studentList.length) {
                        this._studentList.splice(index, 1);
                        this.renderStudentList();
                        this._isDirty = JSON.stringify(this._studentList) !== this._originalData;
                        this._updateDirtyIndicator();
                    }
                },

                // 複数セル一括貼り付け処理
                _pasteMultiCell(startInput, text, insertMode) {
                    this._saveUndoSnapshot();
                    this._syncFromDOM();

                    // 全表示フィールドリスト
                    var fields = this._getVisibleFields();
                    var startField = startInput.getAttribute('data-field');
                    var startFieldIdx = fields.indexOf(startField);
                    if (startFieldIdx === -1) return;

                    var startTr = startInput.closest('tr');
                    var tbody = startTr ? startTr.closest('tbody') : null;
                    if (!tbody) return;
                    var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
                    var startRowIdx = rows.indexOf(startTr);
                    if (startRowIdx === -1) return;

                    var lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
                    while (lines.length > 0 && lines[lines.length - 1].trim() === '') {
                        lines.pop();
                    }

                    // 単一セルの値を選択範囲全体にフィル（Excel互換動作）
                    if (lines.length === 1 && lines[0].indexOf('\t') === -1 &&
                        this._selAnchor && this._selEnd &&
                        (this._selAnchor.row !== this._selEnd.row || this._selAnchor.col !== this._selEnd.col)) {
                        var singleValue = lines[0].trim();
                        var minRow = Math.min(this._selAnchor.row, this._selEnd.row);
                        var maxRow = Math.max(this._selAnchor.row, this._selEnd.row);
                        var minCol = Math.min(this._selAnchor.col, this._selEnd.col);
                        var maxCol = Math.max(this._selAnchor.col, this._selEnd.col);

                        for (var r = minRow; r <= maxRow; r++) {
                            var tr = rows[r];
                            if (!tr) continue;
                            for (var c = minCol; c <= maxCol; c++) {
                                var td = tr.children[c];
                                if (!td) continue;
                                var el = td.querySelector('input, select');
                                if (!el && td.hasAttribute('data-field')) {
                                    el = td;
                                }
                                if (!el) continue;
                                if (el.tagName === 'TD') {
                                    el.textContent = singleValue || '\u3000';
                                } else {
                                    el.value = singleValue;
                                }
                                var field = el.getAttribute('data-field');
                                var idx = parseInt(el.getAttribute('data-idx'));
                                if (!isNaN(idx) && this._studentList[idx] && field) {
                                    this._studentList[idx][field] = singleValue;
                                }
                            }
                        }
                        this._markDirty();
                        return;
                    }

                    var isCut = this._clipboardRange && this._clipboardRange.isCut;

                    // 行全体の切り取り → 行移動として処理
                    if (isCut && this._clipboardRange) {
                        var cutRange = this._clipboardRange;
                        var isFullRowCut = (cutRange.minCol <= 1 && cutRange.maxCol >= this._getMaxCol());

                        if (isFullRowCut) {
                            var insertDataIdx = parseInt(startInput.getAttribute('data-idx'));
                            if (isNaN(insertDataIdx)) return;

                            // 切り取り行のデータインデックスを収集
                            var cutTable = document.querySelector('#student-management-list table');
                            var cutRows = cutTable ? cutTable.querySelectorAll('tbody tr') : [];
                            var cutDataIndices = [];
                            var cutItems = [];
                            for (var r = cutRange.minRow; r <= cutRange.maxRow; r++) {
                                if (!cutRows[r]) continue;
                                var el = cutRows[r].querySelector('[data-idx]');
                                if (!el) continue;
                                var idx = parseInt(el.getAttribute('data-idx'));
                                if (isNaN(idx)) continue;
                                cutDataIndices.push(idx);
                                cutItems.push(JSON.parse(JSON.stringify(this._studentList[idx])));
                            }
                            if (cutItems.length === 0) return;

                            // 元の行を削除（降順でspliceしてインデックスずれ防止）
                            var sortedIndices = cutDataIndices.slice().sort(function(a, b) { return b - a; });
                            for (var i = 0; i < sortedIndices.length; i++) {
                                this._studentList.splice(sortedIndices[i], 1);
                            }

                            // 挿入位置を調整（削除した行が挿入位置より前にあった分だけ減らす）
                            var adjustedIdx = insertDataIdx;
                            for (var i = 0; i < cutDataIndices.length; i++) {
                                if (cutDataIndices[i] < insertDataIdx) adjustedIdx--;
                            }
                            adjustedIdx = Math.max(0, Math.min(adjustedIdx, this._studentList.length));

                            // 切り取った行を挿入
                            var spliceArgs = [adjustedIdx, 0].concat(cutItems);
                            Array.prototype.splice.apply(this._studentList, spliceArgs);

                            // クリーンアップ & 再描画
                            this._clipboardRange = null;
                            this._updateClipboardHighlight();
                            this.renderStudentList();
                            this._isDirty = JSON.stringify(this._studentList) !== this._originalData;
                            this._updateDirtyIndicator();

                            // 移動先行を選択状態にする
                            this._selAnchor = { row: adjustedIdx, col: 1 };
                            this._selEnd = { row: adjustedIdx + cutItems.length - 1, col: this._getMaxCol() };
                            this._updateSelectionHighlight();
                            Utils.showToast(cutItems.length + '行を移動しました', 'success');
                            return;
                        }
                    }

                    // 挿入モードの場合は挿入方式で貼り付け（右クリック「コピーしたセルを挿入」用）
                    if (insertMode) {
                        var insertPos = parseInt(startInput.getAttribute('data-idx'));
                        if (isNaN(insertPos)) return;

                        // 新規行を作成してクリップボードデータを設定
                        var newItems = [];
                        for (var r = 0; r < lines.length; r++) {
                            var newItem = {};
                            this._fields.forEach(function(f) { newItem[f] = ''; });
                            var cols = lines[r].split('\t');
                            for (var c = 0; c < cols.length; c++) {
                                var fieldIdx = startFieldIdx + c;
                                if (fieldIdx >= fields.length) break;
                                newItem[fields[fieldIdx]] = cols[c].trim();
                            }
                            newItems.push(newItem);
                        }

                        // 挿入位置に新規行を挿入
                        var spliceArgs = [insertPos, 0].concat(newItems);
                        Array.prototype.splice.apply(this._studentList, spliceArgs);

                        this._clipboardRange = null;
                        this._updateClipboardHighlight();
                        this.renderStudentList();
                        this._isDirty = JSON.stringify(this._studentList) !== this._originalData;
                        this._updateDirtyIndicator();
                        Utils.showToast(lines.length + '行のデータを挿入しました', 'success');
                        return;
                    }

                    // 通常コピーの場合は上書き方式で貼り付け
                    var neededRows = (startRowIdx + lines.length) - rows.length;
                    for (var i = 0; i < neededRows; i++) {
                        var newItem = {};
                        this._fields.forEach(function(f) { newItem[f] = ''; });
                        this._studentList.push(newItem);
                    }

                    if (neededRows > 0) {
                        this.renderStudentList();
                        tbody = document.querySelector('#student-management-list table tbody');
                        rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
                    }

                    for (var r = 0; r < lines.length; r++) {
                        var cols = lines[r].split('\t');
                        var tr = rows[startRowIdx + r];
                        if (!tr) break;

                        for (var c = 0; c < cols.length; c++) {
                            var fieldIdx = startFieldIdx + c;
                            if (fieldIdx >= fields.length) break;
                            var field = fields[fieldIdx];
                            var value = cols[c].trim();

                            var el = tr.querySelector('[data-field="' + field + '"]');
                            if (el) {
                                if (el.tagName === 'TD') {
                                    // 科目テキストセル
                                    el.textContent = value || '\u3000';
                                } else {
                                    el.value = value;
                                }
                                var idx = parseInt(el.getAttribute('data-idx'));
                                if (!isNaN(idx) && this._studentList[idx]) {
                                    this._studentList[idx][field] = value;
                                }
                            }
                        }
                    }

                    // 切り取りの場合は元セルのみクリア（行削除ではなくセル単位）
                    if (isCut && this._clipboardRange) {
                        var cutRange = this._clipboardRange;
                        var cutTable = document.querySelector('#student-management-list table');
                        if (cutTable) {
                            var cutRows = cutTable.querySelectorAll('tbody tr');
                            for (var cr = cutRange.minRow; cr <= cutRange.maxRow; cr++) {
                                if (!cutRows[cr]) continue;
                                var cutCells = cutRows[cr].children;
                                for (var cc = cutRange.minCol; cc <= cutRange.maxCol; cc++) {
                                    if (cc < 1 || cc > this._getMaxCol() || !cutCells[cc]) continue;
                                    // 貼り付け先と重複するセルはスキップ（自分自身のデータ消失防止）
                                    var pasteRowStart = startRowIdx;
                                    var pasteRowEnd = startRowIdx + lines.length - 1;
                                    var pasteColStart = startFieldIdx + 1; // DOM列（col 0は行番号）
                                    var pasteColEnd = pasteColStart + (lines[0] ? lines[0].split('\t').length : 1) - 1;
                                    if (cr >= pasteRowStart && cr <= pasteRowEnd && cc >= pasteColStart && cc <= pasteColEnd) continue;
                                    var cutEl = cutCells[cc].querySelector('input, select');
                                    if (!cutEl && cutCells[cc].hasAttribute('data-field')) {
                                        cutEl = cutCells[cc]; // 科目テキストセル
                                    }
                                    if (cutEl) {
                                        if (cutEl.tagName === 'TD') {
                                            cutEl.textContent = '\u3000';
                                        } else {
                                            cutEl.value = '';
                                        }
                                        var cutIdx = parseInt(cutEl.getAttribute('data-idx'));
                                        var cutField = cutEl.getAttribute('data-field');
                                        if (!isNaN(cutIdx) && this._studentList[cutIdx] && cutField) {
                                            this._studentList[cutIdx][cutField] = '';
                                        }
                                    }
                                }
                            }
                        }
                        this._clipboardRange = null;
                        this._updateClipboardHighlight();
                    }

                    this._markDirty();
                },

                // DOMの入力フィールドから現在の値を _studentList に同期
                _syncFromDOM() {
                    var inputs = document.querySelectorAll('#student-management-list [data-idx]');
                    inputs.forEach(function(el) {
                        if (el.tagName === 'TD') return; // 科目テキストセルはスキップ（_studentListが正）
                        var idx = parseInt(el.getAttribute('data-idx'));
