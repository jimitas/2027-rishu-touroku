                    document.querySelectorAll('.student-ids-tab').forEach(btn => {
                        const isActive = btn.dataset.tab === this.currentTab;
                        btn.style.color = isActive ? '#004294' : '#9ca3af';
                        btn.style.borderBottomColor = isActive ? '#004294' : 'transparent';
                    });
                },

                // 科目選択時
                onCourseSelect() {
                    // 未保存チェック
                    if (this.isDirty) {
                        if (!confirm('変更が保存されていません。科目を変更すると変更が失われます。よろしいですか？')) {
                            // 元の科目に戻す
                            document.getElementById('student-ids-course-select').value = this.currentCourse;
                            return;
                        }
                    }
                    const select = document.getElementById('student-ids-course-select');
                    this.currentCourse = select.value;
                    this.isDirty = false;
                    if (!this.currentCourse) {
                        // 科目クリア
                        document.getElementById('student-ids-list').innerHTML =
                            '<div style="padding: 20px; text-align: center; color: #9ca3af; font-size: 0.9em;">科目を選択してください</div>';
                        document.getElementById('student-ids-count').textContent = '（0件）';
                        document.getElementById('student-ids-add-section').style.display = 'none';
                        return;
                    }
                    this._loadCurrentData();
                },

                // 現在のデータを読み込み
                _loadCurrentData() {
                    const course = AppState.allCourses.find(c => c['科目名'] === this.currentCourse);
                    if (!course) return;

                    const rawValue = course[this.currentTab] || '';
                    const ids = rawValue ? String(rawValue).split(',').map(s => s.trim()).filter(Boolean) : [];
                    this.currentStudentIds = [...ids];
                    this.originalStudentIds = [...ids];
                    this._renderList();
                    document.getElementById('student-ids-add-section').style.display = 'block';
                    // 検索欄をクリアして検索結果を非表示
                    document.getElementById('student-ids-search-input').value = '';
                    document.getElementById('student-ids-search-results').style.display = 'none';
                },

                // 対象者リストを描画
                _renderList() {
                    const listEl = document.getElementById('student-ids-list');
                    const countEl = document.getElementById('student-ids-count');
                    countEl.textContent = `（${this.currentStudentIds.length}名）`;

                    if (this.currentStudentIds.length === 0) {
                        listEl.innerHTML = '<div style="padding: 20px; text-align: center; color: #9ca3af; font-size: 0.9em;">対象者なし</div>';
                        return;
                    }

                    // クラス順にソート（学年→組→番号、名簿なしは末尾）
                    const sortedIds = [...this.currentStudentIds].sort((a, b) => {
                        const infoA = this._getStudentInfo(a);
                        const infoB = this._getStudentInfo(b);
                        if (!infoA && !infoB) return 0;
                        if (!infoA) return 1;
                        if (!infoB) return -1;
                        return Utils.compareByGradeClassNumber(infoA.grade, infoA.class, infoA.number, infoB.grade, infoB.class, infoB.number);
                    });

                    let html = '';
                    sortedIds.forEach(id => {
                        const info = this._getStudentInfo(id);
                        const displayText = info
                            ? `${info.grade}年${info.class}組${info.number}番 ${info.name}（${id}）`
                            : `${id}（名簿に該当なし）`;
                        html += `<div style="display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; border-bottom: 1px solid #e5e7eb;">
                            <span style="font-size: 0.9em;">${Utils.escapeHtml(displayText)}</span>
                            <button onclick="StudentIdsManager.removeStudent('${id}')"
                                    style="background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1.1em; padding: 2px 6px;" title="削除">✕</button>
                        </div>`;
                    });
                    listEl.innerHTML = html;
                },

                // 生徒情報を取得
                _getStudentInfo(studentId) {
                    if (!this.rosterData) return null;
                    return this.rosterData.find(s => s.studentId === String(studentId));
                },

                // 検索結果リストを更新
                // 生徒検索フィルタ共通メソッド
                _filterStudents(query, excludeIds = []) {
                    if (!this.rosterData) return [];
                    const excludeSet = new Set(excludeIds.map(String));
                    let filtered = this.rosterData.filter(s => !excludeSet.has(String(s.studentId)));

                    // テキスト検索（教職員専用画面と同等の検索パターン対応）
                    const lowerQuery = query.toLowerCase();
                    filtered = filtered.filter(s => {
                        const sid = String(s.studentId);
                        const sName = s.name || '';
                        const grade = String(s.grade || '');
                        const cls = String(s.class || '');
                        const num = String(s.number || '');

                        // 1. 学籍番号・名前の部分一致
                        if (sid.includes(query) || sName.toLowerCase().includes(lowerQuery)) {
                            return true;
                        }

                        // 2. 「2年」「2年1組」「2年1」「2年K組」「2年K」形式
                        const yearClassMatch = lowerQuery.match(/^(\d+)年(?:(.+?)組?)?$/);
                        if (yearClassMatch) {
                            const searchGrade = yearClassMatch[1];
                            const searchClass = yearClassMatch[2] || null;
                            if (searchClass) {
                                return grade === searchGrade && cls.toLowerCase() === searchClass;
                            }
                            return grade === searchGrade;
                        }

                        // 3. 「1-2」「1-2-3」「1-K」「2-」形式
                        const parts = lowerQuery.split('-');
                        if (parts.length >= 2) {
                            const nonEmptyParts = parts.filter(p => p !== '');
                            if (nonEmptyParts.length >= 1 && /^\d+$/.test(nonEmptyParts[0])) {
                                const searchGrade = nonEmptyParts[0];
                                const searchClass = nonEmptyParts[1] || null;
                                const searchNumber = nonEmptyParts[2] || null;

                                if (!searchClass) {
                                    return grade === searchGrade;
                                }
                                if (grade === searchGrade && cls.toLowerCase() === searchClass) {
                                    if (searchNumber) {
                                        return num === searchNumber;
                                    }
                                    return true;
                                }
                                return false;
                            }
                        }

                        // 4. フリーテキスト（「1-2-3」形式での部分一致）
                        return `${grade}-${cls}-${num}`.toLowerCase().includes(lowerQuery);
                    });

                    // 学年→組→番号でソート
                    filtered.sort((a, b) => {
                        if (a.grade !== b.grade) return Number(a.grade) - Number(b.grade);
                        if (a.class !== b.class) return String(a.class).localeCompare(String(b.class));
                        return Number(a.number) - Number(b.number);
                    });

                    return filtered;
                },

                _updateSearchResults() {
                    const input = document.getElementById('student-ids-search-input');
                    const resultsEl = document.getElementById('student-ids-search-results');
                    const query = (input.value || '').trim();

                    // 検索テキストが空なら非表示
                    if (!query) {
                        resultsEl.style.display = 'none';
                        resultsEl.innerHTML = '';
                        return;
                    }

                    if (!this.rosterData) {
                        resultsEl.style.display = 'block';
                        resultsEl.innerHTML = '<div style="padding: 12px; text-align: center; color: #9ca3af; font-size: 0.9em;">名簿を読み込み中...</div>';
                        return;
                    }

                    const filtered = this._filterStudents(query, this.currentStudentIds);

                    // 最大50件表示
                    const limited = filtered.slice(0, 50);

                    if (limited.length === 0) {
                        resultsEl.style.display = 'block';
                        resultsEl.innerHTML = '<div style="padding: 12px; text-align: center; color: #9ca3af; font-size: 0.9em;">該当する生徒がいません</div>';
                        return;
                    }

                    let html = '';
                    limited.forEach(s => {
                        const display = Utils.escapeHtml(`${s.grade}年${s.class}組${s.number}番 ${s.name}（${s.studentId}）`);
                        html += `<div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid #f3f4f6; cursor: pointer;" onmouseenter="this.style.backgroundColor='#f0f9ff'" onmouseleave="this.style.backgroundColor=''">
                            <span style="font-size: 0.9em;">${display}</span>
                            <button onclick="StudentIdsManager.addStudent('${s.studentId}')"
                                    style="padding: 4px 12px; background-color: #004294; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85em; white-space: nowrap;">+追加</button>
                        </div>`;
                    });
                    if (filtered.length > 50) {
                        html += `<div style="padding: 8px 12px; text-align: center; color: #9ca3af; font-size: 0.85em;">他${filtered.length - 50}件（検索を絞り込んでください）</div>`;
                    }
                    resultsEl.style.display = 'block';
                    resultsEl.innerHTML = html;
                },

                // 逆引き検索入力ハンドラ: モード切り替え
                _onReverseInput() {
                    const query = (document.getElementById('student-ids-reverse-input').value || '').trim();
                    if (query) {
                        // 逆引きモード: 科目選択・対象者ラベル・追加セクションを非表示（ボタン行は常時表示）
                        document.getElementById('student-ids-course-select').parentElement.style.display = 'none';
                        document.getElementById('student-ids-count').parentElement.style.display = 'none';
                        document.getElementById('student-ids-add-section').style.display = 'none';
                        this._reverseSearch();
                    } else {
                        this._exitReverseMode();
                    }
                },

                // 逆引きモードを終了して通常モードに戻す
                _exitReverseMode() {
                    document.getElementById('student-ids-course-select').parentElement.style.display = '';
                    document.getElementById('student-ids-count').parentElement.style.display = '';
                    if (this.currentCourse) {
                        document.getElementById('student-ids-add-section').style.display = 'block';
                        this._renderList();
                    } else {
                        document.getElementById('student-ids-list').innerHTML =
                            '<div style="padding: 20px; text-align: center; color: #9ca3af; font-size: 0.9em;">科目を選択してください</div>';
                        document.getElementById('student-ids-count').textContent = '（0件）';
                    }
                },

                // 逆引き検索: 生徒→登録されている科目一覧
                _reverseSearch() {
                    const input = document.getElementById('student-ids-reverse-input');
                    const listEl = document.getElementById('student-ids-list');
                    const countEl = document.getElementById('student-ids-count');
                    const query = (input.value || '').trim();

                    if (!query) {
                        return;
                    }

                    if (!this.rosterData) {
                        listEl.innerHTML = '<div style="padding: 20px; text-align: center; color: #9ca3af; font-size: 0.9em;">名簿を読み込み中...</div>';
                        return;
                    }

                    const filtered = this._filterStudents(query);

                    if (filtered.length === 0) {
                        listEl.innerHTML = '<div style="padding: 20px; text-align: center; color: #9ca3af; font-size: 0.9em;">該当する生徒がいません</div>';
                        countEl.textContent = '（0件）';
                        return;
                    }

                    let html = '';
                    let totalEntries = 0;
                    let matchCount = 0;
                    filtered.forEach(s => {
                        const entries = this._buildReverseEntries(s.studentId);
                        if (entries.length === 0) return; // 登録なし生徒をスキップ
                        matchCount++;
                        const display = Utils.escapeHtml(`${s.grade}年${s.class}組${s.number}番　${s.name}（${s.studentId}）`);
                        html += `<div style="padding: 8px 12px; border-bottom: 2px solid #e5e7eb;">`;
                        html += `<div style="font-weight: bold; margin-bottom: 4px; font-size: 0.95em;">${display}</div>`;
                        entries.forEach(e => {
                            const courseName = Utils.escapeHtml(e.courseName);
                            const label = Utils.escapeHtml(e.columnLabel);
                            const detailHtml = e.detail ? `<span style="font-size: 0.85em; color: #6b7280; margin-left: 4px;">（${Utils.escapeHtml(e.detail)}）</span>` : '';
                            html += `<div style="display: flex; justify-content: space-between; align-items: flex-start; padding: 2px 0 2px 12px;">
                                    <div style="font-size: 0.9em;"><span style="display: inline-block; min-width: 50px; padding: 2px 6px; background: #f0f0f0; border-radius: 4px; font-size: 0.8em; text-align: center; margin-right: 8px;">${label}</span>${courseName}${detailHtml}</div>
                                    <button onclick="StudentIdsManager.removeStudentFromCourse('${s.studentId}', '${e.courseName.replace(/'/g, "\\'")}', '${e.columnName}')"
                                            style="background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1.1em; padding: 2px 6px;" title="削除">✕</button>
                                </div>`;
                        });
                        totalEntries += entries.length;
                        html += `</div>`;
                    });
                    if (matchCount === 0) {
                        listEl.innerHTML = '<div style="padding: 20px; text-align: center; color: #9ca3af; font-size: 0.9em;">該当する登録がありません</div>';
                        countEl.textContent = '（0件）';
                        return;
                    }
                    listEl.innerHTML = html;
                    countEl.textContent = `（${matchCount}名 / ${totalEntries}件）`;
                },

                // 逆引き: 特定生徒が登録されている科目・列を全走査
                _buildReverseEntries(studentId) {
                    const entries = [];
                    const sid = String(studentId);
                    const allColumns = [
                        { name: '抽選学籍番号', label: '抽選' },
                        { name: '非表示学籍番号', label: '非表示' },
                        { name: '表示学籍番号', label: '表示' }
                    ];
                    // 現在のタブに対応する列のみ検索
                    const columns = allColumns.filter(col => col.name === this.currentTab);
                    if (!AppState.allCourses) return entries;
                    AppState.allCourses.forEach(course => {
                        const courseName = course['科目名'];
                        if (!courseName) return;
                        columns.forEach(col => {
                            const raw = course[col.name] || '';
                            const ids = String(raw).split(',').map(s => s.trim()).filter(Boolean);
                            if (ids.includes(sid)) {
                                entries.push({ courseName, columnName: col.name, columnLabel: col.label, detail: course['詳細'] || '' });
                            }
                        });
                    });
                    return entries;
                },

                // 逆引きから科目削除（即座にGAS保存）
                async removeStudentFromCourse(studentId, courseName, columnName) {
                    if (!confirm(`「${courseName}」の${columnName === '抽選学籍番号' ? '抽選' : columnName === '非表示学籍番号' ? '非表示' : '表示'}リストから削除しますか？`)) {
                        return;
                    }

                    const course = AppState.allCourses.find(c => c['科目名'] === courseName);
                    if (!course) {
                        Utils.showToast('科目が見つかりません', 'error');
                        return;
                    }

                    const raw = course[columnName] || '';
                    const ids = String(raw).split(',').map(s => s.trim()).filter(Boolean);
                    const newIds = ids.filter(id => id !== String(studentId));
                    const newIdsString = newIds.join(',');

                    try {
                        const result = await DataManager.callGASFunction(
                            'updateCourseStudentIds', courseName, columnName, newIdsString
                        );
                        if (result && result.success) {
                            // ローカルデータも更新
                            course[columnName] = newIdsString;
                            Utils.showToast('削除しました', 'success');
                            // 逆引き結果を再描画
                            this._reverseSearch();
                        } else {
                            const msg = (result && result.error) || '削除に失敗しました';
                            Utils.showToast(msg, 'error');
                        }
                    } catch (e) {
                        console.error('[学籍番号管理] 逆引き削除エラー:', e);
                        Utils.showToast('削除中にエラーが発生しました', 'error');
                    }
                },

                // 生徒を追加
                addStudent(studentId) {
                    if (!studentId) return;
                    if (this.currentStudentIds.includes(studentId)) return;

                    this.currentStudentIds.push(studentId);
                    this.isDirty = true;
                    this._renderList();
                    this._updateSearchResults();
                },

                // 生徒を削除
                removeStudent(studentId) {
                    this.currentStudentIds = this.currentStudentIds.filter(id => id !== studentId);
                    this.isDirty = true;
                    this._renderList();
                    this._updateSearchResults();
                },

                // 保存
                async save() {
                    if (!this.currentCourse) {
                        Utils.showToast('科目が選択されていません', 'error');
                        return;
                    }

                    const saveBtn = document.getElementById('student-ids-save-btn');
                    saveBtn.disabled = true;
                    saveBtn.textContent = '保存中...';

                    try {
                        const idsString = this.currentStudentIds.join(',');
                        const result = await DataManager.callGASFunction(
                            'updateCourseStudentIds',
                            this.currentCourse,
                            this.currentTab,
                            idsString
                        );

                        if (result && result.success) {
                            // AppState.allCoursesも即時更新
                            const course = AppState.allCourses.find(c => c['科目名'] === this.currentCourse);
                            if (course) {
                                course[this.currentTab] = idsString;
                            }
                            this.originalStudentIds = [...this.currentStudentIds];
                            this.isDirty = false;
                            Utils.showToast('保存しました', 'success');
                        } else {
                            const msg = (result && result.error) || '保存に失敗しました';
                            Utils.showToast(msg, 'error');
                            console.error('[学籍番号管理] 保存失敗:', result);
                        }
                    } catch (e) {
                        console.error('[学籍番号管理] 保存エラー:', e);
                        Utils.showToast('保存中にエラーが発生しました', 'error');
                    } finally {
                        saveBtn.disabled = false;
                        saveBtn.textContent = '保存';
                    }
                },

                // === Excel取込機能 ===

                pendingImportData: null,

                // Excelファイル読み込み
                handleImportFile(event) {
                    const file = event.target.files[0];
                    if (!file) return;

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const workbook = XLSX.read(data, { type: 'array' });
                            const sheet = workbook.Sheets[workbook.SheetNames[0]];
                            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });

                            // 不可視文字除去
                            const stripInvisible = (s) => s ? String(s).replace(/[\uFEFF\u200B\u200C\u200D\uFFFE]/g, '').trim() : '';

                            // ヘッダー行を動的検出（「学籍番号」列を探す）
                            let headerRowIndex = -1;
                            for (let i = 0; i < rows.length; i++) {
                                if (rows[i] && rows[i].some(cell => stripInvisible(cell) === '学籍番号')) {
                                    headerRowIndex = i;
                                    break;
                                }
                            }

                            if (headerRowIndex === -1) {
                                Utils.showToast('「学籍番号」列が見つかりません。ファイル形式を確認してください。', 'error');
                                event.target.value = '';
                                return;
                            }

                            const headers = rows[headerRowIndex].map(h => stripInvisible(h));
                            const dataRows = rows.slice(headerRowIndex + 1);

                            this.processImportData(dataRows, headers, stripInvisible);
                        } catch (err) {
                            console.error('[学籍番号管理] Excel読み込みエラー:', err);
                            Utils.showToast('ファイルの読み込みに失敗しました。', 'error');
                        }
                        event.target.value = '';
                    };
                    reader.readAsArrayBuffer(file);
                },

                // データ解析・グループ化
                processImportData(dataRows, headers, stripInvisible) {
                    // 必須列の検出
                    const idColIdx = headers.indexOf('学籍番号');
                    const courseColIdx = headers.indexOf('科目名');

                    if (idColIdx === -1 || courseColIdx === -1) {
                        Utils.showToast('「学籍番号」と「科目名」の両方の列が必要です。', 'error');
                        return;
                    }

                    // 科目名でグループ化
                    const grouped = {};
                    let skippedRows = 0;
                    dataRows.forEach(row => {
                        if (!row || !row[idColIdx] || !row[courseColIdx]) {
                            skippedRows++;
                            return;
                        }
                        const studentId = stripInvisible(String(row[idColIdx]));
                        const courseName = stripInvisible(String(row[courseColIdx]));
                        if (!studentId || !courseName) {
                            skippedRows++;
                            return;
                        }
                        if (!grouped[courseName]) grouped[courseName] = new Set();
                        grouped[courseName].add(studentId);
                    });

                    if (Object.keys(grouped).length === 0) {
                        Utils.showToast('取り込めるデータがありません。', 'error');
                        return;
                    }

                    // AppState.allCoursesと照合
                    const courseNameSet = new Set((AppState.allCourses || []).map(c => c['科目名']));
                    const imports = [];
                    const unmatchedCourses = [];
                    let totalNew = 0;

                    Object.keys(grouped).forEach(courseName => {
                        if (!courseNameSet.has(courseName)) {
                            unmatchedCourses.push(courseName);
                            return;
                        }

                        const course = AppState.allCourses.find(c => c['科目名'] === courseName);
                        const rawExisting = course[this.currentTab] || '';
                        const existingIds = rawExisting ? String(rawExisting).split(',').map(s => s.trim()).filter(Boolean) : [];
                        const existingSet = new Set(existingIds);

                        const importIds = Array.from(grouped[courseName]);
                        const newIds = importIds.filter(id => !existingSet.has(id));
                        const duplicateCount = importIds.length - newIds.length;
                        const mergedIds = [...existingIds, ...newIds];

                        totalNew += newIds.length;

                        imports.push({
                            courseName,
                            existingIds,
                            newIds,
                            mergedIds,
                            duplicateCount,
                            importCount: importIds.length
                        });
                    });

                    if (imports.length === 0 && unmatchedCourses.length > 0) {
                        Utils.showToast('一致する科目がありません。科目名を確認してください。', 'error');
                        return;
                    }

                    const result = { imports, unmatchedCourses, totalNew };
                    this.showImportConfirmation(result);
                },

                // 確認画面表示
                showImportConfirmation(result) {
                    this.pendingImportData = result;

                    // 通常UI要素を非表示
                    const normalSections = ['student-ids-tabs', 'student-ids-add-section', 'student-ids-button-row'];
                    normalSections.forEach(id => {
                        const el = document.getElementById(id);
                        if (el) el.style.display = 'none';
                    });
                    // 科目選択と対象者リストの親divも非表示
                    const courseSelect = document.getElementById('student-ids-course-select');
                    if (courseSelect && courseSelect.parentElement) courseSelect.parentElement.style.display = 'none';
                    const listEl = document.getElementById('student-ids-list');
                    if (listEl && listEl.parentElement) listEl.parentElement.style.display = 'none';

                    // サマリー
                    const tabLabel = this.currentTab.replace('学籍番号', '');
                    const summaryEl = document.getElementById('student-ids-import-summary');
                    summaryEl.innerHTML = `「${Utils.escapeHtml(tabLabel)}」タブに取り込み: ${result.imports.length}科目 / 新規 ${result.totalNew}件`;

                    if (result.totalNew === 0) {
                        summaryEl.style.background = '#fff3cd';
                        summaryEl.innerHTML += '<br><span style="font-weight: normal; font-size: 0.9em;">すべて既存データと重複しています。</span>';
                    } else {
                        summaryEl.style.background = '#e8f5e9';
                    }

                    // 科目別内訳テーブル
                    const detailsEl = document.getElementById('student-ids-import-details');
                    let tableHtml = '<table style="width: 100%; border-collapse: collapse; font-size: 0.9em;">';
                    tableHtml += '<thead><tr style="background: #f8f9fa; border-bottom: 2px solid #dee2e6;">';
                    tableHtml += '<th style="padding: 8px 12px; text-align: left;">科目名</th>';
                    tableHtml += '<th style="padding: 8px 12px; text-align: right;">新規追加</th>';
                    tableHtml += '<th style="padding: 8px 12px; text-align: right;">重複スキップ</th>';
                    tableHtml += '</tr></thead><tbody>';

                    result.imports.forEach(item => {
                        tableHtml += `<tr style="border-bottom: 1px solid #e5e7eb;">`;
                        tableHtml += `<td style="padding: 8px 12px;">${Utils.escapeHtml(item.courseName)}</td>`;
                        tableHtml += `<td style="padding: 8px 12px; text-align: right; color: ${item.newIds.length > 0 ? '#198754' : '#9ca3af'};">${item.newIds.length}件</td>`;
                        tableHtml += `<td style="padding: 8px 12px; text-align: right; color: #9ca3af;">${item.duplicateCount}件</td>`;
                        tableHtml += '</tr>';
                    });

                    tableHtml += '</tbody></table>';
                    detailsEl.innerHTML = tableHtml;

                    // 警告（マッチしない科目）
                    const warningsEl = document.getElementById('student-ids-import-warnings');
                    if (result.unmatchedCourses.length > 0) {
                        warningsEl.innerHTML = `<div style="padding: 10px 14px; background: #fff3cd; border-radius: 6px; font-size: 0.9em;">
                            <strong>以下の科目名が科目データに見つかりません（スキップされます）:</strong><br>
                            ${result.unmatchedCourses.map(c => Utils.escapeHtml(c)).join('、')}
                        </div>`;
                    } else {
                        warningsEl.innerHTML = '';
                    }

                    // 確認画面を表示
                    document.getElementById('student-ids-import-confirm').style.display = 'block';

                    // 新規0件なら実行ボタンを無効化
                    document.getElementById('student-ids-import-execute-btn').disabled = (result.totalNew === 0);
                },

                // 取込実行
                async executeImport() {
                    if (!this.pendingImportData) return;

                    const btn = document.getElementById('student-ids-import-execute-btn');
                    btn.disabled = true;
                    btn.textContent = '取込中...';

                    try {
                        // GASバッチ保存用データ構築
                        const updates = this.pendingImportData.imports
                            .filter(item => item.newIds.length > 0)
                            .map(item => ({
                                courseName: item.courseName,
                                studentIds: item.mergedIds.join(',')
                            }));

                        if (updates.length === 0) {
                            Utils.showToast('追加するデータがありません。', 'info');
                            this.cancelImport();
                            return;
                        }

                        const result = await DataManager.callGASFunction(
                            'batchUpdateCourseStudentIds',
                            updates,
                            this.currentTab
                        );

                        if (result && result.success) {
                            // AppState.allCoursesを即時更新
                            this.pendingImportData.imports.forEach(item => {
                                if (item.newIds.length > 0) {
                                    const course = AppState.allCourses.find(c => c['科目名'] === item.courseName);
                                    if (course) {
                                        course[this.currentTab] = item.mergedIds.join(',');
                                    }
                                }
                            });

                            Utils.showToast(`${result.updatedCount}科目の学籍番号を取り込みました。`, 'success');

                            // 現在の科目のデータを再読み込み
                            this.pendingImportData = null;
                            this._restoreNormalUI();
                            if (this.currentCourse) {
                                this._loadCurrentData();
                            }
                        } else {
                            const msg = (result && result.error) || '取込に失敗しました';
                            Utils.showToast(msg, 'error');
                            console.error('[学籍番号管理] Excel取込失敗:', result);
                        }
                    } catch (e) {
                        console.error('[学籍番号管理] Excel取込エラー:', e);
                        Utils.showToast('取込中にエラーが発生しました。', 'error');
                    } finally {
                        btn.disabled = false;
                        btn.textContent = '取込実行';
                    }
                },

                // 取込キャンセル
                cancelImport() {
                    this.pendingImportData = null;
                    this._restoreNormalUI();
                },

                // 通常UI復帰
                _restoreNormalUI() {
                    // 確認画面非表示
                    document.getElementById('student-ids-import-confirm').style.display = 'none';

                    // 通常UI要素を復帰
                    document.getElementById('student-ids-tabs').style.display = 'flex';
                    document.getElementById('student-ids-button-row').style.display = 'flex';

                    const courseSelect = document.getElementById('student-ids-course-select');
                    if (courseSelect && courseSelect.parentElement) courseSelect.parentElement.style.display = '';
                    const listEl = document.getElementById('student-ids-list');
                    if (listEl && listEl.parentElement) listEl.parentElement.style.display = '';

                    // 科目選択済みなら追加セクションも表示
                    if (this.currentCourse) {
                        document.getElementById('student-ids-add-section').style.display = 'block';
                    }
                },

                // モーダルを閉じる
                closeModal() {
                    if (this.isDirty) {
                        if (!confirm('変更が保存されていません。閉じますか？')) {
                            return;
                        }
                    }
                    this.isDirty = false;
                    // インポート確認画面が表示中なら復帰
                    if (this.pendingImportData) {
                        this.pendingImportData = null;
                        this._restoreNormalUI();
                    }
                    Utils.hideModal('student-ids-modal');
                }
            };

            // RegistrationManagerをグローバルに公開
            window.RegistrationManager = RegistrationManager;

            // EventHandlersをグローバルに公開
            window.EventHandlers = EventHandlers;

            // SettingsManagerをグローバルに公開
            window.SettingsManager = SettingsManager;

            // ExcelImporterをグローバルに公開
            window.ExcelImporter = ExcelImporter;

            // StudentDeleterをグローバルに公開
            window.StudentDeleter = StudentDeleter;

            // StudentIdsManagerをグローバルに公開
            window.StudentIdsManager = StudentIdsManager;

            // NewStudentImporterをグローバルに公開
            window.NewStudentImporter = NewStudentImporter;

            // TeacherScreenをグローバルに公開（編集制限チェック用）
            window.TeacherScreen = TeacherScreen;

            // グローバル関数（HTML内のonclick属性で使用）
            window.showAdminApprovalScreen = async function() {
                document.getElementById('admin-screen').style.display = 'none';
                document.getElementById('teacher-screen').style.display = 'block';

                // モバイル: PCレイアウトを縮小表示（await前に適用し、読み込み中のモバイルフラッシュを防止）
                EventHandlers.applyMobileScale('teacher-screen');

                // タイトルを変更
                const title = document.getElementById('teacher-screen-title');
                if (title) title.textContent = '教務承認画面';

                // 教職員専用画面と同じTeacherScreenを使用、モードを'admin'に設定
                TeacherScreen.currentMode = 'admin';
                // データはキャッシュを活用（initialize内で必要時のみ読み込み）
                await TeacherScreen.initialize();
            };

            window.showAdminManageScreen = async function() {
                document.getElementById('admin-screen').style.display = 'none';
                document.getElementById('teacher-screen').style.display = 'block';

                // モバイル: PCレイアウトを縮小表示
                EventHandlers.applyMobileScale('teacher-screen');

                // タイトルを変更
                const title = document.getElementById('teacher-screen-title');
                if (title) title.textContent = '登録データ管理';

                TeacherScreen.currentMode = 'admin-manage';
                await TeacherScreen.initialize();
            };

            // ===== 新クラス取り込み =====
            const NewClassImporter = {
                // Excelファイル選択ハンドラ
                handleFileSelect(event) {
                    const file = event.target.files[0];
                    if (!file) return;

                    const btn = document.getElementById('new-class-import-btn');
                    if (btn) { btn.textContent = '読込中...'; btn.disabled = true; }

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const workbook = XLSX.read(data, { type: 'array' });
                            const sheet = workbook.Sheets[workbook.SheetNames[0]];
                            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });

                            // 不可視文字除去ヘルパー
                            const stripInvisible = (s) => s ? String(s).replace(/[\uFEFF\u200B\u200C\u200D\uFFFE]/g, '').trim() : '';

                            // ヘッダー行を動的検出
                            let headerRowIndex = -1;
                            for (let i = 0; i < rows.length; i++) {
                                if (rows[i] && rows[i].some(cell => stripInvisible(cell) === '学籍番号')) {
                                    headerRowIndex = i;
                                    break;
                                }
                            }
                            if (headerRowIndex === -1) {
                                Utils.showToast('「学籍番号」列が見つかりません');
                                const btn = document.getElementById('new-class-import-btn');
                                if (btn) { btn.textContent = '新クラスExcel読込'; btn.disabled = false; }
                                return;
                            }

                            const headers = rows[headerRowIndex].map(h => stripInvisible(h));
                            const idIdx = headers.indexOf('学籍番号');
                            const gradeIdx = headers.findIndex(h => h === '学年' || h === '年');
                            const classIdx = headers.indexOf('組');
                            const numIdx = headers.findIndex(h => h === '番号' || h === '番');

                            if (gradeIdx === -1 || classIdx === -1 || numIdx === -1) {
                                const missing = [];
                                if (gradeIdx === -1) missing.push('学年');
                                if (classIdx === -1) missing.push('組');
                                if (numIdx === -1) missing.push('番');
                                Utils.showToast(`必須列が不足: ${missing.join(', ')}`);
                                const btn = document.getElementById('new-class-import-btn');
                                if (btn) { btn.textContent = '新クラスExcel読込'; btn.disabled = false; }
                                return;
                            }

                            // データ行を解析してMapを構築
                            const newClassMap = new Map();
                            for (let i = headerRowIndex + 1; i < rows.length; i++) {
                                const row = rows[i];
                                if (!row || !row[idIdx]) continue;
                                const studentId = stripInvisible(row[idIdx]);
                                if (!studentId) continue;
                                const grade = parseInt(stripInvisible(row[gradeIdx])) || 0;
                                const cls = stripInvisible(row[classIdx]);
                                const num = parseInt(stripInvisible(row[numIdx])) || 0;
                                if (grade > 0 && cls) {
                                    newClassMap.set(studentId, { '学年': grade, '組': cls, '番号': num });
                                }
                            }

                            if (newClassMap.size === 0) {
                                Utils.showToast('有効なデータが見つかりません');
                                const btn = document.getElementById('new-class-import-btn');
                                if (btn) { btn.textContent = '新クラスExcel読込'; btn.disabled = false; }
                                return;
                            }

                            // 既知の生徒とマッチング確認（型・空白の差異を吸収）
                            // cachedAllStudentsDataはフィルタ前の全生徒データを持つため、担当クラス外の生徒もマッチできる
                            const normalizeId = (id) => String(id ?? '').trim();
                            const allStudents = cachedAllStudentsData?.students || cachedAllStudentsData || TeacherScreen.studentsData || [];
                            const knownIds = new Set(
                                allStudents.map(s => normalizeId(s['学籍番号'] || s.studentId))
                            );
                            const unmatchedIds = [];
                            newClassMap.forEach((_, id) => {
                                if (!knownIds.has(normalizeId(id))) unmatchedIds.push(id);
                            });

                            const matchedCount = newClassMap.size - unmatchedIds.length;

                            if (unmatchedIds.length > 0) {
                                this._pendingMap = newClassMap;
                                this._showUnmatchedWarning(unmatchedIds, matchedCount);
                            } else {
                                this._applyImportedData(newClassMap, matchedCount);
                            }
                        } catch (err) {
                            console.error('[新クラス取り込み] エラー:', err);
                            Utils.showToast(`読み込みエラー: ${err.message}`);
                            const btn = document.getElementById('new-class-import-btn');
                            if (btn) { btn.textContent = '新クラスExcel読込'; btn.disabled = false; }
                        }
                    };
                    reader.readAsArrayBuffer(file);
                    // input要素をリセット（同じファイルの再選択に対応）
                    event.target.value = '';
                },

                // 取り込みデータを確定
                _applyImportedData(newClassMap, matchedCount) {
                    TeacherScreen.newClassMap = newClassMap;
                    const toggle = document.getElementById('new-class-toggle');
                    if (toggle) toggle.disabled = false;
                    const toggleStatus = document.getElementById('new-class-toggle-status');
                    if (toggleStatus) toggleStatus.innerHTML = '<span style="color: #6c757d;">OFF</span>';
                    // トーストで成功メッセージ
                    Utils.showToast(`${matchedCount}名の新クラス情報を取り込みました（全${newClassMap.size}件）`, 'success');
                    // ボタンテキストを「読込済」に変更
                    const btn = document.getElementById('new-class-import-btn');
                    if (btn) {
                        btn.textContent = `新クラス${newClassMap.size}名読込済`;
                        btn.disabled = false;
                        btn.style.backgroundColor = '#6c757d';
                    }
                },

                // 未マッチ生徒の警告モーダル
                _showUnmatchedWarning(unmatchedIds, matchedCount) {
                    this._pendingMatchedCount = matchedCount;
                    const summaryDiv = document.getElementById('new-class-unmatched-summary');
                    const list = unmatchedIds.slice(0, 20).join(', ') + (unmatchedIds.length > 20 ? ` 他${unmatchedIds.length - 20}件` : '');
                    summaryDiv.innerHTML = `
                        <div style="background: #fff3cd; padding: 12px; border-radius: 8px; border: 1px solid #ffc107; margin-bottom: 10px;">
                            <div style="font-weight: bold; color: #856404; margin-bottom: 6px;">
                                ${unmatchedIds.length}件の学籍番号が現在の生徒データに一致しません
                            </div>
                            <div style="font-size: 0.85em; max-height: 200px; overflow-y: auto; color: #664d03;">
                                ${list}
                            </div>
                        </div>
                        <div style="font-size: 0.9em; color: #495057;">
                            一致した生徒: ${matchedCount}名<br>
                            一致しない生徒は新クラスモード時に非表示になります。
                        </div>
                    `;
                    Utils.showModal('new-class-unmatched-modal');
                },

                _confirmUnmatched() {
                    Utils.hideModal('new-class-unmatched-modal');
                    this._applyImportedData(this._pendingMap, this._pendingMatchedCount);
                    this._pendingMap = null;
                    this._pendingMatchedCount = null;
                },

                _cancelUnmatched() {
                    Utils.hideModal('new-class-unmatched-modal');
                    Utils.showToast('取り込みがキャンセルされました', 'warning');
                    const btn = document.getElementById('new-class-import-btn');
                    if (btn) { btn.textContent = '新クラスExcel読込'; btn.disabled = false; }
                    this._pendingMap = null;
                    this._pendingMatchedCount = null;
                },

                // 共通オーバーレイ関数: 新クラスデータで学年/組/番号を上書き（未記載の生徒はそのまま残す）
                applyOverlay(students) {
                    if (!TeacherScreen.useNewClass || !TeacherScreen.newClassMap) return students;
                    const normalize = (id) => String(id ?? '').trim();
                    return students.map(s => {
                        const id = normalize(s['学籍番号'] || s.studentId);
                        const nc = TeacherScreen.newClassMap.get(id);
                        if (!nc) return s; // newClassMapに未記載の生徒はそのまま
                        return { ...s,
                            '学年': nc['学年'], grade: nc['学年'],
                            '組': nc['組'], class: nc['組'],
                            '番号': nc['番号'], number: nc['番号'],
                            '来年度学年': '', nextGrade: ''
                        };
                    });
                },

                // トグルON/OFF処理
                async toggleNewClass(enabled) {
                    TeacherScreen.useNewClass = enabled;

                    if (enabled) {
                        // バックアップを保存
                        TeacherScreen._originalStudentsData = [...TeacherScreen.studentsData];
                        // クラスドロップダウンのHTMLをバックアップ
                        const classSelect = document.getElementById('class-select');
                        this._originalClassSelectHTML = classSelect ? classSelect.innerHTML : null;
                        // オーバーレイ適用
                        TeacherScreen.studentsData = this.applyOverlay(TeacherScreen._originalStudentsData);
                        // ソート
                        TeacherScreen.studentsData.sort((a, b) => Utils.compareByGradeClassNumber(
                            a['学年'] || a.grade, a['組'] || a.class, a['番号'] || a.number,
                            b['学年'] || b.grade, b['組'] || b.class, b['番号'] || b.number
                        ));
                        // キャッシュも更新（印刷・集計用）
                        if (cachedAllStudentsData) {
                            const allStudents = cachedAllStudentsData?.students || cachedAllStudentsData || [];
                            const overlaid = this.applyOverlay(allStudents);
                            if (cachedAllStudentsData.students) {
                                cachedAllStudentsData = { ...cachedAllStudentsData, students: overlaid, _originalStudents: allStudents };
                            }
                        }
                        // クラスリストを新クラスで再生成
                        this.populateClassListFromNewClass();
                        // 新クラスバッジを対象カードに追加
                        ['card-title-approval', 'card-title-bulk-print', 'card-title-enrollment-tally', 'card-title-registration-export', 'card-title-sm-export', 'card-title-textbook-export', 'card-title-report-export'].forEach(id => {
                            const h4 = document.getElementById(id);
                            if (h4 && !h4.querySelector('.new-class-badge')) {
                                const badge = document.createElement('span');
                                badge.className = 'new-class-badge';
                                badge.textContent = '新クラス';
                                // 編集ボタンがある場合はその左側に配置
                                const hasEditBtn = h4.querySelector('button');
                                const rightPos = hasEditBtn ? '60px' : '-10px';
                                badge.style.cssText = `position: absolute; top: -10px; right: ${rightPos}; background-color: #007bff; color: white; font-size: 0.65em; font-weight: bold; padding: 2px 8px; border-radius: 10px; z-index: 1;`;
                                h4.style.position = 'relative';
                                h4.appendChild(badge);
                            }
                        });
                        const toggleStatus = document.getElementById('new-class-toggle-status');
                        if (toggleStatus) toggleStatus.innerHTML = `<span style="color: #007bff;">ON</span>`;
                    } else {
                        // バックアップから復元
                        if (TeacherScreen._originalStudentsData) {
                            TeacherScreen.studentsData = TeacherScreen._originalStudentsData;
                            TeacherScreen._originalStudentsData = null;
                        }
                        // キャッシュも復元
                        if (cachedAllStudentsData && cachedAllStudentsData._originalStudents) {
                            cachedAllStudentsData = { ...cachedAllStudentsData, students: cachedAllStudentsData._originalStudents };
                            delete cachedAllStudentsData._originalStudents;
                        }
                        // クラスドロップダウンをバックアップから復元（GAS RPCを使わない）
                        const classSelect = document.getElementById('class-select');
                        if (classSelect && this._originalClassSelectHTML) {
                            classSelect.innerHTML = this._originalClassSelectHTML;
                            this._originalClassSelectHTML = null;
                        } else {
                            // フォールバック: バックアップがなければGASから取得
                            await populateClassList();
                        }
                        // 新クラスバッジを削除
                        document.querySelectorAll('.new-class-badge').forEach(el => el.remove());
                        const toggleStatus = document.getElementById('new-class-toggle-status');
                        if (toggleStatus) toggleStatus.innerHTML = `<span style="color: #6c757d;">OFF</span>`;
                    }
                    // 生徒一覧を再レンダリング
                    TeacherScreen.renderStudentsList();
                },

                // newClassMapからクラス一覧を生成してドロップダウンに反映
                populateClassListFromNewClass() {
                    const classSet = new Set();
                    TeacherScreen.newClassMap.forEach((info) => {
                        classSet.add(`${info['学年']}-${info['組']}`);
                    });
                    const classList = [...classSet].sort((a, b) => {
                        const sepA = a.indexOf('-');
                        const sepB = b.indexOf('-');
                        const gradeA = Number(a.substring(0, sepA));
                        const gradeB = Number(b.substring(0, sepB));
                        if (gradeA !== gradeB) return gradeA - gradeB;
                        return a.substring(sepA + 1).localeCompare(b.substring(sepB + 1), 'ja');
                    });

                    const classSelect = document.getElementById('class-select');
                    if (!classSelect) return;

                    classSelect.innerHTML = '<option value="">クラスを選択</option>';
                    classList.forEach(className => {
                        const [grade, classNum] = className.split('-');
                        const option = document.createElement('option');
                        option.value = className;
                        option.textContent = (parseInt(grade) === 0 ? '新1年' : `${grade}年`) + `${classNum}組`;
                        classSelect.appendChild(option);
                    });
                    const allOption = document.createElement('option');
                    allOption.value = 'all';
                    allOption.textContent = '全クラス';
                    classSelect.appendChild(allOption);
                },

                // データクリア
                clear() {
                    const toggle = document.getElementById('new-class-toggle');
                    if (toggle && toggle.checked) {
                        toggle.checked = false;
                        this.toggleNewClass(false);
                    }
                    TeacherScreen.newClassMap = null;
                    TeacherScreen.useNewClass = false;
                    TeacherScreen._originalStudentsData = null;
                    this._originalClassSelectHTML = null;
                    if (toggle) toggle.disabled = true;
                    const toggleStatus = document.getElementById('new-class-toggle-status');
                    if (toggleStatus) toggleStatus.innerHTML = '<span style="color: #6c757d;">OFF</span>';
                    const btn = document.getElementById('new-class-import-btn');
                    if (btn) { btn.textContent = '新クラスExcel読込'; btn.disabled = false; }
                }
            };
            window.NewClassImporter = NewClassImporter;

            // クラスリスト用キャッシュ
            let cachedAllStudentsData = null;
            let cachedTeacherEmails = null;

            // ===== 科目別履修者集計 =====
            const EnrollmentTally = {
                // モーダルを閉じる
                closeModal() {
                    Utils.hideModal('enrollment-tally-modal');
                },

                // 集計を実行してモーダル表示
                async showTally() {
                    try {
                        // モーダルを即座に表示（ローディング状態）
                        document.getElementById('enrollment-tally-info').innerHTML = '';
                        document.getElementById('enrollment-tally-result').innerHTML =
                            '<div style="text-align: center; padding: 40px;">' +
                            '<div style="display: inline-block; width: 32px; height: 32px; border: 4px solid #f3f3f3; border-top: 4px solid #004294; border-radius: 50%; animation: spin 1s linear infinite;"></div>' +
                            '<p style="margin-top: 10px; color: #666; font-size: 0.85em;">集計中...</p>' +
                            '</div>';
                        Utils.showModal('enrollment-tally-modal');

                        // データ取得・集計
                        const data = await this.computeTally();
                        this._lastTallyData = data;
                        const html = this.renderTallyTables(data);

                        // フィルタ情報を表示
                        const filterLabels = { submitted: '仮登録（本登録許可生徒も含む）', final: '本登録のみ', all: 'すべて（仮登録〜本登録）' };
                        const infoEl = document.getElementById('enrollment-tally-info');
                        if (infoEl) {
                            const today = new Date();
                            const dateStr = today.getFullYear() + '/' + String(today.getMonth() + 1).padStart(2, '0') + '/' + String(today.getDate()).padStart(2, '0');
                            infoEl.innerHTML = `対象: <strong>${filterLabels[data.filter] || data.filter}</strong> ｜ 対象生徒数: <strong>${data.studentCount} / ${data.totalStudentCount}名</strong> ｜ 集計日: ${dateStr}`;
                        }

                        // 結果を差し替え
                        document.getElementById('enrollment-tally-result').innerHTML = html;

                        // 科目名クリックのイベントデリゲーション（初回のみ設定）
                        if (!this._listenerAttached) {
                            document.getElementById('enrollment-tally-result').addEventListener('click', (e) => {
                                const target = e.target.closest('.tally-course-name');
                                if (target) {
                                    const courseName = target.dataset.courseName;
                                    if (courseName) EnrollmentTally.showStudentsModal(courseName);
                                }
                            });
                            this._listenerAttached = true;
                        }
                    } catch (error) {
                        console.error('[科目別集計] エラー:', error);
                        Utils.showToast('集計中にエラーが発生しました', 'error');
                        Utils.hideModal('enrollment-tally-modal');
                    }
                },

                // 集計データを計算
                async computeTally() {
                    // データ取得（キャッシュ活用）
                    if (!cachedAllStudentsData) {
                        cachedAllStudentsData = await DataManager.callGASFunction('getAllStudentsData');
                    }
                    // 教職員メール取得（キャッシュ活用）
                    if (!cachedTeacherEmails) {
                        cachedTeacherEmails = await DataManager.callGASFunction('getTeacherEmails');
                    }
                    const teacherEmailSet = new Set((cachedTeacherEmails || []).map(e => e.toLowerCase()));
                    // 新クラスオーバーレイ適用
                    const allStudents = NewClassImporter.applyOverlay(cachedAllStudentsData?.students || cachedAllStudentsData || []);

                    // ステータスフィルタ
                    const filterValue = document.getElementById('enrollment-tally-status-filter')?.value || 'submitted';
                    const submittedStatuses = new Set(['仮登録', '確認済', '本登録許可', '本登録']);
                    const finalStatuses = new Set(['本登録']);
                    const allStatuses = submittedStatuses; // 仮登録〜本登録

                    let targetStatuses;
                    if (filterValue === 'final') {
                        targetStatuses = finalStatuses;
                    } else if (filterValue === 'all') {
                        targetStatuses = allStatuses;
                    } else {
                        // submitted: 仮登録+確認済+本登録許可+本登録
                        targetStatuses = submittedStatuses;
                    }

                    // 教職員を除外した全生徒数（分母用）
                    const allRealStudents = allStudents.filter(s => {
                        const email = String(s['メールアドレス'] || '').trim().toLowerCase();
                        if (teacherEmailSet.has(email)) return false;
                        const status = String(s['ステータス'] || '').trim();
                        if (status === '利用停止') return false;
                        return true;
                    });

                    const filteredStudents = allRealStudents.filter(s => {
                        const status = String(s['ステータス'] || '').trim();
                        return targetStatuses.has(status);
                    });

                    // 全生徒からクラス一覧を抽出（フィルタ前の全生徒から抽出し、列が欠けないようにする）
                    const classSet = new Set();
                    allRealStudents.forEach(s => {
                        const grade = safeParseGrade(s['学年'], null);
                        const cls = String(s['組'] || '').trim();
                        if (grade && cls) classSet.add(`${grade}-${cls}`);
                    });
                    const classList = [...classSet].sort((a, b) => {
                        const sepA = a.indexOf('-'); const sepB = b.indexOf('-');
                        const gradeA = Number(a.substring(0, sepA));
                        const gradeB = Number(b.substring(0, sepB));
                        if (gradeA !== gradeB) return gradeA - gradeB;
                        return a.substring(sepA + 1).localeCompare(b.substring(sepB + 1), 'ja');
                    });
                    const grades = [...new Set(classList.map(c => c.split('-')[0]))].sort((a, b) => Number(a) - Number(b));

                    // セクション順序を取得（generateSectionDataと同じロジック）
                    const sectionOrderPriority = ['1年次科目', '2年次科目', '3年次科目', 'プロフェッショナル科目', 'その他'];
                    const sectionData = {};
                    const foundSectionsSet = new Set();

                    AppState.allCourses.forEach(course => {
                        // 開講なし科目は除外
                        if (course['開講なし']) return;

                        let section = course['セクション'];
                        if (!section || section.trim() === '') section = 'その他';

                        if (!sectionData[section]) {
                            sectionData[section] = [];
                            foundSectionsSet.add(section);
                        }

                        const courseName = course['科目名'];
                        const courseGrade = parseInt(course['学年']) || 1;

                        // クラス別カウント・履修者情報
                        const classCounts = {};
                        const courseStudents = [];

                        filteredStudents.forEach(student => {
                            const mark = String(student[courseName] || '').trim();
                            // ○系マークのみ（履修中）
                            if (!/^[○〇⚪]/.test(mark)) return;

                            const studentGrade = safeParseGrade(student['学年'], 1);
                            const studentClass = String(student['組'] || '').trim();
                            const classKey = `${studentGrade}-${studentClass}`;
                            classCounts[classKey] = (classCounts[classKey] || 0) + 1;
                            courseStudents.push({
                                name: student['名前'] || '',
                                grade: studentGrade,
                                className: studentClass,
                                number: parseInt(student['番号']) || 0,
                                classKey
                            });
                        });

                        sectionData[section].push({ courseName, courseGrade, classCounts, detail: course['詳細'] || '', students: courseStudents });
                    });

                    // セクション順序
                    const sectionOrder = [];
                    sectionOrderPriority.forEach(s => { if (foundSectionsSet.has(s)) sectionOrder.push(s); });
                    foundSectionsSet.forEach(s => { if (!new Set(sectionOrderPriority).has(s)) sectionOrder.push(s); });

                    return { sectionData, sectionOrder, classList, grades, filter: filterValue, studentCount: filteredStudents.length, totalStudentCount: allRealStudents.length };
                },

                // 集計データをHTMLテーブルに変換
                renderTallyTables(data) {
                    let html = '';
                    const { classList, grades } = data;

                    // 学年ごとのクラスリストを構築
                    const gradeClasses = new Map();
                    grades.forEach(g => gradeClasses.set(g, classList.filter(c => c.startsWith(g + '-'))));

                    data.sectionOrder.forEach(sectionName => {
                        const courses = data.sectionData[sectionName] || [];
                        if (courses.length === 0) return;

                        html += `<div style="margin-bottom: 20px; page-break-inside: avoid;">`;
                        html += `<h3 style="color: #004294; margin: 10px 0 8px 0; font-size: 1em; border-bottom: 1px solid #004294; padding-bottom: 4px;">${sectionName}</h3>`;
                        html += `<table style="width: 100%; border-collapse: collapse; font-size: 14px;">`;
                        html += `<thead><tr style="background: #eff6ff;">`;
                        html += `<th style="border: 1px solid #ccc; padding: 6px 6px; text-align: left;">科目名</th>`;
                        // 各学年のクラス列＋小計列
                        grades.forEach(g => {
                            gradeClasses.get(g).forEach(cls => {
                                html += `<th style="border: 1px solid #ccc; padding: 6px 2px; text-align: center; white-space: nowrap;">${Utils.escapeHtml(cls)}</th>`;
                            });
                            html += `<th style="border: 1px solid #ccc; padding: 6px 2px; text-align: center; white-space: nowrap; background: #e8f0fe;">${g}年計</th>`;
                        });
                        html += `<th style="border: 1px solid #ccc; padding: 6px 2px; text-align: center; white-space: nowrap;">合計</th>`;
                        html += `</tr></thead><tbody>`;

                        courses.forEach(({ courseName, classCounts, detail, students }) => {
                            const total = Object.values(classCounts).reduce((sum, v) => sum + v, 0);
                            const detailHtml = detail ? `<div style="font-size: 0.7em; color: #555; padding-left: 0.5em; line-height: 1; margin-top: -1px;">${Utils.escapeHtml(detail)}</div>` : '';
                            const nameStyle = detail
                                ? 'border: 1px solid #ccc; padding: 3px 6px; font-size: 0.9em; line-height: 1.2;'
                                : 'border: 1px solid #ccc; padding: 5px 6px;';

                            const isClickable = total > 0 && students && students.length > 0;
                            const clickableStyle = isClickable ? ' cursor: pointer; color: #004294;' : '';
                            const clickableAttr = isClickable ? ` class="tally-course-name" data-course-name="${Utils.escapeHtml(courseName)}"` : '';

                            html += `<tr>`;
                            html += `<td style="${nameStyle}${clickableStyle}"${clickableAttr}>${courseName}${detailHtml}</td>`;
                            grades.forEach(g => {
                                let subtotal = 0;
                                gradeClasses.get(g).forEach(cls => {
                                    const val = classCounts[cls] || 0;
                                    subtotal += val;
                                    html += `<td style="border: 1px solid #ccc; padding: 5px 2px; text-align: center;">${val || ''}</td>`;
                                });
                                html += `<td style="border: 1px solid #ccc; padding: 5px 2px; text-align: center; background: #e8f0fe; font-weight: bold;">${subtotal || ''}</td>`;
                            });
                            html += `<td style="border: 1px solid #ccc; padding: 5px 2px; text-align: center; font-weight: bold;">${total || ''}</td>`;
                            html += `</tr>`;
                        });

                        html += `</tbody></table></div>`;
                    });

                    if (!html) {
                        html = '<p style="color: var(--text-secondary-color); text-align: center; padding: 20px;">対象となる生徒がいません。</p>';
                    }
                    return html;
                },

                // 集計結果を印刷
                async printTally() {
                    try {
                        // 前回の印刷コンテンツが残っていれば除去
                        document.querySelectorAll('.print-content.enrollment-tally-print').forEach(el => el.remove());

                        const data = await this.computeTally();
                        const tablesHtml = this.renderTallyTables(data);

                        const filterLabels = { submitted: '仮登録（本登録許可生徒も含む）', final: '本登録のみ', all: 'すべて（仮登録〜本登録）' };
                        const today = new Date();
                        const dateStr = today.getFullYear() + '/' + String(today.getMonth() + 1).padStart(2, '0') + '/' + String(today.getDate()).padStart(2, '0');

                        // 印刷用コンテナ（A4縦向き・1段組）
                        const printContainer = document.createElement('div');
                        printContainer.className = 'print-content enrollment-tally-print';
                        printContainer.style.cssText = 'position: absolute; left: -9999px; top: 0; width: 794px; box-sizing: border-box;';

                        printContainer.innerHTML = `
                            <div style="font-size: 11px;">
                                <h2 style="text-align: center; margin: 0 0 5px 0; font-size: 14px; color: #333;">科目別履修者集計（クラス別）</h2>
                                <p style="text-align: center; margin: 0 0 8px 0; font-size: 11px; color: #000;">
                                    対象: ${filterLabels[data.filter] || data.filter} ｜ 対象生徒数: ${data.studentCount} / ${data.totalStudentCount}名 ｜ 集計日: ${dateStr}
                                </p>
                                <div>
                                    ${tablesHtml}
                                </div>
                            </div>
                        `;

                        document.body.appendChild(printContainer);

                        // 印刷用スタイル最適化
                        printContainer.querySelectorAll('h3').forEach(el => {
                            el.style.margin = '4px 0 2px 0';
                            el.style.fontSize = '11px';
                            el.style.paddingBottom = '2px';
                        });
                        printContainer.querySelectorAll('div[style*="margin-bottom"]').forEach(el => {
                            el.style.marginBottom = '6px';
                            el.style.breakInside = 'avoid';
                        });
                        printContainer.querySelectorAll('table').forEach(el => {
                            el.style.fontSize = '9px';
                        });
                        printContainer.querySelectorAll('td, th').forEach(el => {
                            el.style.padding = '2px 1px';
                            el.style.whiteSpace = 'nowrap';
                        });
                        printContainer.querySelectorAll('table th:not(:first-child)').forEach(el => {
                            el.style.fontSize = '8px';
                        });
                        // テーブルがコンテナ幅を超える場合は縮小
                        const containerWidth = printContainer.clientWidth;
                        printContainer.querySelectorAll('table').forEach(el => {
                            if (el.scrollWidth > containerWidth) {
                                const scale = containerWidth / el.scrollWidth;
                                el.style.transformOrigin = 'top left';
                                el.style.transform = `scale(${scale})`;
                                el.style.width = `${100 / scale}%`;
                            }
                        });
                        // クリッカブル科目名の印刷用補正（青→黒、ポインタ→デフォルト）
                        printContainer.querySelectorAll('.tally-course-name').forEach(el => {
                            el.style.color = '#000';
                            el.style.cursor = 'default';
                        });

                        // 印刷後にコンテンツを削除
                        const cleanup = () => {
                            if (document.body.contains(printContainer)) {
                                document.body.removeChild(printContainer);
                            }
                            window.removeEventListener('afterprint', cleanup);
                        };
                        window.addEventListener('afterprint', cleanup);

                        requestAnimationFrame(() => {
                            window.print();
                        });

                        // フォールバック: afterprintが発火しない環境用
                        setTimeout(cleanup, 5000);
                    } catch (error) {
                        console.error('[科目別集計] 印刷エラー:', error);
                        Utils.showToast('印刷中にエラーが発生しました', 'error');
                    }
                },

                // 集計データ保持用
                _lastTallyData: null,
                _listenerAttached: false,

                // 科目の履修者一覧モーダルを表示
                showStudentsModal(courseName) {
                    if (!this._lastTallyData) return;

                    // 全セクションから該当科目を検索
                    let targetStudents = null;
                    const { sectionData, sectionOrder } = this._lastTallyData;
                    for (const section of sectionOrder) {
                        const courses = sectionData[section] || [];
                        const found = courses.find(c => c.courseName === courseName);
                        if (found && found.students) {
                            targetStudents = found.students;
                            break;
                        }
                    }

                    if (!targetStudents || targetStudents.length === 0) return;

                    // タイトル・情報
                    document.getElementById('enrollment-tally-students-title').textContent = courseName;
                    document.getElementById('enrollment-tally-students-info').textContent = `履修者数: ${targetStudents.length}名`;

                    // 学年ごとにセクション分け
                    const grades = [...new Set(targetStudents.map(s => (s.classKey || '').split('-')[0]))].sort();

                    let html = '';
                    for (const grade of grades) {
                        const students = targetStudents
                            .filter(s => (s.classKey || '').split('-')[0] === grade)

                                if (a.classKey !== b.classKey) return a.classKey.localeCompare(b.classKey, 'ja');
                                return a.number - b.number;
                            });

                        html += `<h4 style="margin: 24px 0 12px; padding-bottom: 6px; border-bottom: 2px solid #004294; font-size: 14px; color: #004294;">${grade}年（${students.length}名）</h4>`;
                        html += '<table style="width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: 16px;">';
                        html += '<thead><tr style="background: #eff6ff;">';
                        html += '<th style="border: 1px solid #ccc; padding: 6px 8px; text-align: left; width: 120px;">クラス</th>';
                        html += '<th style="border: 1px solid #ccc; padding: 6px 8px; text-align: left;">名前</th>';
                        html += '</tr></thead><tbody>';
                        students.forEach(s => {
                            const cls = (s.classKey || '').split('-')[1] || '';
                            html += `<tr>`;
                            html += `<td style="border: 1px solid #ccc; padding: 5px 8px;">${grade}年${cls}組${s.number}番</td>`;
                            html += `<td style="border: 1px solid #ccc; padding: 5px 8px;">${Utils.escapeHtml(s.name)}</td>`;
                            html += `</tr>`;
                        });
                        html += '</tbody></table>';
                    }
                    document.getElementById('enrollment-tally-students-list').innerHTML = html;

                    Utils.showModal('enrollment-tally-students-modal');
                },

                closeStudentsModal() {

            };

            // EnrollmentTallyをグローバルに公開
            window.EnrollmentTally = EnrollmentTally;

            // ===== 科目データ管理 =====
            const CourseManager = {
                _editingOriginalName: null, // 編集中の元の科目名（追加時はnull）
                _courseList: [],            // 取得済み科目一覧
                _headers: [],              // 科目データシートのヘッダー
                _staircaseCourses: [],     // 選択中の階段科目リスト

                // フォームフィールドとヘッダーのマッピング
                _fieldMap: {
                    'course-edit-name': '科目名',
                    'course-edit-grade': '学年',
                    'course-edit-category': '区分',
                    'course-edit-units': '単位数',
                    'course-edit-section': 'セクション',
                    'course-edit-selectable-grades': '選択可能学年',
                    'course-edit-staircase': '階段',
                    'course-edit-exclusive': '同時不可',
                    'course-edit-subject': '教科',
                    'course-edit-detail': '詳細',
                    'course-edit-closed': '開講なし'
                },

                // モーダルを開いて科目一覧を表示
                async openModal() {
                    const listEl = document.getElementById('course-management-list');
                    listEl.innerHTML = '<div style="text-align: center; padding: 40px; color: #6c757d;">' +
                        '<div style="display: inline-block; width: 32px; height: 32px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite;"></div>' +
                        '<p style="margin-top: 10px; color: #666; font-size: 0.85em;">読み込み中...</p></div>';

                    try {
                        const result = await DataManager.callGASFunction('getCourseList');

                            listEl.innerHTML = '<div style="text-align: center; padding: 40px; color: #dc3545;">' +
                                (result?.error || 'データの取得に失敗しました') + '</div>';

                },

                // セクション別にテーブル描画
                renderCourseList() {
                    const listEl = document.getElementById('course-management-list');
                    if (this._courseList.length === 0) {
                        listEl.innerHTML = '<div style="text-align: center; padding: 40px; color: #6c757d;">科目がありません</div>';
