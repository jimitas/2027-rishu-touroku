    <style>
        /* グローバルbox-sizing: padding/borderを幅に含める */

        /* デザインテーマを更新 */

        /* iOS Safari対策: html要素にもoverflow-x: hiddenが必要 */

        .save-button-in-summary {

        .confirmation-modal {

        /* 仮登録確認モーダル */

        .btn-confirm, .btn-cancel, .btn-pdf {

        .btn-confirm {

        .btn-confirm:hover {

        .btn-cancel:hover {

        #teacher-bulk-approve-btn,
        #teacher-bulk-reject-btn {

        }

        #teacher-bulk-approve-btn:disabled,
        #teacher-bulk-reject-btn:disabled {

        #teacher-single-approve-btn,

        /* --- 登録フォーム --- */
        .course-group {
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .course-group h2 {
            margin-top: 8px;
        }

        .course-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .course-table th, .course-table td {
            border: 1px solid var(--border-color);
            padding: 3px;
            text-align: center;
            vertical-align: middle;
        }

        .course-table th {
            background: linear-gradient(135deg, #e3f2fd 0%, #f1f8ff 100%);
            color: #004294;
            font-weight: bold;
        }

        .course-table td {
            height: 44px;
            background-color: white;
        }

        /* PC版: 科目名列の折り返し防止（リサイズ時の行高さ変化を防止） */
        .course-table td:first-child {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* PC版: 詳細表示中のセルのみフォント縮小+行間詰めで2行を44px内に収める */
        .course-table td:first-child:has(.course-detail) {
            font-size: 0.85em;
            line-height: 1.2;
        }

        /* 科目詳細テキスト（2行目にブロック表示） */
        .course-detail {
            display: block;
            font-size: 0.75em;
            color: #555;
            font-weight: normal;
            line-height: 1.2;
            margin-top: 1px;
            padding-left: 1em;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 科目名列ラッパー: 行高さ固定（table-cellのheight最小制約を回避） */
        .course-name-wrapper {
            max-height: 38px; /* 44px - padding 3px*2 */
            overflow: hidden;
        }

        .course-table th:nth-child(2), .course-table td:nth-child(2) {
            width: 80px; /* 区分列 */
            white-space: nowrap;
        }

        .course-table th:nth-child(3), .course-table td:nth-child(3) {
            width: 55px; /* 単位数列 */
            white-space: nowrap;
        }

        .course-table th:nth-child(4), .course-table td:nth-child(4) {
            width: 70px; /* 登録列 */
            white-space: nowrap;
        }

        /* 教職員専用画面: 左パネル分テーブルが狭いため列幅を縮小（科目名は残りスペースを全取り） */
        #teacher-screen .course-table th:nth-child(2),
        #teacher-screen .course-table td:nth-child(2) { width: 80px; }
        #teacher-screen .course-table th:nth-child(3),
        #teacher-screen .course-table td:nth-child(3) { width: 60px; }
        #teacher-screen .course-table th:nth-child(4),
        #teacher-screen .course-table td:nth-child(4) { width: 70px; }

        .course-row.is-required {
            background-color: var(--required-row-bg-color);
        }

        .mark-cell {
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }

        .mark-cell.completed {
            cursor: not-allowed;
            color: var(--text-color);
            font-size: 1em;
            font-weight: normal;
        }

        .mark-cell.manual-registered {
            color: var(--manual-registered-color);
        }

        .mark-cell.auto-registered {
            cursor: not-allowed;
            color: var(--auto-registered-color);
        }

        .mark-cell.retaken-registered {
            cursor: not-allowed;
            color: #ff6b35; /* オレンジ色 */
            font-weight: bold;
        }

        .mark-cell.required-registered {
            color: #007bff; /* 青色（必修・グラフと統一） */
            font-weight: bold;
            cursor: not-allowed;
        }

        .mark-cell.required-designated-registered {
            color: #0d6efd; /* 青色（履修指定） */
            font-weight: bold;
            cursor: not-allowed;
        }

        .mark-cell.elective-registered {
            color: var(--manual-registered-color); /* 手動選択と同じ明るい緑色に統一 */
            font-weight: bold;
            cursor: pointer;
        }

        
        /* 教職員専用画面の進捗セクション背景色統一 */
        .progress-section {
            background: var(--summary-bg-color); /* トップページのサマリーと同じ背景 */
            padding: 15px 20px;
            border-radius: 8px;
            margin: 15px 0;
            box-shadow: 0 2px 8px rgba(0, 123, 255, 0.1);
        }

        .mark-cell.required-selectable {
            color: var(--required-selectable-color);
        }
        
        .mark-cell.completed-mark {
            color: var(--completed-mark-color);
            font-size: 1em;
            cursor: not-allowed;
        }
        
        .mark-cell.retaken-mark {
            color: var(--retaken-mark-color);
            cursor: not-allowed;
        }

        .mark-cell.retaken-required-mark {
            color: #ff6b35; /* 再履修必修科目はオレンジ（グラフと同じ） */
            cursor: not-allowed;
        }

        .mark-cell.locked {
            cursor: not-allowed !important;
        }

        .mark-cell.unselectable {
            cursor: not-allowed;
            position: relative; /* ::after の斜線描画に必要 */
        }

        .mark-cell.unselectable:not(.completed)::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom right,
                transparent 49%,
                rgba(0, 0, 0, 0.4) 49.5%,
                rgba(0, 0, 0, 0.4) 50.5%,
                transparent 51%
            );
            pointer-events: none;
        }

        .mark-cell.simultaneous-disabled {
            cursor: not-allowed !important;
            color: #999 !important;
            opacity: 0.6;
            position: relative;
        }

        /* 同時不可制約が優先される場合、unselectableの斜線を無効化 */
        .mark-cell.simultaneous-disabled.unselectable::after {
            background: none !important;
        }

        .mark-cell.simultaneous-disabled::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom right,
                transparent 49%,
                rgba(0, 0, 0, 0.8) 49.5%,
                rgba(0, 0, 0, 0.8) 50.5%,
                transparent 51%
            ) !important;
            pointer-events: none;
            z-index: 2 !important;
        }


        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .toast {
            background-color: var(--danger-color);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            animation: fadeInOut 4s ease-in-out;
        }

        @keyframes fadeInOut {
            0%, 100% {
                opacity: 0;
                transform: translateY(20px);
            }
            10%, 90% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

            transition: 0.4s;

            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
